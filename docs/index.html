oted weakness last season.", "Content": "The Raiders agreed to trade defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks, according to sources. Crosby, 28, is a five-time Pro Bowler and has recorded 69.5 career sacks since 2019, more than double the total of any Ravens player over that span. His performance in a September 2024 game against Baltimore, where he recorded six tackles, four tackles for loss, and two sacks\u2014including one that sacked quarterback Lamar Jackson\u2014impressed the Ravens enough to pursue him. \n\nThe Ravens sought to bolster their pass rush, which they identified as a weakness this past season. General manager Eric De Costa emphasized the importance of upgrading at edge rusher during the NFL combine, noting that a ferocious pass rush is key to strong defenses.", "Image_URLs": "docs/images/espn_nfl_1.jpg"}, {"Source": "Laravel News", "Title": "Kit: An Opinionated API Starter Kit for Laravel", "Date": "Sun, 01 Mar 2026 20:51:54 +0000", "Author": "Yannick Lyn Fatt", "URL": "https://laravel-news.com/kit-an-opinionated-api-starter-kit-for-laravel?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Kit by Steve Mc Dougallis is a Laravel API starter kit featuring token-based authentication, JSON:API responses, security defaults, and sunset middleware. It supports versioned routes, invokable controllers, form request validation, and API documentation via Scribe. Included security measures cover rate limiting, headers, and content-type enforcement. It also offers localization, testing, and static analysis tools for streamlined API development.", "Content": "Kit by Steve Mc Dougallis is a Laravel API starter kit built around token-based authentication, API documentation, and security-first defaults. It targets developers who want a structured starting point for building versioned JSON APIs without wiring everything up from scratch.\n\nGetting Started: Clone the repository, install dependencies, and run the setup script:\n```\ncomposer install\ncomposer run setup\nphp artisan serve\n```\nThe `composer run setup` command copies `.env.example` to `.env`, generates an app key, and runs migrations against a local SQLite database.\n\nAPI Architecture: Kit takes a few deliberate architectural positions:\n- No global/api prefix\u2014 routes are versioned directly, e.g., `/v1/auth/login`.\n- Invokable controllers only\u2014 each controller has a single `__invoke` method.\n- Form Requests for validation\u2014 request payloads are validated in dedicated Form Request classes, with DTO-style payload classes in `app/Http/Payloads/V1`.\n- JSON:API resource format\u2014 responses follow a consistent structure for entity data.\n\nAuthentication: Nine routes handle the full auth lifecycle:\n- Registration and login (both return tokens via Laravel Sanctum).\n- `/v1/auth/me` (requires Bearer token).\n- Email verification via signed URLs.\n- Password reset with anti-enumeration responses (the same response is returned whether or not the email exists).\n\nSecurity Defaults: Kit includes several security defaults out of the box:\n- ULID primary keys for user records.\n- Predefined rate limits on auth endpoints, configurable in the App Service Provider.\n- Mandatory Content-Type: application/json enforcement on write requests.\n- Hardened response headers, including `X-Content-Type-Options: nosniff`, `X-Frame-Options: DENY`, and `Referrer-Policy: no-referrer`.\n- Request ID tracking.\n- Audit logging for sensitive operations.\n\nSunset Middleware: Kit also includes a Sunset middleware for deprecating API endpoints over time. It is applied directly to a route with three parameters: the sunset date, a successor URL, and a boolean to control enforcement. For example:\n```\nRoute::middleware('sunset:2027-01-01,https://api.acme.com/v2/auth/login,true')\n    ->post('/v1/auth/login', LoginController::class);\n```\nWhile the endpoint is active, the middleware appends Deprecation, Sunset, and Link headers to responses, allowing clients to detect deprecation and plan accordingly. After the sunset date and enforcement, the endpoint returns a 410 Gone status.\n\nDocumentation: API documentation is generated using Scribe. Annotations are attribute-based rather than docblock-based, and the setup produces an OpenAPI specification alongside the docs.\n\nLocalization: The kit respects the `Accept-Language` request header and responds with a `Content-Language` header. Supported locales default to English, with translation files at `lang/en/api.php` and `lang/es/api.php`.\n\nTooling: The project uses Pest for tests, PHPStan for static analysis, Pint for code formatting, and Rector for automated refactoring. GitHub Actions workflows are included.", "Image_URLs": "docs/images/laravel_5.png"}, {"Source": "Laravel News", "Title": "Ward: A Security Scanner for Laravel", "Date": "Sun, 01 Mar 2026 20:52:40 +0000", "Author": "Yannick Lyn Fatt", "URL": "https://laravel-news.com/ward-a-security-scanner-for-laravel?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Ward is a Go-based command-line security scanner for Laravel projects. It analyzes project structure, environment variables, configurations, dependencies, and applies 42 security rules across categories like secrets, injection, and XSS. It offers detailed reports in multiple formats and can be integrated into CI/CD pipelines with configurable severity thresholds. Installation requires Go, and usage involves initializing and scanning local or remote projects.", "Content": "Ward is a command-line security scanner for Laravel, created by El Jakani Yassine. Written in Go, it is designed around Laravel's structure. Instead of running generic pattern matching across the codebase, Ward first parses the project's structure\u2014including routes, models, controllers, middleware, Blade templates, config files, environment variables, and dependencies\u2014and then runs targeted checks against that context.\n\nInstallation requires Go. After installing, run:\n\n```\ngo install github.com/eljakani/ward@latest\n```\n\nEnsure that `$GOPATH/bin` is in your PATH:\n\n```\nexport PATH=\"$PATH:$(goenv GOPATH)/bin\"\n```\n\nOnce installed, initialize Ward with:\n\n```\nward init\n```\n\nThis creates `~/.ward/` with a default configuration file, over 42 built-in rules organized by category, and directories for reports and scan history.\n\nTo scan a project, point Ward at a local directory:\n\n```\nward scan /path/to/laravel-project\n```\n\nOr at a remote Git repository:\n\n```\nward scan https://github.com/user/laravel-project.git\n```\n\nDuring a scan, Ward displays a terminal user interface (TUI) showing progress and live severity counts. After completion, it presents a sortable findings table with severity badges, category grouping, and a detail panel with descriptions, code snippets, and remediation guidance.\n\nWard includes four independent scan engines:\n\n- **env-scanner:** Checks 8 items in your `.env` file, such as debug mode enabled in production, missing or weak `APP_KEY`, and secrets leaked in `.env.example`.\n- **config-scanner:** Runs 13 checks across `config/*.php` files, including hardcoded credentials, insecure session flags, CORS wildcard origins, and missing security options.\n- **dependency-scanner:** Queries the OSV.dev advisory database in real time against your `composer.lock` to identify vulnerable Packagist packages.\n- **rules-scanner:** Applies 42 rules across seven categories, including secrets (hardcoded passwords, API keys), injection (SQL, command, eval), XSS (unescaped Blade output, JavaScript injection), debug artifacts (`dd()`, `dump()`, `phpinfo()`), weak cryptography (MD5, SHA1, insecure RNG), configuration issues (CORS, CSRF, mass assignment), and authentication gaps (missing middleware, absent rate limiting).\n\nOutput formats are configurable in `~/.ward/config.yaml`:\n\n- **json:** Machine-readable results\n- **sarif:** Compatible with GitHub Code Scanning and IDE integrations\n- **html:** Standalone dark-themed visual report\n- **markdown:** Suitable for pull request comments\n\nWard can be integrated into CI/CD pipelines. It returns non-zero exit codes when findings meet or exceed specified severity levels, enabling deployment gating:\n\n```\nward scan --output json --fail-on high\n```", "Image_URLs": "docs/images/laravel_4.png"}, {"Source": "Laravel News", "Title": "Polyscope Is an Ai-First Dev Environment for Orchestrating Agents", "Date": "Thu, 05 Mar 2026 03:08:03 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/polyscope-is-an-ai-first-dev-environment-for-orchestrating-agents?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Beyond Code has launched Polyscope, a free AI-first development environment for orchestrating multiple AI agents simultaneously. Key features include parallel agent execution, fast copy-on-write cloning, a built-in preview browser, multi-model querying, and workspace integration. Available for macOS, Polyscope offers free plans for solo developers and teams.", "Content": "Polyscope Is an AI-First Dev Environment for Orchestrating Agents\n\nThe team at Beyond Code has announced Polyscope, a free agent orchestration tool designed to run multiple AI agents simultaneously. \n\nFrom the announcement: \"Today we're announcing Polyscope - the free agent orchestration tool of my dreams. Run dozens of AI agents at the same time, blazing fast copy-on-write clones, a built-in preview browser you can use to visually prompt your agents, and much more.\"\n\nKey features include:\n- Running dozens of AI agents in parallel\n- Copy-on-write clones for fast agent branching\n- Built-in preview browser for visually prompting agents\n- Querying multiple models to collaborate on a question\n- Connecting workspaces to multiple repositories\n\nPolyscope is available for macOS at getpolyscope.com, offering a free plan and options for solo developers and teams.", "Image_URLs": "docs/images/laravel_2.png"}, {"Source": "Saskatoon Police News", "Title": "Hit & Run / Assault - 400 Block Witney Avenue North", "Date": "Thu, 05 Mar 2026 20:35:09 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026115", "Summary": "Police are investigating a civilian vehicle chase and assault on March 5, 2026, on Witney Avenue North. A vehicle chased and struck another, then an occupant assaulted the driver. The victim sustained non-life-threatening injuries. The suspect vehicle fled before police arrived. Both parties are believed to know each other; police continue their investigation.", "Content": "Police are investigating following a civilian vehicle chase that led to an assault. Shortly before 10:00 a.m. on March 5, 2026, officers responded to the 400 block of Witney Avenue North after reports of altercations between the occupants of two vehicles. It was reported that a civilian vehicle had been chasing another before intentionally striking it in the 400 block of Witney Avenue. An occupant then exited the vehicle and began assaulting the driver of the struck vehicle. \n\nUpon arrival, officers found the assault victim suffering from non-life-threatening injuries; the other involved vehicle had fled prior to police arrival. Through investigation, officers learned that a confrontational exchange occurred in the area of 22nd Street West and Idylwyld Drive North between two parties before one began chasing the other in their vehicles. During the chase, multiple parked vehicles were struck and damaged. Both parties are believed to have known each other, and police continue their investigation.", "Image_URLs": "docs/images/saskatoon_police_6.png"}, {"Source": "Nasdaq - Original", "Title": "A Tale of Two Earnings Cycles", "Date": "Thu, 05 Mar 2026 22:45:23 +0000", "Author": "Phil Mackintosh", "URL": "https://www.nasdaq.com/articles/tale-two-earnings-cycles", "Summary": "In Q4 2025, both Nasdaq-100\u00ae large caps and S&P 600 small caps showed strong earnings growth, with the Nasdaq posting 17% year-over-year gains and small caps returning to positive growth after 11 quarters of declines. The drivers differ: large caps benefited from stable margins and less sensitivity to inflation and interest rate headwinds, while small caps' recovery was aided by easing inflation, wage pressures, and Fed rate cuts.", "Content": "Earnings: A Tale of Two Earnings Cycles\n\nThe fourth quarter of 2025's earnings season continued a recent trend: the Nasdaq-100\u00ae large caps and S&P 600 small caps both experienced strong earnings growth. However, beyond the headline numbers, the drivers of these earnings trends are quite different.\n\nBoth large and small caps are showing strong earnings growth now. The Nasdaq-100\u00ae posted 17% year-over-year earnings growth in Q4 2025, extending its streak to 11 consecutive quarters of at least 15% growth. In contrast, small caps had experienced 11 straight quarters of negative earnings growth from Q3 2022 through Q1 2025. But the trend reversed in Q2 2025, and Q4 marks its third consecutive quarter of positive earnings growth.\n\nLooking ahead, consensus estimates project the Nasdaq-100\u00ae to continue its streak of over 15% earnings growth for the next year, while small caps are expected to maintain their positive growth trend. Despite both indexes currently showing strong earnings growth, the underlying drivers differ significantly.\n\nThe Nasdaq-100\u00ae has been less sensitive to the headwinds that pushed small caps into recession. Earnings growth can be broken down into three components: earnings before interest and taxes (EBIT) growth, interest costs, and taxes and other items. The analysis uses last twelve months (LTM) data.\n\nSmall caps faced multiple challenges. Over the past couple of years, they experienced negative EBIT growth due to margin pressures from high inflation and wage increases, along with less pricing power compared to large caps. Rising interest costs, driven by Federal Reserve rate hikes from 2022 to 2024, also impacted small caps. Recently, as inflation and wage growth slowed, EBIT growth turned positive, aided by Fed rate cuts that stabilized interest costs, which are expected to decline further in upcoming quarters.\n\nIn contrast, the Nasdaq-100\u00ae appeared to operate in a world less affected by these headwinds. While these challenges impacted large caps less\u2014thanks to their higher margins\u2014they still played a role in their earnings dynamics.", "Image_URLs": "docs/images/nasdaq_original_4.jpg"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Hwy 11 North Bound Lanes", "Date": "Thu, 05 Mar 2026 23:24:40 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026116", "Summary": "Saskatoon police report a semi-trailer collision on Highway 11 near Circle Drive, causing damage to the bridge. One eastbound lane on Circle Drive and one northbound lane on Highway 11 are now open. Traffic restrictions remain, with ongoing investigations and assessments. Motorists are advised to take alternate routes and expect delays. No injuries were reported.", "Content": "The Saskatoon Police Service advises that City of Saskatoon engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed.\n\nThe Saskatoon Police Service Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nThe police report that a semi-trailer carrying equipment on the northbound lane of Highway 11, entering the city from Regina at the Circle Drive overpass, was too high for the structure, causing significant damage.\n\nAs a result, the northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge are closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_4.png"}, {"Source": "Star Phoenix", "Title": "Sask. Party government under fire for $10-a-day child care cutoff", "Date": "Thu, 05 Mar 2026 23:26:31 +0000", "Author": "Michael Joel-Hansen", "URL": "https://thestarphoenix.com/news/saskatchewan/sask-party-government-under-fire-for-10-a-day-child-care-cutoff", "Summary": "Saskatchewan's new child care policy restricts $10-a-day coverage to children born after April 1, leaving families with children born before that date facing higher fees. Critics, including NDP Leader Carla Beck, and providers argue the cutoff was poorly communicated and unfair, impacting families like Tina Lloyd\u2019s, whose daughter\u2019s costs will rise significantly. The government defends the deal as the best possible negotiated outcome.", "Content": "Saskatchewan NDP Leader Carla Beck criticized the provincial government after it announced that only children who turn six and are born after April 1 will qualify for the $10-a-day childcare rate, leaving some families facing full fees.\n\nTina Lloyd had been hopeful she\u2019d have some monthly breathing room in her family\u2019s budget when she heard that six-year-olds in their kindergarten year would be covered for $10-a-day child care under the upcoming agreement between the provincial and federal governments. The coverage was expected to last until the end of kindergarten. Lloyd, whose daughter has a March 31 birthday, and her husband are facing increased care fees, which will rise from $217 each month to $900 for full-time care or $650 for half-time care. The provincial government recently informed parents and providers that the agreement covers $10-daily child care only for children who turn six after April 1, when the new agreement takes effect.\n\nUnder the new provisions, children with birthdays before April 1 will not be covered. \u201cTheir notice this week said, \u2018No, it\u2019s going to be an extra $680 starting less than a month from now,\u2019\u201d Lloyd said.\n\nWhen the $1.6 billion funding agreement was announced in November 2025, provincial Education Minister Everett Hindley stated that ensuring children did not age out of the program at six was a major priority. \u201cIf we\u2019re going to renegotiate this deal, this is one thing we would certainly want to try to get in there,\u201d he said at the time.\n\nSpeaking with media in Regina on Thursday, Hindley acknowledged the agreement is \u201cnot a perfect deal\u201d but insisted it is an improvement over the previous arrangement. He explained that the deal was the result of negotiations between the provincial and federal governments, which involved compromises. \u201cThis is the best deal that we were able to obtain,\u201d Hindley said.\n\nShelby Fox, owner of Early Bird Daycare in Warman, believed the province indicated the new child care agreement would extend $10-a-day childcare to all six-year-olds, which providers had been advocating for. Fox has one child in her care affected by the cutoff and described the situation as \u201cdisheartening.\u201d To manage increased costs, Lloyd is considering picking up more nursing shifts, and she and her husband may also ask grandparents for help with child care.\n\nThe timing of the notice was also problematic. Providers learned about the April 1 cutoff only on Monday. Fox noted that provincial regulations require licensed providers to give at least one month\u2019s notice before any fee changes, and she argued they did not receive sufficient notice based on these standards.", "Image_URLs": "docs/images/star_phoenix_5.jpg"}, {"Source": "Smashing Magazine", "Title": "Say Cheese! Meet SmashingConf Amsterdam \ud83c\uddf3\ud83c\uddf1", "Date": "Thu, 26 Feb 2026 11:00:00 GMT", "Author": "hello@smashingmagazine.com (Iris Lje\u0161njanin)", "URL": "https://smashingmagazine.com/2026/02/meet-smashingconf-amsterdam/", "Summary": "The first Smashing Conf Amsterdam will be held April 13\u201316, 2026, at Path\u00e9 Tuschinski, focusing on UX, design systems, accessibility, AI, and modern CSS. The conference emphasizes live workflows and practical insights for designers and UI engineers. Tickets are \u20ac724.79 in person and \u20ac200 online, with discounts for Smashing Membership.", "Content": "Events, Smashing Conf\n\nAbout The Author\n\nJuggling between three languages on a daily basis, Iris is known for her love of linguistics, arts, web design, and typography.\n\nIris \u21ac Email Newsletter\n\nYour (smashing) email  \nWeekly tips on front-end & UX.  \nTrusted by 182,000+ folks.  \nSmart Interface Design Patterns, 45 lessons + UX training  \nCelebrating 10 million developers  \nNaming Design Systems, with Samantha Gordashko  \nBuilding with AI for everyone. An introduction to Lovable Survey JS: White-Label Survey Solution for Your JS App  \nHow To Measure UX and Design Impact, with Vitaly Friedman\n\nMeet our brand new conference for designers and UI engineers who love the web. That\u2019s Smashing Conf Amsterdam, taking place in the legendary Path\u00e9 Tuschinski, on April 13\u201316, 2026.\n\nWe\u2019ve been passionate about design & UX for years. We\u2019ve published articles on design systems and usability, inclusive design and product design, UX research, and enterprise UX. Now it\u2019s time to bring it all together: in-person, in a new location, with a new spirit of curiosity and community. And it\u2019s happening this April!\n\nMeet the first Smashing Conf Amsterdam taking place on April 13\u201316, 2026! A conference for designers and UI engineers focused on UX and front-end topics: design systems, accessibility, Figma, UX writing, modern CSS, and AI\u2014all while enjoying the best views, fun, and gezelligheid that Amsterdam has to offer.\n\nIn-Person \u20ac724.79  \nGet your ticket!  \nApril 13\u201316, 2026. Amsterdam, the Netherlands.  \nSave up to 25% with Smashing Membership.\n\nOnline \u20ac200.00  \nLive talks + behind-the-scenes access with all video recordings, of course.  \nSave up to 25% with Smashing Membership.\n\n\u201cGezelligheid\u201d Meets Modern Tech\n\nOne of the most difficult Dutch words to translate directly into English is Gezelligheid (pronounced guh-ZELL-uhk-hyde). It\u2019s a foundational concept in Dutch culture that loosely translates to coziness, conviviality, and a warm, social, or inviting atmosphere\u2014and that\u2019s exactly what Smashing Conf Amsterdam has to offer.\n\nWhat Should You Expect?\n\nSince launching our first Smashing Conf in 2012, each event has focused on how industry professionals work, fail, and succeed. We encourage speakers to share lessons learned and demonstrate their processes. Don\u2019t be surprised to see speakers sitting down and showing their design process or setting up a Figma board and designing live with the audience.\n\nSmashing Conf Amsterdam is a premier, single-track conference curated for front-end developers, UI engineers, and UX designers. Unlike traditional conferences that rely on polished slide decks, Smashing Conf emphasizes a \u201clive-work\u201d philosophy. Speakers are encouraged to showcase their actual workflows\u2014coding live, designing in Figma, and troubleshooting in real-time\u2014to provide actionable insights rather than high-level theory.\n\nPrevious conference talks are available on our YouTube channel.", "Image_URLs": "docs/images/smashing_5.png"}, {"Source": "Nasdaq - Original", "Title": "The SIP Formula Is Broken and Everyone Knows It", "Date": "Thu, 26 Feb 2026 22:20:07 +0000", "Author": "Phil Mackintosh", "URL": "https://www.nasdaq.com/articles/sip-formula-broken-and-everyone-knows-it", "Summary": "The SIP (Securities Information Processor) and NBBO (National Best Bid and Offer) were designed to protect investors and improve liquidity, but the current market structure exploits economic incentives without adding value. The SIP's revenue-sharing formula favors data providers and less-liquid stocks, with quotes playing a more significant role than trades in price discovery, raising concerns about its effectiveness.", "Content": "Market Infrastructure: The SIP Formula Is Broken and Everyone Knows It\n\nFebruary 26, 2026 \u2014 05:20 pm EST\n\nInvestors around the world know that it's important to understand the right prices for stocks and ideally avoid paying too much for the stocks they buy. In the U.S., solving that problem included creating a consolidated tape (also known as Securities Information Processor, or SIP) and a National Best Bid and Offer (NBBO) as part of Reg NMS.\n\nThe SIP has been undeniably beneficial for the public. By consolidating all the best prices, it protected investors, reduced trading costs and complexity, and arguably improved liquidity, helping attract more companies to U.S. public markets. However, the NBBO isn\u2019t a \u201cfree service.\u201d It results from venues and traders who decide to advertise their liquidity publicly. Regulators at the time recognized that those providing data to the public should be rewarded and incentivized.\n\nToday, the market has evolved in ways that exploit economic incentives\u2014often without adding the intended value to the public, who expect to pay for reliable NBBO quotes. The SIP formula works to reward those providing its data. As detailed elsewhere, the SIP charges different types of users different prices based on how much that data benefits them. Professionals pay more than retail investors, and electronic trading systems pay more than individual traders. It also rewards data contributors to the SIP. Since quotes and trades both contain signals about a stock\u2019s value and market interest, the current formula splits revenue evenly: 50% to trades and 50% to quotes, with more money allocated to less-liquid stocks that require market makers.\n\nThe totals are shown in Chart 1. Note that \u201cnon-display\u201d data, used for routing, trade pricing, and benchmarking\u2014rather than on-screen display\u2014relies on the \u201cuse\u201d of data by computers, rather than for broker or customer screens, suggesting quotes are twice as important as trades. A number of well-known academics have studied price discovery extensively. Their research indicates that, for most stocks, quotes matter about twice as much as trades. This makes sense, considering that many trades use NBBO prices\u2014such as midpoint trades that occur at the NBBO midpoint at the time.\n\nThe more detailed analysis from Brogaard\u2019s study supports this view.", "Image_URLs": "docs/images/nasdaq_original_12.jpg"}, {"Source": "Smashing Magazine", "Title": "Now Shipping: Accessible UX Research, A New Smashing Book By Michele Williams", "Date": "Tue, 03 Mar 2026 15:00:00 GMT", "Author": "hello@smashingmagazine.com (Ari Stiles)", "URL": "https://smashingmagazine.com/2026/03/accessible-ux-research-release/", "Summary": "The Smashing Book \u201cAccessible UX Research\u201d by Michele Williams is now available worldwide. It offers practical guidance on inclusive UX research, focusing on assistive technologies, diverse disabilities, and integrating accessibility into the design process. The book provides strategies for involving disabled users, managing resources, and enhancing research quality across various professional roles.", "Content": "The newest Smashing Book, \u201cAccessible UX Research\u201d by Michele Williams, is now shipping worldwide. This book focuses on research, assistive technology, different types of disability, and integrating accessibility into the entire design process. It aims to help readers make their UX research more inclusive and thorough, regardless of budget or timeline.\n\nGood UX research is fundamental to creating great products. It reduces guesswork and helps solve problems early. One effective way to enhance research is by ensuring inclusivity\u2014testing with users with diverse needs and abilities and using their feedback to develop more accessible products.\n\nAccessible UX Research provides a clear, easy-to-follow roadmap for planning and executing effective user research. Dr. Michele Williams draws on extensive experience to offer guidance suitable for various professionals interested in digital product development. \n\nFor beginners, the book offers tips on making research more inclusive, asking better questions, understanding biases, and managing limited resources effectively. Accessibility professionals will find detailed information on assistive technologies, how to incorporate them into testing, and ways to document and share results to impact product development. Developers, managers, and others interested in understanding how different abilities affect user experience will benefit from historical context, descriptions, and cultural insights to better interpret accessibility recommendations.\n\nThe book is a practical guide to inclusive UX research, not a checklist. It provides strategies for including disabled participants and ensuring research is effective and reliable.", "Image_URLs": "docs/images/smashing_2.png"}, {"Source": "Laravel News", "Title": "Filament v5.3.0 Released with Deferred Tab Badges and Column Manager Improvements", "Date": "Wed, 04 Mar 2026 03:31:31 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/filament-v5-3-0?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Filament v5.3.0 adds ten features, including deferred tab badge loading, modal/slideover column manager, customizable Rich Editor file attachments, and sort loading indicators. It expands rate limiting options, enhances navigation group definitions with PHP enums, and introduces a Callout controls slot. Bug fixes address sidebar state restoration and missing chart translations.", "Content": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, column manager modal and slideover support, enhancements to Rich Editor plugins, and sort loading indicators on table columns.\n\nDeferred tab badge loading allows badge counts to load independently from the tab content, improving performance by avoiding unnecessary database queries when badge values are expensive to compute.\n\nThe column manager now supports displaying in a modal or slideover, providing additional layout options beyond the default dropdown for managing table column visibility.\n\nRich Editor plugins can now supply their own file attachment providers, enabling plugin authors to integrate custom upload and storage behaviors directly into the editor without external configuration. Additionally, plugins can control the visibility and state of toolbar buttons for more granular editing control.\n\nTable columns now display a loading spinner on sort icons during sorting operations, offering visual feedback when sorting takes a moment to complete.\n\nRate limiting configurations have been expanded to support user ID and email address in addition to IP-based options. Navigation groups for pages and resources now accept Unit Enum values, simplifying the definition of navigation groups using PHP enums.\n\nThe Callout component has gained a controls slot, allowing custom action buttons or content alongside callout messages. Resources now support additional configuration options, and the component color palette has been extended with more Tailwind CSS color options.\n\nBug fixes include correct restoration of sidebar state on desktop page loads and the addition of missing chart widget translations.", "Image_URLs": "docs/images/laravel_3.png"}, {"Source": "Saskatoon Police News", "Title": "Evade Police/Impaired Driving - McPherson Ave, Preston Ave.", "Date": "Wed, 04 Mar 2026 16:09:08 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026113", "Summary": "A 41-year-old Saskatoon man faces multiple charges after evading police overnight. The incident began when police attempted to stop a suspicious black Chrysler 200, which fled, leading to reckless driving and a crash. The male suspect, wanted on warrants and suspected of methamphetamine influence, was arrested after fleeing on foot. He is charged with impaired driving, dangerous driving, evading police, and related offenses.", "Content": "A 41-year-old Saskatoon man is facing multiple charges following an incident in which a driver evaded police overnight.\n\nAt approximately 1:00 a.m., March 4, 2026, an officer on patrol spotted a suspicious vehicle in the 500 block of 8th Street East. The officer attempted to stop a black Chrysler 200 when it turned onto McPherson Avenue. The driver was slow to pull over, and when he did, a male and a female exited the vehicle and fled on foot. The driver then sped away as the officer approached the vehicle.\n\nThe suspect vehicle evaded police, driving recklessly in the area of Wilson Crescent and Preston Avenue. The driver attempted to overtake a snowplow; however, his tires had been damaged earlier in the incident, causing him to lose control and end up on the median. The male suspect tried to flee on foot but was taken into custody.\n\nHe was found to be wanted on several warrants and is believed to have been under the influence of methamphetamine at the time. The man is now charged with possession of bear spray, impaired driving, dangerous driving, evading police, and breaching court conditions.", "Image_URLs": "docs/images/saskatoon_police_10.png"}, {"Source": "Saskatoon Police News", "Title": "Update - Additional Arrest - Homicide - 1700 Block 20th Street West", "Date": "Wed, 04 Mar 2026 17:12:50 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026114", "Summary": "A second male, aged 26, has been charged with aggravated assault and manslaughter in connection with the February 3, 2026, homicide and will appear in court. An 18-year-old previously charged with manslaughter was arrested on February 26 and now faces new charges including accessory after the fact, public mischief, and obstruction of justice, with manslaughter and assault charges withdrawn. The investigation is ongoing.", "Content": "A second male has been charged in connection to a February 3, 2026, homicide. A 26-year-old male is charged with aggravated assault and manslaughter. He will appear in court this afternoon.\n\nA man previously charged in the homicide investigation is now facing new charges. On February 26, 2026, investigators attended a correctional facility in Saskatoon and arrested an 18-year-old man who was previously charged with manslaughter in relation to the February 3rd homicide. He is now charged with accessory after the fact to manslaughter, accessory after the fact to aggravated assault, public mischief, and obstruction of justice. The charges of manslaughter and aggravated assault have been withdrawn.\n\nThe Major Crime Unit continues to investigate.", "Image_URLs": "docs/images/saskatoon_police_8.png"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
