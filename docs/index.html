<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <h1 class="text-3xl font-bold text-gray-900">🗞️ News Aggregator</h1>
            <div class="mt-2">
                <p class="text-gray-600">Latest articles from multiple sources</p>
                <p class="text-sm text-gray-500 mt-1">Last updated: March 20, 2026 at 06:19 PM</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Articles Grid -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be rendered here -->
        </div>
    </main>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-start md:items-center justify-center md:min-h-screen p-0 md:p-4">
            <div class="bg-white w-full h-screen md:h-auto md:rounded-lg md:shadow-xl md:max-w-2xl md:max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start md:rounded-t-lg">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-source" class="font-semibold text-blue-600"></span>
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 font-bold text-4xl p-3 rounded-lg transition-colors">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read Full Article →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-8 rounded text-lg">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "New York Times - World", "Title": "Iran War Live Updates: Trump Says U.S. Is Considering \u2018Winding Down\u2019 War", "Date": "Sat, 21 Mar 2026 00:07:19 +0000", "Author": "The New York Times", "URL": "https://www.nytimes.com/live/2026/03/20/world/iran-war-oil-trump", "Summary": "President Trump indicated the U.S. is considering winding down its conflict with Iran, claiming progress near its objectives. Meanwhile, U.S. forces increased aerial assaults to reopen the Strait of Hormuz, which Iran has threatened to close. The conflict has damaged energy infrastructure across nine countries, causing oil prices to rise. The U.S. temporarily eased sanctions on Iranian oil to address market impacts.", "Content": "President Trump said in a social media post on Friday that the United States was considering \u201cwinding down\u201d the war with Iran as it was \u201cgetting very close\u201d to meeting its objectives. His remarks came even as U.S. officials said they were ramping up aerial assaults against Iranian drones and naval vessels in an effort to reopen the Strait of Hormuz.\n\nEarlier, Mr. Trump told reporters on the White House lawn: \u201cI don\u2019t want to do a cease-fire. You know, you don\u2019t do a cease-fire when you\u2019re literally obliterating the other side.\u201d The president has said multiple times that the war was nearly over, only for U.S. attacks to intensify.\n\nAs the U.S.-Israeli war on Iran approaches the three-week mark, American commanders are still trying to eliminate Iran\u2019s ability to choke off the strait, the critical passageway in and out of the Persian Gulf. Iran has used a lethal combination of mines, missiles, and armed drones \u2014 or the threat of using them \u2014 to all but shut down shipping through the strait, through which passes a large part of the world\u2019s oil and natural gas.\n\n\u201cI think we\u2019ve won,\u201d Mr. Trump said, referring to Iran, stating that \u201call they\u2019re doing is clogging up the strait.\u201d Later, in his social media post on Friday, he wrote: \u201cThe Hormuz Strait will have to be guarded and policed, as necessary, by other Nations who use it \u2014 The United States does not! If asked, we will help these Countries in their Hormuz efforts, but it shouldn\u2019t be necessary once Iran\u2019s threat is eradicated.\u201d\n\nIran has continued to strike out at its Persian Gulf neighbors, shaking the world\u2019s energy supplies and the global economy. At least 37 oil refineries, natural gas fields, and other energy sites in nine countries have been damaged in drone and missile attacks since the United States and Israel began bombarding Iran, a New York Times analysis found. U.S. and Middle Eastern officials have blamed those strikes on Iran, which has taken responsibility for some of them.\n\nThe price of oil rose once again on Friday, with the global benchmark crude settling around $112 a barrel, up more than 50 percent since the war began. The S&P 500 Index fell about 1.5 percent, losing ground for the fourth straight week.\n\nThe state-owned Kuwait Petroleum Corporation said a drone attack had caused fires at the Mina al-Ahmadi refinery for the second consecutive day. Israel reported launching targeted attacks on Tehran after Iranian missile fire set off sirens in Jerusalem and northern Israel overnight.\n\nTo help ease the surge in oil prices, the U.S. Treasury Department on Friday temporarily lifted sanctions on Iranian oil that is already loaded onto vessels at sea, authorizing it to be sold to most countries. The license applies to oil loaded on vessels as of March 20 and is extended until April 19.", "Image_URLs": "docs/images/nyt_1_1774052141888.jpg"}, {"Source": "Ars Technica", "Title": "Jury finds Musk owes damages to Twitter investors for his tweets", "Date": "Fri, 20 Mar 2026 22:27:42 +0000", "Author": "John Timmer", "URL": "https://arstechnica.com/tech-policy/2026/03/jury-agrees-that-musks-tweets-during-twitter-takeover-constituted-fraud/", "Summary": "A California jury found Elon Musk misled investors through public statements about Twitter, causing its stock to decline before his purchase. The class action lawsuit could result in Musk owing up to $2.6 billion in damages. The jury rejected claims of a larger scheme but held Musk liable for the misleading tweets.", "Content": "On Friday, a jury in California determined that Elon Musk misled investors in Twitter via public statements that depressed the price of the company's stock ahead of his ultimately successful purchase of the service. Because this was a class action lawsuit, Musk is likely to owe damages to a large number of investors\u2014payments that may reach billions of dollars.\n\nIn the lead-up to Musk\u2019s purchase of the social media platform, he made several comments on Twitter and while appearing as a guest on a podcast, largely focused on the alleged prevalence of bot accounts on the platform. These statements raised fears that the deal might not go through and caused Twitter\u2019s share price to decline, leading some investors to sell shares at a depressed price during this period.\n\nA number of those investors initiated a suit that was certified as a class action, claiming that Musk's statements defrauded them and that he made them intentionally as part of a larger scheme. The jury rejected arguments about this larger scheme but found Musk liable for the tweets. While damages have yet to be determined, lawyers for the plaintiffs reportedly say they could reach as high as $2.6 billion.", "Image_URLs": "docs/images/ars_technica_1_1774052365372.jpg"}, {"Source": "Laravel News", "Title": "Prompt Deck: Manage AI Prompts as Versioned Files in Laravel", "Date": "Fri, 20 Mar 2026 03:48:20 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/prompt-deck-manage-ai-prompts-as-versioned-files-in-laravel?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Prompt Deck by Victor Ukam for Laravel manages AI prompts via versioned markdown files stored on disk, supporting variable interpolation, A/B testing, and version activation. Compatible with PHP 8.2+ and Laravel 11+, it offers artisan commands for prompt management and integrates with laravel/ai through HasPromptTemplate. The package facilitates structured prompt handling for AI applications.", "Content": "Prompt Deck by Victor Ukam gives Laravel applications a structured way to manage AI prompts\u2014storing them as versioned markdown files on disk rather than embedding strings directly in application code. The package requires PHP 8.2+ and Laravel 11+.\n\nKey features include disk-based prompt files with directory-based versioning, variable interpolation using {{ $variable }} syntax in markdown files, artisan commands for creating, listing, testing, and activating prompt versions, A/B testing support to compare prompt versions by token usage, latency, and cost, and integration with laravel/aivia via the Has Prompt Templatetrait.\n\nCreating and using prompts involves generating a new prompt with the make:prompt command, which scaffolds a versioned directory structure under resources/prompts/. For example, running php artisan make:prompt order-summary creates a directory like resources/prompts/order-summary with version folders such as v1 containing system.md and metadata.json.\n\nThe system.md prompt file can be edited with placeholders like {{ $variable }} for dynamic values, e.g., \"You are a {{ $tone }} customer service agent. Summarise the following order: {{ $order }}.\" Loading or rendering the prompt can be done with the Prompt Deck facade, retrieving specific versions if needed. For example:\n\nuse Veeqtoh\\PromptDeck\\Facades\\PromptDeck;\n\n$prompt = PromptDeck::get('order-summary');\n\n$messages = $prompt->toMessages(['tone' => 'friendly', 'order' => $orderDetails]);\n\nThe toMessages() method returns an array compatible with OpenAI, Anthropic, and similar APIs. To load a specific version:\n\n$prompt = PromptDeck::get('order-summary', 'v2');\n\nActivating a prompt version via Artisan is also possible:\n\nphp artisan prompt:activate order-summary v2\n\nFor applications using laravel/ai, the Has Prompt Templatetrait provides instructions() and promptMessages() methods on your agent class:\n\nuse Veeqtoh\\PromptDeck\\Concerns\\HasPromptTemplate;\n\nclass OrderAgent extends Agent {\n    use HasPromptTemplate;\n}\n\nSetting PROMPTDECK_SCAFFOLD_ON_MAKE_AGENT=true in the .env file will automatically scaffold a matching prompt directory when running php artisan make:agent.\n\nPrompt Deck is available on GitHub, with full documentation in the Prompt Deck docs.", "Image_URLs": "docs/images/laravel_2_1774052204378.png"}, {"Source": "Saskatoon Police News", "Title": "Unidentified Person - Request For Public Assistance", "Date": "Fri, 20 Mar 2026 20:33:29 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026149", "Summary": "Saskatoon police and coroner\u2019s service seek help identifying a deceased Caucasian male, aged 55-70, found outside on March 9, 2026. He had blond dyed hair, hazel eyes, and was dressed in black clothing. No ID was found, and his death is not considered suspicious. Contact police with information at 306-975-8300.", "Content": "The Saskatoon Police Service Major Crime Section and Saskatchewan Coroner\u2019s Service are requesting public assistance in identifying a person who was found deceased outside at around 6:00 a.m. on March 9, 2026, in the 100 block of 29th Street West.\n\nThe deceased is described as a Caucasian male between the ages of 55 and 70, with an average build and short dyed blond hair. He has hazel eyes, a small scar on the top of his nose, and is missing most teeth. The man\u2019s clothing size is large, and he was found wearing a black H&M jacket with black framed glasses in the left pocket, black boots, a black zip-up hoodie, dark jeans, blue boxers, and a blue t-shirt. He also had a pair of sunglasses missing a lens in his possession. No identification was located on the deceased.\n\nThe circumstances of the man\u2019s death are not believed to be suspicious in nature. Anyone with information that could assist with identifying the man is asked to contact police at 306-975-8300.", "Image_URLs": "docs/images/saskatoon_police_4_1774052229541.png"}, {"Source": "TechCrunch", "Title": "Elon Musk misled Twitter investors while trying to get out of acquisition, jury says", "Date": "Fri, 20 Mar 2026 23:29:17 +0000", "Author": "Amanda Silberling", "URL": "https://techcrunch.com/2026/03/20/elon-musk-misled-twitter-investors-while-trying-to-get-out-of-acquisition-jury-says/", "Summary": "A California jury found Elon Musk intentionally misled Twitter investors by tweeting false concerns about bots to back out of his $44 billion Twitter deal in 2022. The lawsuit, filed by shareholder Giuseppe Pampena, claims Musk's actions caused stock declines and losses. Damages could reach $2.6 billion, though Musk's net worth exceeds $660 billion.", "Content": "A civil jury in California ruled that Elon Musk intentionally misled Twitter investors when he tried to back out of his $44 billion acquisition of the platform in 2022. At the time, Musk had tweeted that Twitter had too many bots, which he later cited as a reason to renegotiate the deal. Twitter sued Musk to force him to complete the purchase.\n\nMusk posted on Twitter that the deal was temporarily on hold pending details supporting the claim that spam and fake accounts represented less than 5% of users. Following this tweet, Twitter shares declined by 8%. Investor Giuseppe Pampena filed suit against Musk on behalf of other former Twitter shareholders who sold their shares between May 13, 2022, and October 4, 2022, when the deal was finalized.\n\nPampena\u2019s lawsuit argued that Musk intentionally posted concerns about Twitter\u2019s user base to create uncertainty and artificially lower its stock price, causing shareholders who sold during that period to suffer losses. Musk\u2019s attorneys contended that he was expressing legitimate concerns about the number of bots on the platform. However, the jury was convinced by the plaintiff\u2019s argument.\n\nIt is not yet clear how much Musk will have to pay in damages, but Pampena\u2019s attorney estimated that damages could reach up to $2.6 billion. This would be a relatively small amount for Musk, whose net worth is estimated at over $660 billion.\n\nThis is not Musk\u2019s first legal issue related to tweets. In 2018, he tweeted that he had secured funding to take Tesla private at $420 per share, which the SEC alleged was misleading and charged Musk with securities fraud. Musk testified that he believed he would take Tesla private at that price, which represented a significant premium over the stock\u2019s current value.", "Image_URLs": "docs/images/techcrunch_1_1774052269963.jpg"}, {"Source": "Star Phoenix", "Title": "Kids find confidence during 10th year of Sask. First Nations Spelling Bee", "Date": "Fri, 20 Mar 2026 22:23:42 +0000", "Author": "Michelle Berg, Saskatoon StarPhoenix", "URL": "https://thestarphoenix.com/news/local-news/kids-find-confidence-during-10th-year-of-sask-first-nations-spelling-bee", "Summary": "Eight-year-old Raquel Greenfield won the primary division at the 10th-anniversary Saskatchewan First Nations Spelling Bee, earning a spot at the national championships in Toronto. Seven-year-old Osa Ahenakew finished second, impressing with her confidence and sportsmanship. The event featured about 200 participants from 20 communities, promoting First Nations youth to compete nationally.", "Content": "Osa Ahenakew, 7, reacts on stage during the primary finals of the Saskatchewan First Nations Spelling Bee at Tommy Douglas Collegiate. She finished in second place in her age group during the spelling bee's 10th-year anniversary event on March 20.\n\nEight-year-old Raquel Greenfield\u2019s spelling success came down to persistence. \u201cShe would practice every night,\u201d her mother, Megan Greenfield, said. \u201cShe would repeat the word to herself until she spelled it correctly\u2026 she\u2019s been really intentionally focused.\u201d That dedication paid off as the Grade 3 student from Brilliant Star Montessori School took first place in the primary division at the Saskatchewan First Nations Spelling Bee, held Friday at Tommy Douglas Collegiate in Saskatoon.\n\nThe event marked the spelling bee\u2019s 10th anniversary. It began in 2015 as an initiative to give First Nations youth \u2014 many from small communities \u2014 a platform to compete at a national level. Around 200 participants from 20 communities were divided into three age categories: primary (ages six to eight), junior (nine to 11), and intermediate (12 to 14). Winners from each division advance to the Spelling Bee of Canada\u2019s National Championships in Toronto on May 23, where they will represent Saskatchewan on a national stage. It will be Greenfield\u2019s first time on a plane. Her mom said the achievement is especially meaningful because her daughter is shy and struggles with anxiety in social situations. \u201cI\u2019m excited for her to have that opportunity,\u201d she said. Greenfield said she felt nervous on stage but happy when she was named the winner. She spelled her final word \u2014 \u201cdomestic\u201d \u2014 with a gentle confidence.\n\nRaquel Greenfield, 8, spells a word during the Saskatchewan First Nations Spelling Bee at Tommy Douglas Collegiate on March 20. She finished in first place. \n\nThe runner-up was seven-year-old Osa Ahenakew, a Grade 2 student from Chief Ahtahkakoop School who described the experience as \u201cpretty cool.\u201d She brought energy to the stage, something she credits in part to dance \u2014 and the other competitors. \u201cI\u2019m a ballet dancer,\u201d she said, adding she also competes in traditional powwow dance. When asked where her confidence comes from, she points to her peers: \u201cAll the spellers.\u201d Her mother, Colby Calliou, said Ahenakew also surprised her by encouraging other competitors during the event. \u201cThere was one little kid there that was struggling and she was like, \u2018You got this! It\u2019s okay!\u2019\u201d Calliou said they prepared by studying 15 words a day. If Ahenakew got a word wrong, she\u2019d write it down 10 times.\n\nFor both families, the spelling bee was about more than results. \u201cI just told her she could do it,\u201d Megan Greenfield said. \u201cIt was about the experience.\u201d When asked which word was her favorite to spell, Ahenakew didn\u2019t hesitate. \u201cMilkshake.\u201d", "Image_URLs": "docs/images/star_phoenix_1_1774052083234.jpg"}, {"Source": "BBC News - World", "Title": "Iranian strikes on bases used by US caused $800m in damage, new analysis shows", "Date": "Fri, 20 Mar 2026 22:34:05 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cddq7j48p35o?at_medium=RSS&at_campaign=rss", "Summary": "Iranian strikes on US military bases in the Middle East caused approximately $800 million in damages within two weeks, mainly targeting air-defense and communication systems. The damage includes $485 million to a radar system in Jordan and $310 million to infrastructure. Iran has repeatedly targeted bases like Ali Al-Salim, Al-Udeid, and Prince Sultan. Since the conflict began, 13 US service members have died, with total casualties around 3,200, including civilians.", "Content": "Iranian strikes on military bases used by the US in the Middle East caused about $800 million (\u00a3600 million) in damage in the first two weeks of the war, a new analysis shows.\n\nMuch of the damage was caused in initial retaliatory strikes by Iran in the week after the US and Israel launched the war, according to a report by the Center for Strategic & International Studies (CSIS) and an analysis by the BBC. The full extent of the damage caused by Iranian strikes on US assets in the region is not clear. However, the $800 million in estimated damages to US military infrastructure\u2014higher than previously reported\u2014offers a picture of the steep costs to the US as the conflict drags on.\n\n\"The damage to US bases in the region has been underreported,\" said Mark Cancian, a CSIS senior adviser and co-author of the think tank study. \"Although that appears to be extensive, the full amount won't be known until more information is available.\"\n\nIn response to a request for comment, the US Department of Defense referred the BBC to US Central Command, which is leading the war. Officials there declined to comment.\n\nIran's retaliatory strikes targeted US air-defense and satellite-communication systems, among other assets, in Jordan, the United Arab Emirates, and other countries across the Middle East. A significant portion of damage was caused by a strike on a US radar for a Thaad missile defense system at an air base in Jordan. The AN/TPY-2 radar system costs approximately $485 million, according to a CSIS review of defense department budget documents. These air-defense systems are used for the long-range interception of ballistic missiles.\n\nStrikes by Iran caused an additional $310 million in estimated damages to buildings, facilities, and other infrastructure on US bases and military bases used by American forces in the region. Iran has also struck at least three air bases more than once, according to satellite imagery analyzed by BBC Verify. The repeat strikes underscore Iran's efforts to target specific US assets. Russia has reportedly shared intelligence with Tehran on American military forces in the region.\n\nSatellite imagery shows the three air bases\u2014Ali Al-Salim in Kuwait, Al-Udeid in Qatar, and Prince Sultan in Saudi Arabia\u2014with fresh damage appearing during different phases of the conflict.\n\nSince President Donald Trump joined Israel in launching attacks on Iran on February 28, the US has lost 13 military service members. The US-based Human Rights Activists News Agency (Hrana) estimates the overall death toll has reached nearly 3,200, including 1,400 civilians.", "Image_URLs": "docs/images/bbc_1_1774052246211.jpg"}, {"Source": "Film Jabber", "Title": "Ready or Not 2: Here I Come", "Date": "2026-03-20", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/ready-or-not-2-here-i-come.html", "Summary": "After surviving an attack from the Le Domas family, Grace (Samara Weaving) learns she has advanced in the deadly game, now with her sister Faith (Kathryn Newton). She must survive, protect her sister, and win the throne from four rival families vying for control of the world.", "Content": "Moments after surviving an all-out attack from the Le Domas family, Grace (Samara Weaving) discovers she\u2019s reached the next level of the nightmarish game \u2014 and this time with her estranged sister Faith (Kathryn Newton) at her side. Grace has one chance to survive, keep her sister alive, and claim the High Seat of the Council that controls the world.\n\nFour rival families are hunting her for the throne, and whoever wins rules it all.", "Image_URLs": "docs/images/filmjabber_4_1774052327974.webp"}, {"Source": "Smashing Magazine", "Title": "Modal vs. Separate Page: UX Decision Tree", "Date": "Thu, 19 Mar 2026 15:00:00 GMT", "Author": "hello@smashingmagazine.com (Vitaly Friedman)", "URL": "https://smashingmagazine.com/2026/03/modal-separate-page-ux-decision-tree/", "Summary": "Choosing between modals and pages impacts user flow, context, and task completion. Modals are suitable for self-contained tasks, warnings, or details without disrupting the current workflow, but they can be intrusive if misused. Proper differentiation among modals, overlays, dialogs, and lightboxes is crucial, with non-modals often being more user-friendly for subtle notifications.", "Content": "How to choose between modals and pages, when to avoid modals, and how to determine the right level of interruption or navigation.\n\nYou probably have been there before. How do we choose between showing a modal to users, and when do we navigate them to a separate, new page? And does it matter at all?\n\nActually, it does. The decision influences users\u2019 flow, their context, their ability to look up details, and with it error frequency and task completion. Both options can be disruptive and frustrating \u2014 at the wrong time, and at the wrong place.\n\nSo we\u2019d better get it right. Well, let\u2019s do just that.\n\nModals vs. Dialogs vs. Overlays vs. Lightboxes\n\nWhile we often speak about a single modal UI component, we often ignore fine, intricate nuances between all the different types of modals. In fact, not every modal is the same. Modals, dialogs, overlays, and lightboxes \u2014 all sound similar, but they are actually quite different:\n\n- **Dialog:** A generic term for \u201cconversation\u201d (user \u2194 system).\n- **Overlay:** A small content panel displayed on top of a page.\n- **Modal:** User must interact with overlay + background disabled.\n- **Nonmodal:** User must interact with overlay + background enabled.\n- **Lightbox:** Dimmed background to focus attention on the modal.\n\nAs Anna Kaley highlights, most overlays appear at the wrong time, interrupt users during critical tasks, use poor language, and break users\u2019 flow. They are interruptive by nature, and typically with a high level of severity without a strong need for that.\n\nThe many sides of modals and overlays. A little tree to understand the differences for UI components.\n\nSurely users must be slowed down and interrupted if the consequences of their action have a high impact, but for most scenarios, non-modals are much more subtle and a more friendly option to bring something to the user\u2019s attention. If anything, I always suggest it to be a default.\n\nModals \u2192 For Single, Self-Contained Tasks\n\nAs designers, we often dismiss modals as irrelevant and annoying \u2014 and often they are! \u2014 yet they have their value as well. They can be very helpful to warn users about potential mistakes or help them avoid data loss. They can also help perform related actions or drill down into details without interrupting the current state of the page.\n\nBut the biggest advantage of modals is that they help users keep the context of the current screen. It doesn\u2019t mean just the UI, but also the user's ongoing task or workflow.", "Image_URLs": "docs/images/smashing_2_1774052176138.jpg"}, {"Source": "Polygon", "Title": "Crimson Desert interactive maps", "Date": "Sat, 21 Mar 2026 00:15:17 GMT", "Author": "Polygon Staff", "URL": "https://www.polygon.com/map/crimson-desert-interactive-pywel-hernand-demeniss-pailune-delesyia/", "Summary": "Crimson Desert's Pywel continent is vast and challenging to navigate without guidance. Interactive maps help players find key locations, quests, vendors, and resources. Guides assist newcomers in understanding game systems and developing skills like fishing and mining. Walkthroughs cover main story quests and Abyss puzzles, emphasizing the importance of exploration and resource collection for progression.", "Content": "Crimson Desert's continent of Pywel is a large area, and it's easy to miss many of the game's best features if you're not sure where to look. The game often doesn't provide much guidance on how to find fast travel points or locate special abyss artifacts. While some discovery is part of the experience, falling behind on collecting abyss artifacts and upgrading weapons can have noticeable consequences.\n\nInteractive maps are available to help players find everything important, including faction quests, inns, vendors\u2014both legitimate and shady back-alley ones\u2014bounty boards, dungeons, caves, resource nodes like iron ore and abyss cressets, and prime fishing spots.\n\nFor newcomers, there are guides to learn the basics and refresh knowledge of game systems. The world of Pywel is vast, making it challenging to decide where to go first. Players are encouraged to develop life skills such as fishing, logging, cooking, and mining, which can be profitable.\n\nAdditionally, walkthroughs are provided for main story quests like \"Abyss Without Balance\" and \"Familiar Curses,\" as well as puzzles in the Abyss such as Root's End.", "Image_URLs": "docs/images/polygon_1_1774052292456.png"}, {"Source": "CBC News - World", "Title": "As Middle Eastern countries struggle to down Iranian drones, Ukraine sends 200 specialists to help", "Date": "Fri, 20 Mar 2026 15:03:14 EDT", "Author": "", "URL": "https://www.cbc.ca/news/world/drones-ukraine-kuwait-qatar-9.7136187?cmp=rss", "Summary": "Following Iranian Shahed drone attacks in Kuwait, Ukraine has deployed over 200 drone specialists to five Middle Eastern countries to protect infrastructure. Ukraine, experienced in countering Iranian drones used by Russia, is also working on selling interceptor drones to Gulf states amid increased demand and ongoing conflicts involving Iran, the U.S., and Israel.", "Content": "After Iranian Shahed drones hit an oil refinery in Kuwait, Ukrainian President Volodymyr Zelenskyy confirmed that Kyiv has sent more than 200 military specialists to the Middle East to help defend critical infrastructure from the same type of threat Ukraine has faced for years.\n\nZelenskyy said 228 Ukrainian drone specialists have been deployed to five countries \u2014 Qatar, the United Arab Emirates, Saudi Arabia, Kuwait, and Jordan.\n\nAfter the U.S. and Israel started launching airstrikes against Iran on February 28, Gulf Arab states have been targeted with more than 2,000 drones and missiles. Those countries, which have suffered attacks on energy infrastructure, hotels, and diplomatic missions, are also keen to purchase thousands of Ukraine\u2019s interceptor drones, and Kyiv says that \"serious agreements and deals\" are being worked out.\n\n\"For the last week, we had four different requests for interceptors from the Middle East,\" said Andrii Sych, co-founder of the Kyiv-based UV military cluster, a manufacturer that also collaborates with other drone companies. \"So I can say the demand is quite high.\"\n\nOne inquiry came from the United Arab Emirates, but the manufacturer has not officially sold any interceptors yet because it needs an export license from Kyiv and permission to sell defense technology abroad.\n\nUkraine has extensive experience in downing Iranian drones, which were first used by Russia in the fall of 2022. Since then, manufacturers across the country have been at the forefront of developing drone interceptors\u2014an innovation driven by daily deadly attacks and extensively tested in battle.\n\nUkraine's homegrown drones have become increasingly lethal, serving as critical tools in the ongoing conflict with Russia.", "Image_URLs": "docs/images/cbc_2_1774052123803.jpg"}, {"Source": "Variety", "Title": "Crisis at Row K: New Indie Film Distributor\u2019s Money Problems Put Reputations and Maude Apatow\u2019s Directorial Debut in Jeopardy (EXCLUSIVE)", "Date": "Fri, 20 Mar 2026 22:41:09 +0000", "Author": "Varietymattdonnelly", "URL": "https://variety.com/2026/film/news/row-k-crisis-money-trouble-madue-apatow-movie-1236694347/", "Summary": "Row K Entertainment, a new Hollywood distribution label launched less than eight months ago, faces financial difficulties, including unpaid bills and work stoppages. Its slate, including films like \u201cPoetic License\u201d and \u201cDead Man\u2019s Wire,\u201d has been delayed or affected. Founders Christopher Woodrow and Raj Singh are central to the issues, with concerns about cash flow and strategic direction.", "Content": "Less than eight months after it launched, Row K Entertainment, a new Hollywood distribution label, is being beset with unpaid bills and concerns about its finances. Eight sources from outside the company and within told Variety that cash flow has been an increasingly urgent issue at Row K since its inception last summer. Vendors and consultants haven\u2019t been paid for months, resulting in work stoppages and legal threats.\n\nAfter a splashy debut at the 2025 Toronto International Film Festival, where the company acquired four movies, Row K\u2019s slate looks imperiled. One of the films that Row K picked up during TIFF, Maude Apatow\u2019s directorial debut \u201cPoetic License,\u201d has been pushed from a planned May release to September. The decision has baffled Apatow\u2019s team and inner circle, including the film\u2019s producer, Judd Apatow, and its star, Leslie Mann. The film earned glowing reviews when it debuted at TIFF and screened at SXSW. Had it not moved, Maude Apatow would have released the film at the same time she will star in the anticipated third season of \u201cEuphoria.\u201d\n\nOther titles on the slate include January\u2019s \u201cDead Man\u2019s Wire\u201d from Gus Van Sant and the romantic indie \u201cCharlie Harper.\u201d At the center of the storm are Row K founders Christopher Woodrow and Raj Singh. Woodrow, a producer with credits including Alejandro Gonz\u00e1lez I\u00f1\u00e1rritu\u2019s \u201cBirdman,\u201d was involved in a contentious 2014 lawsuit with backers from his former company, Worldview Entertainment, which claimed he embezzled and mismanaged funds. In 2018, Woodrow and Worldview settled the litigation without admitting liability. Singh has a smaller profile in the industry but formerly served as CEO of the comedy shop National Lampoon.\n\nRow K\u2019s release of \u201cDead Man\u2019s Wire\u201d has provided an opportunity to evaluate and refine their strategy as a new entrant in a highly competitive marketplace. The company states, \u201cLike many early-stage companies, we moved quickly to establish a slate and are now taking a more measured, disciplined approach\u2014prioritizing commercially viable titles.\u201d", "Image_URLs": "docs/images/variety_6_1774052359046.webp"}, {"Source": "Saskatoon Police News", "Title": "Saskatoon Police Welcome Electronic Storage Detection Dog - Taffy", "Date": "Fri, 20 Mar 2026 17:04:18 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026148", "Summary": "Taffy, a nearly three-year-old golden retriever, has joined the Saskatoon Police Service's ICE Unit after training in Indiana. She assists in locating electronic devices during investigations and provides therapy support for crime victims and officers. Taffy was donated by OUR Rescue and is the first ESD dog in Saskatchewan, enhancing efforts against child exploitation.", "Content": "Meet Taffy! Recently, the Saskatoon Police Service welcomed Taffy to the Saskatchewan Internet Child Exploitation (ICE) Unit following her successful completion of the Jordan Detection K9 Electronic Storage Detection (ESD) program in Indianapolis, Indiana, with 22 other dog teams. Taffy is a nearly three-year-old golden retriever who began her work with the SPS earlier this year alongside her handler, Detective Sergeant Bryon Sommacal.\n\nIn addition to her primary work to locate electronic devices during the execution of search warrants, Taffy also serves a secondary role as a deep therapy support dog for victims of crime and members of the SPS. Since beginning her work, Taffy has fulfilled each function of her role; locating hidden electronic devices during the execution of search warrants, providing comfort to a child victim of a sex crime, and, most recently, supporting members of the SPS following the sudden loss of a colleague.\n\nThe SPS obtained Taffy at no cost through OUR Rescue, a non-profit organization dedicated to supporting law enforcement agencies in efforts to combat human trafficking and child exploitation through the donation of ESD dogs and costs associated with training and annual recertifications. Taffy is one of eight dog teams in Canada and the first in Saskatchewan trained in locating electronic devices in internet child exploitation investigations.\n\nESD dogs are purpose-trained to detect the chemical compound commonly found in electronic devices such as cell phones, USBs, hard drives, SD cards, laptops, and other digital media that may contain evidence relevant to an internet child exploitation investigation.\n\n\u201cDigital evidence plays a significant role in internet child exploitation investigations,\u201d says Staff Sergeant Tim Failler, Coordinator of the Saskatchewan ICE Unit. \u201cEven the smallest device can hold thousands of images, videos, and messages. The introduction of Taffy as a resource for investigators greatly increases our ability to locate those devices and hold offenders accountable.\u201d\n\nThe addition of Taffy at the SPS to support the work of the Saskatchewan ICE Unit furthers our commitment to providing effective response and quality service to protect our community and meet their needs.", "Image_URLs": "docs/images/saskatoon_police_5_1774052237797.jpg"}, {"Source": "Variety", "Title": "SXSW 2026: The 8 Best Things We Watched in Austin, From a Semi-Suicidal Charlie Day to a Talking Fox Played by Olivia Colman", "Date": "Fri, 20 Mar 2026 23:07:44 +0000", "Author": "Kate Aurthur", "URL": "https://variety.com/lists/sxsw-2026-top-8-noah-kahan-doc-over-your-dead-body/", "Summary": "The 2024 SXSW Film & TV Festival featured diverse titles, including headliners like \u201cI Love Boosters,\u201d \u201cOver Your Dead Body,\u201d and \u201cThey Will Kill You.\u201d The final season of \u201cThe Comeback,\u201d starring Lisa Kudrow, premiered after a decade, with its third season airing on HBO on March 22. Notable documentaries included Netflix\u2019s \u201cNoah Kahan: Out of Body\u201d and other indie projects seeking distribution.", "Content": "Though this year\u2019s South by Southwest Film & TV Festival was an abbreviated, seven-day affair, filmmakers still brought Austin\u2019s crowds an assortment of film and TV titles full of blood, laughter, and tears to complement their tacos and barbecue. It was a strong year for the SXSW headliners section, which is populated with studio-backed titles and celebrity names. Three of them made the best-of-fest list: Boots Riley\u2019s Keke Palmer-led sci-fi comedy \u201cI Love Boosters,\u201d Jorma Taccone\u2019s comedic thriller \u201cOver Your Dead Body\u201d starring Jason Segel and Samara Weaving, and the horror comedy \u201cThey Will Kill You\u201d from Kirill Sokolov, starring Zazie Beetz as its murderous heroine. SXSW is known for its love of gory humor.\n\nSXSW officially added TV to its lineup a few years back, and no series on the 2026 lineup justified that move more than \u201cThe Comeback.\u201d Created by Michael Patrick King and Lisa Kudrow, with Kudrow starring as a washed-up reality TV star, the world premiere of the third and final season after a decade-long hiatus was a welcome presence at the festival.\n\nOn the documentary front, the standout was Netflix\u2019s \u201cNoah Kahan: Out of Body,\u201d which is soon to premiere on Netflix. Other notable picks include \u201cThe Fox,\u201d \u201cKill Me,\u201d and \u201cTheir Town,\u201d all of which are smartly written indie projects still seeking distribution.\n\nIt\u2019s been 11 and a half years since \u201cThe Comeback\u201d last aired, and for fans, that\u2019s far too long. The first two episodes of Season 3, which premiered at the Paramount Theatre on March 16, felt worth the wait. \u201cThe Comeback,\u201d Lisa Kudrow and Michael Patrick King\u2019s brilliant creation, is like a comet that appears every ten years or so, and this time, it will circle the Earth just once more when its third season premieres on HBO on March 22.\n\nThe show centers on Kudrow\u2019s Valerie Cherish\u2014a yearning sitcom star who\u2019s never quite achieved her dreams\u2014who finds herself in a state of duress. This time, she\u2019s been offered the leading role in the first TV comedy fully written by AI. Valerie worries about this, just a little, but her ambition quickly takes over as she dives into the opportunity.", "Image_URLs": "docs/images/variety_4_1774052350358.jpg"}, {"Source": "CBC News - World", "Title": "Canadian Armed Forces members among troops NATO pulled out of Iraq", "Date": "Fri, 09 Jan 2026 12:00:37 EST", "Author": "", "URL": "https://www.cbc.ca/news/politics/caf-members-pulled-out-of-iraq-nato-mission-9.7136773?cmp=rss", "Summary": "NATO withdrew its trainers from Iraq amid Iran-related retaliatory attacks during the U.S.-Israeli conflict. Canadian Armed Forces personnel, part of the NATO mission, were relocated to safety, with Canada reaffirming its commitment to international stability. NATO continues its mission from Europe, and the Canadian government faced criticism for lack of transparency regarding a missile strike on a Kuwait airbase.", "Content": "Canadian Armed Forces members and civilians are among the personnel NATO has pulled out of Iraq as the country faces retaliatory attacks from Iran along with other Gulf countries during the U.S.-Israeli war on Iran.\n\nCanada's defence minister confirmed that Canadian Armed Forces personnel with the NATO mission in Iraq have been relocated and are safe and accounted for. Defence Minister David McGinty stated that the Canadian Armed Forces and civilians serving on the NATO advisory mission in Iraq are safe and in a secure location. He called on all states to respect international law and uphold the principles of international security.\n\nThe military alliance confirmed on Friday that it withdrew the last of its military trainers from Iraq and moved them to Europe. The non-combat NATO mission, launched in 2018, aims to train and advise Iraqi forces to help stabilize the country and fight terrorism. The mission involves several hundred personnel from NATO allies, Austria, and Australia.\n\nU.S. General Alexus Grynkewich, Supreme Allied Commander Europe, expressed gratitude to Iraq and all allies who assisted in the safe relocation of NATO personnel. He stated that the NATO mission will continue from Joint Force Command Naples.\n\nCanada remains committed to supporting international peace and stability in coordination with NATO allies. The Canadian government was criticized earlier this month for not informing the public about a reported Iranian missile strike on an airbase in Kuwait where Canadian Armed Forces members are stationed. No Canadian military members were injured. Conservative defence critic James Bezan called the lack of transparency \"really shameful,\" while the Department of National Defence cited operational security reasons for not discussing potential damage or impacts to military facilities.", "Image_URLs": "docs/images/cbc_1_1774052114543.jpg"}, {"Source": "Star Phoenix", "Title": "Sask. NDP criticizes new Shellbrook school in education budget", "Date": "Fri, 20 Mar 2026 21:16:18 +0000", "Author": "Aidan Jaager", "URL": "https://thestarphoenix.com/news/local-news/sask-ndp-criticizes-new-shellbrook-school-in-education-budget", "Summary": "The Saskatchewan government plans to build a new school in Shellbrook, Premier Scott Moe's hometown, amid criticism from the NDP, which claims many other schools are in worse condition. The NDP highlights 13 schools as critical and 132 as poor, arguing the project may be favoritism. Education Minister Hindley states the Shellbrook project has been a long-term priority for the local school division.", "Content": "NDP education critic Matt Love said 13 schools are in \"critical\" condition and 132 are in \"poor\" condition. The Opposition insists there are hundreds more schools in greater need of funding than Shellbrook, which is where Premier Scott Moe grew up and the constituency he represents.\n\nIn the face of criticism over the 2026-27 provincial budget, the Saskatchewan Party government insists there is no favouritism behind the decision to fund a new school in the home community of Premier Scott Moe. Included among major capital projects for the Ministry of Education was the construction of a new pre-kindergarten to Grade 12 school in Shellbrook, located approximately 45 kilometres west of Prince Albert.\n\nAccording to the budget, tabled on Wednesday by Finance Minister Jim Reiter, the plan is to replace and consolidate the current elementary and high schools into one facility. The Opposition NDP insists there are hundreds more schools in greater need of funding, and questioned whether it was moved near the top of the list because Moe represents the constituency of Rosthern-Shellbrook.\n\n\u201cThe premier gets a shiny new school in Shellbrook while students learning in more than 200 others get leaky or entirely collapsed roofs, a lack of space for student desks and lockers, and entire wings that can no longer accommodate student learning,\u201d NDP education critic Matt Love said on Friday. Love spoke to reporters outside Saskatoon\u2019s Ecole Canadienne Fran\u00e7aise-Pavillion Monique Rosseau, where in January the library ceiling collapsed.\n\nAccording to the NDP, analysis of government data indicates 13 schools in Saskatchewan are deemed to be in critical condition, 132 schools are deemed in poor condition, and more than 200 schools are in worse shape than the current schools in Shellbrook. NDP Leader Carla Beck said there are 103 communities in the province with a school in worse shape than those in Shellbrook.\n\n\u201cTell me again this isn\u2019t about the premier playing favourites with his friends and neighbours,\u201d she said. \u201cIf there really is nothing to hide, I call on Scott Moe to publicly release all government documents behind the school capital decisions in this bad news budget.\u201d\n\nMinister of Education Everett Hindley insists there was nothing unfair behind the decision, saying a school in Shellbrook \u201chas been a priority for that school division for a number of years.\u201d He noted the replacement is needed due to the age of the existing schools in the community and that it could be several years until the school in Shellbrook is built.\n\n\u201cThere\u2019s 27 school divisions each and every year that identify what would be their top three major capital projects within the schools, within their school division and boundaries,\u201d Hindley said.", "Image_URLs": "docs/images/star_phoenix_3_1774052107207.jpg"}, {"Source": "Smashing Magazine", "Title": "Anime vs. Marvel/DC: Designing Digital Products With Emotion In Flow", "Date": "Tue, 17 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Alan Cohen)", "URL": "https://smashingmagazine.com/2026/03/anime-marvel-dc-designing-digital-products-emotion-flow/", "Summary": "The article compares anime like Dan da Dan and superhero films like James Gunn\u2019s Superman to illustrate two emotional design approaches. \"Emotion in Flow\" ensures seamless emotional shifts through continuity and cues, exemplified by Dan da Dan. \"Emotion in Conflict\" involves jarring transitions seen in superhero movies. Applying these concepts, designers can create digital products that facilitate smooth emotional transitions and improve user engagement.", "Content": "Design is about pacing and feelings as much as pixels and patterns. Alan Cohen explores Emotion in Flow and Emotion in Conflict, showing how anime like Dan Da Dan and superhero films like James Gunn\u2019s Superman manage emotional shifts and translating those ideas into practical patterns for product design.\n\nThese aren\u2019t only UX ideas; they are applicable across entertainment. The clearest way to feel the difference is to compare how anime handles emotional shifts versus how Marvel and DC films stumble. Using examples from Dan da Dan (an anime series on Netflix) and James Gunn\u2019s Superman movie, the concepts are defined and then translated into practical product design patterns for digital products, including apps, SaaS, and web.\n\n**Emotion In Flow (Anime: Dan da Dan)**\n\nIn Dan da Dan, the tonal range is wild\u2014horror, comedy, tenderness\u2014but it flows seamlessly. For example, in one arc, the protagonists are on a bizarre, comedic quest involving the \u201cgolden genitals\u201d of a main character, and in another, viewers are drawn into a heartbreaking story of a mother whose child is kidnapped. On paper, these shifts could be jarring, but on screen, they are coherent and emotionally clear.\n\nWhy does this work? \n\n- **Continuity of stakes:** Even when humor is present, the characters\u2019 goals and dangers remain consistent. Humor releases tension after a mini\u2011resolution without denying the threat.\n- **Clear mood cues:** Music, framing, pacing, and character reactions signal upcoming emotional shifts, priming viewers to ride the change rather than be yanked.\n- **An emotional anchor:** Relationships remain central, ensuring the scene\u2019s core remains intact despite tonal shifts.\n\nIn UX, good products emulate this by preparing users for emotional transitions, facilitating smooth transitions, and resolving feelings to keep users immersed as their emotional tone shifts. Dan da Dan exemplifies this, transitioning flawlessly from humor to empathy.\n\n**Emotion In Conflict (Marvel/DC: James Gunn\u2019s Superman)**\n\nIn contrast, films like James Gunn\u2019s Superman often undercut emotional moments with misplaced jokes, jarring transitions, or surprise pop-ups, disrupting the emotional flow. These moments create conflict rather than harmony, making the experience feel inconsistent and less immersive.\n\nBy understanding these two approaches\u2014Emotion in Flow and Emotion in Conflict\u2014designers can craft digital experiences that guide users through emotional shifts smoothly, enhancing engagement and clarity.", "Image_URLs": "docs/images/smashing_3_1774052185675.jpg"}, {"Source": "Film Jabber", "Title": "The Pout-Pout Fish", "Date": "2026-03-20", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-pout-pout-fish.html", "Summary": "\"The Pout-Pout Fish\" (2026) is a PG animated family film set for release on March 20, 2026, directed by Ricard Cuss\u00f3 and Rio Harrington. Featuring a cast including Nick Offerman and Miranda Otto, it follows two aquatic misfits on a quest to save their home. Based on a bestselling children\u2019s book series by Deborah Diesen, published by Macmillan.", "Content": "The Pout-Pout Fish (2026) is an animated family film rated PG, with a runtime of 92 minutes. It is scheduled for release on March 20, 2026. The film is directed by Ricard Cuss\u00f3 and Rio Harrington, written by Elise Allen, Elie Choufany, and Dominic Morris. The cast includes Nick Offerman, Nina Oyama, Miranda Otto, Remy Hii, Jordin Sparks, and Amy Sedaris. The studio behind the film is Viva Pictures.\n\nThe story follows two aquatic misfits on an impossible journey to save their home. It is based on the New York Times bestselling children\u2019s book series written by Deborah Diesen and illustrated by Dan Hanna. Published by Macmillan Children\u2019s Publishing Group, the series has sold over 10 million copies and has been translated into numerous languages. It was named a Top Ten Children\u2019s Book by TIME Magazine.", "Image_URLs": "docs/images/filmjabber_1_1774052316284.webp"}, {"Source": "BBC News - World", "Title": "US lifts sanctions on some Iranian oil as gas prices soar", "Date": "Fri, 20 Mar 2026 23:52:54 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c9d415g55nno?at_medium=RSS&at_campaign=rss", "Summary": "The US lifted sanctions on some Iranian oil, allowing limited sales until April 19, potentially releasing 140 million barrels to global markets. The move aims to address soaring gas prices but is unlikely to significantly impact prices and may increase funds for Iran. Experts criticized the policy, citing concerns over funding Iran's regime and limited market effects.", "Content": "The US has lifted sanctions on some Iranian oil as gas prices soar. Treasury Secretary Scott Bessent announced the issuance of a narrowly tailored, short-term authorization permitting the sale of Iranian oil currently stranded at sea. The move marks a significant reversal of longstanding American policy and carries highly uncertain outcomes.\n\nExperts indicated that the measure is likely to have a limited effect on prices and could potentially increase funds flowing to the Iranian regime. Globally, energy prices are rising as the war impacts shipping and production. On Friday, Bessent stated that the permit applies to the sale of crude oil and petroleum products of Iranian origin currently loaded on vessels. The authorization will last until April 19, and the Treasury Department estimates it could bring about 140 million barrels of oil to global markets.\n\nBefore the conflict, China was the primary buyer of Iranian oil, purchasing barrels at a steep discount due to sanctions. In an interview with Fox Business, Bessent suggested that a waiver on sales restrictions could help redirect supplies to countries like India, Japan, and Malaysia, while forcing China to pay market prices. However, he did not detail how the waiver would function or whether it would include rules to prevent proceeds from returning to the Iranian government.\n\nDavid Tannenbaum, director of Blackstone Compliance Services, criticized the move, telling the BBC, \"Essentially we're allowing Iran to sell oil, which could then be used to fund the war effort.\" President Donald Trump was asked about the proposal but did not provide a clear stance, stating only that the US would do \"whatever is necessary to keep the price.\"\n\nExperts warned that the waiver would likely have minimal impact on prices. Rachel Ziemba, an adjunct senior fellow at the Center for a New American Security, said, \"I don't think it's a game changer and it raises a whole lot of questions.\" She noted that while the US may not want money from Iranian oil sales, preventing funds from flowing back to Iran could be difficult in practice, especially given the current supply shocks.\n\nThe US has already taken other measures to increase supply, including releasing millions of barrels from reserves and suspending some sanctions on Russian oil last week. This latter decision drew criticism from European leaders, who argued it would strengthen Vladimir Putin's regime and prolong the conflict in Ukraine.", "Image_URLs": "docs/images/bbc_3_1774052253682.jpg"}, {"Source": "Polygon", "Title": "Outfits and how to unlock them in Pok\u00e9mon Pokopia", "Date": "Fri, 20 Mar 2026 22:00:32 GMT", "Author": "Julia Lee", "URL": "https://www.polygon.com/pokemon-pokopia-outfits-cosmetics-hair-unlock-locations/", "Summary": "In Pok\u00e9mon Pokopia, players can customize Ditto with outfits and hairstyles found as \"human records\" across the island, including magazines, tablets, and newspapers. Key outfits include Team Rocket, Rock-solid, Ranger, Ninja, Psychic Master, Black Belt, Sailor, and Super Nerd, located in various areas such as Sparkling Skylands, Rocky Ridges, Bleak Beach, and Withered Wasteland. Some cosmetics are found on main islands, others on randomized Dream Islands.", "Content": "This article is part of a directory: Pok\u00e9mon Pokopia guides and walkthroughs.\n\nIf you want to customize your Ditto in Pok\u00e9mon Pokopia, you can find outfits and hairstyles around the deserted island to swap in. Many of these outfits are based on gym leaders and trainers from previous games. All cosmetics are found as \"human records\" scattered around the island, appearing as magazines, tablets, books, or newspapers with a yellow sparkle on the ground. Interacting with them adds these outfits to your collection. Once unlocked, you can use the pieces separately to mix and match, such as combining a Team Rocket hat with a Super Nerd button-up. Interact with a mirror to swap your look.\n\nSome cosmetics are located in set spots on the main island, while others can only be found on randomized Dream Islands. The following details where to find various outfits and hairstyles in Pok\u00e9mon Pokopia.\n\nThere are a few cosmetics available across the four main areas in Pokopia:\n\n- **Team Rocket outfit:** Located on the northwest island in Sparkling Skylands. Enter the building from the top and climb down the metal stairs.\n- **Rock-solid outfit:** Found in the mines from the entrance where DJ Rotom is met in Rocky Ridges. Proceed through the lava-filled room, drop through the opening in the middle, and continue forward. Use the ladders to reach the book on the floor.\n- **Ranger outfit:** Located next to the furnace in the industrial ruins at Bleak Beach.\n- **Ninja outfit:** Inside a ruined home east of the Withered Wasteland Pok\u00e9mon Center.\n- **Psychic Master outfit:** On the eastern island of Sparkling Skylands, on the floor of the eroded gym.\n- **Black Belt outfit:** On the ground of the dojo in Sparkling Skylands, accessible via the elevator on the northern island.\n- **Sailor outfit:** On the S.S. Anne in Bleak Beach, on the bridge near the steering wheel.\n- **Super Nerd outfit:** On the path into the mines from the room where DJ Rotom is first encountered in Rocky Ridges.\n- **Parted hair:** Inside the cave where you free Onix in the Withered Wasteland.\n- **Mermaid hair:** On top of a cliff overlooking the ruined town north of the Pok\u00e9mon Center in Withered Wasteland.", "Image_URLs": "docs/images/polygon_2_1774052300846.jpg"}, {"Source": "TechCrunch", "Title": "Microsoft rolls back some of its Copilot AI bloat on Windows", "Date": "Fri, 20 Mar 2026 20:53:09 +0000", "Author": "Sarah Perez", "URL": "https://techcrunch.com/2026/03/20/microsoft-rolls-back-some-of-its-copilot-ai-bloat-on-windows/", "Summary": "Microsoft is reducing AI integration in Windows 11, notably limiting Copilot in apps like Photos and Notepad, to focus on meaningful AI experiences. This \u201cless-is-more\u201d approach aims to address consumer concerns about AI trust and safety. The company has also delayed some AI features, such as Windows Recall, and is implementing other user-focused updates based on feedback.", "Content": "Microsoft announced a series of changes focused on improving the quality of its Windows 11 operating system, notably including reducing the number of entry points to its AI assistant, Copilot. The company said it will decrease Copilot AI integrations in some apps, starting with Photos, Widgets, Notepad, and the Snipping Tool.\n\nUnder the heading of \u201cintegrating AI where it\u2019s most meaningful,\u201d Pavan Davuluri, EVP of Windows and Devices, stated on the company\u2019s blog that Microsoft is becoming more intentional about \u201chow and where Copilot integrates across Windows.\u201d Its goal is to focus on AI experiences that are \u201cgenuinely useful.\u201d\n\nThis \u201cless-is-more\u201d approach to AI integration may reflect growing consumer pushback against AI bloat. While many recognize AI as a useful tool, there are concerns around trust and safety. A Pew Research study published this month noted that half of U.S. adults are now more concerned than excited about AI as of June 2025, up from 37% in 2021.\n\nMicrosoft has previously reconsidered its Copilot integrations. Earlier this month, the news site Windows Central reported that the company\u2019s plan to ship Copilot-branded AI features across Windows 11 had been quietly shelved. This included some system-level integrations within the Settings app, File Explorer, and elsewhere.\n\nAdditionally, Microsoft delayed the launch of its AI-powered memory feature, Windows Recall for Copilot + PCs, for over a year to address privacy concerns. Although the Recall feature launched last April, security vulnerabilities are still being discovered.\n\nUser feedback has influenced Microsoft\u2019s AI-related decisions on Windows. Davuluri mentioned that he and his team have spent months listening to the community about how they\u2019d like to see improvements.\n\nThe Copilot rollback is just one of several changes. The company also announced the ability to move the taskbar to the top or sides of the screen, more control over system updates, faster File Explorer, improved Widgets experience, updates to the Feedback Hub, and easier navigation of the Windows Insider Program.", "Image_URLs": "docs/images/techcrunch_2_1774052277857.jpg"}, {"Source": "Laravel News", "Title": "NativePHP v3.1: The Biggest Performance Leap Yet", "Date": "Fri, 20 Mar 2026 01:53:15 +0000", "Author": "NativePHP", "URL": "https://laravel-news.com/nativephp-v31-the-biggest-performance-leap-yet?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Native PHP v3.1 introduces a major performance boost, reducing Laravel request times from 200-300ms to 5-30ms by booting Laravel once. It adds background job processing with dedicated threads, supports Android 8+ and full ICU on iOS, and includes features like PHP 8.3-8.5 auto-detection and plugin enhancements. Upgrading is straightforward with no breaking changes.", "Content": "Native PHP v3.1 just dropped. And it\u2019s not a minor bump. This is the single biggest performance update ever shipped, offering 10x faster response times, background job processing, Android 8+ support, full ICU on iOS, and more.\n\nEvery request used to go through a full Laravel boot cycle\u2014200-300ms each time. That\u2019s gone. V3.1 boots Laravel once and reuses the kernel across all subsequent requests, reducing response times to 5-30ms. Your app finally feels native. Livewire state, router state, facade instances\u2014all handled automatically. It can fall back to classic mode if needed.\n\nV3.1 ships with ZTS (Thread-Safe) PHP and a dedicated background queue worker on its own thread. Dispatch jobs like normal with QUEUE_CONNECTION=database. The worker starts automatically. Long-running tasks no longer block the UI. Jobs survive app restarts, supporting both iOS and Android.\n\nMinimum SDK for Android drops from API 33 (Android 13) to API 26 (Android 8). More devices can now run your app. SDK versions are configurable: `'Android'=>['compile_sdk'=>env('NATIVEPHP_ANDROID_COMPILE_SDK',36),'min_sdk'=>env('NATIVEPHP_ANDROID_MIN_SDK',33),'target_sdk'=>env('NATIVEPHP_ANDROID_TARGET_SDK',36),],`\n\niOS builds now include full ICU support. The PHP intl extension works on both platforms. Filament works on iOS and Android out of the box, with no workarounds or compromises, optional via `--with-icu`/`--without-icu` flags.\n\nAdditional features include PHP 8.3-8.5 auto-detection from composer.json, local binary caching, plugin multi-register for discovering and registering all plugins in one pass, and platform shorthand\u2014ios/andriod/everywhere. Unused dependencies like react/http and react/socket have been removed.\n\nUpgrading is a drop-in process with no breaking changes. Use `composer require nativephp/mobile:~3.1.0` and `php artisan native:install --force`. Read the full announcement and update today.", "Image_URLs": "docs/images/laravel_1_1774052196041.png"}, {"Source": "New York Times - World", "Title": "On a Holiday of Renewal, Iranians Are Mourning and Fearful", "Date": "Fri, 20 Mar 2026 19:42:50 +0000", "Author": "Yeganeh Torbati and Arash Khamooshi", "URL": "https://www.nytimes.com/2026/03/20/world/middleeast/iran-nowruz-new-year.html", "Summary": "Iranians marked Nowruz under subdued conditions due to economic hardship, government violence, and recent U.S.-Israeli bombings. Traditionally a festive holiday, this year\u2019s celebrations at Tehran\u2019s Tajrish Bazaar were muted, with reduced crowds and somber mood amid ongoing mourning for victims of protests and conflict-related tolls.", "Content": "People shopping for Nowruz, the Iranian new year holiday, which has been muted this year by the war, at Tajrish Bazaar in Tehran on Thursday.\n\nUsually, in the days leading up to the Iranian new year, Tajrish Square in Tehran is an explosion of color and joyful clamor. Merchants and customers haggle over the flowers, tableware, and painted eggs that Iranians use to decorate their homes for the holiday, Nowruz. This year, though, the mood throughout the country is subdued, as Iranians close out a year in which they have endured deepening economic misery, a brutal massacre carried out by government forces, and U.S.-Israeli bombardment.\n\nNowruz, which falls on Friday and is believed to have been celebrated in ancient Iran since at least the fifth century B.C., marks the first day of spring and symbolizes new beginnings. Iranians traditionally set out tables adorned with objects representing renewal, health, and prosperity. They buy new clothes, spring clean their homes, and gather with friends. In significance and mood, it resembles a combination of Christmas, New Year\u2019s Eve, and Independence Day.\n\nThis year, the holiday falls during the most difficult and perilous time in modern memory, giving Iranians little to celebrate. Thousands of families are still mourning loved ones killed by state forces during mass protests in January. Three weeks of U.S. and Israeli bombardment have killed civilians, destroyed homes, and put the nation on edge.\n\nCrowds at Tajrish Bazaar on Thursday were noticeably reduced. Traditional goods like goldfish and colored eggs, which are sold for Nowruz, were available, but stalls did not have the usual crowds.", "Image_URLs": "docs/images/nyt_3_1774052149904.jpg"}, {"Source": "Ars Technica", "Title": "Once again, ULA can't deliver when the US military needs a satellite in orbit", "Date": "Fri, 20 Mar 2026 21:35:56 +0000", "Author": "Stephen Clark", "URL": "https://arstechnica.com/space/2026/03/spacex-swipes-yet-another-military-contract-from-united-launch-alliance/", "Summary": "The US Space Force is shifting its GPS satellite launches from ULA\u2019s Vulcan rocket to SpaceX\u2019s Falcon 9 due to repeated technical issues with Vulcan\u2019s boosters. The final GPS Block III satellite will now launch on Falcon 9 in April, marking the fourth such transfer in recent months. ULA\u2019s Vulcan remains grounded pending investigation results.", "Content": "For the fourth time in a little more than a year, the US Space Force needs to send up a new satellite to replenish the military\u2019s GPS navigation network. And once again, the company the Pentagon is paying to launch it can\u2019t answer the call.\n\nUnited Launch Alliance, a 50-50 joint venture between Boeing and Lockheed Martin, was supposed to launch the final satellite for the Space Force\u2019s GPS Block III program this month. Space Systems Command, responsible for buying spacecraft and rockets for the military, announced Friday it has transferred the launch to a Falcon 9 rocket from SpaceX, ULA\u2019s chief rival in the market for launching US government satellites.\n\nThis is only the latest example of the Space Force moving a GPS launch from ULA to SpaceX. The three most recent GPS satellites were also supposed to launch on ULA\u2019s Vulcan rocket. Beginning in 2024, the Space Force shifted them over to SpaceX. In exchange, military officials moved three future launches from SpaceX to ULA, including the launch of the GPS III SV10 satellite.\n\nULA\u2019s Vulcan rocket is now grounded for the second time in less than two years, prompting the Space Force to move GPS III SV10 back to SpaceX. ULA will receive rights to launch a classified US military mission in 2028.\n\nSpace Systems Command assigned launch missions for the final four GPS satellites several years ago. At the time, the Vulcan rocket was nearing its first test flight. The debut was delayed from 2020 until early 2024, and since then, the new rocket\u2019s path to operational service has not been smooth. On its second and fourth flights\u2014in October 2024 and last month\u2014the new rocket suffered problems with its solid rocket boosters.\n\nAn investigation into the first incident found a manufacturing defect was responsible for the loss of the booster\u2019s exhaust nozzle shortly after liftoff. Officials have not announced the results of the probe into the second booster failure, but it appeared to be similar to the first incident. On each flight, the Vulcan rocket recovered from the anomaly and successfully completed its climb into orbit.\n\nThe recurrence of the same type of failure twice in four flights gave US military officials pause. Last month, the military officer in charge of the Space Force\u2019s space launch program said the investigation into the booster problem will take \u201cmany months.\u201d The Space Force won\u2019t resume launching payloads on the Vulcan rocket until the investigation is complete.\n\nThose statements suggested the Space Force was likely to transfer the GPS slated to fly on the next Vulcan rocket to a different launch vehicle. That\u2019s exactly what happened. On Friday, Space Systems Command confirmed that GPS III SV10 will now launch on SpaceX\u2019s Falcon 9 rocket in late April.", "Image_URLs": "docs/images/ars_technica_9_1774052384037.jpg"}, {"Source": "Variety", "Title": "\u2018Baywatch\u2019 Adds Nadia Gray to Recurring Cast", "Date": "Fri, 20 Mar 2026 23:10:27 +0000", "Author": "Varietymattdonnelly", "URL": "https://variety.com/2026/film/news/baywatch-adds-nadia-gray-recurring-cast-1236695717/", "Summary": "Nadia Gray joins Fox\u2019s \u201cBaywatch\u201d reboot as Lisa, an EMT and lifeguard partner. She appears alongside stars including Stephen Amell, Brooks Nader, and others. Gray has recent roles in \u201cParadise Disturbed,\u201d \u201cAll Rise,\u201d \u201cBright,\u201d and \u201cDays of Our Lives.\u201d Production is underway in Los Angeles, with Amell starring as Hobie Buchannon.", "Content": "Fox\u2019s highly anticipated \u201cBaywatch\u201d reboot has added Nadia Gray as a recurring guest star, Variety has confirmed. Gray will play Lisa, an EMT and partner to the team of lifeguards on Venice Beach. The character is said to have a particular affinity for one person on the Baywatch squad. \n\nGray joins a previously announced ensemble that includes Stephen Amell, Brooks Nader, Hassie Harrison, Shay Mitchell, Jessica Belkin, Thaddeus La Grone, Livvy Dunne, and Noah Beck. She will next appear in a supporting lead role in the indie film \u201cParadise Disturbed,\u201d opposite Holt Mc Callany (\u201cThe Iron Claw\u201d). Her previous roles include the CBS series \u201cAll Rise,\u201d alongside Wilson Bethel, a supporting role in the Netflix film \u201cBright\u201d starring Will Smith and Joel Edgerton, and a recurring part on NBC\u2019s \u201cDays of our Lives.\u201d\n\nGray is represented by Adrian Hamerski at Brave Artists Management and lawyer Adam Vitabile at Hirsch Wallerstein Hayum Matlof and Fishman. Other recurring stars booked for the new \u201cBaywatch\u201d include Ashley Moore, Kylar Miranda, Luke Eisner, and Charlie McElveen. Production in Los Angeles has attracted paparazzi attention during its early days.\n\nAmell will star as Hobie Buchannon, described as the \u201cwild child we all loved from the original series,\u201d who \u201cis now a Baywatch Captain, following in the footsteps of his legendary father, Mitch.\u201d The official synopsis states, \u201cHobie\u2019s world is turned upside down when Charlie, the daughter he never knew, shows up on his doorstep, eager to carry on the Buchannon family legacy and become a Baywatch lifeguard alongside her dad.\u201d", "Image_URLs": "docs/images/variety_2_1774052340798.jpg"}, {"Source": "Smashing Magazine", "Title": "Dropdowns Inside Scrollable Containers: Why They Break And How To Fix Them Properly", "Date": "Fri, 20 Mar 2026 13:00:00 GMT", "Author": "hello@smashingmagazine.com (Godstime Aburu)", "URL": "https://smashingmagazine.com/2026/03/dropdowns-scrollable-containers-why-break-how-fix/", "Summary": "Dropdown menus inside scrollable containers often get clipped or hidden due to overflow settings (`overflow: hidden/auto`) and stacking context issues. Even with high z-index, menus may not appear correctly if their parent containers clip overflowing content. Understanding overflow behavior, positioning, and stacking contexts is essential to resolving these display problems.", "Content": "A common issue arises when dropdown menus are placed inside scrollable panels, causing them to get clipped or disappear behind container edges. This problem often occurs in data tables within scrollable containers, where each row has an action menu\u2014a small dropdown with options like Edit, Duplicate, and Delete. While these menus work perfectly in isolation, embedding them inside a scrollable div can cause unexpected behavior, such as clipping at the container\u2019s edge or appearing behind other content. Sometimes, attempting to fix this with a high z-index like 9999 seems to help, but often it has no effect, indicating a deeper issue.\n\nThe root cause involves three browser systems: overflow clipping, stacking contexts, and containing blocks. Understanding how these interact can make the problem more predictable and easier to resolve.\n\nOne key issue is overflow. When an element has `overflow: hidden`, `overflow: scroll`, or `overflow: auto`, the browser clips any content extending beyond its bounds, including absolutely positioned descendants. For example:\n\n```css\n.scroll-container {\n  overflow: auto;\n  position: relative;\n}\n.menu {\n  position: absolute;\n  /* Positioning relative to the nearest positioned ancestor */\n}\n```\n\nIn practice, even if the dropdown menu is absolutely positioned, it can still be clipped by an ancestor with a non-visible overflow. This means that the menu can be cut off by the container\u2019s overflow settings, regardless of its positioning. Clipping and positioning are separate systems that can collide in ways that seem unpredictable but are actually consistent once understood.", "Image_URLs": "docs/images/smashing_1_1774052167266.jpg"}, {"Source": "CBC News - World", "Title": "Palestinian man says Israeli settlers sexually assaulted him in front of his family", "Date": "Fri, 20 Mar 2026 11:31:00 EDT", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/palestinian-man-israeli-settlers-sexual-assault-west-bank-9.7136163?cmp=rss", "Summary": "In March, Israeli settlers reportedly assaulted Palestinian man Suhaib Abu Kbash in Humsah, tying his genitals and parading him naked in front of his family. Seven suspects were arrested, and the incident is under investigation. Violence by settlers in the West Bank has increased, with rights groups condemning the Israeli government\u2019s inaction amid ongoing tensions.", "Content": "Israeli settlers sexually assaulted a Palestinian man\u2014tying his genitalia with zip ties and parading him naked in front of his family\u2014during a mid-March attack in the occupied West Bank, according to the victim and eyewitnesses.\n\nThe Israeli military and police said the incident is under investigation. Israeli police reported that seven suspects had been arrested on suspicion of involvement, and that police officers and military personnel were dispatched to Humsah.\n\nSuhaib Abu Kbash, 29, told Reuters that around 80 masked settlers armed with knives and sticks raided the Bedouin community of Humsah on March 13. He said about 20 of them beat him, stripped him, bound his genitals, and dragged him naked in front of his young children. \"I thought they were going to kill me,\" he said.\n\nReuters spoke to three eyewitnesses who corroborated Abu Kbash's account.\n\nAttacks by masked Jewish settlers, including the burning of cars and homes, beatings, and livestock theft, have become near-daily in the West Bank, according to Palestinians and rights groups tracking the violence.\n\nThe Yesha Council, which represents Jewish settlements, declined to comment.\n\nHumsah sits between two hills in the Jordan Valley, an area that Israeli rights group B'Tselem has said faces daily settler attacks. The alleged assault on Abu Kbash was part of a pattern of escalating violence, the group's executive director Yuli Novak told Reuters.\n\nWith the fragile Israel-Hamas ceasefire holding, there has been a rise in settler violence against Palestinians in the West Bank, something human rights groups say the Israeli government turns a blind eye to.", "Image_URLs": "docs/images/cbc_3_1774052131655.jpg"}, {"Source": "Film Jabber", "Title": "Project Hail Mary", "Date": "2026-03-20", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/project-hail-mary.html", "Summary": "\"Project Hail Mary\" (2026) is a PG-13 sci-fi film directed by Phil Lord and Christopher Miller, starring Ryan Gosling. It follows Ryland Grace, a scientist waking on a spaceship with amnesia, tasked with saving Earth from a dying sun. Based on Andy Weir's novel, the film explores his efforts to solve the mystery and includes an unexpected friendship.", "Content": "Project Hail Mary (2026) is a science fiction drama action film rated PG-13, with a runtime of 156 minutes. It is directed by Phil Lord and Christopher Miller, written by Drew Goodard, and stars Ryan Gosling, Sandra H\u00fcller, Lionel Boyce, Ken Leung, and Milana Vayntrub. The studio is MGM.\n\nThe story follows science teacher Ryland Grace, who wakes up on a spaceship light years from Earth with no memory of who he is or how he got there. As his memory returns, he uncovers his mission: to solve the mystery of a substance causing the sun to die out. Using his scientific knowledge and unorthodox ideas, he must find a way to save Earth from extinction. An unexpected friendship complicates his mission.\n\n\"Project Hail Mary\" is an adaptation of Andy Weir's popular science fiction novel, offering an entertaining and relatively faithful rendition of the story.", "Image_URLs": "docs/images/filmjabber_2_1774052322531.webp"}, {"Source": "TechCrunch", "Title": "What happened at Nvidia GTC:\u00a
