    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "Hoppers", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/hoppers.html", "Summary": "\u201cHoppers\u201d (2026) is a PG-rated animated sci-fi comedy directed by Daniel Chong, set to release on March 6, 2026. Produced by Walt Disney, it stars Jon Hamm, Bobby Moynihan, and Piper Curda. The film follows Mabel as she explores a world where human consciousness can be transferred into robotic animals to uncover hidden mysteries.", "Content": "Hoppers (2026) is an action animated comedy sci-fi film rated PG, with a runtime of 105 minutes. It is set to be released on March 6, 2026. The film is directed by Daniel Chong and written by Jesse Andrews and Daniel Chong. The cast includes Jon Hamm, Bobby Moynihan, and Piper Curda. It is produced by Walt Disney Pictures.\n\nIn \u201cHoppers,\u201d scientists have discovered how to \u201chop\u201d human consciousness into lifelike robotic animals, allowing people to communicate with animals as animals. Using this new technology, Mabel (Curda) will uncover mysteries within the animal world that are beyond anything she could have imagined.", "Image_URLs": "docs/images/filmjabber_2.webp"}, {"Source": "Film Jabber", "Title": "Sir\u0101t", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/sirat.html", "Summary": "\"Sir\u0101t,\" an R-rated foreign suspense drama directed by Oliver Laxe, releases in Los Angeles and New York on November 14, 2025, and nationwide on March 6, 2026. The 115-minute film stars Sergi L\u00f3pez and others, following a father and son searching for their missing daughter at a Moroccan rave amid electronic music and raw freedom.", "Content": "Sir\u0101t is a drama film set in a foreign suspense genre, rated R, with a runtime of 115 minutes. It is scheduled for release on November 14, 2025, in Los Angeles and New York, and on March 6, 2026. Directed by Oliver Laxe and written by Santiago Fillol and Oliver Laxe, the film stars Sergi L\u00f3pez, Bruno N\u00fa\u00f1ez, Stefania Gadda, Joshua Liam Henderson, Tonin Janvier, Jade Oukid, and Richard Bellamy. \n\nThe story follows a father and his son who arrive at a rave deep in the mountains of southern Morocco. They are searching for Mar, their daughter and sister, who vanished months earlier at one of these endless, sleepless parties. Surrounded by electronic music and a raw, unfamiliar sense of freedom, they repeatedly show her photo, clinging to hope as they follow a group of ravers to one last destination.", "Image_URLs": "docs/images/filmjabber_3.webp"}, {"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026), directed by Maggie Gyllenhaal, is an R-rated horror drama romance releasing on March 6, 2026. Featuring stars like Jessie Buckley, Christian Bale, and Annette Bening, it tells the story of a lonely Frankenstein who revives a murdered woman to create a companion in 1930s Chicago. The film explores macabre romance and ambitious themes.", "Content": "The Bride (2026) is a horror drama romance film rated R, with a runtime of 126 minutes. It is set to be released on March 6, 2026. The film is directed and written by Maggie Gyllenhaal, known for her work on The Lost Daughter. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. It is produced by Warner Brothers.\n\nThe story follows a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening) to create a companion. They revive a murdered young woman, and The Bride (Buckley) is born.\n\nThe film is described as a bold, iconoclastic take on a compelling story, filled with life, macabre romance, and ambitious ideas. Maggie Gyllenhaal's vision results in a film that is both beautiful and hideous, a creature difficult to describe.", "Image_URLs": "docs/images/filmjabber_1.webp"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Highway 11 - Update", "Date": "Fri, 06 Mar 2026 01:39:24 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026117", "Summary": "Saskatoon police report that one eastbound lane on Circle Drive and one northbound lane on Highway 11 are open after a semi-trailer struck a bridge, causing significant damage. No injuries occurred. Traffic restrictions remain, and motorists are advised to use alternate routes as engineers assess the damage. The collision is under investigation.", "Content": "The Saskatoon Police Service advises that city engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed. The Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nA semi with trailer carrying a piece of equipment in the northbound lane of Highway 11, entering the city limits at the Circle Drive overpass, was too high for the structure and caused significant damage. As a result, the northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge are closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_2.png"}, {"Source": "Laravel News", "Title": "The Inertia v3 Beta is Here", "Date": "Fri, 06 Mar 2026 02:36:45 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/the-inertia-v3-beta-is-here?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "The Inertia v3 Beta introduces a built-in XHR HTTP client, making Axios optional, and adds a use Httphook for external HTTP requests. It features optimistic updates across router and forms, supports concurrent updates, and offers instant navigation for smoother user experience. Additionally, a server-side preserve Fragment option maintains URL hashes during redirects.", "Content": "The Inertia v3 Beta is a major pre-release milestone that introduces several new features and improvements. It now includes a built-in XHR HTTP client, making Axios an optional peer dependency. Applications that do not require Axios can omit it entirely, while those that prefer it can continue using it by installing it as a peer dependency.\n\nA new use Httphook allows making HTTP requests outside of Inertia, providing the same developer experience as use Form\u2014 including processing, errors, progress, and dirtystate\u2014but returns response data instead of triggering page navigation. It supports surfacing all validation errors, not just the first.\n\nOptimistic updates have been added across the router, use Form, and use Http, including support for concurrent optimistic updates. The update callback can receive current props and return the optimistic state to apply immediately, with automatic rollback on validation errors, server errors, or interrupted requests. The router supports both a fluent API and an inline option for optimistic updates.\n\nThe use Form hook now works similarly, allowing optimistic updates when adding new items. The <Form> component also gains an optimistic prop for declarative handling.\n\nInstant support has been added to make navigation feel immediate by rendering the destination page before the server response completes.\n\nA new server-side preserve Fragment option keeps the URL hash fragment intact across redirects. When the server includes preserve Fragment: true in the Inertia page object, the client retains the original request's URL fragment even during redirects.", "Image_URLs": "docs/images/laravel_1.png"}, {"Source": "Smashing Magazine", "Title": "Human Strategy In An AI-Accelerated Workflow", "Date": "Fri, 06 Mar 2026 08:00:00 GMT", "Author": "hello@smashingmagazine.com (Carrie Webster)", "URL": "https://smashingmagazine.com/2026/03/human-strategy-ai-accelerated-workflow/", "Summary": "AI is transforming UX design by automating tasks like wireframes and prototypes, raising fears of job replacement. While AI accelerates artifact creation, UX remains focused on navigating ambiguity, advocating for users, and solving complex problems. The industry is adjusting to AI\u2019s capabilities, but core principles of human-centered design continue to define the field.", "Content": "UX design is entering a new phase, with designers shifting from makers of outputs to directors of intent. AI can now generate wireframes, prototypes, and even design systems in minutes, but UX has never been only about creating interfaces. It\u2019s about navigating ambiguity, advocating for humans in systems optimized for efficiency, and solving their problems through thoughtful design.\n\nI\u2019ve been working in User Experience design for more than twenty years. Long enough to have held many job titles, from when stakeholders asked us to \u201cjust make it pretty\u201d to when wireframes were delivered as annotated PDFs. Over the years, many tools and methodologies have come and gone, and entire platforms have disappeared. Yet, nothing has unsettled designers quite like AI.\n\nWhen generative AI tools first entered my workflow, my reaction wasn\u2019t excitement \u2014 it was unease, with a bit of curiosity. Watching an interface appear in seconds, complete with sensible spacing, readable typography, and halfway-decent copy, triggered a very real fear: if a machine can do this, where does that leave me?\n\nThat fear is now widespread. Designers at every level ask the same question, often quietly: \u201cWill an AI agent replace me by next week, month, or year?\u201d The timeline varies depending on where you are in your career and how quickly your employer chooses to adopt AI tools. I have been fortunate in some roles to work with organizations that haven\u2019t allowed the use of AI due to data security concerns. Discussions about AI\u2019s impact are ongoing on platforms like Reddit.\n\nFearing the takeover of AI in our roles is not irrational. We\u2019re seeing AI generate wireframes, prototypes, personas, usability summaries, accessibility suggestions, and entire design systems. Tasks that once took days can now be completed in minutes.\n\nHere\u2019s the uncomfortable truth: If your role is largely about producing artifacts, drawing buttons, aligning components, or translating instructions into screens, then parts of that work are already being automated. Still, UX design has never been solely about creating a user interface. It\u2019s about navigating ambiguity, advocating for humans within systems optimized for efficiency, and translating complex needs into effective solutions.", "Image_URLs": "docs/images/smashing_1.jpg"}, {"Source": "Politico - Picks", "Title": "Crude prices make record jump as Trump\u2019s measures fail to calm markets", "Date": "Fri, 06 Mar 2026 21:11:50 EST", "Author": "James Bikales", "URL": "https://www.politico.com/news/2026/03/06/crude-prices-make-record-jump-as-trumps-measures-fail-to-calm-markets-00817397", "Summary": "Crude oil prices surged past $90 per barrel amid ongoing disruptions in the Strait of Hormuz, as U.S. efforts to stabilize markets failed. Iran\u2019s damage to tankers and production cuts by Iraq and Kuwait have worsened supply issues, with analysts warning prices could reach $200. The U.S. has implemented measures like sanctions easing and naval escorts, but supply disruptions persist.", "Content": "Crude prices made a record jump as Trump\u2019s measures failed to calm markets. The Trump administration has yet to solve the fundamental issue of getting oil and gas tankers moving through the Strait of Hormuz again, analysts said.\n\nA week after it began its strikes on Iran, the Trump administration\u2019s efforts to stem the rise in energy prices have yet to turn the tide \u2014 and analysts warn the worst of the price shocks may still be to come.\n\nThe U.S. benchmark oil price eclipsed $90 a barrel on Friday for the first time since 2023, up more than $20 since the war began Saturday, marking the market\u2019s highest one-week jump in history. The price increase has already started to affect American consumers, with prices at the gas pump up 32 cents a gallon from a week ago.\n\nThe unyielding price increases are attributed to the continued disruption in the Strait of Hormuz, through which 20 percent of the world\u2019s crude passes each day. This comes as President Donald Trump faces rising pressure to contain the economic impact of the war on Americans, eight months ahead of the midterms, where affordability issues are a top concern.\n\n\u201cCrude WILL go to $200 [a barrel], en route higher, unless traffic through the Strait resumes,\u201d said Rory Johnston, an oil analyst who writes the newsletter Commodity Context. \u201cNot clickbait, but rather brutal physics and necessary economic incentives.\u201d\n\nThe White House announced several measures aimed at calming the oil markets this week, including temporarily easing sanctions on India\u2019s purchase of Russian oil and offering naval escorts and political risk insurance to oil and gas tankers traversing the Strait of Hormuz. However, none of these measures has succeeded, as traders boost prices on news of supply disruptions.\n\nIran has succeeded in damaging several oil tankers, while Iraq and Kuwait have already throttled oil production because their crude tankers can no longer reach markets. China has warned it could stop exporting fuel amid supply concerns.\n\nThe longer ships avoid the Strait of Hormuz, the more Gulf countries will start to run out of storage capacity and be forced to shut in their production, said Claudio Galimberti, chief economist at Rystad Energy. \u201cIf the Strait of Hormuz remains closed for, let\u2019s say, three weeks, then you will have shut in 15 million barrels a day of production in the Middle East,\u201d Galimberti said. \u201cThat takes us from a position of comfortable oversupply as of last Friday to one of incredible deficit, the size of which we\u2019ve never seen before.\u201d\n\nGalimberti also noted that oil may be slow to flow even if shipping traffic resumes, given the difficult and expensive processes required to restart production. \u201cIf it\u2019s shut for weeks or months, then it\u2019s going to take weeks and probably longer to get production back to normal.\u201d", "Image_URLs": "docs/images/politico_4.jpg"}, {"Source": "XXL Hip Hop", "Title": "King, Domani Strike Back at 50 Cent with Two Angry Diss Tracks", "Date": "Fri, 06 Mar 2026 21:35:53 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/king-domani-50-cent-diss-tracks/", "Summary": "King and Domani released diss tracks, \"Droptop\" and \"PU$Y,\" attacking 50 Cent for disrespecting T.I. and the Harris family on the Power Origins theme song. 50 Cent responded with provocative posts, including a photoshopped image, escalating the feud. The conflict centers on lyrical disses and personal insults related to the show's theme song.", "Content": "King and Domani released two diss tracks on their Instagram pages in retaliation against 50 Cent for disrespecting T.I. and the Harris family on the new Power Origins theme song.\n\nKing's diss track is called \"Droptop.\" On the song, he criticizes 50 Cent for talking too much smack and accuses him of allegedly beating women. \"You were made from 50 Cent because ya mama gave it cheap,\" King raps.\n\nMeanwhile, Domani delivered his diss track titled \"PU$Y.\" On the haunting song, he challenges 50 Cent's tough-guy persona. \"I smell p***y / How about you come here and try to push me / That suga water got ya, now you turn sweet, huh / I smell p***y / Ni**a, I read you like a book read / Come bring ya a*s to school quit playin' hookie / I smell p***y,\" he raps.\n\nBoth songs are responses to 50 Cent, who featured T.I. and the Harris family on the theme song for his upcoming television show, Power Origins. On the track, which features R&B singer Leon Thomas, 50 raps about the drug trade: \"I'm back on my dope boy grammar / Your daddy made your mama eat every box in Atlanta,\" and \"Freak sh*t / Peep sh*t / Keep sh*t, on the low / But everybody know.\"\n\n50 Cent captioned his Instagram post about the song, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\nHe further escalated tensions by posting a photoshopped image of T.I. with Tiny eating a piece from a cut-up cardboard box, possibly implying that 50's lyric was directed at T.I. and the Harris family matriarch. \"LOL...They are gonna learn to leave me alone,\" 50 Cent wrote in the caption.\n\nThe feud between 50 Cent and the Harris family is intensifying.", "Image_URLs": "docs/images/xxlhiphop_5.jpg"}, {"Source": "Nasdaq - Original", "Title": "Weekly Chartstopper: March 6, 2026", "Date": "Fri, 06 Mar 2026 22:00:46 +0000", "Author": "Michael Normyle", "URL": "https://www.nasdaq.com/articles/weekly-chartstopper-march-6-2026", "Summary": "Since Iran's conflict began, oil prices have surged 30-35%, impacting global energy markets and raising inflation expectations. U.S. GDP could decline by 0.6%, with markets reducing Fed rate cut forecasts by 20 basis points. Despite economic concerns, the Nasdaq-100 fell only 1%, while the 10-year Treasury yield increased to 4.15%. Key upcoming data include CPI, PCE, and GDP revisions.", "Content": "US Markets Weekly Chartstopper: March 6, 2026\n\nMarch 06, 2026 \u2014 05:00 pm EST\n\nSince the conflict with Iran began on Saturday, markets have been trying to assess its economic impact, primarily through higher energy prices. The conflict has effectively halted traffic in the Strait of Hormuz, which transports 20-25% of global oil and liquefied natural gas (LNG), and has shuttered energy facilities in the region.\n\nThis week, international and U.S. oil prices have risen 30% and 35%, respectively, reaching their highest levels since 2023. European LNG prices are up 65%, while U.S. LNG prices have increased by 10%. JPMorgan estimates that if oil prices remain at these levels, U.S. headline inflation could rise by 0.3 percentage points, and U.S. GDP growth could decrease by 0.6 percentage points. \n\nGiven the likely boost to inflation, markets have reduced their expectations for Federal Reserve rate cuts this year by 20 basis points to around 40 basis points. This adjustment follows a significant jobs report miss, with the economy losing 92,000 jobs in February\u2014against expectations of a 55,000 gain\u2014and broad-based losses across sectors. However, it\u2019s important not to overinterpret a single month\u2019s data, as the private sector has averaged a gain of about 20,000 jobs per month over the past three months.\n\nDespite this, the Nasdaq-100\u00ae is down just 1% this week, though rising inflation expectations have pushed the 10-year Treasury yield up nearly 20 basis points to 4.15%.\n\nNext Week\n\nHere are the top events to watch:\n\nTuesday: NFIB Small Business Optimism (Feb.)  \nWednesday: CPI Inflation (Feb.)  \nThursday: Jobless Claims  \nFriday: PCE Inflation and Spending (Jan.), Real GDP (Q4 revision), JOLTS Job Openings (Jan.)", "Image_URLs": "docs/images/nasdaq_original_3.png"}, {"Source": "CBC News - World", "Title": "U.S. says it worked with Ecuador to bomb alleged drug-trafficking operations site", "Date": "Fri, 06 Mar 2026 22:15:00 EST", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/us-ecuador-joint-operation-drug-trafficking-9.7118563?cmp=rss", "Summary": "The U.S. and Ecuador conducted a joint operation targeting a drug traffickers' camp near the Colombian border in Ecuador, involving helicopters, aircraft, boats, and drones. The camp belonged to Colombian FARC dissidents. Ecuador\u2019s President Noboa prioritizes cracking down on organized crime, with the U.S. described as a key partner. No details on casualties were provided.", "Content": "The U.S. and Ecuador carried out a joint operation targeting drug trafficking in Ecuador, authorities in both countries announced on Friday. The U.S. described the operation as \"lethal kinetic operations.\" Neither U.S. Southern Command nor Ecuador's defense ministry provided details on whether anyone was killed or captured during the strike.\n\nThe operation involved helicopters, aircraft, river boats, and drones to locate and bomb a drug traffickers' training camp in northeastern Ecuador near the Colombian border, according to Ecuador's defense ministry. The camp belonged to the Comandos de la Frontera (CDF), a Colombian criminal organization composed of FARC dissidents, with a capacity for 50 people.\n\nEcuadorian President Daniel Noboa has prioritized a military crackdown on organized crime. His government has also imposed tariffs on Colombia, accusing it of insufficient efforts to combat drug trafficking. Noboa is scheduled to attend the \"Shield of the Americas\" summit in Miami this weekend, where regional leaders will discuss security and organized crime.\n\nThe Ecuadorian defense ministry stated that the United States is a key ally in this fight. \"At the request of Ecuador, the Department of War executed targeted action to advance our shared objective of dismantling narco-terrorist networks,\" said Pentagon spokesman Sean Parnell. This operation followed a similar U.S.-Ecuador effort announced earlier this week by U.S. Southern Command.", "Image_URLs": "docs/images/cbc_4.jpg"}, {"Source": "TechCrunch", "Title": "Nintendo sues the US government for a refund on tariffs", "Date": "Fri, 06 Mar 2026 22:35:35 +0000", "Author": "Amanda Silberling", "URL": "https://techcrunch.com/2026/03/06/nintendo-sues-the-u-s-government-for-a-refund-on-tariffs/", "Summary": "Nintendo filed a lawsuit against the U.S. government seeking a refund for tariffs paid under President Trump\u2019s executive orders, which were struck down by the Supreme Court for exceeding presidential authority. Over a thousand companies are also pursuing refunds on tariffs totaling over $200 billion. Trump increased tariffs from 10% to 15%, prompting 24 states to sue.", "Content": "Nintendo filed a lawsuit against the U.S. government on Friday seeking a refund for tariffs it paid due to President Donald Trump\u2019s executive orders invoking the International Emergency Economic Powers Act (IEEPA). The lawsuit, filed in the U.S. Court of International Trade, follows a Supreme Court decision that struck down the tariffs imposed under IEEPA, ruling that the president exceeded his authority. More than a thousand other companies have also sued for refunds on these tariffs, which have resulted in over $200 billion collected on imports in total.\n\nNintendo confirmed the filing, stating, \"We have nothing else to share on the topic.\" In response to the Supreme Court\u2019s decision, President Trump raised tariffs from 10% to 15%. Subsequently, 24 states have sued, arguing that the president has once again overstepped his powers by making this change.", "Image_URLs": "docs/images/techcrunch_3.jpg"}, {"Source": "TechCrunch", "Title": "X is testing a new ad format that connects posts with products", "Date": "Fri, 06 Mar 2026 22:41:26 +0000", "Author": "Sarah Perez", "URL": "https://techcrunch.com/2026/03/06/x-is-testing-a-new-ad-format-that-connects-posts-with-products/", "Summary": "X is testing a new ad format that inserts product recommendations beneath posts referencing the company or its products, initially seen with Starlink in Europe. The suggested links direct users to product websites, and the feature aims to provide non-intrusive advertising. This follows recent initiatives like \"Paid Partnership\" labels and creator monetization tools, as X seeks to attract more marketers and compete with larger social platforms.", "Content": "X is testing a new ad format that inserts a recommendation directly underneath a post that references the company or its products. The initial test, spotted by an X user in Europe, displayed a suggestion to \u201cGet Starlink\u201d beneath a post from a user that said Starlink\u2019s satellite service works great in Portugal. The link, when clicked, directed users to Starlink\u2019s website. X head of product Nikita Bier confirmed the test, responding, \u201cTrying to make an ad product that isn\u2019t an ad.\u201d\n\nThe Starlink ad is not visible to all users at this time, but the placeholder where the ad sits is. If a user posts from @levelsio\u2019s account on March 6, there will be an outlined box beneath the text of the post. This box currently showcases a random X post unless the user is in a location where the ad test is live. \n\nIn places where the ad displays, several commenters noticed the new addition, with one asking, \u201clmao, did you add this Starlink button?\u201d In response to a suggestion that X should allow affiliate links in this ad slot, Bier said, \u201cNo, then people will lie. I want to trust recommendations on here.\u201d \n\nThe test follows earlier news that the company is rolling out \u201cPaid Partnership\u201d labels for creators. These labels can be applied to posts to comply with social media advertising regulations, instead of requiring creators to use hashtags like \u201cad\u201d or \u201cpaid partnership.\u201d If sponsored posts were combined with embedded links like the one being tested, X could potentially attract more marketers to the platform. This could encourage creators to use the app more, helping it compete against larger social networks such as Instagram, YouTube, and TikTok.\n\nX has been pursuing creator content for some time\u2014long before it was called \u201cX\u201d and before Elon Musk\u2019s ownership. The platform has introduced various creator products, including payouts for viral content, ad-revenue sharing, and creator subscriptions. Recently, the company revamped its Creator Subscriptions offering with new features, including the ability to monetize individual threads.\n\nAdditionally, X announced that its integrated chatbot Grok can now read X\u2019s long-form content, known as Articles. However, this feature remains underutilized, as many creators prefer to publish lengthy written content through their own websites or newsletters.", "Image_URLs": "docs/images/techcrunch_2.jpg"}, {"Source": "XXL Hip Hop", "Title": "CyHi Addresses G.O.O.D. Music Breakup on \"The G.O.O.D. Ole Days\"", "Date": "Fri, 06 Mar 2026 23:21:00 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/cyhi-the-good-ole-days-song/", "Summary": "Cy Hi addresses the breakup of G.O.O.D. Music in his song \"The G.O.O.D. Ole Days,\" blaming strained relationships with Travis Scott, Kid Cudi, and Kanye West. He cites a lack of collaboration, differing loyalties, and Ye's difficult leadership as factors. Cy Hi also announces a new album, \"The Story of Mr. EGOT,\" coming soon.", "Content": "Cy Hi addresses Travis Scott, Kid Cudi, and the reasons behind the G.O.O.D. Music breakup on his new song, \"The G.O.O.D. Ole Days.\" On Friday (March 6), Cy Hi released his new song where he discusses artists from Ye's G.O.O.D. Music label and why the breakup happened.\n\nProduced by Mark Byrd and Phil Blackman, the song features Cy Hi explaining his fallout with G.O.O.D. Music members Travis Scott, Kid Cudi, and others. According to Cy Hi, his friendship with Travis deteriorated when he couldn't get a verse from him in exchange for co-writing Travis's biggest hit, \"Sicko Mode.\" He raps, \"I like what he did in fashion, but ni**a just look hella tacky. When I helped him with his album, it went like [11-times] platinum, but I still ain't got my swap and he mad that I'm even askin'.\"\n\nRegarding Kid Cudi, Cy Hi believes their relationship soured because Cudi sided with Ye during his past disagreement with Cudi. He raps, \"It could have got real ugly / They said that Ye almost f**k around and killed buddy, and that's why their relationship is still muddy. And I'm caught between it all. Man, ni**a should feel for me.\"\n\nAs for Ye, Cy Hi acknowledges he was also a reason for G.O.O.D. Music's dissolution but empathizes with the Chicago rapper-producer, noting Ye's leadership efforts. He lyrically explains, \"Okay, I understand that. But you know sometimes Kanye could be a little difficult. I get it, but I understand him in a different way. Y'all just know the beautiful dark twisty Ye. He's just an honest person, but it gets conveyed as somebody with a broken heart against the 808. I ain't going to lie. Sometimes it gets in the business way. He just ain't afraid to say what you didn't say.\"\n\nNear the end of the song, Cy Hi announces he's dropping a new album titled \"The Story of Mr. EGOT\" \"real soon.\"", "Image_URLs": "docs/images/xxlhiphop_3.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Buy the Spike in CrowdStrike or Okta Stock After Posting Record Profitability?", "Date": "Fri, 06 Mar 2026 23:30:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/buy-spike-crowdstrike-or-okta-stock-after-posting-record-profitability", "Summary": "CrowdStrike and Okta outperformed expectations in Q4, posting record profitability and strong revenue growth amid market volatility. CrowdStrike\u2019s $1.3 billion sales and 47% ARR growth reflect surging demand for AI-driven cybersecurity. Okta\u2019s $761 million sales and expanding enterprise adoption highlight platform consolidation success. Both stocks surged over 10% post-earnings, with positive full-year guidance.", "Content": "Technology\n\nBuy the Spike in CrowdStrike or Okta Stock After Posting Record Profitability?\n\nIn a week marked by broader market volatility, cybersecurity firms CrowdStrike (CRWD) and Okta (OKTA) have emerged as outperformers after exceeding their Q4 expectations. Both stocks have surged more than 10% since reporting their Q4 results on Tuesday and Wednesday, respectively. They delivered standout Q4 reports, showing record profitability, strong revenue growth, expanding recurring revenue bases, and rising demand for cybersecurity and identity solutions.\n\nCrowdStrike\u2019s AI-Driven Security Demand\n\nCrowdStrike\u2019s strong Q1 results were defined by faster-than-expected growth amid surging demand for its Falcon cybersecurity platform as AI-driven cyber threats become more sophisticated. Notably, Falcon is a cloud-native cybersecurity solution that provides advanced endpoint detection and response (EDR), managed detection and response (MDR), and next-generation antivirus capabilities to protect organizations from cyber threats.\n\nFalcon\u2019s growth led to CrowdStrike posting Q4 sales of $1.3 billion, up 24% from a year ago and surpassing estimates of $1.29 billion. Its net new annual recurring revenue (ARR) grew 47% year over year, reaching a quarterly record of $331 million. More importantly, CrowdStrike saw record profitability since going public in 2019, with Q4 EPS rising 9% to a peak of $1.12, surpassing expectations of $1.10.\n\nOkta\u2019s Enterprise Adoption & Platform Consolidation\n\nOkta\u2019s standout Q4 report was highlighted by steady subscription growth, expanding enterprise adoption, and strong cash flow, signaling a successful transition for its unified identity security platform. The consolidated platform allows customers to integrate with nearly any application, service, or cloud through a secure, reliable, and scalable security system. Accelerating adoption of Okta's platform was attributed to trust from large organizations as they modernize their security architecture.\n\nWith solid revenue growth, Okta\u2019s Q4 sales increased 11% to $761 million, beating estimates of $749.1 million. Its remaining performance obligations (RPO) rose 15% year over year, while current RPO grew 12%, indicating strong future revenue. Okta also posted record profitability, with Q4 EPS rising 15% to $0.90, beating expectations of $0.85. Other highlights included Q4 free cash flow increasing 11% to a record $252 million.\n\nFull-Year Results & Guidance\n\nCapping off a record year, CrowdStrike\u2019s annual sales surged 22% to $4.81 billion, while full-year EPS skyrocketed to $3.73 from previous levels.", "Image_URLs": "docs/images/nasdaq_tech_3.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Par Petroleum (PARR) Q4 Earnings: How Key Metrics Compare to Wall Street Estimates", "Date": "Fri, 06 Mar 2026 23:30:01 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/par-petroleum-parr-q4-earnings-how-key-metrics-compare-wall-street-estimates", "Summary": "Par Petroleum reported Q4 2025 revenue of $1.81 billion, up 5.9% from estimates, and EPS of $1.17, beating revenue expectations but slightly below EPS estimates. Key refinery throughput metrics exceeded analyst estimates, while some production costs were higher than expected. Overall, the company showed mixed performance relative to Wall Street forecasts.", "Content": "Technology Par Petroleum (PARR) Q4 Earnings: How Key Metrics Compare to Wall Street Estimates\n\nFor the quarter ended December 2025, Par Petroleum (PARR) reported revenue of $1.81 billion, down 1% over the same period last year. EPS came in at $1.17, compared to -$0.79 in the year-ago quarter. The reported revenue represents a surprise of +5.9% over the Zacks Consensus Estimate of $1.71 billion. With the consensus EPS estimate being $1.21, the EPS surprise was -2.91%.\n\nWhile investors closely watch year-over-year changes in headline numbers\u2014revenue and earnings\u2014and how they compare to Wall Street expectations to determine their next course of action, some key metrics always provide a better insight into a company's underlying performance. Since these metrics play a crucial role in driving the top- and bottom-line numbers, comparing them with the year-ago numbers and what analysts estimated about them helps investors better project a stock's price performance.\n\nHere is how Par Petroleum performed in the just reported quarter in terms of the metrics most widely monitored and projected by Wall Street analysts:\n\nTotal Refining - Feedstocks Throughput: 190,900 thousands of barrels of oil versus the three-analyst average estimate of 189,129.2 thousands of barrels of oil.\n\nHawaii Refinery - Feedstocks Throughput: 87.10 MMBBL/D compared to the 85.96 MMBBL/D average estimate based on three analysts.\n\nWashington Refinery - Feedstocks Throughput: 37.00 MMBBL/D versus 36.08 MMBBL/D estimated by three analysts on average.\n\nWyoming Refinery - Feedstocks Throughput: 14.40 MMBBL/D compared to the 15.53 MMBBL/D average estimate based on three analysts.\n\nMontana Refinery - Feedstocks Throughput: 52.40 MMBBL/D compared to the 51.55 MMBBL/D average estimate based on three analysts.\n\nAdjusted Gross Margin per barrel - Washington Refinery: $8.32 versus $6.39 estimated by two analysts on average.\n\nProduction costs per barrel - Wyoming Refinery: $13.27 versus the two-analyst average estimate of $10.25.\n\nProduction costs per barrel - Washington Refinery: $4.57 compared to the $4.08 average estimate based on two analysts.\n\nProduction costs per barrel - Hawaii Refinery: $4.15 versus the two-analyst average estimate of $4.70.\n\nRevenues from Refining: $1.75 billion versus the two-analyst average estimate of $1.57 billion. The reported number represents a year-over-year change of -1.2%.\n\nRevenues from Retail: $142.28 million compared to the $145.87 million average estimate based on two analysts. The reported number represents a change of +0.5% year over year.\n\nRevenues from Logistics: $73.71 million versus $74 million estimated by two analysts on average.", "Image_URLs": "docs/images/nasdaq_tech_2.jpg"}, {"Source": "CBC News - World", "Title": "Iranian President Masoud Pezeshkian apologizes to Gulf states as war enters second week", "Date": "Fri, 09 Jan 2026 12:00:37 EST", "Author": "Anya Zoledziowski", "URL": "https://www.cbc.ca/news/world/livestory/iran-israel-us-war-day-8-9.7109761?cmp=rss", "Summary": "After Iran\u2019s supreme leader was killed in a U.S.-Israel strike, Iran retaliated against Israel and U.S. bases. Over 1,230 deaths have occurred, including 217 in Lebanon, amid escalating conflict and humanitarian crises. Iran targeted Israel and U.S. installations, while Israel intensified strikes on Hezbollah in Lebanon. Canada is evacuating citizens; Trump called for Iran\u2019s unconditional surrender.", "Content": "Days after Iran\u2019s supreme leader was killed in a U.S.-Israel strike, Iran retaliated against Israel and U.S. bases as Israel intensified strikes on Iran-backed Hezbollah in Lebanon.\n\nThe U.S.-Israeli conflict with Iran has continued to escalate after nearly a week, resulting in over 1,230 deaths in Iran, with the Lebanese Health Ministry reporting 217 fatalities and more than 790 wounded due to Israeli attacks. The situation has led to a humanitarian crisis, with thousands seeking evacuation.\n\nIran launched retaliatory attacks on Israel and U.S. military installations, while Israel increased its campaign against Iran-backed Hezbollah militants in Lebanon. On Friday, U.S. President Donald Trump stated that the only deal with Iran to potentially end the war would be \"unconditional surrender.\"\n\nIranian President Masoud Pezeshkian issued an apology to Gulf states affected by the conflict but rejected Trump's demand for Iran's surrender. Prime Minister Mark Carney announced that Canada had no plans to engage militarily, focusing instead on evacuating 3,500 Canadians who requested assistance.\n\nThe conflict has seen widespread destruction, with Israeli jets striking Tehran and Iran targeting Kuwait. Smoke rises over southern Beirut following Israeli strikes, and sirens blare over Tel Aviv as Israel's defense systems engage.", "Image_URLs": "docs/images/cbc_2.jpg"}, {"Source": "Smashing Magazine", "Title": "Getting Started With The Popover API", "Date": "Mon, 02 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Godstime Aburu)", "URL": "https://smashingmagazine.com/2026/03/getting-started-popover-api/", "Summary": "The article explains the evolution of tooltips in web development, highlighting the new Popover API as a native browser solution. Traditionally, tooltips required complex JavaScript and faced accessibility issues. The Popover API aims to simplify implementation, improve accessibility, and reduce reliance on external libraries, with broad browser support enhancing native tooltip handling.", "Content": "The article discusses the evolution of tooltips in web development, focusing on the new Popover API as a native browser solution. Traditionally, building tooltips involved using JavaScript libraries, which often led to complex, hard-to-maintain code. Although tooltips seem simple\u2014appearing on hover or focus and disappearing when the user moves away\u2014implementing them correctly for all users, including those relying on keyboard navigation and screen readers, proved challenging.\n\nCommon issues included flickering, overlapping content on small screens, and accessibility problems such as screen readers announcing tooltips incorrectly or not at all. Over time, the developer's tooltip code grew increasingly complex, with multiple event listeners, manual ARIA attribute management, and handling outside clicks, making maintenance difficult. While libraries provided some relief, they often acted as black boxes, obscuring the underlying behavior.\n\nThis prompted exploration of the newer Popover API, which aims to handle these interactions natively within the browser. Although still evolving and with some parts in flux, the API currently enjoys broad support across major browsers. Using the Popover API can simplify tooltip implementation, making them more accessible and reducing reliance on external libraries.", "Image_URLs": "docs/images/smashing_3.jpg"}, {"Source": "Nasdaq - Original", "Title": "February 2026 Review and Outlook", "Date": "Mon, 02 Mar 2026 21:05:25 +0000", "Author": "The Market Intelligence Desk Team", "URL": "https://www.nasdaq.com/articles/february-2026-review-and-outlook", "Summary": "In February 2026, U.S. equities showed mixed results amid sector rotation. Large-cap indices were restrained, with the Nasdaq 100 down 2.3%, while equal-weight and mid-cap indices outperformed. Market leadership shifted toward cyclicals and defensives like energy and healthcare. Treasury yields declined, and economic data indicated a cooling economy. Overall, the month reflected ongoing rotation rather than a risk-off environment.", "Content": "US Markets February 2026 Review and Outlook\n\nThe Market Intelligence Desk Team\n\nMarket Intelligence Desk by this author ->\n\nExecutive Summary: U.S. equities delivered a mixed headline performance amid significant internal rotation. Market leadership broadened as equal-weight, mid-cap, and value exposures outperformed. Market breadth improved with seven of 11 large-cap sectors within 0.5% of their respective 52-week highs. Mega-cap growth and AI-adjacent software weighed on cap-weighted indices. Treasury yields declined meaningfully, led by the long end. Energy prices strengthened amid geopolitical risk, reinforcing real-asset leadership. Earnings growth remains solid despite increasing dispersion beneath the surface.\n\nU.S. equity markets delivered a mixed performance in February, with headline indices masking significant rotation and dispersion beneath the surface. Among large caps, the Dow Jones Industrials rose modestly by 0.3%, the S&P 500 declined 0.8% for the second time in three months, and the Nasdaq 100 fell 2.3%, posting its worst monthly decline since March 2025. Cap-weighted indices were restrained by corrective price action in select large-cap growth stocks, as seen in the Magnificent Seven Index, which declined 7.3%, its worst since March 2025. Conversely, the S&P 500 Equal Weight Index gained 3.5%, its best since May 2025, outperforming the cap-weighted S&P 500 for the fourth consecutive month. The S&P Midcap 400 rose 4.1%, its best month since May 2025.\n\nImportantly, February did not resemble a broad risk-off environment. Instead, market action was characterized by rotation rather than liquidation. Investors continued reallocating away from concentrated leadership toward a broader mix of cyclicals and defensives, with strong gains across energy, utilities, materials, staples, industrials, and healthcare. This shift suggests confidence in the durability of economic activity, even as debate persists around the return profile and timing of large-scale AI investments.\n\nFrom a macro perspective, the backdrop remained supportive but nuanced. Economic data indicated a gradually cooling economy rather than contraction, while inflation progress remained uneven. Treasury yields declined significantly during the month, with the 10-year yield falling below 4%, reinforcing expectations for a patient Federal Reserve. Overall, February appeared less like a turning point for equities and more like an extension of an ongoing transition toward broader participation and more selective leadership.\n\nThe divergence in February was largely driven by continued weakness in mega-cap growth, particularly within technology.", "Image_URLs": "docs/images/nasdaq_original_7.jpg"}, {"Source": "Nasdaq - Technology", "Title": "3 AI Infrastructure Stocks on Sale", "Date": "Sat, 07 Mar 2026 00:04:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/3-ai-infrastructure-stocks-sale", "Summary": "The article discusses stock market volatility due to geopolitical tensions, creating buying opportunities for value investors. It highlights that AI infrastructure stocks, including Everus Construction Group and Sterling Infrastructure, are on sale after recent declines, despite strong earnings and future growth prospects. These companies, involved in building AI data centers and infrastructure, are now more attractive investments amid market uncertainty.", "Content": "AAPLTSLAAMZNMETAAMDNVDAPEPCOSTADBEGOOGAMGNHONINTCINTUNFLXADPSBUXMRNAAAPLTSLAAMZNMETAAMDNVDAPEPCOSTADBEGOOGAMGNHONINTCINTUNFLXADPSBUXMRNAAAPLTSLAAMZNMETAAMDNVDAPEPCOSTADBEGOOGAMGNHONINTCINTUNFLXADPSBUXMRNA\n\nTechnology\n\n3 AI Infrastructure Stocks on Sale\n\nMarch 06, 2026 \u2014 07:04 pm EST\n\nWelcome to Episode #431 of the Value Investor Podcast. Every week, Tracey Ryniec, the editor of Zacks Value Investor portfolio, shares some of her top value investing tips and stock picks.\n\nStocks are selling off after the start of the Iran War has brought uncertainty back to the markets. Oil has spiked over $90 a barrel on the near closure of the Strait of Hormuz, which has caused traders to get jittery. Is this a short-term event, or will it drag on for months? There is uncertainty. That means it\u2019s a good time for value investors to look for buying opportunities in stocks. In times of high volatility, most stocks tend to sell off. Why not get your favorite stocks on sale?\n\nThe AI Infrastructure Companies are on Sale\n\nThe AI infrastructure companies posted strong fourth quarter and 2025 earnings, and most have guided higher for 2026. The hyperscalers are spending over $500 billion this year on building out the infrastructure for AI. The AI infrastructure companies are going to be among the beneficiaries. They are involved in many different areas of the AI universe. These companies are building data centers, providing products for power generation, making racks to hold the chips in data centers, and cooling the data centers.\n\nShares of many of these companies were trading at 5-year highs recently. But valuations were stretched. None of the AI infrastructure companies are \u201ccheap\u201d on a P/E or P/S ratio basis. But this sell-off has made them more attractive. They are on sale. Now is the time for value investors to take a look.\n\n3 AI Infrastructure Stocks on Sale\n\n1. Everus Construction Group (ECG)\n\nEverus Construction Group is \u201cbuilding America\u2019s future.\u201d It is involved in electrical and communication wiring and infrastructure, as well as electrical transmission and distribution projects. Shares of Everus have fallen further since the podcast was recorded on Wednesday, Mar 4, 2026. Everus is down 9.1% in the last 5 days but remains up 178% over the last year. It has become cheaper on a price-to-earnings (P/E) basis. Everus now trades with a forward P/E of 27. Earnings are expected to rise 5.3% in 2026 and 7% in 2027. Is it time for value investors to buy Everus?\n\n2. Sterling Infrastructure, Inc. (STRL)\n\nSterling Infrastructure provides development services in E-Infrastructure, Transportation, and Building Solutions, including for e-commerce warehouses and data centers. Earnings are expected to jump 25.8% in 2026 and another 15% in 2027. Shares of Sterling have pulled back.", "Image_URLs": "docs/images/nasdaq_tech_1.jpg"}, {"Source": "BBC News - World", "Title": "Armed robots take to the battlefield in Ukraine war", "Date": "Sat, 07 Mar 2026 00:36:19 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c62662gzlp8o?at_medium=RSS&at_campaign=rss", "Summary": "Since Russia's invasion of Ukraine, the conflict has become highly technological, with Ukraine deploying uncrewed ground vehicles (UGVs) for combat, reconnaissance, and logistics. These robots have successfully repelled attacks, captured prisoners, and clashed with enemy units. Most are remotely controlled, with final firing decisions made by humans, amid ongoing ethical considerations. Ukraine plans to expand UGV use significantly.", "Content": "Since the start of Russia's full-scale invasion, the war in Ukraine has developed into a high-tech conflict. Swarms of spy and killer drones have set the skies of Ukraine abuzz, and uncrewed boats have crippled the Russian navy in the Black Sea. Now, Ukraine has embarked on a massive programme to deploy armed robots on the ground.\n\nUncrewed ground vehicles (UGVs), or ground robot systems as they are known in Ukrainian military parlance, have already proven their worth. There have been reports of UGVs successfully repelling Russian attacks and even taking enemy soldiers prisoner. Ukrainian and Russian killer robots are even said to have clashed without humans being present at the site of the battle.\n\n\"Robot wars are already happening,\" says Oleksandr Afanasiev from the Ukrainian army's K2 brigade. He commands its UGV battalion\u2014the world's first, he claims. One way the brigade has been using these robots is by mounting Kalashnikov machine guns on top. \"They open fire on a battlefield where an infantryman would be afraid to turn up. But a UGV is happy to risk its existence,\" Maj Afanasiev explains.\n\nHis battalion has also been using explosive-laden, battery-powered kamikaze UGVs to blow up enemy positions and hideouts. Unlike aerial drones that buzz overhead, these make no sound to warn the enemy of an impending strike. The deputy commander of the 33rd Detached Mechanised Brigade's tank battalion, who goes by the callsign Afghan, claims that one Ukrainian UGV armed with a machine gun ambushed a Russian personnel carrier, while another robot defended a Ukrainian position for weeks.\n\nAfghan admits there are limits to the killer robots' autonomy on the battlefield, citing ethical and international humanitarian law considerations. \"Modern UGVs are part-autonomous. They can move on their own, observe, and detect the enemy. But still, the decision to open fire is made by a human, their operator,\" he says. \"Robots can misidentify the wrong person or attack a civilian. That's why the final decision must be made by an operator.\"\n\nMost armed UGVs are remotely controlled by operators over the internet from a safe distance. Ukraine's lethal UGVs can be armed with grenade launchers as well as machine guns, and can also be deployed to plant landmines or barbed wire. However, the majority of uncrewed vehicles are still used for their original purposes of delivering supplies and evacuating the wounded.\n\nThe role of armed UGVs is expected to grow exponentially, according to Valerii Zaluzhnyi, Ukraine's former commander-in-chief and now ambassador to the UK. Speaking at the London think-tank Chatham House about the future of warfare, he described how strike UGVs would be used.", "Image_URLs": "docs/images/bbc_3.jpg"}, {"Source": "XXL Hip Hop", "Title": "One Suspect Charged for Foolio's Murder Wants Separate Trial", "Date": "Sat, 07 Mar 2026 00:46:07 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/foolio-murder-suspect-wants-his-own-trial/", "Summary": "Rashad Murphy, one of five charged in Foolio's 2004 murder, requests a separate trial or jury due to potential evidence overlap. His attorneys filed motions amid ongoing court proceedings; co-defendant Alicia Andrews was convicted of manslaughter and faces sentencing. The other suspects\u2019 motions were denied. The case remains ongoing in Florida.", "Content": "One of the suspects charged with Foolio's murder is to have his own trial. According to documents obtained by XXL, attorneys for Rashad Murphy, one of the suspects in the 2024 murder of rapper Foolio, filed a supplemental memorandum on Thursday (March 5) requesting to be tried separately from his co-defendants for their upcoming trial, or at least have a different jury. Last month, the court held a hearing to address the motion but no ruling was made.\n\nOn Friday (March 6), Murphy's attorneys filed an amended memorandum addressing the court's indication that evidence concerning a separate shooting involving Murphy's co-defendants might be admissible against all defendants. This would happen if the judge determines that the evidence is \"inextricably intertwined\" with the charges related to Foolio's killing. Florida law requires a defendant-specific relevance and prejudice analysis in joint trials, Rashad Murphy respectfully submits this supplemental memorandum to address that issue.\n\nRashad Murphy is one of five people charged with Foolio's murder, along with Alicia Andrews, Isaiah Chance, Sean Gathright, and Davion Murphy. The Jacksonville, Fla., rapper was shot and killed by three masked gunmen while celebrating his birthday in Tampa, Fla., on June 23, 2004. In October 2025, Andrews was convicted of manslaughter in connection with Foolio's killing and faces a maximum sentence of 15 years in prison. Her sentencing was delayed after the original judge was removed in January by an appellate court due to bias. Andrews\u2019 new sentencing hearing is now scheduled for December 8.\n\nMeanwhile, the four other murder suspects\u2014Rashad, Davion, Isaiah, and Sean Gathright\u2014were in court on Wednesday (March 4), where a judge denied several motions, including some Florida statutes, the death penalty, and victim impact evidence. Video of their court hearing can be viewed below.", "Image_URLs": "docs/images/xxlhiphop_1.jpg"}, {"Source": "TechCrunch", "Title": "Robinhood\u2019s startup fund stumbles in NYSE debut", "Date": "Sat, 07 Mar 2026 02:04:43 +0000", "Author": "Marina Temkin", "URL": "https://techcrunch.com/2026/03/06/robinhoods-startup-fund-stumbles-in-nyse-debut/", "Summary": "Robinhood has raised $658.4 million for its Robinhood Ventures Fund I, allowing retail investors to access private startups like Databricks and Stripe. The fund\u2019s shares, priced at $25, closed at $21 on debut. Unlike Destiny Tech100, which trades above its net asset value, Robinhood\u2019s fund lacks exposure to high-profile companies like OpenAI and SpaceX, which it plans to add later.", "Content": "Retail investors are famously locked out of the startup world. Robinhood is attempting to change that by allowing the general public to invest in a portfolio of what it calls \u201csome of the most exciting private companies operating today.\u201d To do this, the company that pioneered the commission-free brokerage model has secured access to eight startups\u2014including Databricks, Stripe, Mercor, and Oura\u2014grouping them into a vehicle called Robinhood Ventures Fund I. The fund, which also includes Ramp, Airwallex, Revolut, and Boom, set out last month with an ambitious $1 billion target, but demand for this novel way of investing in private companies was lower than expected.\n\nOn Thursday, Robinhood announced the fund had raised $658.4 million \u2014 which could reach $705.7 million if underwriters exercise their full allotment. The shares, priced at $25 in the offering, began trading on Friday and closed the day at $21, a 16% decline.\n\nRVI\u2019s reception on Wall Street stands in stark contrast to another attempt to give individual investors exposure to buzzy startups. When Destiny Tech100 \u2014 a publicly traded, closed-end fund holding stakes in 100 venture-backed companies including SpaceX, OpenAI, and Discord \u2014 direct-listed on the NYSE in March 2024, its shares surged from a reference price of $4.84 to an opening trade of $8.25, eventually closing its first day at $9.00. Destiny Tech100 has kept climbing since its public debut. The fund closed trading on Friday at $26.61, a 33% premium to its net asset value of $19.97, meaning its shares trade well above the actual value of its underlying holdings.\n\nWhat explains why retail investors aren\u2019t nearly as excited about Robinhood\u2019s fund as they are about Destiny Tech 100? The most likely explanation is RVI\u2019s lack of exposure to the companies widely expected to go public at enormous valuations: OpenAI, Anthropic, and SpaceX. Robinhood is looking to address this. RVI intends to add more startups to the fund, eventually aiming to hold what Robinhood Ventures President Sarah Pinto described as \u201c15 to 20 of the best late-stage growth companies out there.\u201d The company\u2019s CFO, Shiv Verma, told Axios Pro that Robinhood is eyeing exposure to OpenAI.", "Image_URLs": "docs/images/techcrunch_1.jpg"}, {"Source": "Polygon", "Title": "Marathon interactive maps", "Date": "Sat, 07 Mar 2026 02:15:17 GMT", "Author": "Polygon Staff", "URL": "https://www.polygon.com/map/marathon-interactive-maps-exfil-locations/", "Summary": "The article discusses new interactive maps for the game Marathon, featuring two launch zones\u2014Perimeter and Dire Marsh\u2014and an upcoming Cryo Archive map. Perimeter is beginner-friendly but challenging, with hotspots like Hauler and Tunnels. Dire Marsh is swampy with stronger UESC enemies, while Outpost is a tough, close-quarters facility. Additional maps and details are provided for strategic gameplay.", "Content": "No Ads Ninja v10 Client!\n\nJump Links Perimeter interactive map Dire Marsh interactive map Outpost interactive map Whether you're looking for locked rooms, exfil locations, or priority targets, our Marathon interactive maps are what you need. There are two zones in Marathon at launch \u2014 Perimeter and Dire Marsh \u2014 and each of them offers a different environment to hunt down other runners and UESC enemies alike, before getting the heck out of there with your hard-earned loot. Here are our interactive Marathon maps for Perimeter, Dire Marsh, and Outpost. Expect an interactive map for the game's hardest map, Cryo Archive, when it becomes playable later this month.\n\nPerimeter interactive map Considered the best map for beginners, don't let that fool you. Perimeter can still give you a tough time. Hauler is one of the most active player hotspots here, as one of the only ways from the southern half of the map to the north, due to the Data Wall that stretches horizontally. Then there's Tunnels, which is a mazy network of underground tunnels that houses plenty of high-tier loot. Not to mention Station and Overflow, which you must complete the \"Survival Directive\" priority contract.\n\nDire Marsh interactive map Dire Marsh is a swampy environment, with Algae Ponds being the most populated; some players have referred to it as \"Marathon's Tilted Towers.\" You can complete \"Introducing: Traxus\" at Intersection, Bio-Research, or Complex, and there's also the Maintenance Pump key you can use in the southwest corner. The UESC threats on Dire Marsh are stronger than on Perimeter, so make sure you're using the best weapons and classes.\n\nOutpost interactive map Outpost is a close-quarters map that takes place within a massive UESC facility. The enemies are tougher, extraction is more difficult, and even the air itself will sometimes combust into hellfire. This map is brutal for new runners. Bring some good equipment before you tackle this map.", "Image_URLs": "docs/images/polygon_3.png"}, {"Source": "CBC News - World", "Title": "With Trump visit coming up, China hedges its bets on helping Iran", "Date": "Sat, 07 Mar 2026 04:00:00 EST", "Author": "", "URL": "https://www.cbc.ca/news/world/china-trump-us-iran-9.7117124?cmp=rss", "Summary": "China\u2019s 2026 economic growth target is lowered to 4.5%, amid U.S.-Israel Middle East conflict. Premier Li Qiang highlighted increased external economic complexities, referencing Iran\u2019s turmoil after recent attacks. China had previously supported Iran\u2019s economy and military, but now condemns U.S. strikes and seeks de-escalation. The situation complicates China's economic and strategic outlook.", "Content": "China\u2019s latest blueprint for driving growth in its economy was largely written before the U.S. and Israel instigated the most far-reaching war in the Middle East in decades. When Chinese Premier Li Qiang stood up in Beijing\u2019s Great Hall of the People on Thursday to deliver the opening address of the so-called Two Sessions, some last-minute updates appeared evident.\n\nWhile emphasizing domestic resilience in the world's second-largest economy and referencing ongoing trade frictions with the United States, Li also noted that the \"external economic environment\" had suddenly become even more \"complex.\" By \"complex,\" Qiang could mean that the leadership in Iran, a strategic ally and key supplier of oil, has been decapitated and that the country is under withering bombardment from two of the world\u2019s most advanced militaries.\n\nChina has lowered its 2026 economic growth target to 4.5 percent at the annual Two Sessions summit in Beijing, where political leaders are strategizing on political, economic, and military goals amid U.S. trade tensions and uncertainty over the war in the Middle East.\n\nFor several years prior to the U.S. and Israeli attacks, China provided Iran with crucial economic and political lifelines. China bought Iranian oil despite the risks of Western sanctions and supplied Iran with key components for its ballistic missile and drone programs. In 2021, China and Iran signed a long-term economic cooperation agreement. Taken together, China\u2019s support allowed Iran to maintain a formidable military while avoiding the full impact of its international isolation.\n\nAfter the bombs started falling, Chinese officials condemned the assassination of Supreme Leader Ayatollah Ali Khamenei, lambasted the U.S. for its \"blatant military strikes,\" and dispatched a special envoy, Zhai Jun, to try to de-escalate the war.", "Image_URLs": "docs/images/cbc_3.jpg"}, {"Source": "BBC News - World", "Title": "We've been speaking to Iranians during one week of war. Here's what they said", "Date": "Sat, 07 Mar 2026 06:00:32 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c5y5lqygrn7o?at_medium=RSS&at_campaign=rss", "Summary": "During the first week of war, Iranians' reactions varied from celebration over the regime's potential fall to fear and uncertainty amid bombings and internet restrictions. Some, like Hamid, expressed hope for regime change, while others questioned the war's motives, seeing it as driven by regional and international interests. The regime maintains control through fear, with many fearing repercussions for opposition.", "Content": "We've been speaking to Iranians during one week of war. Here's what they said.\n\nOn Monday, three days into the war, men in Tehran watched from a hillside as a plume of smoke rose after an explosion.\n\nWhen Hamid heard news of the death of Iran's Supreme Leader Ayatollah Ali Khamenei a week ago, he felt a wave of euphoria and took his wife and daughter into the street outside his home in Tehran to celebrate. For the next few days, as US and Israeli bombs slammed into buildings across the capital, the family went onto the roof of the house to watch the airstrikes coming in, cheering every time a regime target was hit. \"Try to find anywhere else on this earth where the population would be happy with an external attack on their country,\" he told me, via a cousin in the UK. \"But we now have hope that the regime will soon be gone. We are happy.\"\n\nHamid\u2014not his real name\u2014is not alone. Alongside colleagues from BBC Persian, we have been hearing from people inside and outside Iran on a momentous week for them, for the future of their country, and for the entire region. BBC Persian is the Persian language service of BBC News, used by 24 million people around the world\u2014the majority in Iran\u2014despite being blocked and routinely jammed by Iranian authorities.\n\nIn a police state under bombardment, with severe internet restrictions in place, it is impossible to fully gauge the mood across a vast nation of 90 million people. Residents of Tehran have received messages warning: \"If your connection to the internet continues in the coming days, your line will be blocked and you will be referred to judicial authorities.\"\n\nThe regime still instills fear, and no one who voices opposition to it is willing to give their name for fear of repercussions on themselves or their families. But a week on, while some are still celebrating every strike on the regime, others are increasingly frightened, questioning the motives and endgame of the war. \"The goal of this war isn't to bring about freedom or democracy for the Iranian people,\" Ali told us. \"It's for the geopolitical benefit of Israel, the US, and Arab countries in the region.\"\n\nMohammad, in his 30s and living in Tehran, said he had hoped for a deal between the US and Iran that would have avoided war. \"Deep down, I always hoped an agreement would be made,\" he said. He thought he would be happy at Khamenei's death, but in the end \"felt nothing.\" He told my colleague Soroush Pakzad that he is now filled with uncertainty about the future\u2014and, with regime checkpoints everywhere on the ground and bombardments from the sky, he is afraid.\n\nOther Iranians speak of feeling a mix of fear, stress, and hope. One woman told me that it would take living in Iran for 40 years to fully understand the complexity of what she and others are now experiencing. \"We laugh and are happy when the regime is...\"", "Image_URLs": "docs/images/bbc_5.jpg"}, {"Source": "Politico - Picks", "Title": "Trump\u2019s week: Poor jobs numbers, high gas prices and Noem\u2019s ouster", "Date": "Sat, 07 Mar 2026 07:00:00 EST", "Author": "Sam Sutton and Megan Messerly", "URL": "https://www.politico.com/news/2026/03/07/trump-poor-jobs-numbers-high-gas-prices-noem-00817900", "Summary": "Poor economic data and the departure of Kristi Noem from DHS highlight vulnerabilities for Trump\u2019s administration. Rising oil prices and inflation, worsened by Iran conflict, threaten the economy. Meanwhile, immigration policies face declining support, complicating efforts to boost GOP prospects ahead of midterms amid economic and foreign policy challenges.", "Content": "Poor economic news and a key Cabinet departure expose the White House\u2019s vulnerabilities.\n\nPresident Donald Trump walks from the stage after a campaign rally at Van Andel Arena, Tuesday, Nov. 5, 2024, in Grand Rapids, Mich.\n\nDonald Trump won reelection on the promise of restoring the economy and eliminating illegal immigration. But in the last week, both issues have threatened to turn into liabilities: a stagnant labor market and soaring gas prices amid the Iran conflict are hammering the economy, and the ouster of Kristi Noem from the Department of Homeland Security has cast new light on the administration\u2019s increasingly unpopular immigration agenda.\n\nThe economic backdrop has grown ominous \u2014 Wall Street analysts are warning that surging oil prices could lead to stagflation \u2014 and the barrage of bad news has jeopardized the GOP\u2019s ability to keep voters focused on Trump administration policies aimed at addressing the rising cost of living.\n\n\u201cIf you combine an economy that people don\u2019t like with a prolonged war that you know nobody in his base believes they voted for, that\u2019s a toxic problem,\u201d said one Trump ally granted anonymity to speak freely. While Trump isn\u2019t on the ballot this year, his party needs the president\u2019s poll numbers to improve to keep the House and Senate.\n\n\u201cDon\u2019t drag this war out,\u201d the person said. \u201cThat\u2019s my best advice for the administration. The country is in no mood for a prolonged war.\u201d\n\nThe Iran conflict has put immense upward pressure on oil and gas \u2014 prices at the pump have climbed by more than 11 percent in a week. Now, with employers shedding payroll and Trump pressing reset on who\u2019s leading his immigration agenda, the president is on the backfoot on the two issues he needs to own for his party to win the midterms.\n\nAffordability was a dominant concern even when gas prices were low, said Stephen Moore, a former Heritage Foundation economist who\u2019s been an unofficial adviser to Trump over the years. The spiraling conflict in Iran has pushed oil above $90 a barrel \u2014 which is broadly expected to keep inflation high in the near term \u2014 and \u201cTrump definitely needs those prices to come down as quickly as possible,\u201d Moore said.\n\nThe president, meanwhile, is also struggling with what was once his strongest and most defining issue \u2014 immigration. While the number of people crossing the southern border has fallen significantly, in part due to Trump administration efforts, the widely shared images of aggressive enforcement actions across the country have left even some of his supporters wincing. Other conservatives, still, are unhappy that those efforts have not gone far enough, falling short of the \u201cmass deportations\u201d he promised on the campaign trail.\n\nPolling underscores the erosion of support. A recent NBC News poll found that 49 percent of adults strongly disapprove of Trump\u2019s handling of border issues.", "Image_URLs": "docs/images/politico_7.jpg"}, {"Source": "Politico - Picks", "Title": "Allies fear Iran war will leave them without US weapons they bought", "Date": "Sat, 07 Mar 2026 07:00:00 EST", "Author": "Jack Detsch, John Sakellariadis and Phelim Kine", "URL": "https://www.politico.com/news/2026/03/07/allies-fear-iran-war-will-leave-them-without-u-s-weapons-they-bought-00817204", "Summary": "Allied nations fear U.S. weapon supplies are depleting rapidly due to the Iran conflict, risking their own defense capabilities. European and Asian countries worry they may not receive promised arms or air defenses, as U.S. munition consumption increases. This has led to concerns over strained alliances, increased European self-reliance, and potential shifts away from U.S. arms dependence.", "Content": "Allies fear Iran war will leave them without US weapons they bought. European and Asian countries worry the Pentagon is burning through munitions so fast that it won\u2019t have enough to send the weapons they have purchased.\n\nAmerican allies are watching in disbelief as the Pentagon reroutes weapon shipments to aid the Iran war, angry and scared that arms the U.S. demanded they buy will never reach them. European nations that have struggled to rebuild arsenals after sending weapons to Ukraine fear they won\u2019t be able to ward off a Russian attack. Asian allies, startled by America\u2019s rate of fire, question whether it could embolden China and North Korea. And even in the Middle East, countries aren\u2019t clear if they will get air defenses from the U.S. for future priorities.\n\nNearly a dozen officials in allied nations in Asia and Europe say they can\u2019t win. The Trump administration has put them under extreme political pressure to raise defense budgets and buy American weapons \u2014 from air defense interceptors to guided bombs \u2014 only to quickly burn through those munitions in a war of its own.\n\n\u201cIt shouldn\u2019t be a secret to anyone that the munitions that have been and will be fired are the ones that everybody needs to acquire in large numbers,\u201d said one northern European official.\n\nWeapons production is a complex process that takes years of planning and runs through a supply chain riddled with bottlenecks. Trump\u2019s reassurances that the U.S. has a \u201cvirtually unlimited supply\u201d of munitions to fight Iran has done little to soothe allies\u2019 fears.\n\n\u201cIt is very frustrating, the words are not matching the deeds,\u201d said an Eastern European official, who like others interviewed, was granted anonymity to speak candidly. \u201cIt is pretty clear to everyone that the U.S. will put their own, Taiwan\u2019s, Israel\u2019s, and hemisphere priorities before Europe.\u201d\n\nThe joint U.S.-Israel war, officials warn, could accelerate the distancing between America and its allies when it comes to defense. The European Union already has approved rules to favor its own arms-makers over American contractors \u2014 risking tens, if not hundreds of billions in future U.S. sales. Even major companies, such as the German drone-maker Helsing, are touting \u201cEuropean sovereignty.\u201d Poland, a longtime American ally, has bought tanks and artillery from South Korea instead of U.S. contractors such as General Dynamics.\n\nIt\u2019s been a wake-up call for officials in Asia and Europe who once took Pentagon arms sales for granted.\n\n\u201cThe Europeans still live in a dream world in which the U.S. is a gigantic Walmart, where you buy the stuff and you get it immediately, and that is simply not true,\u201d said Camille Grand, a former top NATO official who now heads the Brussels-based think tank.", "Image_URLs": "docs/images/politico_1.jpg"}, {"Source": "Polygon", "Title": "Henry Cavill's Highlander needs to steal one overlooked trick from the original movie", "Date": "Sat, 07 Mar 2026 13:00:17 GMT", "Author": "Brian VanHooker", "URL": "https://www.polygon.com/40-years-later-highlander/", "Summary": "The 1986 film Highlander was a box office failure and critically panned but gained cult status through VHS. Despite its popularity, it is considered a poorly made, overly serious movie with uninteresting characters, despite its fun sword fights. The upcoming reboot starring Henry Cavill suggests Highlander remains a serious, slog-like franchise.", "Content": "The original opinion of Highlander was the right one. When the movie debuted 40 years ago, on March 7, 1986, it outright bombed at the box office, pulling in a mere $12.8 million on its $19 million budget. Critics also hated it, with Roger Ebert calling it \u201ca completely silly and very boring movie\u201d and Gene Siskel saying it was \u201cone of the lousiest films I\u2019ve ever in my life.\u201d Despite its lackluster start, Highlander became a cult hit on VHS and spawned a franchise that includes several films and TV shows, as well as an upcoming reboot starring Henry Cavill. But here\u2019s the thing: Highlander is not some hidden gem that audiences just missed and critics overlooked. It\u2019s a bad and painfully self-serious movie, and the upcoming reboot suggests it will be a similar slog.\n\nThe original Highlander was conceived by screenwriter Gregory Widen and directed by Russell Mulcahy. It stars Christopher Lambert as Connor MacLeod, a warrior in 1500s Scotland who appears to die in battle, only to fully recover and be accused of witchcraft, leading to his banishment by his clan. Soon after, a swordsman named Juan S\u00e1nchez-Villalobos Ram\u00edrez (Sean Connery) informs MacLeod that he is an \u201cimmortal\u201d who can only be killed by beheading. Ram\u00edrez explains that one day, in a distant land, the last immortals will do battle until only one remains, which is where Highlander\u2019s famous catchphrase, \u201cThere can be only one,\u201d comes from. That final battle takes place in 1980s New York, where most of Highlander is set. Now living as an antique dealer, MacLeod fights the last of the immortals, wins, and absorbs their power, becoming mortal.\n\nAdmittedly, the sword fights in Highlander are pretty fun and occupy a good portion of the film. But action alone isn\u2019t enough if the characters aren\u2019t interesting, and that\u2019s the core issue with Highlander. While it has a compelling premise that combines swords and sorcery with gritty 1980s New York, director Russell Mulcahy takes everything so seriously that the film feels entirely joyless. It\u2019s all just so \u201cbadass\u201d for the sake of being badass.\n\nFans appreciate Highlander for its worldbuilding and campiness. The premise offers untapped potential, but camp usually involves self-awareness or a sense of humor, neither of which the film possesses. Instead, the sword fights and action are overly serious, with no room for humor or humanity. Additionally, a nearly $20 million budget in the 1980s was substantial, and the film features beautiful Scottish landscapes, which contrasts with its otherwise serious tone.", "Image_URLs": "docs/images/polygon_2.jpg"}, {"Source": "Star Phoenix", "Title": "Five Saskatoon concerts to see in March", "Date": "Sat, 07 Mar 2026 13:00:52 +0000", "Author": "Aidan Jaager", "URL": "https://thestarphoenix.com/news/local-news/five-saskatoon-concerts-to-see-in-march", "Summary": "Inuk singer-songwriter Elisapie will perform folk and pop with Inuktitut lyrics at the Broadway Theatre on March 17, showcasing songs from her Juno-nominated album \u201cInuktitut.\u201d Known for blending Indigenous and contemporary themes, she reflects on personal and cultural stories. The event is part of her Canadian tour, highlighting her award-winning music and Indigenous storytelling.", "Content": "Canadian Inuk singer-songwriter Elisapie will perform a blend of folk and pop with Inuktitut lyrics at the Broadway Theatre on March 17.\n\nFrom Indigenous pop music and country performances to Juno- and CCMA-award winners, there\u2019s plenty of talent in this all-Canadian artist lineup to mark on your calendar. Here are five concerts to note.\n\nElisapie is a Canadian Inuk singer-songwriter born in a remote village in Nunavik, Quebec. She is best known for blending rock, indie, folk, and pop with Inuktitut lyrics. Her sound also fuses classic rock and traditional Indigenous elements.\n\nIn her upcoming show, Elisapie said the songs take her back to childhood memories and storytelling. \u201cIt\u2019s not necessary to talk about how we\u2019re from the north and we\u2019re nomadic people and that we hunt. It\u2019s not so much about that, but more on a personal, contemporary view that I want to share. It\u2019s important because that\u2019s how we are, so it will be about very personal Inuk experiences.\u201d\n\n\u201cGoing back to Saskatoon, just touring out west, that\u2019s such a nice privilege to have. I\u2019m just really happy to be bringing
