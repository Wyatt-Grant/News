    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">

                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start md:rounded-t-lg">

                <!-- Modal Footer -->

                    </button>

    <script>
        // Embedded article data
        const articles = [{"Source": "Laravel News", "Title": "Laravel Pint Now Replaces Fully Qualified Class Names with Imports", "Date": "Fri, 13 Mar 2026 02:19:07 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/laravel-pint-now-replaces-fully-qualified-class-names-with-imports?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Laravel Pint's Laravel preset now includes the fully_qualified_strict_types rule, which converts FQCNs to short class names with use statements in code and PHPDoc annotations. Running Pint after updating automates these changes, which are cosmetic and do not affect runtime. Users can enable the rule via default preset or custom configuration.", "Content": "Laravel Pint's Laravel preset now includes the fully_qualified_strict_types rule, which automatically replaces fully qualified class names (FQCNs) with short class names and adds the corresponding use statements. The rule was added by Nuno Maduro and applies to both code and PHPDoc annotations.\n\nWhen you reference a class using its fully qualified name, the rule converts it to a short name and adds a use import at the top of the file. For example, a typical Laravel model might look like this:\n\n```php\nclass User extends Authenticatable {\n    /** @use Has Factory<\\Database\\Factories\\UserFactory> */\n    use HasFactory, Notifiable;\n\n    protected function casts(): array {\n        return [\n            'email_verified_at' => \\Illuminate\\Database\\Eloquent\\Casts\\Attribute::class,\n        ];\n    }\n}\n```\n\nAfter running Pint, it becomes:\n\n```php\nuse Database\\Factories\\UserFactory;\nuse Illuminate\\Database\\Eloquent\\Casts\\Attribute;\n\nclass User extends Authenticatable {\n    /** @use Has Factory<UserFactory> */\n    use HasFactory, Notifiable;\n\n    protected function casts(): array {\n        return [\n            'email_verified_at' => Attribute::class,\n        ];\n    }\n}\n```\n\nThe rule handles FQCNs in type hints, return types, PHPDoc tags (@param, @return, @var, @throws), and inline code references.\n\nIf your project uses Pint's default Laravel preset, the rule is already active. Update Pint and run it:\n\n```\ncomposer update laravel/pint\n./vendor/bin/pint\n```\n\nIf you use a custom preset in your `pint.json`, you can add the rule manually:\n\n```json\n{\n  \"preset\": \"psr12\",\n  \"rules\": {\n    \"fully_qualified_strict_types\": {\n      \"import_symbols\": true\n    }\n  }\n}\n```\n\nSetting `import_symbols` to true tells the fixer to automatically add use statements for any FQCNs it finds, rather than only shortening names that already have a corresponding import.\n\nThis rule will affect existing projects the first time you run Pint after updating. Expect a one-time diff across your codebase as FQCNs are replaced with imports. The changes are cosmetic and don't affect runtime behavior.", "Image_URLs": "docs/images/laravel_1_1773455286301.png"}, {"Source": "Politico - Picks", "Title": "Hegseth ignored military officials when he slashed offices that limit risk to civilians", "Date": "Fri, 13 Mar 2026 13:30:00 EST", "Author": "Jack Detsch and Paul McLeary", "URL": "https://www.politico.com/news/2026/03/13/military-leaders-warned-hegseth-not-to-gut-offices-that-limit-risk-to-civilians-00827722", "Summary": "The Pentagon's decision to cut civilian harm oversight offices faces scrutiny amid a recent strike on an Iranian girls\u2019 school that killed over 170 children. Top military officials opposed reducing these offices, warning it could increase civilian casualties. The move, led by Defense Secretary Pete Hegseth, reduced staff significantly, raising concerns over accountability and the accuracy of U.S. military operations.", "Content": "The Defense secretary\u2019s decision to cut offices that mitigate civilian harm faces renewed attention as the Pentagon investigates a strike that killed hundreds of Iranian children.\n\nTop military officials warned the Pentagon unsuccessfully last year not to gut oversight offices that limit risk to civilian casualties and investigate responsibility for their deaths, such as the recent strike on an Iranian girls\u2019 school that killed hundreds of children. Then-Central Command chief Erik Kurilla and Joint Chiefs Chair Gen. C.Q. Brown pushed Defense Secretary Pete Hegseth not to slash the Civilian Protection Center of Excellence and other similar initiatives at American command posts, according to Wes Bryant, the Pentagon\u2019s former chief of civilian harm assessments and two other people familiar with the matter.\n\nOpponents of the move, which also included Adm. Christopher Grady\u2014the former vice chair of the Joint Chiefs\u2014argued that the staff were critical to preventing risks to civilian populations before U.S. strikes and to probing deadly Pentagon attacks. They believed these offices would ultimately save resources for military operations. Hegseth instead chose to reduce the number of employees working on the issue from 200 to less than 40.\n\nThe high level of opposition to the cuts, which has not been previously reported, hints at tension between top military officials and their civilian leader over the rules of engagement in combat, which the Pentagon chief has called \u201cstupid.\u201d It also comes as preliminary reports suggest the U.S. may have accidentally targeted the elementary school, which killed more than 170 students and is the largest U.S.-led killing of civilians in decades.\n\n\u201cAs it turns out, when you kill fewer civilians, you tend to be putting your resources toward killing the enemy,\u201d said Bryant, who served in the Biden and Trump administrations. \u201cWhen they spend weeks or longer tracking some guy and then finally killing him, and then realize he\u2019s just an aid worker, look at all those resources they spent, all that time, the funding, wasted munitions too, and assets wasted on the wrong person.\u201d\n\nThe revelation of previous backlash also follows Hegseth\u2019s announcement this week that he would further cut the lawyers who advise commanders on the legality of operations, known as judge advocate generals. He already fired many of those Army, Navy, and Air Force lawyers in the first days of the administration.\n\nThe decision to dismantle the civilian casualty offices could intensify criticism as more details emerge about the school struck next to an Islamic Revolutionary Guard Corps base in the opening hours of the U.S.-Israeli operation.", "Image_URLs": "docs/images/politico_4_1773455585602.jpg"}, {"Source": "Polygon", "Title": "X-Men '97 season 2 release date just got a hint in new comics series", "Date": "Fri, 13 Mar 2026 20:04:23 GMT", "Author": "Austin Manchester", "URL": "https://www.polygon.com/x-men-97-new-comic-series-season-2-marvel/", "Summary": "Marvel Comics announced a five-issue prequel series for X-Men '97 Season 2, starting June 3, to bridge the gap after the first season's cliffhanger. The comic will explore the mutants' survival and introduce new characters. The show's second season is scheduled for summer 2026, possibly arriving earlier, with the comic release providing hints about the upcoming storyline.", "Content": "For fans of X-Men '97, the wait for season 2\u2014and a resolution to that cliffhanger\u2014has been a long one. A newly revealed comic may make that wait just a little more bearable. On Friday, Marvel Comics announced a prelude series for the second season of X-Men '97, and the comic's release date is our best hint yet as to when the next season of the animated show might drop.\n\nX-Men '97: Season Two comes from writer Steve Foxe and artist Salva Espin. It'll pick up right where the first season left off and lead into the show's second season. Marvel teased in a news release, \"Follow the X-Men left behind in a world that hunts and hates mutantkind! Can they survive? And just where \u2014 or when \u2014 are the X-Men now?!\" It also hints that the prequel comic will feature \"major new characters \u2014 and teams \u2014 joining the cast,\" potentially offering a preview of new mutants and possibly more New Mutants in the upcoming season.\n\nFoxe noted how season 1 ended with a wild cliffhanger, and \"our prequel for Season Two doesn\u2019t take any cheats or shortcuts around that wild status quo.\" The prequel will be a five-issue series, with the first book arriving on June 3. The release date for the second season of X-Men '97 remains on track for a summer 2026 premiere, and it might arrive sooner than expected.\n\nWhile a prequel comic might typically wrap up before a season begins, that wasn't the case with the first season of X-Men '97. A tie-in prequel comic was announced before the show's exact premiere date, and issue #1 was released in comics shops a week after the first episode debuted on Disney Plus. Whether the same timing will apply for season 2 and its tie-in comic remains to be seen.", "Image_URLs": "docs/images/polygon_3_1773455540172.jpg"}, {"Source": "XXL Hip Hop", "Title": "Jack Harlow Surprises Fans With Neo Soul-Inspired Monica Album", "Date": "Fri, 13 Mar 2026 20:29:34 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/jack-harlow-fans-monica-album/", "Summary": "Jack Harlow released his fourth album, \"Monica,\" a neo soul-inspired project, on his 28th birthday. The nine-song collection features melodic, romantic tracks exploring love's ups and downs. Harlow explained his shift to soul music as a deliberate choice to embrace Black music and create inviting melodies. The album received mixed reactions but was generally well-received by fans.", "Content": "Jack Harlow is surprising fans with his neo soul-inspired album, Monica, which he released on his 28th birthday. On Friday (March 13), Jack Harlow delivered his fourth album, Monica, a neo soul-leaning project, which is a departure from his previous rap projects. The nine-song collection features the Kentucky native melodically rap-singing romantic songs dealing with the ups and downs of love. Among the soulful standout tracks include \"All of My Friends,\" \"Lonesome,\" \"Trade Places,\" and \"Say Hello.\"\n\nIn an interview with the New York Times' Popcast program, Jack explained why he delved into soul music as opposed to taking a \"safer route\" by retreating into traditionally White sounds. \"I love Black music... Of course I'm hyper aware of the politics of today,\" he stated. \"That safer landing spot that a lot of my White contemporaries have found... There's plenty of people expecting me to take some of the routes y'all are taking.\" \n\n\"I love R&B music,\" he added. \"I love the sound of soft, intimate, melodic music. So, I want to be understood. I want to write melodies that invite people to sing along.\" Jack's new musical direction has shocked some of his fans. One person on X wrote, \"This Jack Harlow album is dead a*s R&B album.\" Another fan opined, \"New Jack Harlow is chill but 3 years for a meh lofi R&B album is a bit wild. He's given up tryna be the best white boy in rap, I guess.\"\n\nHowever, most people really enjoyed the Kentuckian's soulful project. A fan commented, \"Oh Jack Harlow, I was not expecting this from you. This is my type of s**t right here. Real YEARNING.\" Jack Harlow recorded Monica in New York City at Electric Lady Studios, the same place where the late singer-pianist D'Angelo recorded his soulful masterpiece, Voodoo.", "Image_URLs": "docs/images/xxlhiphop_5_1773455674728.jpg"}, {"Source": "Polygon", "Title": "Good Luck, Have Fun, Don't Die is finally on streaming this weekend \u2014 and so is Zootopia 2", "Date": "Fri, 13 Mar 2026 21:00:17 GMT", "Author": "Samantha Nelson", "URL": "https://www.polygon.com/new-movies-to-watch-good-luck-have-fun-dont-die-zootopia-2-march-13-2026/", "Summary": "Several new films are now streaming: *Good Luck, Have Fun, Don\u2019t Die* features a time traveler fighting an AI apocalypse; *This Is Not a Test* depicts teens surviving a zombie outbreak in high school; *Zootopia 2* is now on Disney Plus, blending social commentary with comedy; *The Fifth Element* director Luc Besson\u2019s Dracula film is available on VOD; and *Not Without Hope* and *Bodycam* are on Paramount Plus and Shudder, respectively.", "Content": "The world is ending this weekend \u2014 on streaming. Sam Rockwell plays a time traveler recruiting diner patrons to help him stop the AI apocalypse in Gore Verbinski\u2019s *Good Luck, Have Fun, Don\u2019t Die*. Packed with a whole Black Mirror season\u2019s worth of dark technology stories, this wild film is now available to rent. \n\nMeanwhile, *This Is Not a Test*, Adam Mac Donald\u2019s adaptation of Courtney Summers\u2019 young adult novel, follows a group of teens trying to survive the zombie apocalypse while holed up in their high school. The mash-up of *Dawn of the Dead* and *The Breakfast Club* is shambling onto VOD. \n\n*Zootopia 2* smashed box office records, and the blend of sharp social commentary and zany chase scenes is reporting for duty on Disney Plus this weekend. \n\n*The Fifth Element* and *L\u00e9on: The Professional* director Luc Besson has made a ridiculous version of Dracula, where a mopey vampire is searching for the reincarnation of his lost wife. The undead prince is ready to seduce you on VOD. \n\nHere's a rundown of the most notable new releases on streaming and VOD, including the biggest, best, and most popular new movies you can watch at home right now. \n\n**New movies on Disney Plus**  \n*Zootopia 2*  \nGenre: Buddy cop comedy  \nRun time: 1h 48m  \nDirectors: Jared Bush and Byron Howard  \nCast: Ginnifer Goodwin, Jason Bateman, Ke Huy Quan  \n\nWhen Gary De\u2019Snake (Ke Huy Quan) crashes the Zootopia centennial celebration and steals a historic book, the mismatched Zootopia Police Department partners Judy Hopps (Ginnifer Goodwin) and Nick Wilde (Jason Bateman) work to chase him down. But the case puts them against powerful interests who want to ensure secrets about the city\u2019s past stay buried.  \n\nFrom our review: Discrimination still very much exists within the multi-species animal city of Zootopia, and the duo of Hopps and Wilde are still fighting it. But returning directors Jared Bush and Byron Howard once again blend high-concept political messaging about embracing diversity with a blitz of visual gags, pop-culture references, and endearingly silly characters that ensure *Zootopia 2* never feels too preachy. The film moves at a breakneck pace, driven by several major chase scenes and a flood of jokes that come so fast that even if one doesn\u2019t land, there\u2019s something else to laugh at a moment later.  \n\n**New movies on Paramount Plus**  \n*Not Without Hope*  \nGenre: Survival thriller  \nRun time: 2h 1m  \nDirector: Joe Carnahan  \nCast: Zachary Levi, Quentin Plair, Terrence Terrell  \n\nBased on a true story, *Not Without Hope* follows a group of friends whose fishing boat capsizes in a storm off the coast of Mexico. Stranded at sea, the brawny buddies struggle against hypothermia, hunger, and thirst while the Coast Guard tries to stage a rescue mission.  \n\n**New movies on Shudder**  \n*Bodycam*  \nGenre: Horror  \nRun time: 1h 15m  \nDirector: Brandon Christensen  \nCast: Jaime Callica, Sean Rogerson, Catherine Lough Haggquist  \n\nWhen a domestic disturbance call turns deadly, two officers attempt to protect their reputation by covering up their overly aggressive response.", "Image_URLs": "docs/images/polygon_2_1773455531026.png"}, {"Source": "Star Phoenix", "Title": "Future U of S poultry facility receives $6.2 million investment", "Date": "Fri, 13 Mar 2026 22:06:08 +0000", "Author": "Aidan Jaager", "URL": "https://thestarphoenix.com/news/local-news/future-u-of-s-poultry-facility-receives-6-2-million-investment", "Summary": "A new 24,000-square-foot poultry facility will be built at the University of Saskatchewan within two years, supported by $6.2 million from the Canadian Foundation for Innovation. The facility will feature enriched housing and free-range systems to improve hen welfare. Funding includes $3 million from Saskatchewan Egg Producers and $1 million from the university\u2019s College of Agriculture.", "Content": "A new 24,000-square-foot poultry facility will be built in Saskatchewan within the next two years, supported by a $6.2 million investment from the federally funded Canadian Foundation for Innovation. The facility aims to position the University of Saskatchewan as a leader in poultry research and animal welfare.\n\nThe facility will feature enriched housing systems designed to promote better living conditions and reduce aggression among chickens. It will include 10 individual housing rooms that will accommodate half of the chickens, equipped with lighting, ventilation, and temperature controls. The other half will be housed in free-range systems, allowing the chickens to wander outdoors.\n\nThe University of Saskatchewan stated that $3 million has been contributed by Saskatchewan Egg Producers (SEP), an independent farmer-run organization, and $1 million by the university\u2019s College of Agriculture and Bioresources. SEP\u2019s executive director, Dion Martens, emphasized the importance of research into lighting, nutrition, and behavior, noting that egg farmers value innovation, hen welfare, and food safety. There are 78 egg farm producers across Saskatchewan and 1,200 across Canada, part of a $2 billion industry.", "Image_URLs": "docs/images/star_phoenix_1_1773455185027.png"}, {"Source": "XXL Hip Hop", "Title": "Ralo Insists Young Thug Thinks He's Pablo Escobar, Thug Responds", "Date": "Fri, 13 Mar 2026 22:14:57 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/ralo-young-thug-protective-custody/", "Summary": "Boosie Bad Azz listed rappers who avoided protective custody, prompting reactions from Meek Mill and Young Thug. Thug defended his choice, citing safety concerns during his YSL RICO case, while Ralo criticized Thug\u2019s claims, emphasizing his own preference for general population. Boosie\u2019s list, including Diddy and NBA YoungBoy, trended on social media.", "Content": "Boosie Bad Azz shared his list of rappers who avoided protective custody while incarcerated, which sparked a variety of comments, particularly from Meek Mill who was upset that he wasn't on the list. Young Thug weighed in with his thoughts, suggesting that protective custody could be a smart option depending on a person's circumstances.\n\nThug explained that going to protective custody was the better move for him to avoid officers adding more charges while he was incarcerated. He was likely referring to his time in jail fighting racketeering and gun charges in his YSL RICO case in 2024. \n\nHowever, Ralo was critical of Thug's explanation. The Atlanta rapper posted on X that Thug \"ain't went to not one federal prison yard.\" He said, \"He had that weak a*s trial and now he thinks he's [Pablo] Escobar. Imagine being called a rat and still walking every yard with my chess out!\" Ralo later shared a video on Instagram, stating he would rather die than voluntarily enter protective custody. He claimed to have been involved in over 40 one-on-one fights across 11 facilities and preferred battling in the general population rather than sitting in walls in protective custody.\n\nYoung Thug responded to Ralo's video by telling him to \"stfu.\" Boosie listed over a dozen rappers who avoided protective custody, including Diddy, Pooh Shiesty, NBA YoungBoy, and Gucci Mane. The list became a trending topic on social media.", "Image_URLs": "docs/images/xxlhiphop_3_1773455663751.jpg"}, {"Source": "XXL Hip Hop", "Title": "Chance The Rapper Testifies Against Ex-Manager in $3 Million Case", "Date": "Fri, 13 Mar 2026 23:56:35 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/chance-the-rapper-former-manager-3-million-dollar-trial/", "Summary": "Chance the Rapper testified in a $3 million contract dispute with former manager Pat Corcoran in Cook County, Illinois. Chance stated he was unaware of a sunset clause and paid Corcoran $11 million from 2012 to 2020. Corcoran claims he was terminated in 2019 and seeks unpaid commissions; Chance countersued for over $1 million, alleging managerial breaches. The trial is expected to last two weeks.", "Content": "Chance The Rapper testified against his former manager over a $3 million contract dispute. Patrick Corcoran's trial against his former client, Chance The Rapper, is underway in Cook County, Ill. The case stems from a 2020 lawsuit in which Pat claims he struck a handshake deal with the Chicago rapper to receive 15% of net proceeds across all income streams, including a sunset clause where Pat would get paid three years after being fired.\n\nOn Tuesday (March 10), Chance was called to testify in the case and offered a different story from Pat's complaint. According to him, he never knew a sunset clause existed in their arrangement. \"We never described it as a contract until he sued me. We had an at-will agreement that didn't address termination,\" he reportedly testified, according to the Chicago Sun-Times. \"We moved that way forever. We never discussed the sunset clause, we just discussed how I'd pay him,\" he continued. \"And one thing that stayed consistent is that I paid him his 15% [in net proceeds]. I kept paying him that 15%.\"\n\nChance, born Chancelor Johnathan Bennett, stated in his testimony that he paid Pat a total of $11 million during their working relationship, which spanned from 2012 to 2020. He also added that Pat was definitely the most-paid person on the payroll of his company, Chance the Rapper LLC.\n\nIn his lawsuit, Pat Corcoran (also known as Pat the Manager) claimed that he was terminated in 2019 because of \"fan disappointment\" with the rapper's album, The Big Day, and low ticket sales for the accompanying tour. Pat was replaced by Chance's father, Ken Bennett, and brother, Taylor Bennett. Nevertheless, Pat claimed Chance didn't comply with their post-employment agreement. He's seeking $3.8 million in unpaid commissions and damages for breach of their agreement and related violations of the Illinois Sales Representative Act.\n\nIn 2021, Chance fired back with a countersuit, demanding more than $1 million in damages. He claimed that Pat had failed to fulfill his managerial duties, alleging he was disloyal and put his own interests first, resulting in business deals that harmed the rapper's career. That case has not gone to trial as of yet.\n\nThe civil trial between Chance the Rapper and his former manager is scheduled to last approximately two weeks.", "Image_URLs": "docs/images/xxlhiphop_1_1773455655287.jpg"}, {"Source": "Smashing Magazine", "Title": "Beyond `border-radius`: What The CSS `corner-shape` Property Unlocks For Everyday UI", "Date": "Thu, 12 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Brecht De Ruyte)", "URL": "https://smashingmagazine.com/2026/03/beyond-border-radius-css-corner-shape-property-ui/", "Summary": "The new CSS `corner-shape` property enhances `border-radius` by allowing diverse corner styles like squircle, bevel, scoop, notch, and square. It provides greater design flexibility, enabling complex shapes without hacks such as clip-paths or SVG masks. `corner-shape` can be combined with `superellipse()` for precise control, improving UI aesthetics and simplifying implementation.", "Content": "Developers have long been limited by the shape options available through the CSS `border-radius` property, often resorting to complex workarounds like clip-paths, SVG masks, and other hacks to achieve non-rounded corners such as beveled, scooped, or squircle shapes. These methods come with trade-offs, including borders not following clip-paths, shadows being cut off, and brittle code that breaks with layout changes.\n\nThe new `corner-shape` property aims to address these limitations by providing a companion to `border-radius` that modifies the shape of the curve created by `border-radius`. It does not replace `border-radius` but enhances its capabilities, allowing for more diverse corner styles such as `squircle`, `bevel`, `scoop`, `notch`, and `square`. These can be applied individually to each corner, offering greater flexibility in UI design.\n\nThe `corner-shape` property accepts various values, including `round` (the default), `squircle`, `bevel`, `scoop`, `notch`, and `square`. It can also be combined with the `superellipse()` function for precise control over the shape. For example, setting `border-radius: 25px; corner-shape: superellipse(0);` results in a beveled corner.\n\nThis development represents a significant step forward in CSS design, enabling more complex and visually appealing corners without the need for hacks or workarounds.", "Image_URLs": "docs/images/smashing_2_1773455264636.jpg"}, {"Source": "Laravel News", "Title": "Laracon AU Returns to Brisbane - Call for Speakers Now Open", "Date": "Wed, 11 Mar 2026 02:17:27 +0000", "Author": "Michael Dyrynda", "URL": "https://laravel-news.com/laracon-au-returns-for-2026?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Laracon AU 2026 will be held in Brisbane from November 4-6, 2026, focusing on technical Laravel topics. The Call for Papers is open until April 17, inviting community submissions on architecture, performance, and real-world solutions. The event aims to connect Laravel developers across the APAC region with talks, networking, and learning opportunities.", "Content": "Laracon AU will return to Brisbane, Australia, on November 4-6, 2026, bringing the Laravel community together once again. Now in its sixth year, Laracon AU has become a gathering point for Laravel developers across the APAC region and beyond. Attendees can expect two days of technical talks, hallway conversations, and shared experiences building real applications with Laravel.\n\nThe Call for Papers is now open, inviting the community to submit talks for this year's event. The 2026 schedule will emphasize deep technical content and real-world implementation. Talks will focus on practical architecture, production patterns, and lessons learned from solving complex problems in modern Laravel applications. Topics may include scaling queues, designing resilient architecture, performance tuning, testing strategies, and integrating emerging tooling into Laravel workflows. The goal is to highlight talks that developers can immediately apply to their projects. Those who have built interesting solutions, solved difficult problems, or discovered beneficial patterns are encouraged to submit proposals.\n\nLaracon AU 2026 will be held in Brisbane, a city known for its warm spring weather, riverfront precincts, and vibrant developer community. Attendees traveling from interstate or overseas may want to arrive earlier in the week. There will be additional opportunities to learn and connect on Wednesday before the main conference begins. It is recommended to arrive Tuesday evening or early Wednesday and to depart after 8 pm on Friday to fully participate in the event.\n\nThe conference continues to bring together developers from across the Laravel ecosystem\u2014engineers, maintainers, founders, and community members\u2014to share ideas and advance the craft. Details about speaker announcements, ticket releases, and additional event information will be shared in the coming months. \n\nThe Call for Papers closes on April 17th. Interested speakers should submit their proposals now. Updates can be followed at laracon.au and on social media as the event approaches.", "Image_URLs": "docs/images/laravel_2_1773455306865.png"}, {"Source": "Saskatoon Police News", "Title": "Arrests - Firearms Investigation - 1300 Block 8th Street East", "Date": "Wed, 11 Mar 2026 15:29:09 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026129", "Summary": "Two individuals, a 26-year-old male and a 19-year-old female, were arrested after police responded to a report of a firearm in a taxi in the 1300 block of 8th Street East. Police seized a pellet gun, bear spray, batons, knives, a machete, cell phones, cash, and methamphetamine. They face a total of 17 charges.", "Content": "Two people are facing charges after police responded to a report of a firearm yesterday. At approximately 9:30 p.m. on March 10, 2026, it was reported that two individuals had left a firearm in the back of a taxi they had exited in the 1300 block of 8th Street East. Police seized the firearm, which was determined to be a pellet gun, and attended a suite in a motel where they arrested a male and female. \n\nUpon their arrest and further investigation, police located three cans of bear spray, two expandable batons, two knives, a machete, multiple cell phones, cash, and methamphetamine packaged for distribution. A 26-year-old male and a 19-year-old female are facing a total of 17 charges.", "Image_URLs": "docs/images/saskatoon_police_4_1773455323597.png"}, {"Source": "The Hockey Writers", "Title": "Guide to the 2025-26 Minnesota Frost", "Date": "Fri, 13 Mar 2026 20:25:00 +0000", "Author": "Jess Amato", "URL": "https://thehockeywriters.com/guide-to-the-2025-26-minnesota-frost/", "Summary": "The 2026 Winter Olympics concluded, but women\u2019s hockey continues in the PWHL\u2019s third season. The Minnesota Frost feature prominent Olympians like Klara Hymlarova, Denisa Krizov\u00e1, Kendall Coyne Schofield, Kelly Pannek, Lee Stecklein, and Taylor Heise. Notable highlights include Coyne Schofield\u2019s Olympic gold and Krizov\u00e1 and Hymlarova surpassing career points. The league offers ongoing support opportunities for women's hockey fans.", "Content": "The 2026 Winter Olympics are now over, but that doesn\u2019t mark the end of women\u2019s hockey for the 2025-26 season. The Professional Women\u2019s Hockey League (PWHL) is currently halfway through its third season as an established league. There is still plenty of time to start watching and supporting the latest women\u2019s hockey league.\n\nUnsure of which team to follow? That\u2019s the whole purpose of this series: to help you get a better understanding of each team so you know who to support now that the league is back up and running. Next up: the Minnesota Frost.\n\nEight players participated in the Olympics. Czechia\u2019s Klara Hymlarova and Denisa Krizov\u00e1 both aimed to bring home a medal for their country. Both played in all five Olympic games Czechia participated in. Hymlarova recorded one assist, and although Krizov\u00e1 didn\u2019t record any points, she served as one of the alternate captains for her country.\n\nKrizov\u00e1 has spent all three of her PWHL seasons in Minnesota. So far this season, she has three points in 17 games. She needs to go on a significant scoring streak to tie or surpass her career-high of nine points from last season.\n\nHymlarova has also spent her entire career with the Frost. In her second PWHL season, she has three points in 17 games and has already surpassed her career-high of two points, making any additional points this season an added bonus.\n\nKendall Coyne Schofield had a lot riding on these Olympics. As a new mom, she wanted to prove she still had what it takes to compete internationally. She achieved that and more, earning her second Olympic gold medal.\n\nAs the captain of the Frost, Coyne Schofield provides strong leadership both on and off the ice. She currently has 16 points in 15 games but was placed on Long-Term Injured Reserve (LTIR) following an injury sustained at the Olympics. Fans hope she will return to the team soon.\n\nKelly Pannek, another experienced Olympian, participated in her third Olympics this year. She played all seven games and recorded two assists. She has spent all three of her PWHL seasons with Minnesota and has had an impressive season, with 16 points in 17 games, tying her career-high points total. At her current pace, she is on track to set a new career-high before the season ends.\n\nLee Stecklein has competed in several Olympics, with this year marking her fourth. Like Pannek, she had two assists in the Olympics. In her 15 games this season, she has four assists. As a defender primarily focused on defense, her role is crucial, and she continues to be a key part of Team USA\u2019s defensive strength when playing for the Frost.\n\nThe 2026 Olympics marked Taylor Heise\u2019s first time competing at the Olympic level, and it is likely not to be her last. She recorded five points in the tournament.", "Image_URLs": "docs/images/hockey_writers_3_1773455615419.jpg"}, {"Source": "The Hockey Writers", "Title": "Maple Leafs Announce Matthews Out for Remainder of Season With MCL Tear", "Date": "Fri, 13 Mar 2026 23:45:52 +0000", "Author": "Spencer Lazary", "URL": "https://thehockeywriters.com/maple-leafs-announce-matthews-out-for-remainder-of-season-with-mcl-tear/", "Summary": "Toronto Maple Leafs captain Auston Matthews is out for the 2025-26 season due to a grade 3 MCL tear and quad contusion after a knee-on-knee hit from Radko Gudas. Gudas faces a phone hearing, likely resulting in a short suspension. Matthews\u2019s recovery could take 4-6 months, potentially affecting his return for the 2026-27 season.", "Content": "The Toronto Maple Leafs have announced that their captain, Auston Matthews, is out for the remainder of the 2025-26 season with a grade 3 MCL tear and quad contusion. He will be re-evaluated in two weeks. Matthews suffered the injury after taking a knee-on-knee hit from Anaheim Ducks captain Radko Gudas in Thursday night\u2019s game. Gudas was given a five-minute major and a game misconduct. It was announced that he will have a phone hearing, which typically results in no more than a five-game suspension.\n\nA grade 3 MCL tear is the most severe, involving a complete tear of the medial collateral ligament. According to the Cleveland Clinic, recovery time for this injury is estimated at six to 12 weeks, roughly four months, if there are no setbacks. This means Matthews may miss the start of the 2026-27 season, depending on his recovery.\n\nThe hit has sparked debate among fans regarding its necessity and the immediate response on the ice. The Maple Leafs' players did not initially push back against Gudas, who was seen looking at Matthews after the hit. In the third period, the team increased their physical play, but it was too late to change the game\u2019s outcome.\n\nWith the Maple Leafs already out of playoff contention, their focus now shifts to Matthews\u2019 recovery update in two weeks and their position in the upcoming 2026 NHL Entry Draft in June.", "Image_URLs": "docs/images/hockey_writers_1_1773455594274.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            // Reset scroll to top before showing modal
            const modalContent = modal.querySelector('.overflow-y-auto');
            if (modalContent) modalContent.scrollTop = 0;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
