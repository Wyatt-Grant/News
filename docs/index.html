    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">

                <!-- Modal Image -->

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">

                <!-- Modal Footer -->

                    </button>
                </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "Sir\u0101t", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/sirat.html", "Summary": "\"Sir\u0101t\" is an R-rated suspense drama set in Morocco, directed by Oliver Laxe. The 115-minute film, starring Sergi L\u00f3pez and others, follows a father and son searching for their missing daughter at a mountain rave. It releases in Los Angeles and New York on November 14, 2025, with a wider release on March 6, 2026.", "Content": "Sir\u0101t is a drama film set in a foreign suspense genre, rated R, with a runtime of 115 minutes. It is scheduled for release on November 14, 2025, in Los Angeles and New York, and on March 6, 2026. Directed by Oliver Laxe and written by Santiago Fillol and Oliver Laxe, the cast includes Sergi L\u00f3pez, Bruno N\u00fa\u00f1ez, Stefania Gadda, Joshua Liam Henderson, Tonin Janvier, Jade Oukid, and Richard Bellamy. \n\nThe story follows a father and his son who arrive at a rave deep in the mountains of southern Morocco. They are searching for Mar, their daughter and sister, who vanished months earlier at one of these endless, sleepless parties. Surrounded by electronic music and a raw, unfamiliar sense of freedom, they repeatedly display her photo, holding onto hope as they follow a group of ravers to one last destination.", "Image_URLs": "docs/images/filmjabber_3.webp"}, {"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026), directed and written by Maggie Gyllenhaal, is an R-rated horror-drama-romance film set for release on March 6, 2026. Starring Jessie Buckley, Christian Bale, and others, it follows a lonely Frankenstein (Bale) who revives a murdered woman, creating The Bride. The film explores themes of love, macabre romance, and ambitious ideas.", "Content": "The Bride (2026) is a horror, drama, and romance film rated R, with a runtime of 126 minutes. It is set to be released on March 6, 2026, and directed by Maggie Gyllenhaal, who also wrote the screenplay. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. The studio behind the film is Warner Brothers.\n\nThe story follows a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening) to create a companion. Together, they revive a murdered young woman, resulting in the birth of The Bride (Buckley).\n\nThe film is described as a bold, iconoclastic take on a compelling story, blending life, macabre romance, and ambitious ideas. Maggie Gyllenhaal's vision presents a beautiful yet hideous creature that is both captivating and unsettling.", "Image_URLs": "docs/images/filmjabber_1.webp"}, {"Source": "Film Jabber", "Title": "Hoppers", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/hoppers.html", "Summary": "\"Hoppers\" is a 2026 animated sci-fi comedy film directed by Daniel Chong, featuring Jon Hamm, Bobby Moynihan, and Piper Curda. Produced by Walt Disney, it releases on March 6, 2026. The story follows Mabel as she explores a world where human consciousness can be transferred into robotic animals, uncovering hidden mysteries.", "Content": "Hoppers (2026) is an action animated comedy sci-fi film rated PG, with a runtime of 105 minutes. It is set to be released on March 6, 2026. The film is directed by Daniel Chong and written by Jesse Andrews and Daniel Chong. The cast includes Jon Hamm, Bobby Moynihan, and Piper Curda. It is produced by Walt Disney Pictures.\n\nIn \u201cHoppers,\u201d scientists have discovered how to \u201chop\u201d human consciousness into lifelike robotic animals, allowing people to communicate with animals as animals. Using this new technology, Mabel (Curda) will uncover mysteries within the animal world that are beyond anything she could have imagined.", "Image_URLs": "docs/images/filmjabber_2.webp"}, {"Source": "Film Jabber", "Title": "How to Make a Killing", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/how-to-make-a-killing.html", "Summary": "\"How to Make a Killing\" (2026) is a crime suspense comedy directed by John Patton Ford, starring Glen Powell and Margaret Qualley. Produced by A24, it follows Becket Redfellow, a wealthy man's disowned son, who plans to kill relatives to inherit $28 billion. The 105-minute R-rated film features crime, violence, and dark humor.", "Content": "How to Make a Killing (2026) is a crime suspense comedy directed by John Patton Ford, who also wrote the screenplay. The film stars Glen Powell, Margaret Qualley, Jessica Henwick, Bill Camp, Zach Woods, Topher Grace, and Ed Harris. It is produced by A24 and has a runtime of 105 minutes. The movie is rated R for language and some violence/bloody images.\n\nDisowned at birth by his obscenely wealthy family, blue-collar Becket Redfellow (Glen Powell) will stop at nothing to reclaim his inheritance, no matter how many relatives stand in his way.\n\nIn the film, Glen Powell plays a man who has not been dealt much luck in life: he\u2019s incredibly good-looking, has a high-earning career, and is admired by two women. However, he considers killing off several relatives to inherit $28 billion.", "Image_URLs": "docs/images/filmjabber_4.webp"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Highway 11 - Update", "Date": "Fri, 06 Mar 2026 01:39:24 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026117", "Summary": "Saskatoon police report that one eastbound lane on Circle Drive and one northbound lane on Highway 11 are open after a collision, with no injuries. Traffic restrictions remain, and a semi carrying equipment caused damage to Highway 11 and the bridge, leading to closures for assessment. Motorists are advised to take alternate routes.", "Content": "The Saskatoon Police Service advises that City of Saskatoon engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed. The Saskatoon Police Service Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nThe Saskatoon Police Service also reports that a semi with trailer carrying a piece of equipment in the northbound lane of Highway 11 from Regina entering the city limits at the Circle Drive overpass was too high for the structure, causing significant damage. Highway 11 northbound lanes into the city limits and Circle Drive eastbound lanes over the bridge will be closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_2.png"}, {"Source": "Laravel News", "Title": "The Inertia v3 Beta is Here", "Date": "Fri, 06 Mar 2026 02:36:45 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/the-inertia-v3-beta-is-here?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "The Inertia v3 Beta introduces a built-in XHR HTTP client, making Axios optional, and adds a use Httphook for standalone HTTP requests. It expands optimistic updates with support for concurrent changes and instant navigation for faster user experience. A new server-side preserve Fragment option retains URL hash fragments across redirects, enhancing navigation consistency.", "Content": "The Inertia v3 Beta is a major pre-release milestone that introduces several new features and improvements. It now includes a built-in XHR HTTP client, making Axios an optional peer dependency. Applications that do not require Axios can omit it entirely, while those that prefer it can continue using it by installing it as a peer dependency.\n\nA new use Httphook has been added to facilitate standalone HTTP requests outside of Inertia, providing a similar developer experience to use Form, including processing, errors, progress, and dirtystate. This hook returns response data instead of triggering page navigation and supports surfacing all validation errors.\n\nOptimistic updates have been expanded across the router, use Form, and use Http, with support for concurrent updates. The update callback can apply immediate optimistic state changes, with automatic rollback on validation errors, server errors, or interrupted requests. Both fluent API and inline options are supported.\n\nInstant support has been introduced to make navigation feel immediate by rendering the destination page before the server response completes.\n\nAdditionally, a new server-side preserve Fragment option allows the URL hash fragment to remain intact across redirects. In Laravel, this can be achieved by chaining preserve Fragment() on a redirect response. When the server includes preserve Fragment: true in the Inertia page object, the client retains the original URL fragment even during redirects.", "Image_URLs": "docs/images/laravel_1.png"}, {"Source": "New York Times - World", "Title": "He Had a Purple Heart, PTSD and a Rap Sheet. He Had to Leave the U.S.", "Date": "Fri, 06 Mar 2026 05:00:24 +0000", "Author": "Max Kim", "URL": "https://www.nytimes.com/2026/03/06/world/asia/south-korea-deportee-immigration.html", "Summary": "Sae Joon Park, a U.S. Army veteran and deportee, faces potential deafness amid health issues in South Korea. Having been deported last year due to a criminal record, he struggles with language barriers, as he hasn't lived in South Korea since age 7. His case has garnered media attention and a congressional hearing, with promises of review by officials.", "Content": "Sae Joon Park\u2019s life was in pieces after he was swept up in the Trump administration\u2019s deportation push last year. But on a recent Tuesday, he was preoccupied with the more immediate concern that he might be going deaf.\n\nAt a walk-in clinic in Busan, South Korea, he explained to the receptionist, in slightly accented Korean, how his left eardrum had inexplicably ruptured in his sleep a few weeks earlier. Now his right ear was fading out, too.\n\n\u201cFill in the blanks, please,\u201d she said, producing an intake form.\n\n\u201cI can\u2019t read or write Korean,\u201d Mr. Park said.\n\nIt was a line he had delivered many times in recent weeks, explained by the fact that he hadn\u2019t lived in South Korea since he was 7, when he immigrated to the United States. A U.S. Army veteran with combat trauma and a Purple Heart, he was ordered to leave America at the age of 56 over a criminal history that he thought he had atoned for.\n\nHe had pleaded his case in nearly two dozen media interviews. In December, he video-called into a congressional hearing where former Homeland Security Secretary Kristi Noem promised to look into his case.", "Image_URLs": "docs/images/nyt_12.jpg"}, {"Source": "Smashing Magazine", "Title": "Human Strategy In An AI-Accelerated Workflow", "Date": "Fri, 06 Mar 2026 08:00:00 GMT", "Author": "hello@smashingmagazine.com (Carrie Webster)", "URL": "https://smashingmagazine.com/2026/03/human-strategy-ai-accelerated-workflow/", "Summary": "UX design is evolving as AI rapidly automates tasks like wireframes and prototypes, raising fears of job displacement. However, UX remains focused on navigating ambiguity, advocating for users, and solving complex human problems. While AI can handle artifact creation, the core of UX\u2014understanding and addressing human needs\u2014continues to require human insight and judgment.", "Content": "UX design is entering a new phase, with designers shifting from makers of outputs to directors of intent. AI can now generate wireframes, prototypes, and even design systems in minutes, but UX has never been only about creating interfaces. It\u2019s about navigating ambiguity, advocating for humans in systems optimized for efficiency, and solving their problems through thoughtful design.\n\nI\u2019ve been working in User Experience design for more than twenty years. Long enough to have held many job titles, from when stakeholders asked us to \u201cjust make it pretty\u201d to when wireframes were delivered as annotated PDFs. I\u2019ve seen many tools come and go over the years, methodologies rise and fall, and entire platforms disappear. Yet, nothing has unsettled designers quite like AI.\n\nWhen generative AI tools first entered my workflow, my reaction wasn\u2019t excitement \u2014 it was unease, with a little curiosity. Watching an interface appear in seconds, complete with sensible spacing, readable typography, and halfway-decent copy, triggered a very real fear: if a machine can do this, where does that leave me? That fear is now widespread. Designers at every level ask the same question, often quietly: \u201cWill an AI agent replace me by next week, month, or year?\u201d\n\nWhile the difference between next week and next year is significant, it depends on where you are in your career and how quickly your employer chooses to adopt AI tools. I have been fortunate in several roles to work with organizations that haven\u2019t allowed the use of AI due to data security concerns. For those interested, discussions about AI\u2019s impact are ongoing on platforms like Reddit.\n\nFearing the takeover of AI in our roles is not irrational. We\u2019re AI generating wireframes, prototypes, personas, usability summaries, accessibility suggestions, and entire design systems. Tasks that once took days can now be completed in minutes. Here\u2019s the uncomfortable truth: if your role is largely about producing artifacts, drawing buttons, aligning components, or translating instructions into screens, then parts of that work are already being automated.\n\nStill, UX design has never truly been about just creating a user interface. It\u2019s about navigating ambiguity. It\u2019s about advocating for humans in systems optimized for efficiency. It\u2019s about translating messy human needs into effective solutions.", "Image_URLs": "docs/images/smashing_1.jpg"}, {"Source": "New York Times - World", "Title": "Lebanon at \u2018Tipping Point\u2019 as It Seeks to Disarm Hezbollah", "Date": "Fri, 06 Mar 2026 08:59:40 +0000", "Author": "Christina Goldbaum", "URL": "https://www.nytimes.com/2026/03/06/world/middleeast/lebanon-hezbollah-iran-disarm.html", "Summary": "Lebanon's government, balancing U.S. and regional pressures, faces a critical moment amid escalating Israel-Hezbollah conflict. Israeli strikes in Beirut displaced thousands, raising fears of civil war. Experts warn this could lead to clashes between Lebanese forces and Hezbollah or disarmament, as tensions intensify following Hezbollah's retaliation for Iran's leader's death.", "Content": "For much of the past year, Lebanon\u2019s government has navigated a delicate balance in its dealings with Hezbollah, the Iranian-backed armed group, as it has sought to disarm militants and reduce their influence in Lebanese politics. Now, with Lebanon facing a rapidly escalating conflict between Hezbollah and Israel, the country is awaiting whether the government will seize this moment to take decisive action against Hezbollah and how the group will respond.\n\nOvernight, the Israeli military launched strikes against Hezbollah in the southern outskirts of Beirut, with explosions audible across the city. The bombardment displaced thousands of residents from the densely populated area, many of whom spent the night on the streets of downtown Beirut.\n\n\u201cThis is the tipping point,\u201d said Sami Nader, director of the Institute of Political Science at Saint Joseph University of Beirut. \u201cEither we have the dark scenario where the army clashes with Hezbollah and there is civil strife, or Hezbollah abides by the government\u2019s decision and they disarm.\u201d\n\nLebanese officials have had to maintain a careful balance over the past year: appeasing demands from the United States and other allies for swift action against Hezbollah while proceeding cautiously to avoid clashes between Lebanese soldiers and militants, a scenario that many fear could trigger civil conflict.\n\nHowever, when Hezbollah began firing at Israel this week in retaliation for the killing of Iran\u2019s Supreme Leader, Ayatollah Ali Khamenei, igniting more intense fighting, that careful calculation appeared to unravel.", "Image_URLs": "docs/images/nyt_9.jpg"}, {"Source": "CBC News - World", "Title": "'This is wrong,' Lebanese resident says as hundreds of thousands displaced amid Israeli strikes", "Date": "Fri, 06 Mar 2026 11:13:47 EST", "Author": "", "URL": "https://www.cbc.ca/news/world/lebanon-israel-evacuation-orders-iran-war-9.7117084?cmp=rss", "Summary": "Israeli airstrikes in Lebanon have killed at least 217 people and displaced hundreds of thousands, forcing many to sleep outdoors. The conflict, involving Hezbollah and Iran-backed militias, has intensified since Israel and the U.S. targeted Iran. Residents fear for safety amid ongoing bombings, with Israel ordering Lebanese civilians to evacuate southern Beirut and parts of the Bekaa Valley.", "Content": "Israeli airstrikes continued to pound Lebanon on Friday, forcing hundreds of thousands to flee their homes in densely populated neighborhoods to shelter elsewhere, as aid groups warned the escalating conflict could lead to a humanitarian catastrophe. According to Lebanon's Health Ministry, at least 217 people have been killed and hundreds more injured since the conflict intensified on Monday.\n\nDisplaced people fleeing Israeli airstrikes in the Lebanese capital's southern suburb of Dahiyeh were seen sleeping on the Beirut corniche, some in cars, others on the street or the beach. Jamal Seifeddin, 43, who spent the night outside in downtown Beirut, described the dire conditions, saying, \"We\u2019re sleeping here in the streets \u2014 some in cars, some on the street, some on the beach. No one even brought a blanket.\"\n\nThe southern suburbs of Beirut were again targeted by Israeli airstrikes as Israel traded blows with the Iranian-backed militia Hezbollah. Following U.S. and Israeli attacks against Iran that began a week ago, Hezbollah launched missiles and drones into Israel on Monday for the first time in over a year. Israel responded with bombardments of southern Lebanon and Beirut's southern suburbs.\n\nResidents fleeing the area expressed fears for their safety. Hadi Kaakour, a resident fleeing Beirut's southern suburbs, said he was unsure he would be safe anywhere, stating, \"We don't put anything past [Israel], they will strike us no matter where we go.\" Others voiced frustration at Lebanon being pulled into the conflict, with Yousef Nabulsi saying, \"We got sucked into a mess that we have nothing to do with. People have been displaced and are now staying on the streets, and this is wrong.\"\n\nIsrael's military ordered Lebanese residents out of Beirut's southern suburbs, including areas controlled by Hezbollah, as well as parts of the eastern Bekaa Valley, after previously ordering people out of a section of south Lebanon.", "Image_URLs": "docs/images/cbc_4.jpg"}, {"Source": "CBC News - World", "Title": "Justice Department releases Epstein files that include uncorroborated Trump allegation, after complaints", "Date": "Fri, 06 Mar 2026 11:56:54 EST", "Author": "Chris Iorfida", "URL": "https://www.cbc.ca/news/world/epstein-files-trump-allegations-9.7117186?cmp=rss", "Summary": "The U.S. Justice Department released previously undisclosed files related to Jeffrey Epstein, including allegations from a woman claiming she was raped by Epstein's associate \"Jeff\" in the 1980s and made claims involving Donald Trump, which the White House dismissed as baseless. The files, part of the Epstein Transparency Act, faced scrutiny over their handling and include unverified and sensational claims.", "Content": "The U.S. Justice Department has released additional files connected to the late sex offender Jeffrey Epstein, including descriptions of interviews with a woman making allegations against President Donald Trump, a onetime Epstein friend.\n\nThe department said Thursday the files had been \"incorrectly coded as duplicative,\" and therefore not originally published. The department has faced scrutiny in Congress over its handling of the documents, which it is required to make public as part of the Epstein Transparency Act, which was spurred by efforts from both Democratic and Republican legislators.\n\nSome of the new records pertain to a woman who contacted the FBI shortly after Epstein\u2019s 2019 arrest and claimed that a man named \u201cJeff\u201d living in Hilton Head, S.C., had raped her there in the 1980s when she was around 13 years old. The woman told the agents she didn\u2019t know the man\u2019s identity at the time, but decades later concluded he was Jeffrey Epstein when a friend texted her his photo from a news story.\n\nThe woman was interviewed four times by FBI agents and over time added a host of other claims, including that Epstein had schemed to have her mother sent to prison, beaten her, arranged sexual encounters with other men, and once flew her to either New Jersey or New York sometime in the mid-'80s, where she claimed to have bitten Trump after he tried to sexually assault her. She eventually declined to answer additional questions and broke off contact with agents, according to the files.\n\nWhite House Press Secretary Karoline Leavitt called the woman's claims \"completely baseless accusations, backed by zero credible evidence.\" The Justice Department has cautioned that some of the documents include \"untrue and sensationalist claims\" against Trump.\n\nIt is not precisely known when the Epstein and Trump relationship began, but the earliest period that has been publicly suggested is the late 1980s.", "Image_URLs": "docs/images/cbc_5.jpg"}, {"Source": "Star Phoenix", "Title": "Carney approval high in Sask., Liberals at 49 per cent national voter support: poll", "Date": "Fri, 06 Mar 2026 12:00:25 +0000", "Author": "Postmedia News", "URL": "https://thestarphoenix.com/news/local-news/carney-approval-high-in-sask-liberals-at-49-per-cent-national-voter-support-poll", "Summary": "A Postmedia-Leger poll shows high approval for Mark Carney in Western provinces, with 53% in Alberta and 59% in Manitoba and Saskatchewan. 59% of Canadians are satisfied with Prime Minister Carney\u2019s government, while support for the Bloc Qu\u00e9b\u00e9cois and NDP remains low. Conservative support has declined slightly, and most Canadians prefer waiting until 2029 for the next election.", "Content": "Western provinces showed high approval ratings for Mark Carney, at 53 per cent for Alberta and 59 per cent for Manitoba and Saskatchewan, according to a new Postmedia-Leger poll. Leger executive vice-president Andrew Enns noted Saskatchewan Premier Scott Moe has taken two international trips with Carney and has come back with results for his constituents.\n\nHigh approval ratings in Saskatchewan for Prime Minister Mark Carney demonstrate what happens when a federal leader doesn\u2019t go out of their way to pick fights with certain regions of the country, the executive vice-president of a national pollster said. The poll also showed support for the Bloc Qu\u00e9b\u00e9cois falling to five per cent, compared to six per cent in January. Support for the New Democratic Party remained stable at five per cent.\n\nThe poll indicated that 59 per cent of respondents are satisfied with the performance of the Liberal government led by Carney. \u201cWe\u2019re actually a full year in of having Prime Minister Carney managing the affairs of the government,\u201d Enns said. \u201cThey\u2019ve done a very good job of keeping government activity, government message, on track in terms of what Canadians are expecting of their government during these times.\u201d\n\nEnns noted that the poll is \u201cnot good news\u201d for the Conservatives, whose support has remained around 37 to 38 per cent over the last 18 months. \u201cNow suddenly they have lost some support,\u201d said Enns. \u201cI think it probably should be concerning to them.\u201d He suggested this could be due to their old messaging falling flat or possibly related to Carney\u2019s personal approval ratings. Some conservative-minded voters are responding positively to Carney.\n\nSpeculation has persisted over the past few months that Carney may call an early election to secure a majority government, as the Liberals remain strong in the polls. However, about half of Canadians polled said the next election should be in 2029, as set out in the fixed election date legislation. \u201cCanadians don\u2019t want an election now, they quite frankly don\u2019t want one this spring,\u201d Enns said. \u201cAnd when you like what you\u2019re getting, which 60 per cent of Canadians do\u2014how the government\u2019s performing, how the prime minister is performing\u2014they\u2019re not interested in changing that.\u201d\n\nNearly 71 per cent of Liberal voters would prefer an election in 2029. Notably, nearly 24 per cent of Conservative voters would like an election now; 19 per cent would like one this spring, and 20 per cent this fall. \u201cI have to just chalk that up to sort of that hard partisanship,\u201d Enns said, \u201cthat a certain swath of that Conservative Party, that intensity that they hold, that they\u2019ll take an election whenever they can get it.\u201d", "Image_URLs": "docs/images/star_phoenix_4.jpg"}, {"Source": "Star Phoenix", "Title": "Warm to early sounds of spring: Five things to do this weekend in Saskatoon, March 6-8", "Date": "Fri, 06 Mar 2026 12:00:48 +0000", "Author": "Jocelyn Bennett, Saskatoon StarPhoenix", "URL": "https://thestarphoenix.com/news/local-news/warm-to-early-sounds-of-spring-five-things-to-do-this-weekend-in-saskatoon-march-6-8", "Summary": "A women\u2019s march was held at Vimy Memorial in Kiwainis Memorial Park on International Women\u2019s Day, featuring a book reading and musical performances. Upcoming events include a tribute concert to 1950s music on Friday, a brass band concert on Sunday, and Ukrainian comedian Yurii Kolotylyn\u2019s standup shows Saturday at Art Bar. The University of Saskatchewan Huskies women\u2019s basketball team advances to semifinals.", "Content": "Commemorating International Women\u2019s Day, a women\u2019s march was held at the Vimy Memorial in Kiwainis Memorial Park on Sunday at 1 p.m. The event included a book reading, a performance of piano pieces, and some favorite cover songs. \n\nEnjoy a modern take on classic music with \"An Evening with the Bromantics,\" which brings the 1950s to the stage in a tribute to the golden era. The six-piece Saskatchewan band explores Motown and early rock with songs from Roy Orbison, The Platters, Buddy Holly, and Sam Cooke. The all-ages concert is scheduled for Friday at the Broadway Theatre at 8 p.m.\n\nThe Bridge City Brass Band presents traditional and contemporary brass band music. The concert features familiar tunes, along with the Saskatoon premiere of \"A Gallimaufry Suite\" by Philip Harper and \"Eternity\" by Michael Bojesen. It will be held on Sunday at Grace-Westminster United Church at 2:30 p.m.\n\nThe University of Saskatchewan Huskies women's basketball team advances to the semifinal stage.\n\nSaskatoon-based Ukrainian comedian Yurii Kolotylyn is bringing his comedy to the stage. He will perform his full-length standup show in Ukrainian, followed by an English version. The shows, limited to ages 19 and older, are scheduled for Saturday at Art Bar at 7 p.m. in Ukrainian and 9 p.m. in English.", "Image_URLs": "docs/images/star_phoenix_3.jpg"}, {"Source": "CBC News - World", "Title": "Dillon Brooks, Canadian NBA player with the Phoenix Suns, arrested for suspicion of DUI after traffic stop", "Date": "Fri, 06 Mar 2026 12:37:43 EST", "Author": "", "URL": "https://www.cbc.ca/sports/basketball/nba/dillon-brooks-canadian-nba-player-with-the-phoenix-suns-arrested-for-suspicion-of-dui-after-traffic-stop-9.7117561?cmp=rss", "Summary": "Phoenix Suns forward Dillon Brooks was arrested for suspicion of DUI early Friday in Scottsdale, Arizona, after a traffic stop. He was taken to jail and released around 3:30 a.m. Brooks, 30, has been out since February 21 with a fractured left hand and is expected to return in late March. The Suns are gathering information.", "Content": "Phoenix Suns forward Dillon Brooks was arrested for suspicion of driving under the influence early Friday morning in Scottsdale, Arizona, police said. Officers conducted a traffic stop around 1 a.m., and after an investigation, Brooks was taken to jail and released following the booking process around 3:30 a.m.\n\nThe 30-year-old from Mississauga, Ontario, has not played since February 21 due to a fractured left hand. He is expected to be out until at least late March after undergoing surgery.\n\nThe Suns issued a statement saying, \"We are aware of the situation involving Dillon Brooks and are gathering more information. We have no further comment at this time.\"\n\nThe team played the Chicago Bulls at home on Thursday night, just hours before his arrest, losing 105-103. Before his injury, Brooks was having the best season of his NBA career, averaging a career-high 20.9 points per game. He joined the Suns as part of the trade that sent Kevin Durant to the Rockets during the offseason.", "Image_URLs": "docs/images/cbc_6.jpg"}, {"Source": "XXL Hip Hop", "Title": "50 Cent Appears to Clap Back at T.I. on New Power Origins Theme", "Date": "Fri, 06 Mar 2026 14:52:12 GMT", "Author": "C. Vernon Coleman II", "URL": "https://www.xxlmag.com/50-cent-disses-ti-power-theme-song/", "Summary": "50 Cent released a Power Origins theme song with lyrics referencing T.I. and Tiny's sexual assault allegations, which they deny. He also suggested a documentary on the matter. T.I. responded with a defiant Instagram post, taunting 50 Cent and releasing a diss track. The feud between the two continues.", "Content": "50 Cent appears to have taken a jab at T.I. and the Harris family on the new Power Origins theme song. On Thursday night (March 5), the G-Unit head honcho shared the track for the upcoming Power TV show universe, featuring Grammy Award-winning singer Leon Thomas. In the television intro, Fif appears to reference T.I. and Tiny with provocative lyrics: \"I'm back on my dope boy grammar / Your daddy made your mama eat every box in Atlanta,\" and \"Freak sh*t / Peep sh*t / Keep sh*t, on the low / But everybody know.\" He captioned the post, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\nThe lyrics seem to allude to T.I. and Tiny being accused of sexual assault by multiple women, though none of the claims have been proven in court. Both T.I. and Tiny have denied the allegations.\n\nThis track followed a since-deleted social media post from 50 Cent on March 4, where he claimed he was working on a \"Surviving T.I. and Tiny Documentary.\" He wrote, \"Remember how quiet I got before the DIddy doc, Dame thought I wasn't coming. I hope this doesn't mess up your promo tour\u2014they're gonna ask about your 20 sexual assault cases. You might want to talk to a crisis PR person.\"\n\nT.I. responded to 50's comments and the song with a defiant message on Instagram: \"We can go bar for bar, hit for hit, or doc for doc... either way all you gon do is show how much of a FN u is. Let\u2019s play. Nobody fears you over here Boo Boo\u2026\" He also shared a new song titled \"Trauma Bond,\" in which he raps about his family and takes a shot at 50 Cent, writing, \"@50cent Drop whatever you choose, just please keep showing da world You a H*!!!\" and \"#On Clay & You still ain\u2019t Tell us why you in 4K 'D**k Pulling' wit the smile of a Sissy???? Pandora\u2019s box is ajar sir\u2026 Good Luck FN You suck. P.S. Me & mine till the end of time Issa 'Trauma Bond'!!!!\"\n\nThe ongoing feud between T.I. and 50 Cent shows no signs of ending soon.", "Image_URLs": "docs/images/xxlhiphop_7.jpg"}, {"Source": "BBC News - World", "Title": "Israeli troops push into Lebanon for yet another war with Iran's proxy Hezbollah", "Date": "Fri, 06 Mar 2026 16:16:05 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cpv8xlvk3p4o?at_medium=RSS&at_campaign=rss", "Summary": "Israeli troops have entered Lebanon, capturing hilltops near the border amid ongoing clashes with Hezbollah, which has launched rockets and drones at northern Israel. Israel has issued a large-scale evacuation in southern Lebanon, aiming to disarm Hezbollah. The conflict follows recent Israeli airstrikes and a significant military buildup, with fears of a full-scale invasion and increased civilian displacement.", "Content": "Israeli troops have entered Lebanon for what appears to be another conflict involving Iran's proxy, Hezbollah. Along the northern border, bursts of machine-gun fire from inside Lebanon are loud and sustained as new Israeli forces push to secure strategic positions near the border. The sound of air strikes echoes over the remains of Shia villages destroyed during Israel's last ground war there in 2024.\n\nA senior military official stated that Israeli ground forces are capturing additional hilltops inside Lebanon as a defensive measure to better protect northern communities. However, there has been a significant military buildup, with dozens of tanks and armored bulldozers recently positioned near the border, fueling speculation of a full-scale invasion.\n\nIsrael has issued a large-scale evacuation order for southern Lebanon, extending roughly 27 kilometers (16 miles) inside the country. The Israel Defense Forces Chief of Staff, Eyal Zamir, has said the goal is to disarm Hezbollah and that operations will continue until that is achieved. A senior military official, speaking anonymously, indicated that forces are prepared to move as deep as the Litani River and beyond if instructed, emphasizing plans are in place for immediate action.\n\nHezbollah, allied with Iran, joined the conflict on Monday and has been launching rockets and drones at northern Israel daily, most of which are intercepted by Israeli air defenses. Residents in one Israeli border community affected by a drone attack on Tuesday expressed reluctance to leave, questioning where they would go given the dangers elsewhere.\n\nIsrael's opposition leader, Yair Lapid, suggested creating a \"sterile zone\" in southern Lebanon, similar to the Yellow Line in Gaza, which marks the boundary between Israeli-controlled territory and Hamas-held areas. He proposed removing Lebanese villages from the zone, arguing that they had become host to terrorist organizations and that such measures, though unpleasant, were justified.\n\nIn recent days, hundreds of thousands of Lebanese civilians have been fleeing Israeli air strikes, less than 18 months after a ceasefire ended the previous conflict.", "Image_URLs": "docs/images/bbc_6.jpg"}, {"Source": "Star Phoenix", "Title": "Complex repairs needed after semi collision with Saskatoon overpass", "Date": "Fri, 06 Mar 2026 16:26:20 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/news/local-news/semi-collision-with-overpass-reduces-saskatoon-freeway-lanes", "Summary": "A semi hauling heavy equipment struck the Highway 11, Highway 16, and Circle Drive overpass in Saskatoon, causing significant damage. Traffic was reduced to a single lane, with closures affecting northbound Highway 11 and eastbound Circle Drive. No injuries occurred. Repairs are underway, but the timeline is unclear due to the extent of damage.", "Content": "Traffic moved through a single open lane beneath the Circle Drive overpass on Highway 11 as crews assessed damage after a semi hauling heavy equipment struck the structure Thursday afternoon. Saskatoon Police said the collision caused significant damage to the overpass at the Highway 11, Highway 16, and Circle Drive cloverleaf.\n\nRepairs are needed on a busy overpass in Saskatoon after cargo on a semi-trailer collided with the concrete structure. The City of Saskatoon stated that the extent of the damage or the cost of fixing the section of the cloverleaf at Circle Drive and Highway 11 was not immediately known after the collision Thursday afternoon. Planning for repairs was underway on Friday, though a repair timeline was not available due to \u201cthe complexity and extent of the required work,\u201d the city said in a news release.\n\nAccording to Saskatoon police, a semi with a trailer on Thursday around 5 p.m., carrying a piece of equipment in the northbound lane of Highway 11 from Regina entering the city limits at the Circle Drive overpass, was too high for the structure and caused significant damage. Northbound traffic on Highway 11 and eastbound traffic on Circle Drive were immediately closed off for hours before one lane in each direction was reopened. No injuries were reported.\n\nCity engineers, Saskatoon police, emergency services, and collision analysts were all on the scene. The analysts were working with Saskatchewan Highway Patrol to investigate. Work began on Friday morning to safely remove loose concrete and address safety concerns. Southbound traffic on Highway 11 and westbound traffic on Highway 16 remained unaffected. Northbound semi trucks on Highway 11 were being detoured around the area at Township 360 via Range Road 3050.", "Image_URLs": "docs/images/star_phoenix_2.jpg"}, {"Source": "Star Phoenix", "Title": "Despite off-night shooting, Huskies advance to women's hoops semifinal", "Date": "Fri, 06 Mar 2026 17:08:22 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/sports/local-sports/u-of-s-huskies/despite-off-night-shooting-huskies-advance-to-womens-hoops-semifinal", "Summary": "The University of Saskatchewan Huskies advanced to the U Sports women\u2019s basketball semifinals with a 71-55 win over UBC, despite shooting poorly. Led by Gage Grassick\u2019s 25 points, they aim for a second consecutive national title. They will face Laval on Saturday, after Laval upset top-ranked Toronto Metropolitan. Calgary and New Brunswick also advanced to the semifinals.", "Content": "Though the University of Saskatchewan Huskies were off-target on the offensive end, they were sharp enough defensively to make up for it as they began their pursuit for back-to-back national basketball titles. In their quarterfinal on Thursday versus Canada West rival British Columbia at the U Sports Women\u2019s Final 8 in Quebec City, the fifth- ranked Huskies shot just 24 per cent from three-point range and 48 per cent from the free throw line, but overcame those struggles by locking down the fourth- ranked Thunderbirds. Holding UBC to 34 per cent shooting from the field and never allowing more than 15 points in any quarter, the Huskies advanced to Saturday\u2019s semifinal with a 71-55 victory.\n\nWinners of U Sports crowns in 2016, 2020 and 2025, the Huskies have another national title within reach. The team, undefeated in the regular season, lost in the Canada West semifinal but received the lone wild card to nationals.\n\n\u201cI think if we can defend like that and we can have a bit better shooting night, then we\u2019ll give ourselves a chance no matter who we\u2019re playing against,\u201d Huskies head coach Lisa Thomaidis said following the game.\n\nFirst-team all-Canadian Gage Grassick led the Huskies with a game-high 25 points, while adding three steals and four rebounds. Ella Murphy Wiebe scored 16 points and hauled down eight rebounds. Maya Flindell and Andrea Dodig each scored 11 points for the Huskies. Sara Toneguzzi had a team-high 21 points for UBC.\n\nIn Saturday\u2019s semifinal, the Huskies take on No. 8- and host Laval. In a first-round upset, the Rouge et Or knocked off top-ranked Toronto Metropolitan 57-54. Sabrine Khelifi, who led her team with 14 points, banked a three-pointer from the top of the arc with 15 seconds left in the fourth quarter to break the tie and propel her squad to the medal round.\n\nThe Huskies tip off Saturday against Laval at 4 p.m. On the other side of the bracket, Canada West champion and third-ranked Calgary Dinos advanced with a 58-45 win over sixth-ranked McGill. In Saturday\u2019s other semifinal, Calgary faces off against No. 2-ranked New Brunswick, which handled seventh-ranked Carleton Ravens 80-63.", "Image_URLs": "docs/images/star_phoenix_1.jpg"}, {"Source": "BBC News - World", "Title": "Flight paths squeezed as Iran conflict closes more airspace", "Date": "Fri, 06 Mar 2026 18:09:19 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/crrx1jgr4jjo?at_medium=RSS&at_campaign=rss", "Summary": "The closure of southern Azerbaijani airspace due to regional conflicts is causing significant disruption for airlines, forcing longer reroutes north or south and increasing flight times and fuel costs. Gulf airlines are increasing flights from the UAE and Oman to evacuate travelers, but overall capacity remains low. Air traffic has sharply decreased, complicating airline planning amid heightened tensions.", "Content": "The closure of airspace over the southern half of Azerbaijan is putting additional pressure on airlines responding to disruptions caused by the conflict in the Gulf. Flight traffic had already been severely disrupted in a region that normally acts as a significant hub for the global airline industry. The Buta drone attack on a small Central Asian country has squeezed many flights into a narrow corridor across the north of Azerbaijan.\n\nAviation expert John Strickland noted there is now a \"very tight range of options for airlines\" trying to navigate the current situation. Western airlines have had to avoid Russian airspace, including Siberia, since the invasion of Ukraine in 2022. Now, all flights are also steering clear of Iran and Iraq airspace, opting for alternative routes to the north or south.\n\nFlightradar24 data maps show real-time congestion in an approximately 100 km wide strip across the north of Azerbaijan, a country roughly the size of Portugal. Late on Friday, data indicated planes were using northern Azerbaijan's airspace but not flying over the south of the country.\n\nGulf airlines have begun operating more flights out of the UAE and Oman to evacuate stranded travelers, but there are no flights out of Qatar, and capacity remains well below normal levels, according to Opsgroup, which provides risk information for the industry. \"The central corridor across Iran, Iraq and the Gulf is effectively closed, so most traffic is going either north via the Caucasus and Afghanistan, or south via Egypt, Saudi Arabia, and Oman,\" said David Mumford, an international operations specialist at Opsgroup. \"Both routes are longer and busier than usual, so flight times and fuel burn are higher.\"\n\nAir traffic sharply decreased after the attacks began on Saturday as airlines were forced to use more limited corridors. Aviation consultant Strickland said passengers could experience longer flight times due to extended routing. \"Flights already doing circuitous routing have even less choice,\" he added.\n\nSome airlines have been adjusting routes in recent weeks as tensions in the Gulf increased. This week, even more flights were forced to switch to routes further south to avoid the conflict zone. Congestion is expected during busy times, such as west to east in the afternoon and evening when Europe-to-Asia flights are scheduled, and east to west early in the morning when flights from Asia to Europe arrive. This presents \"another big complication for airlines' planning,\" on top of usual factors like weather and the impact of delays on subsequent flights.\n\nMost airlines are not currently adding stops to accommodate longer routes, but Qantas has added a refueling stop in Singapore on its non-stop flight from Perth to London.", "Image_URLs": "docs/images/bbc_2.jpg"}, {"Source": "Nasdaq - Technology", "Title": "ZRS Chart of the Month", "Date": "Fri, 06 Mar 2026 20:09:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/zrs-chart-month-1", "Summary": "Zacks' research chief highlights a top stock targeting millennial and Gen Z audiences, which generated nearly $1 billion last quarter. Selected as the \"single best pick to double,\" it offers significant upside potential after a recent pullback. Zacks provides a free report with this stock and four runners-up for investors.", "Content": "Technology ZRS Chart of the Month September 06, 2024 \u2014 02:00 pm EDT\n\nWritten by John Blank for Zacks\n\nResearch Chief Names \"Single Best Pick to Double\"\n\nFrom thousands of stocks, five Zacks experts each have chosen their favorite to skyrocket 100% or more in the coming months. Among these, Director of Research Sheraz Mian has selected one company with the most explosive upside. This company targets millennial and Gen Z audiences and generated nearly $1 billion in revenue last quarter. A recent pullback presents an ideal opportunity to invest.\n\nWhile not all elite picks are guaranteed winners, this one has the potential to surpass previous Zacks\u2019 Stocks Set to Double, such as Nano-X Imaging, which surged +129.6% in just over nine months.\n\nFor those interested, Zacks offers a free report featuring the top stock and four runners-up. To access the latest recommendations from Zacks Investment Research, download the report today.\n\nZacks Investment Research\n\nThe views expressed are those of the author and do not necessarily reflect the views of Nasdaq, Inc. Zacks is a leading investment research firm focusing on stock analysis and recommendations, founded in 1978. Their core methodology involves earnings estimate revisions, forming the basis of the Zacks Rank. More resources for individual investors are available at www.zacks.com.", "Image_URLs": "docs/images/nasdaq_tech_6.jpg"}, {"Source": "TechCrunch", "Title": "OSHA probing fatality at Rivian warehouse", "Date": "Fri, 06 Mar 2026 20:23:08 +0000", "Author": "Sean O'Kane", "URL": "https://techcrunch.com/2026/03/06/osha-probing-fatality-at-rivian-warehouse/", "Summary": "OSHA is investigating the death of 61-year-old Kevin Lancaster at a Rivian warehouse in Illinois, where he was pinned between a tractor trailer and a loading dock. Lancaster died from blunt traumatic injuries after being trapped for 20 minutes. Rivian expressed condolences and is cooperating with authorities. The factory has faced safety scrutiny, but violations have decreased since 2024.", "Content": "The Occupational Safety and Health Administration has opened an investigation into the death of a worker at a Rivian warehouse in Illinois this week, the federal agency told Tech Crunch on Friday. The agency said the probe could take up to six months.\n\nThe man, identified by local authorities as 61-year-old Kevin Lancaster, reportedly died from \u201cblunt traumatic compressional injuries\u201d after getting pinned between a tractor trailer and a loading dock at the facility, which is located just a few miles from Rivian\u2019s factory. Lancaster was reportedly trapped in that spot for around 20 minutes on Thursday before firefighters were able to reach him, according to a local news report. Emergency crews responded to a call at 1:40 p.m. local time, and Lancaster was pronounced dead at a local medical center at 2:33 p.m. local time. The Normal Police Department and the McLean County Coroner are still investigating Lancaster\u2019s death, according to the report.\n\n\u201cSafety at our facilities is our top priority. Unfortunately yesterday afternoon, a contractor passed away after an incident at our warehouse,\u201d Rivian said in a statement to Tech Crunch. \u201cOur sympathy and thoughts are with their family and friends. We are working with the Normal Police Department on its investigation.\u201d\n\nThe safety of Rivian\u2019s factory in Normal, Illinois, became a source of scrutiny in 2024 after a Bloomberg News report detailed 16 \u201cserious\u201d violations levied on the company across that year and the one prior. Automotive factories are notoriously dangerous, though, and Rivian has received just one violation at the Illinois manufacturing plant since that report was published. OSHA even told Bloomberg at the time that Rivian \u201chas improved their safety and health team and are very cooperative with the OSHA process.\u201d\n\nRivian assembles its flagship R1 pickup truck, R1 SUV, and commercial electric van, known as the EDV, at its 4.3-million-square-foot factory in Normal. The company is expanding the space by another 1.1 million square feet to make room for its next EV, the R2. Once complete, the factory will have capacity to assemble 215,000 vehicles.", "Image_URLs": "docs/images/techcrunch_5.jpg"}, {"Source": "XXL Hip Hop", "Title": "King, Domani Strike Back at 50 Cent with Two Angry Diss Tracks", "Date": "Fri, 06 Mar 2026 21:35:53 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/king-domani-50-cent-diss-tracks/", "Summary": "King and Domani released diss tracks on Instagram, retaliating against 50 Cent for dissing T.I. and the Harris family on the Power Origins theme song. King\u2019s \"Droptop\" criticizes 50 Cent, while Domani\u2019s \"PU$Y\" questions his toughness. 50 Cent responded with provocative posts, escalating the feud.", "Content": "King and Domani dropped two diss tracks after 50 Cent appeared to have dissed T.I. and the Harris family on the new Power Origins theme song. On Friday (March 6), King and Domani released the songs on their Instagram pages in retaliation against 50 Cent for disrespecting T.I. and the Harris family.\n\nKing's diss track is called \"Droptop.\" In the song, he criticizes 50 Cent for talking too much and accuses him of allegedly beating women. \"You were made from 50 Cent because ya mama gave it cheap,\" King raps.\n\nMeanwhile, Domani's diss track titled \"PU$Y\" targets 50 Cent with a haunting tone. He questions 50's toughness, rapping, \"I smell p***y/How about you come here and try to push me/That suga water got ya, now you turn sweet, huh/I smell p***y/Ni**a, I read you like a book read/Come bring ya a*s to school quit playin' hookie/I smell p***y.\"\n\nThese songs respond to 50 Cent, who featured T.I. and the Harris family on the theme song for his upcoming television show, Power Origins. The track, featuring R&B singer Leon Thomas, includes street rap about the drug trade. 50 Cent raps, \"I'm back on my dope boy grammar/Your daddy made your mama eat every box in Atlanta,\" and mentions secret activities with lines like, \"Freak sh*t/Peep sh*t/Keep sh*t, on the low/But everybody know.\" 50 captioned his Instagram post about the song, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\nFurther escalating the feud, 50 Cent posted a photoshopped image of T.I. with Tiny eating from a cut-up cardboard box, possibly implying that 50's lyric was directed at T.I. and the Harris family. He captioned the post, \"LOL...They are gonna learn to leave me alone.\"\n\nThe feud between 50 Cent and the Harris family is intensifying.", "Image_URLs": "docs/images/xxlhiphop_5.jpg"}, {"Source": "The Hockey Writers", "Title": "Grading the Maple Leafs & Kings\u2019 Scott Laughton Trade", "Date": "Fri, 06 Mar 2026 21:45:07 +0000", "Author": "Spencer Lazary", "URL": "https://thehockeywriters.com/grading-the-maple-leafs-kings-scott-laughton-trade/", "Summary": "The Toronto Maple Leafs traded Scott Laughton to the Los Angeles Kings for a conditional 2026 third-round pick, as part of multiple deadline deals aimed at recouping draft capital and managing cap space. The Leafs also traded Nicolas Roy and Bobby McMann for draft picks. The moves reflect a strategic sell-off rather than immediate roster improvement. The Kings seek playoff boost with Laughton\u2019s addition.", "Content": "The Toronto Maple Leafs left everything to the final buzzer. All day, Leafs Nation was wondering what deals the organization would make to help this team retool. Yesterday, they traded Nicolas Roy to the Colorado Avalanche; today, they dealt Bobby McMann to the Seattle Kraken. Now, they have announced that they have traded Scott Laughton to the Los Angeles Kings.\n\nLaughton was acquired just one year ago at the 2025 NHL Trade Deadline. Now, he is on his way out of town and heading to California to try and help the Kings push for a playoff spot down the stretch. As for the Maple Leafs, their selling of assets continues.\n\nFull Trade:\nMaple Leafs receive: Conditional 2026 third-round pick  \nKings receive: Scott Laughton  \nMaple Leafs Restocking Draft Capital  \nTrade Grade: C\n\nThe Maple Leafs have made three trades over the last 24 hours, all of which have resulted in draft picks. This approach is ideal for Toronto, who are trying to maximize cap space heading into next season and recoup draft capital for players on expiring contracts. No fan within Leafs Nation should have expected them to pull off a hockey trade. It was always going to be a cap dump for draft picks, or a major trade for someone like Robert Thomas. It makes more sense for them to sell assets for picks and then look at how to retool this roster in the offseason, rather than trying to fix it at the deadline.\n\nBrad Treliving did have the right approach in selling their UFAs. Unfortunately, he had to budge on his asking price. He was able to get a first and a fifth for Roy, a second and a fourth for McMann. However, he was only able to secure a conditional third-round pick, which slides to a second if the Kings make the playoffs. While that is a decent return, it is significantly less than what he paid for Laughton just a season ago, which was Nikita Grebennik and a conditional 2027 first-round pick. It would have been a better return if he could have acquired a player like Alex Turcotte or a mid-tier prospect along with the conditional pick. Regardless, he was able to sell an expiring asset, which should set them up well in the draft. The only hope now is that the Kings can play well enough to make the playoffs.\n\nFrom the Kings\u2019 perspective, the cost for Laughton is minimal. They are giving up a reliable depth center as they try to improve their playoff chances. The Kings sit three points out of the final wild card spot and have made some significant organizational changes over the past month, including acquiring Artemi Panarin before the Winter Olympic roster freeze, firing head coach Jim Hiller, and hiring D.J. Smith. They also dealt Warren Foegele and Corey Perry, adding Laughton as a third or fourth center depending on their lineup needs.", "Image_URLs": "docs/images/hockey_writers_5.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Top Research Reports for Procter & Gamble, American Express & TJX", "Date": "Fri, 06 Mar 2026 21:51:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/top-research-reports-procter-gamble-american-express-tjx", "Summary": "The article highlights recent research reports on major stocks, including Procter & Gamble, American Express, and TJX. P&G faces margin pressures from rising costs but maintains steady sales through brand strength and innovation. American Express has declined 5.1% over six months amid rising expenses and credit-loss provisions. The reports also cover micro-cap stocks Genie Energy and Comp X International.", "Content": "Technology Top Research Reports for Procter & Gamble, American Express & TJX\n\nMarch 06, 2026 \u2014 04:51 pm EST\n\nThe Zacks Research Daily presents the best research output of our analyst team. Today's Research Daily features new research reports on 16 major stocks, including The Procter & Gamble Co. (PG), American Express Co. (AXP), and The TJX Companies, Inc. (TJX), as well as two micro-cap stocks Genie Energy Ltd. (GNE) and Comp X International Inc. (CIX). The Zacks microcap research is unique as our research content on these small and under-the-radar companies is the only research of its type in the country.\n\nThese research reports have been hand-picked from the roughly 70 reports published by our analyst team today. You can access today\u2019s research reports here.\n\nAhead of Wall Street\n\nThe daily 'Ahead of Wall Street' article is a must-read for all investors who want to be prepared for that day's trading action. The article is released before the market opens, providing analysis of that morning's economic releases and their potential impact on the day's market. You can read this article for free on our homepage and sign up to receive email notifications when it is published each morning.\n\nYou can read today's AWS here.\n\nNon-Farm Payrolls Sink -92K in February\n\nToday's Featured Research Reports\n\nShares of Procter & Gamble have declined 1.8% over the past six months, compared to the Zacks Consumer Products - Staples industry\u2019s decline of 1.9%. The company faces mounting margin pressure from elevated commodity costs, rising tariffs, and higher financing expenses. Gross margins are contracting despite productivity gains, with a $400 million tariff headwind and a $250 million drag from higher interest and taxes threatening earnings growth.\n\nNevertheless, P&G\u2019s resilient performance underscores the strength of its brand portfolio and disciplined operating strategy. Despite a mixed consumer backdrop, the company continues to generate steady organic sales, supported by pricing strength and broad-based growth in categories such as Beauty, Health Care, and Grooming.\n\nProcter & Gamble\u2019s integrated approach, innovation, market expansion, and productivity initiatives enable it to adapt quickly to evolving consumer trends while maintaining competitiveness. (You can read the full research report on Procter & Gamble here.)\n\nAmerican Express shares have declined 5.1% over the past six months, compared to the industry\u2019s decline of 24.8%. The company faces rising expense intensity, elevated credit-loss provisions amid weakening consumer credit trends, and relatively high leverage, which could pressure margins and earnings stability if macroeconomic conditions remain challenging.", "Image_URLs": "docs/images/nasdaq_tech_5.jpg"}, {"Source": "TechCrunch", "Title": "Life EV officially owns Rad Power Bikes now", "Date": "Fri, 06 Mar 2026 21:56:35 +0000", "Author": "Kirsten Korosec", "URL": "https://techcrunch.com/2026/03/06/life-ev-officially-owns-rad-power-bikes-now/", "Summary": "Life EV acquired Rad Power Bikes for $13.2 million after its bankruptcy, gaining IP, inventory, and assets. The company plans to maintain Rad Power\u2019s operations and expand retail in key U.S. markets, supporting existing customers. Life EV, based in Florida, focuses on acquiring and scaling e-bike brands and aims to expand across North America.", "Content": "Life Electric Vehicles Holdings, also known as Life EV, officially owns the intellectual property, inventory, and certain operating assets of Rad Power Bikes. Life EV acquired Rad Power for $13.2 million. Rad Power Bikes, a buzzy electric bike company that raised nearly $330 million in venture capital, filed for Chapter 11 bankruptcy protection in December. The company had struggled for months prior to its bankruptcy filing and had warned employees it might have to shut down without new capital.\n\nLife EV intends to keep the company intact and said it will continue retail operations under the Rad Power Bikes brand in the United States. It also plans to expand the retail footprint in select key markets. Life EV pledged to support existing customers who might be wondering what would become of their bike warranties or gift cards.\n\nThe Florida-based Life EV has built its business by acquiring, developing, and scaling electric bicycle and micro-mobility brands. While Rad Power is perhaps its highest-profile purchase, the company also holds an equity interest in LEV Manufacturing, Inc., which acquired the Serial 1 premium electric bicycle brand originally developed and spun off from Harley-Davidson.\n\nIn a statement, Life EV said the acquisition fits into its broader strategy of expansion across North America.", "Image_URLs": "docs/images/techcrunch_4.jpg"}, {"Source": "The Hockey Writers", "Title": "Grading the Islanders\u2019 Trade for the Blues\u2019 Brayden Schenn", "Date": "Fri, 06 Mar 2026 22:00:00 +0000", "Author": "Alex Chauvancy", "URL": "https://thehockeywriters.com/grading-the-islanders-trade-for-the-blues-brayden-schenn/", "Summary": "The New York Islanders traded for Brayden Schenn from the St. Louis Blues, giving up a first-round pick, Jonathan Drouin, and a goaltending prospect. Schenn, with declining performance and a $6.5 million cap hit through next season, may not significantly improve the team. The Blues received a strong return, while the Islanders' move is viewed as questionable.", "Content": "The New York Islanders have had an interesting few weeks ahead of the NHL trade deadline. Shortly before the Olympic break, they acquired Ond\u0159ej Pal\u00e1t and a couple of draft picks from the New Jersey Devils in exchange for Maxim Tsyplakov. Today, they made one of the splashier deals of Deadline Day, acquiring Brayden Schenn from the St. Louis Blues. \n\nHere are the full details:\n\nIsles acquire: Schenn  \nBlues acquire: 2026 1st-round pick, 3rd-round pick, Jonathan Drouin, goaltending prospect Marcus Gildon\n\nSchenn had to waive his no-trade clause to join the Islanders, but it may have been better for the Islanders had he invoked it. This move is a head-scratcher that doesn\u2019t make much sense for where they are as an organization. As for the Blues, they made out like bandits and got full value for their longtime captain.\n\nThe Islanders have been a surprise this season and look like a safe bet to make the playoffs at this point. That\u2019s why GM Mathieu Darche decided to become a buyer, but it\u2019s questionable whether his moves have made the team significantly better. Pal\u00e1t\u2019s best days seem behind him, and the same appears true for Schenn.\n\nSchenn has 12 goals and 28 points in 61 games this season, which is decent production, but there are red flags. His skating has declined in recent seasons, which is concerning given the Islanders\u2019 uptempo style. He also struggles in transition. His shooting ability has also fallen off in the last couple of seasons. While he still scores at a decent clip, his volume has decreased. He is a good playmaker and excels in faceoffs, which likely contributed to the Islanders\u2019 decision to acquire him.\n\nStill, there are more cons than pros in this deal. One issue is Schenn\u2019s contract, which runs through next season at a cap hit of $6.5 million. This trade would have been more palatable if he were a rental, but the extra year complicates matters. Additionally, he makes the Islanders a slower team, which Pal\u00e1t already did.\n\nThe Islanders also gave up quite a bit to acquire Schenn. Drouin struggled with the Islanders, and while they aren\u2019t losing much there, giving up a first-round pick for a declining player in his mid-30s with term is questionable asset management. It remains to be seen if this trade will work out as intended.\n\n**Islanders Grade: C**  \n**Blues maximized Schenn\u2019s value**  \n\nThe Blues had another trade nixed by a no-trade clause when Colton Parayko did not waive to join the Sabres. This trade, however, went through, allowing them to get a solid return for their longtime captain. Drouin did struggle with the Islanders but has been productive at times over the last few seasons.", "Image_URLs": "docs/images/hockey_writers_4.jpg"}, {"Source": "Nasdaq - Original", "Title": "Weekly Chartstopper: March 6, 2026", "Date": "Fri, 06 Mar 2026 22:00:46 +0000", "Author": "Michael Normyle", "URL": "https://www.nasdaq.com/articles/weekly-chartstopper-march-6-2026", "Summary": "Since the Iran conflict began, oil prices have surged by over 30%, impacting U.S. inflation and GDP growth. Markets have lowered expectations for Fed rate cuts and seen a slight Nasdaq decline. The 10-year Treasury yield rose to 4.15%. Key upcoming data include CPI, PCE, GDP revisions, and job reports.", "Content": "US Markets Weekly Chartstopper: March 6, 2026\n\nMarch 06, 2026 \u2014 05:00 pm EST\n\nSince the conflict with Iran began on Saturday, markets have been trying to assess its economic impact, primarily through higher energy prices. The conflict has effectively halted traffic in the Strait of Hormuz, which transports 20-25% of global oil and liquefied natural gas (LNG), and has shuttered energy facilities in the region.\n\nThis week, international and U.S. oil prices have increased by 30% and 35%, respectively, reaching their highest levels since 2023. European LNG prices are up 65%, while U.S. LNG prices have risen by 10%. JPMorgan estimates that if oil prices remain at these levels, U.S. headline inflation could increase by 0.3 percentage points, and U.S. GDP growth could decrease by 0.6 percentage points. \n\nGiven this likely boost to inflation, markets have reduced their expectations for Federal Reserve rate cuts this year by 20 basis points to around 40 basis points. This adjustment follows a significant jobs report miss, with the economy losing 92,000 jobs in February\u2014against expectations of a 55,000 gain\u2014and broad-based sector losses. However, it\u2019s important not to overinterpret a single month\u2019s data, as the private sector has averaged a gain of about 20,000 jobs per month over the past three months.\n\nDespite these developments, the Nasdaq-100\u00ae is down just 1% this week, though rising inflation expectations have pushed the 10-year Treasury yield up nearly 20 basis points to 4.15%.\n\nNext Week\n\nHere are the top events to watch:\n\n- Tuesday: NFIB Small Business Optimism (February)\n- Wednesday: CPI Inflation (February)\n- Thursday: Jobless Claims\n- Friday: PCE Inflation and Spending (January), Real GDP (Q4 revision), JOLTS Job Openings (January)\n\nMichael Normyle  \nU.S. Economist and Senior Director at Nasdaq", "Image_URLs": "docs/images/nasdaq_original_3.png"}, {"Source": "The Hockey Writers", "Title": "Avalanche Acquire Nazem Kadri From Calgary Flames", "Date": "Fri, 06 Mar 2026 22:09:09 +0000", "Author": "Matteo Giuliano", "URL": "https://thehockeywriters.com/avalanche-acquire-nazem-kadri-from-calgary-flames/", "Summary": "Nazem Kadri was traded from the Calgary Flames to the Colorado Avalanche for a 2028 first-round pick, a 2027 second-round pick, Victor Olofsson, and Max Curran, with Calgary retaining 20% of Kadri\u2019s $7 million salary. The Avalanche strengthen their lineup, boosting Stanley Cup hopes, while the Flames acquire multiple draft picks and prospects for rebuilding.", "Content": "We have potentially the trade of the deadline, with Nazem Kadri and a 2027 fourth-round pick being traded to the Colorado Avalanche. The Calgary Flames will receive a 2028 first-round pick, a 2027 second-round pick, Victor Olofsson, and Max Curran. The Flames will retain 20 percent of Kadri\u2019s contract, which is $1.4 million, as part of the deal.\n\nWhat the Avalanche Are Getting\n\nAvalanche fans are already familiar with him, but Kadri is the ideal third-line centre for any team. He is a physical presence in a lineup and has found a way to score goals on one of the lowest-scoring teams in the NHL. While his stats this season haven\u2019t been fantastic, with just 10 goals and 29 assists in 59 games, he scored 35 goals just last season for the Flames.\n\nTrade talks around Kadri have been ongoing since his first year in Calgary, where everything went wrong for the Flames. The Jonathan Huberdeau trade happened in the same offseason as the Kadri signing, and nothing gelled. That trade is now regarded by many as one of the worst trades in NHL history.\n\nRelated: Panthers are Winning the Matthew Tkachuk Trade\n\nKadri is a fantastic player, but his age and contract are concerns for the future. He is already 35 and is under contract for another three seasons after this one, with an average annual value of $7 million. Even with the salary cap increasing, it is a pricey deal; however, if they win the cup with Kadri, none of this will matter.\n\nNew Stanley Cup Favorite?\n\nThe biggest weakness with the Avalanche lineup was the center position heading into the deadline. After the deadline, Colorado acquired a new third- and fourth-line center. A lineup of Nathan MacKinnon, Brock Nelson, Nazem Kadri, and Nicolas Roy provides elite depth. With a lineup that was very top-heavy before the deadline, that no longer appears to be the case.\n\nWith the league being so wide open this season, Colorado is now a favorite to win their second Stanley Cup in five years.\n\nThe Flames Continue Their Rebuild\n\nThe Flames receive a first- and a second-round pick as part of the deal. They now have six first-round picks in the next three seasons. It is unlikely they will use all six selections in the first round over that period, which means these picks could be used as assets for future deals. They also received prospect Max Curran, who has posted 14 goals and 27 assists for a total of 41 points in 31 games with the Edmonton Oil Kings.\n\nFlames general manager Craig Conroy did well to acquire assets in this deal, especially considering concerns over Kadri\u2019s contract length, price, and his age of 35.", "Image_URLs": "docs/images/hockey_writers_3.jpg"}, {"Source": "Polygon", "Title": "Best Xbox Game Pass games to play this weekend (March 6-8 2026)", "Date": "Fri, 06 Mar 2026 22:11:14 GMT", "Author": "Austin Manchester", "URL": "https://www.polygon.com/best-xbox-game-pass-games-march-6-2026/", "Summary": "March's new releases, including Pok\u00e9mon Pokopia and Slay the Spire 2, are not on Xbox Game Pass. However, the service offers popular titles like Resident Evil Requiem, now the fastest-selling in the series, and the Resident Evil 2 remake. Other recommended Game Pass games include Planet of Lana 2 and the original Slay the Spire, a key roguelike deckbuilder.", "Content": "While March is off to a strong start for new games already, with Pok\u00e9mon Pokopia, Slay the Spire 2, and Marathonall releasing this past week, none of those are on Xbox Game Pass. Neither is February's Resident Evil Requiem, one of the year's best games so far and one that might end up in the Game of the Year conversation by year's end. But you know what is on Game Pass? A bounty of excellent games well worth checking out.\n\nThis week's recommendations include a precursor to Requiem, an indie hit, and a must-play roguelike deckbuilder.\n\nEveryone\u2019s talking about Resident Evil Requiem right now, partly because it\u2019s become the fastest-selling game in the series\u2019s history, and mostly because grown-up Leon looks incredibly hot. Whether you\u2019ve already finished Requiem or you\u2019re holding out for a sale, now\u2019s the perfect time to revisit the stellar Resident Evil 2 remake on Game Pass. As rookie cop Leon, you\u2019re tasked with escaping Raccoon City police headquarters and uncovering the nefarious secrets of the Umbrella Corporation. RE2 is a thrilling, exquisitely paced adventure that you can easily devour in a weekend. And if you\u2019re left wanting more, you can double your pleasure by playing Claire Redfield\u2019s route.\n\nPlanet of Lana 2: Children of the Leaf is a stylish and cinematic indie puzzle-platformer. Without recognizable language, it tells a deeply personal narrative through expressive animation, sweeping music, and standout vocal performances that sound like gibberish to our ears. The mechanics are deeper than the first game's, with new ways to tackle puzzles, such as using Mui's ability to hypnotize creatures to progress. Planet of Lana 2 opens with a recap of the first game, so you don\u2019t technically need to have played the 2023 hidden gem to enjoy its sequel. But both games are available on Game Pass.\n\nSlay the Spire 2 just had one of the biggest game launches of the year. But if you\u2019re curious to hear what all the hype is about before jumping in, the first game is still available. Mega Crit's 2019 roguelike deckbuilder is arguably the game that kicked off the current roguelike deckbuilding trend. Its mix of cards and characters is an immediate draw for strategy enthusiasts. The unique visuals and the depth of run variety keep players coming back for years. Slay the Spire 2 builds on the original's fundamentals, but if you want a taste of what to expect, the first game offers a solid introduction.", "Image_URLs": "docs/images/polygon_5.jpeg"}, {"Source": "CBC News - World", "Title": "U.S. says it worked with Ecuador to bomb alleged drug-trafficking operations site", "Date": "Fri, 06 Mar 2026 22:15:00 EST", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/us-ecuador-joint-operation-drug-trafficking-9.7118563?cmp=rss", "Summary": "The U.S. and Ecuador conducted a joint operation targeting a Colombian FARC dissident drug training camp near Ecuador's border, using helicopters, aircraft, boats, and drones. Details on casualties are undisclosed. Ecuador's President Noboa emphasizes a crackdown on organized crime and values U.S. support. The operation aligns with regional efforts to combat drug trafficking and narco-terrorism.", "Content": "The U.S. and Ecuador carried out a joint operation targeting drug trafficking in Ecuador, authorities in both countries announced on Friday. The U.S. described the operation as \"lethal kinetic operations.\" Neither U.S. Southern Command nor Ecuador's defense ministry provided details on whether anyone was killed or captured during the strike.\n\nEcuador's defense ministry stated that the operation involved helicopters, aircraft, river boats, and drones to locate and bomb a drug traffickers' training camp in northeastern Ecuador near the Colombian border. The camp belonged to the Comandos de la Frontera (CDF), a Colombian criminal organization composed of FARC dissidents, with a capacity for 50 people.\n\nEcuadorian President Daniel Noboa has prioritized a military crackdown on organized crime. His government has also imposed tariffs on Colombia, accusing it of insufficient efforts to combat drug trafficking. Noboa is scheduled to travel to Miami this weekend to participate in the Trump administration's \"Shield of the Americas\" summit, which gathers regional leaders to discuss security and organized crime.\n\nThe Ecuadorian defense ministry stated, \"The United States is a key ally in this fight,\" and noted that the operation was conducted at Ecuador's request to dismantle narco-terrorist networks. This operation followed a similar joint effort announced earlier this week by U.S. Southern Command.", "Image_URLs": "docs/images/cbc_3.jpg"}, {"Source": "Polygon", "Title": "Resident Evil Requiem is a timely critique of capitalist greed", "Date": "Fri, 06 Mar 2026 22:15:17 GMT", "Author": "Josh Broadwell", "URL": "https://www.polygon.com/resident-evil-requiem-critique-rich-tech-bros/", "Summary": "Resident Evil Requiem offers a deeper critique of capitalism, highlighting how elites like Victor Gideon manipulate blood and memories to create clones and control individuals. It depicts experiments at the Raccoon City Orphanage and the exploitation of vulnerable people, symbolizing broader themes of societal manipulation, power, and greed, with a focus on the corrupting influence of those in control.", "Content": "As much as Resident Evil changed over the years, a few things remained constant with the series' attitude toward society. Corporations are bad, rich people are even worse, and corporate scientists are also bad. The themes usually don't go much further than that. But Resident Evil Requiem has a more carefully thought-out critique of capitalism and selfishness more broadly, and it's a timely one as well. \n\nVictor Gideon, one of Requiem's primary antagonists, is the focal point of Capcom's critique. He wants to realize Oswell Spencer's presumed goal of preserving the consciousness of a \"superior\" person by transplanting it into another host to create new generations of \"elites,\" similar to real-life tech and business moguls. It is revealed that the Raccoon City Orphanage was a front for these experiments, with dozens of clone children created for this purpose. Central to Gideon\u2019s plans is the idea that people's memories and essences are stored in blood, hence all the blood-related work he's doing at the Rhodes Care Home. This concept isn't just Resident Evil hokum; the idea that blood contains part of the human spirit and could transfer it between hosts persisted for centuries, dating back to the Middle Ages.\n\nThe ideal result is a person who remains an individual but is inclined to think like Spencer, know what he knows, and behave like him, if Gideon\u2019s words about Grace are any indication. The operation resembles a gruesome algorithm that takes pieces from everyone's experiences and inserts a predetermined bias to produce a result that benefits the creator more than anyone else. This can be seen as a metaphor for social media, where a handful of malicious individuals manipulate perceptions and beliefs.\n\nConnections become even more explicit in the care center\u2019s basement, where Gideon and his team perform gruesome experiments, including using a mulcher to extract blood for their work.
