this album and this show, because I never thought I was actually going to even make it to producing a show like this of my personal and healing journey through songs,\u201d she added.\n\nElisapie said her songs evoke a lot of emotions, and she enjoys hearing how people connect with them in different ways. \u201cI just feel good in that space where I can allow kind of a bridge between maybe Indigenous stories and non-Indigenous stories, and there\u2019s a huge dialogue that I think is often as, \u2018it\u2019s uncomfortable,\u2019 but that\u2019s not how we view it. I think each uncomfortable moment is an opportunity and I think we just want to connect.\u201d\n\nAs part of her Canadian tour, she will be performing songs from her album \u201cInuktitut,\u201d which was nominated for Juno 2025 Album of the Year, and won Adult Alternative Album of the Year. She also made the Polaris Music Prize 2024 Shortlist and was awarded a 2024 Juno for Contemporary Indigenous Album of the Year.\n\nElisapie performs at the Broadway Theatre on March 17 at 7:30 p.m. Tickets are available at broadwaytheatre.ca.\n\nCanadian rock band Black Pistol Fire will perform at Louis\u2019 at the University of Saskatchewan on March 14. Formed in Toronto, Black Pistol Fire consists of childhood friends Kevin McKeown and Eric Owen. They are known for blending influences from blues, garage punk, and southern rock.\n\nMcKeown handles guitar and lead vocals, while Owen is on drums. Their top songs include \u201cLost Cause\u201d and \u201cBully,\u201d from the album \u201cDeadbeat Graffiti.\u201d The duo earned two Juno Award nominations in 2022 for Breakthrough Group of the Year and Rock Album of the Year for their album \u201cLook Alive.\u201d", "Image_URLs": "docs/images/star_phoenix_3.jpg"}, {"Source": "Polygon", "Title": "Resident Evil Requiem gave me hope for a Resident Evil 6 remake", "Date": "Sat, 07 Mar 2026 14:00:17 GMT", "Author": "Giovanni Colantonio", "URL": "https://www.polygon.com/resident-evil-6-remake-requiem/", "Summary": "Capcom's 2009 Resident Evil 5 aimed to shift toward action, but 2012's Resident Evil 6 was a critical failure, nearly ending the series. Resident Evil 7 revived interest, and Resident Evil Requiem, inspired by the 2023 remake of Resident Evil 4, showcases improved gameplay with fast-paced, over-the-top combat. The game reimagines Resident Evil 6's chaotic action, highlighting its potential for a remake.", "Content": "Resident Evil Requiem\n\nIn 2009, Capcom entered its hubris era. The publisher was riding high off the success of Resident Evil 4 and was ready to capitalize by continuing to transform its survival-horror juggernaut into a full-blown action series. Resident Evil 5 attempted to repeat its predecessor\u2019s success with mixed results, but Capcom\u2019s ambitions came crashing down in 2012 with Resident Evil 6. The game was a notorious misstep that almost killed the series for good until Resident Evil 7 Biohazard restored its goodwill five years later. It\u2019s not the kind of game that typically gets redeemed with endless remasters and remakes. \n\nBut after playing through the excellent Resident Evil Requiem, maybe it\u2019s time to reconsider. I\u2019m now convinced Capcom could pull off a Resident Evil 6 remake \u2014 and I swear I\u2019m not just creating another Morbius meme. Resident Evil 6 was an attempt to give the series a major climax that brought several disparate characters together into one epic saga. The story unites fan favorites like Leon S. Kennedy and Chris Redfield as the aftermath of the evil Umbrella Corporation\u2019s bioweapons research goes global. Leon kills the President of the United States, there are two Ada Wongs, and Troy Baker is there for some reason.\n\nIt had a terrible reputation for a reason: The action game turned all of Resident Evil\u2019s dumbest qualities up to 15. The lore-heavy story barely made sense, the corniness was maxed out, and none of it controlled very well. It was Capcom taking all the wrong lessons from its success stories over the years and folding them into one overstuffed attempt to create a big-scale action game that appealed to a wider market beyond horror diehards. Even though it's widely considered the series\u2019 worst mainline game by a mile, it still has its apologists. And by that, I mean me.\n\nResident Evil 6 isn\u2019t a good game, but it is a hilarious one. It fully realizes the series\u2019 B-movie ambitions in spectacularly stupid fashion. What other game lets you suplex a zombie to explode its head? The melodramatic silliness was just right, but the experience was always held back by messy controls that made combat much more of a nightmare than it needed to be. Capcom just hadn\u2019t figured out how to transform Resident Evil\u2019s slow zombie battles into fast-paced shootouts.\n\nOver a decade later, Capcom has finally figured that out. Resident Evil Requiem rebuilds on the changes introduced in 2023\u2019s critically acclaimed Resident Evil 4 remake to make for some thrilling action. It\u2019s not just about giving Leon a big arsenal of guns and letting him loose in a Raccoon City filled with monsters. He can parry chainsaws, spin kick heads off, and slice up bodies with a hatchet. The power of the multifaceted system is immediately apparent in Leon\u2019s first shootout in Requiem\u2019s Care Center, where he carves his way through an entire room full of zombies. It\u2019s so hectic and over-the-top.", "Image_URLs": "docs/images/polygon_1.jpg"}, {"Source": "Star Phoenix", "Title": "Opinion: If Ottawa doesn't reform supply management, Washington will", "Date": "Sat, 07 Mar 2026 14:00:36 +0000", "Author": "Steve Bartlett", "URL": "https://thestarphoenix.com/opinion/opinion-if-ottawa-doesnt-reform-supply-management-washington-will", "Summary": "The U.S. Supreme Court ruled Trump-era tariffs unconstitutional in their legal basis but did not declare tariffs illegitimate, allowing President Trump to impose a 15% tariff on all imports. Approximately $130 billion in tariff revenue has been collected since 2025. The decision signals tariffs will remain a key trade tool, impacting U.S.-Canada relations, especially regarding dairy market access, with broader implications for trade policy and economic strategies.", "Content": "A person takes a jug of milk from a refrigerator in this file photo. The U.S. Supreme Court was unequivocal: the tariffs imposed under the Trump Administration were unconstitutional in their legal rationale. That distinction matters. The court did not declare tariffs themselves illegitimate. It rejected the justification used to impose them.\n\nIn response, President Trump invoked Article 122 and imposed a blanket 15 percent tariff on all goods entering the United States. The signal could not be clearer: tariffs are not going away. They are being re-engineered.\n\nSince early 2025, Washington has collected roughly $130 billion in tariff revenues. The court offered no guidance on what should happen to those funds. Thousands of American companies will undoubtedly challenge their assessments, but the broader message from the court \u2014 particularly reflected in Justice Kavanaugh\u2019s dissent \u2014 is that tariffs are likely to remain a structural feature of U.S. trade policy, regardless of who occupies the White House.\n\nThis decision was not partisan theatre. A Republican-dominated court ruled against a Republican president. That adds credibility. The ruling was procedural, not philosophical. The White House now has 150 days to construct a more defensible economic and legal framework to justify tariffs \u2014 and it will.\n\nThe American political mood has shifted. A growing share of the electorate believes globalization has disadvantaged the United States. Trade policy is adjusting accordingly. Whether Canada likes it or not, this is the new American trajectory.\n\nSo where does that leave us? Canada needs a trade arrangement with the United States. But it is increasingly unrealistic to assume that future access will be tariff-free. One of Washington\u2019s predictable demands will be expanded access to Canada\u2019s dairy market.\n\nYes, more access. But dismantling supply management to satisfy short-term political pressure is not an option. President Trump understands that dairy is a political wedge issue in Canada. Yet from a business perspective, the case for dramatically expanding U.S. retail dairy exports into Canada is weak. Canadian consumers are not clamoring for American fluid milk.\n\nHowever, the story changes at the ingredient level. Industrial dairy proteins produced in the United States are far more competitive than Canadian equivalents. On that front, expanded access could benefit processors on both sides of the border. That conversation should be grounded in economics, not ideology.\n\nThe traditional Canadian response to trade concessions has been compensation. Ottawa distributed more than $1.7 billion in payments to dairy farmers following previous agreements. While politically expedient, that approach entrenches inefficiency. It inflates quota values, pushes farm", "Image_URLs": "docs/images/star_phoenix_1.jpg"}, {"Source": "BBC News - World", "Title": "Iran will continue to defend itself against aggression, ambassador to UK says", "Date": "Sat, 07 Mar 2026 14:11:37 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cq6qp458zv1o?at_medium=RSS&at_campaign=rss", "Summary": "Iran\u2019s ambassador to the UK stated that Iran will continue to defend itself if US and Israeli aggression persists, despite Iran\u2019s president apologizing to Gulf neighbors and promising to stop attacks. Iran considers facilities used against it legitimate targets and will respond to ongoing aggression, emphasizing its right to strike military bases in the region. The conflict has led to regional strikes and US-Israel retaliations.", "Content": "Iran will continue to defend itself if the aggression from the American and Israeli side continues, the Iranian ambassador to the UK has told the BBC. While on Saturday Iran's president apologized to its Gulf neighbors and promised to stop attacks, Seyed Ali Mousavi stated that their policy remains to \"defend themselves.\"\n\nAfter days of strikes across the Middle East causing disruption and damage in many countries, Mousavi said that \"if facilities or properties or bases are used against the Iranian nation,\" they would be considered \"legitimate targets.\" In recent hours, Gulf countries including Qatar and the UAE have been hit by Iran, while the US and Israel have continued their attacks as the war enters a second week.\n\nIn an interview with the BBC to be broadcast on Sunday, Mousavi was asked if Iran would stop its attacks on military bases outside Israel in other parts of the Middle East. He said there is \"willingness from the Iranian side not to strike, not to attack our neighbors,\" but maintained that Iran had the right to continue striking targets across the region where there were military bases.\n\nMousavi said Iran's response \"depends on the activities of the Americans and the Israeli regime.\" He added, \"If the aggression\u2026 continues, there is no doubt we will defend ourselves. And if they want to use these military bases \u2014 although we don't want to do that \u2014 there is no doubt we will defend ourselves accordingly.\"\n\nIt has been more than seven days since the US and Israel began strikes on Iran, which led Tehran to retaliate with its own attacks across the region. Kuwait, the United Arab Emirates, Saudi Arabia, Bahrain, Oman, and Iraq have all been hit, as has an RAF base in Cyprus.\n\nIt is rare for the leadership of a country like Iran to apologize publicly, and it is also uncommon for a representative of Iran to agree to be interviewed. Following President Masoud Pezeshkian's apology, Iran's ambassador to the UK agreed to speak with the BBC and invited the interview to take place at Iran's embassy in London, a building with a history marked by tension between Iran and the West. The embassy is the site of a 1980 siege where five Iranian gunmen were killed after a raid by SAS commandos, resulting in the release of nineteen hostages, one of whom died and two were injured in the crossfire. The gunmen belonged to a dissident Iranian group opposed to Ayatollah Khomeini.", "Image_URLs": "docs/images/bbc_1.jpg"}, {"Source": "New York Times - World", "Title": "Mideast Fighting: Live Updates: Trump Vows to Hit Iran Harder", "Date": "Sat, 07 Mar 2026 14:12:55 +0000", "Author": "The New York Times", "URL": "https://www.nytimes.com/live/2026/03/07/world/iran-war-trump-israel-lebanon", "Summary": "President Trump pledged to intensify strikes on Iran amid ongoing conflict, which has entered its second week, killing hundreds and displacing thousands. Iran\u2019s interim government refused unconditional surrender, threatening retaliation. Israel launched extensive attacks in Tehran, Lebanon, and against Hezbollah. The war has disrupted international travel, increased oil prices, and left U.S. and Iranian leaders uncertain about ending the conflict.", "Content": "President Trump vowed Iran would be \u201chit very hard\u201d on Saturday \u2014 including \u201careas and groups of people\u201d yet to be targeted since the Israeli-American joint assault began \u2014 as the spiraling war entered its second week. Mr. Trump also said Iran had \u201capologized and surrendered to its Middle East neighbors.\u201d His remarks came after a televised speech earlier on Saturday by Masoud Pezeshkian, the Iranian president who is also a member of the interim three-person council running the country.\n\nWhile the Iranian president apologized to Gulf states for shooting scores of missiles and drones at them in retaliatory strikes, Mr. Pezeshkian appeared to reject Mr. Trump\u2019s demand on Friday for unconditional surrender. \u201cThe idea that we would surrender unconditionally is a dream that our enemies will take to the grave,\u201d Mr. Pezeshkian said. And Mr. Pezeshkian cautioned that Iran reserved the right to respond against countries from whose territory Iran was attacked. That matches Iran\u2019s current justification for targeting the Gulf states \u2014 that the countries host U.S. military bases.\n\nThe mixed remarks by American and Iranian leaders left it far from clear whether an off ramp to end the war was emerging. Shortly after Mr. Pezeshkian\u2019s televised apology, air-raid sirens rang out in Bahrain and Qatar, suggesting that attacks were still ongoing.\n\nThe Israeli military said on Saturday it had launched \u201ca broad-scale wave of strikes\u201d overnight across the Iranian capital of Tehran and central Iran. Israeli attacks hit Mehrabad airport in Tehran overnight on Saturday, according to Iranian state media.\n\nJust over a week into the fighting, the U.S.-Israeli war with Iran has killed hundreds and displaced hundreds of thousands; drawn in states from Oman to Turkey; snarled international travel and shipping; and sent oil and gas prices surging.\n\nAnd President Trump\u2019s plan for the war remained very much unclear. His administration has zigzagged between outlining specific military goals for the war versus a broader attempt to oust the Iranian government.\n\nIsrael also intensified its attacks in Lebanon against Iran-backed Hezbollah militants there. Overnight, Israeli warplanes repeatedly bombarded the southern outskirts of Beirut, where the military had ordered hundreds of thousands of residents to flee or face imminent danger.\n\nThe Israeli military said its special forces had also launched a rare raid deep in eastern Lebanon to search \u2014 unsuccessfully \u2014 for the remains of Ron Arad, an Israeli soldier deemed missing in action since the 1980s. The raid prompted clashes in which at least 41 people were killed amid Israeli airstrikes, according to Lebanese officials and state media.", "Image_URLs": "docs/images/nyt_1.jpg"}, {"Source": "Laravel News", "Title": "Polyscope Is an Ai-First Dev Environment for Orchestrating Agents", "Date": "Thu, 05 Mar 2026 03:08:03 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/polyscope-is-an-ai-first-dev-environment-for-orchestrating-agents?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Beyond Code has launched Polyscope, a free AI-first development environment for orchestrating multiple AI agents simultaneously. Key features include parallel agent execution, fast copy-on-write cloning, a built-in preview browser, multi-model querying, and workspace integration. Available for macOS at getpolyscope.com, it offers free plans for solo developers and teams.", "Content": "Polyscope Is an AI-First Dev Environment for Orchestrating Agents\n\nThe team at Beyond Code has announced Polyscope, a free agent orchestration tool designed to run multiple AI agents simultaneously. \n\nFrom the announcement: \"Today we're announcing Polyscope - the free agent orchestration tool of my dreams. Run dozens of AI agents at the same time, blazing fast copy-on-write clones, a built-in preview browser you can use to visually prompt your agents, and much more.\"\n\nKey features include:\n- Running dozens of AI agents in parallel\n- Copy-on-write clones for fast agent branching\n- Built-in preview browser for visually prompting agents\n- Querying multiple models to collaborate on a question\n- Connecting workspaces to multiple repositories\n\nPolyscope is available for macOS at getpolyscope.com, offering a free plan and options for solo developers and teams.", "Image_URLs": "docs/images/laravel_2.png"}, {"Source": "Saskatoon Police News", "Title": "Hit & Run / Assault - 400 Block Witney Avenue North", "Date": "Thu, 05 Mar 2026 20:35:09 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026115", "Summary": "Police are investigating a vehicle chase and assault on Witney Avenue North on March 5, 2026. A civilian vehicle chased and struck another, after which an occupant assaulted the driver. The victim sustained non-life-threatening injuries. The fleeing vehicle was not located, and police are continuing their investigation into the incident.", "Content": "Police are investigating following a civilian vehicle chase that led to an assault. \n\nShortly before 10:00 a.m. on March 5, 2026, police were called to the 400 block of Witney Avenue North following multiple reports of altercations between the occupants of two vehicles. Information was received that a civilian vehicle had been chasing another before intentionally striking it in the 400 block of Witney Avenue. An occupant then exited the vehicle and began assaulting the driver of the vehicle that had been struck. \n\nUpon arrival, officers located the victim of the assault suffering from non-life-threatening injuries; the other involved vehicle fled prior to police arrival. \n\nThrough investigation, officers learned that a confrontational exchange took place in the area of 22nd Street West and Idylwyld Drive North between two parties before one began chasing the other in their vehicles. During the chase, multiple uninvolved parked vehicles were struck and damaged. \n\nBoth parties are believed to have been known to one another, and police are continuing to investigate.", "Image_URLs": "docs/images/saskatoon_police_6.png"}, {"Source": "Nasdaq - Original", "Title": "A Tale of Two Earnings Cycles", "Date": "Thu, 05 Mar 2026 22:45:23 +0000", "Author": "Phil Mackintosh", "URL": "https://www.nasdaq.com/articles/tale-two-earnings-cycles", "Summary": "In Q4 2025, both Nasdaq-100\u00ae and small caps showed strong earnings growth, with the Nasdaq posting 17% YoY growth and small caps reversing previous losses. The Nasdaq's growth was less affected by inflation and rate hikes, benefiting from higher margins. Small caps recovered from margin pressures and rising interest costs, with both expected to maintain positive growth outlooks.", "Content": "Earnings: A Tale of Two Earnings Cycles\n\nThe fourth quarter of 2025's earnings season continued a recent trend: the Nasdaq-100\u00ae large caps and S&P 600 small caps both experienced strong earnings growth. However, beyond the headline numbers, the drivers of these earnings trends are quite different.\n\nBoth large and small caps are showing strong earnings growth now. The Nasdaq-100\u00ae posted 17% year-over-year earnings growth in Q4 2025, extending its streak to 11 consecutive quarters of at least 15% growth. In contrast, small caps had experienced 11 straight quarters of negative earnings growth from Q3 2022 through Q1 2025. But the trend reversed in Q2 2025, and Q4 marked its third consecutive quarter of positive earnings growth.\n\nLooking ahead, consensus estimates project the Nasdaq-100\u00ae to continue its streak of 15%+ earnings growth over the next year, with small caps also expected to maintain their positive trajectory. Despite both indexes showing strong growth today, the underlying drivers differ significantly.\n\nThe Nasdaq-100\u00ae has been less sensitive to headwinds that pushed small caps into recession. Earnings growth can be broken down into three components: earnings before interest and taxes (EBIT), interest costs, and taxes and other items. Analyzing last twelve months (LTM) data reveals notable differences.\n\nSmall caps faced multiple headwinds over the past few years. They experienced negative EBIT growth due to margin pressures from high inflation and wage increases, along with less pricing power. Rising interest costs, driven by Federal Reserve rate hikes from 2022 to 2024, also impacted them. Recently, as inflation and wages slowed, EBIT growth turned positive, aided by Fed rate cuts that stabilized interest costs, which are expected to decline further.\n\nIn contrast, the Nasdaq-100\u00ae appeared less affected by these headwinds, largely because large caps tend to operate with higher margins, making increased input costs less impactful.", "Image_URLs": "docs/images/nasdaq_original_4.jpg"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Hwy 11 North Bound Lanes", "Date": "Thu, 05 Mar 2026 23:24:40 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026116", "Summary": "Saskatoon Police reopened one eastbound lane on Circle Drive and one northbound lane on Highway 11 after damage from a semi-trailer collision. No injuries occurred. Traffic restrictions remain, with delays expected. The incident involved a high semi entering the city, causing damage and closures until assessments are completed. Motorists are advised to take alternate routes.", "Content": "The Saskatoon Police Service has announced that one eastbound lane on Circle Drive and one northbound lane on Highway 11 have been opened for traffic following recent damage assessments. \n\nThe collision investigation is being conducted by the Saskatoon Police Service Collision Analyst Unit in cooperation with the Saskatchewan Highway Patrol. No injuries were reported in the incident.\n\nTraffic flow restrictions remain in place until further notice. Motorists are advised to take alternate routes or expect delays in the area.\n\nThe incident involved a semi-trailer carrying equipment in the northbound lane of Highway 11 from Regina, which entered the city limits at the Circle Drive overpass. The vehicle was too high for the structure, causing significant damage.\n\nAs a result, the northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge are closed until city engineers assess the damage and determine if it is safe for travel. Motorists are advised to seek alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_4.png"}, {"Source": "Smashing Magazine", "Title": "Now Shipping: Accessible UX Research, A New Smashing Book By Michele Williams", "Date": "Tue, 03 Mar 2026 15:00:00 GMT", "Author": "hello@smashingmagazine.com (Ari Stiles)", "URL": "https://smashingmagazine.com/2026/03/accessible-ux-research-release/", "Summary": "The book *Accessible UX Research* by Dr. Michele Williams offers practical guidance on conducting inclusive user research, emphasizing testing with diverse users and assistive technologies. It provides tips for beginners, insights for accessibility professionals, and understanding for developers and managers. The guide aims to improve research effectiveness, inclusivity, and product impact without being a checklist, addressing common concerns about inclusion and bias.", "Content": "Good UX research is at the root of great products. It takes the guesswork out of our designs and helps us solve problems before they grow. One of the best ways to make our research effective is to keep it inclusive\u2014testing with users with different needs and abilities, and using their feedback to build products that work for more people.\n\nOur newest book, *Accessible UX Research*, can help you plan and execute great user research. Dr. Michele Williams draws from years of experience to build a clear, easy-to-follow roadmap. This book has something for everyone who wants to build digital products well:\n\nIf you are just getting started with research, you will find helpful tips for making your research more inclusive. You will also get a primer on how to ask better questions, understand your own biases, and how to use your limited time and budget effectively.\n\nIf you are an accessibility-minded professional, you will find a deep well of details on different assistive technologies, how to include them in your testing environment, and ways to record and share your results to create a real impact on the products you make.\n\nIf you are a developer, a manager, or someone who wants to understand how different abilities impact each user\u2019s experience, you will find the history, clear descriptions, and cultural touchpoints needed to make sense of all the accessibility and inclusion recommendations you encounter.\n\nThe book isn\u2019t a checklist for you to complete as part of your accessibility work. It\u2019s a practical guide to inclusive UX research, from start to finish. If you\u2019ve ever felt unsure how to include disabled participants, or worried about \u201cgetting it wrong,\u201d this book is for you. You\u2019ll get clear, practical strategies to make your research more inclusive, effective, and reliable.\n\nInside, you\u2019ll learn how to plan research.", "Image_URLs": "docs/images/smashing_2.png"}, {"Source": "Laravel News", "Title": "Filament v5.3.0 Released with Deferred Tab Badges and Column Manager Improvements", "Date": "Wed, 04 Mar 2026 03:31:31 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/filament-v5-3-0?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Filament v5.3.0 adds ten features, including deferred tab badge loading, modal and slideover column management, customizable Rich Editor file attachments, and sort loading indicators. It expands rate limiting to user ID and email, enhances navigation group definitions with PHP enums, and introduces a Callout controls slot. Bug fixes improve sidebar state restoration and chart widget translations.", "Content": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, column manager modal and slideover support, enhancements to Rich Editor plugins, and sort loading indicators on table columns.\n\nDeferred tab badge loading allows badge counts to load independently from tab content, improving performance by avoiding unnecessary database queries on page load when badge values are expensive to compute.\n\nThe column manager now supports displaying in a modal or slideover, providing alternative layout options beyond the default dropdown for managing table column visibility.\n\nRich Editor plugins can now supply their own file attachment providers, enabling custom upload and storage behavior directly within the editor without external configuration. Additionally, plugins can control the visibility and state of toolbar buttons for more granular editing control.\n\nTable columns now feature a loading spinner on sort icons during sorting operations, offering visual feedback when sorting takes a moment to complete.\n\nRate limiting configurations have been expanded to support user ID and email address as keys, supplementing existing IP-based options. Navigation groups can now accept Unit Enum values, simplifying the definition of navigation groups using PHP enums.\n\nThe Callout component gains a controls slot, allowing custom action buttons or content to be added alongside callout messages. Resources now support additional configuration options, and the component color palette has been extended with more Tailwind CSS color choices.\n\nBug fixes include correct restoration of sidebar state on desktop page loads and the addition of missing chart widget translations.", "Image_URLs": "docs/images/laravel_3.png"}, {"Source": "ESPN NFL News", "Title": "Sources: Ravens to acquire Crosby in blockbuster", "Date": "Fri, 6 Mar 2026 23:24:11 EST", "Author": "Jamison Hensley", "URL": "https://www.espn.com/nfl/story/_/id/48127564/sources-raiders-trade-maxx-crosby-ravens-two-1sts", "Summary": "The Baltimore Ravens traded first-round picks in 2026 and 2027 to acquire five-time Pro Bowl defensive end Maxx Crosby from the Las Vegas Raiders, marking their first trade for a veteran using a first-round pick. Crosby, 28, will bolster a weak pass rush, aiming to improve their postseason prospects after a disappointing 2025 season. The deal is pending a physical.", "Content": "In the biggest trade in franchise history, the Baltimore Ravens are acquiring five-time Pro Bowl defensive end Maxx Crosby from the Las Vegas Raiders for first-round picks in 2026 and 2027, sources told ESPN's Adam Schefter on Friday night. The deal is contingent on Crosby passing a physical, which can't occur until the start of the new league year Wednesday.\n\nThis marks the first time in the Ravens' 31-year existence that they have used a first-round pick to trade for a veteran player. Baltimore had the No. 14 pick in this year's draft. Among the teams the Ravens beat out for Crosby were the Dallas Cowboys, who were willing to offer a first- and a second-round pick for the star pass rusher.\n\nCrosby, 28, significantly upgrades a struggling Ravens pass rush that in 2025 totaled 30 sacks, Baltimore's fewest in 15 years. Last season was also the first time since the Ravens' inaugural 1996 campaign that they didn't have an edge rusher with more than 4.5 sacks.\n\nThe Ravens are making this uncharacteristic offseason splash after a disappointing 2025 season in which they finished 8-9, failed to make the playoffs, and fired longtime coach John Harbaugh. Baltimore has been looking for a game changer, such as Crosby, to get over the postseason hurdle and reach the Super Bowl for the first time since the 2012 season.\n\nThe addition of Crosby gives the Ravens their most decorated and feared pass rusher in his prime since Terrell Suggs, the franchise's all-time sacks leader who played in Baltimore from 2003 to 2018. Crosby has produced four double-digit sack seasons in his seven-year career. Over that span, the Ravens have had two edge rushers with 10 or more sacks in a season: Kyle Van Noy (12.5 in 2024) and Odafe Oweh (10 in 2024).\n\nThis is a huge addition for new Ravens coach Jesse Minter, who will call plays on defense. Since entering the NFL in 2019, Crosby has 360 quarterback pressures, which is 29 more than the next-closest player, according to ESPN Research.\n\nThe Ravens have been reluctant to give up coveted draft capital because of their philosophy of building through the draft. Before Baltimore landed Crosby, the highest draft pick it had given up was a second-rounder for middle linebacker Roquan Smith in 2022.", "Image_URLs": "docs/images/espn_nfl_3.jpg"}, {"Source": "The Hockey Writers", "Title": "What Is Nico Hischier\u2019s Future With the New Jersey Devils?", "Date": "Sat, 07 Mar 2026 14:05:00 +0000", "Author": "Devora Slonim", "URL": "https://thehockeywriters.com/what-is-nico-hischier-future-with-the-new-jersey-devils/", "Summary": "Nico Hischier, the captain of the New Jersey Devils since 2022, is set to become a free agent after the 2026-27 season unless the team extends his contract. Signed in 2019 for seven years at $50.75 million, he is a top two-way center and franchise leader. His future contract negotiations could impact both his career and the team's long-term success.", "Content": "For nearly a decade, Nico Hischier has been the centerpiece of the New Jersey Devils\u2019 rebuilding era. Drafted first overall in 2017, the Swiss center quickly became the face of the franchise and later the team\u2019s captain. His leadership, two-way ability, and consistency have made him one of the most important players in the organization.\n\nA significant milestone is slowly approaching. Hischier\u2019s current contract expires at the end of the 2026-27 season, which would make him an unrestricted free agent in 2027 if a new deal is not reached before then. That reality means the Devils may soon face a major decision: extend their captain long term, or risk losing one of the most important players in franchise history to free agency. While the most likely outcome remains a contract extension in New Jersey, the team\u2019s inconsistent success during Hischier\u2019s tenure could complicate things.\n\nFor a player who has become the heartbeat of the Devils franchise, the coming seasons could determine not only the next chapter of his career but also the long-term trajectory of the team itself.\n\nHischier\u2019s Contract Timeline\n\nIn October 2019, Hischier signed a seven-year, $50.75 million contract extension with the Devils, carrying a $7.25 million annual cap hit. The deal was viewed as a cornerstone move for a rebuilding franchise that believed Hischier would be part of its long-term foundation. The contract also includes a modified ten-team no-trade clause, further emphasizing the team\u2019s commitment to him as a central piece of its future.\n\nWhen the extension was signed, Hischier was only 20 years old and already viewed as a leader within the organization. At just 22 years old, he was named the 12th captain in Devils\u2019 franchise history.\n\nA Talented Player and Complete Center\n\nSince entering the NHL, Hischier has firmly established himself as one of the league\u2019s premier two-way centers. Over 589 career games, he has accumulated 191 goals and 467 points, consistently ranking among the top three point-getters on his team season after season. But Hischier\u2019s value extends far beyond his offensive production \u2014 he is widely regarded as one of the most complete players in the game.\n\nHischier\u2019s defensive prowess has not gone unnoticed. He is frequently assigned to the toughest defensive matchups, often facing the opposition\u2019s top lines and shutting down elite scorers. He excels in all aspects of the game, including special teams, key faceoffs, and driving possession across all three zones. His exceptional two-way play earned him recognition as a Selke Trophy finalist during the 2022-23 season, awarded to the best defensive forward, highlighting his status as one of the league\u2019s best all-around players.\n\nThis season, Hischier leads the NHL in faceoffs won with 1,341 and maintains an impressive 55.5% win rate. These numbers illustrate not only his skill but also his consistency in controlling the pace of the game.", "Image_URLs": "docs/images/hockey_writers_3.jpg"}, {"Source": "The Hockey Writers", "Title": "NHL Rumours: Treliving\u2019s Failure, Kadri Deal Details & Blues Investigation", "Date": "Sat, 07 Mar 2026 14:15:00 +0000", "Author": "Jacob Billington", "URL": "https://thehockeywriters.com/nhl-rumours-treliving-failure-kadri-deal-details-blues-investigation/", "Summary": "NHL rumors highlight Toronto Maple Leafs GM Brad Treliving\u2019s criticized trade deadline, admitting failure and frustration over late deals, including trades for Bobby McMann and Scott Laughton. The Colorado Avalanche and Calgary Flames negotiated a Nazem Kadri deal, while the St. Louis Blues investigated a leak about Colton Parayko\u2019s potential trade. Several expected moves, like Robert Thomas and Sergei Bobrovsky, did not occur, amid surprise trades like John Carlson to the Ducks.", "Content": "In today\u2019s NHL rumour rundown, we start with the Toronto Maple Leafs and their general manager, Brad Treliving, and the criticism he has faced over his trade deadline execution. Next, we head to the Colorado Avalanche and Calgary Flames, who hashed out a Nazem Kadri deal after a tough negotiation. Finally, the St. Louis Blues have reportedly held an internal investigation to determine the source of a leak regarding the Colton Parayko deal he nixed, which would have sent him to the Buffalo Sabres.\n\nMany teams were busy on deadline day, but not everyone was able to achieve their desired outcomes. Some players like Robert Thomas, Rasmus Ristolainen, Sergei Bobrovsky, and others were expected to be moved but weren\u2019t. Meanwhile, there were several surprise moves, including John Carlson heading to the Anaheim Ducks. Here are the biggest rumours from one of the busiest days of the season.\n\nTreliving Admits Failure on Deadline Day\n\nIt is customary for general managers to address the media after the 3:00 p.m. trade deadline, and while Treliving has done so many times before, his attitude during his March 6 press conference was notably different. Speaking about both the trade deadline and the team\u2019s disappointing season, he took ownership, stating, \u201cThe failures here start with me.\u201d\n\nThere is significant frustration with the Maple Leafs\u2019 deadline moves, or lack thereof. It took until the final moments for Treliving to complete two highly anticipated trades, sending Bobby McMann to the Seattle Kraken and Scott Laughton to the Los Angeles Kings.\n\nRegarding McMann, the market earlier in the week suggested a higher price than the second- and fourth-round picks received for him. While the full details of earlier trade negotiations are unclear, it appears Treliving may have overextended his patience, leading to a less favorable deal.\n\nSimilarly, Laughton was traded for a conditional third-round pick, which has a 32.6 percent chance of becoming a second-round pick if the Kings make the playoffs, according to Money Puck\u2019s odds. The Maple Leafs also gave up a first-round pick and prospect Nikita Grebennikov, and just a year later, received a modest return for him.\n\nFinding a first-round pick along with a fifth-round pick for Nicolas Roy provides some relief, but considering that was all they could secure for Mitch Marner, there is reason for disappointment in Treliving\u2019s decisions. Of course, trades involve two willing teams, but with Calle Jarnkrok, Nick Robertson, Simon Benoit, and Troy, the overall outcome has drawn scrutiny.", "Image_URLs": "docs/images/hockey_writers_2.jpg"}, {"Source": "The Hockey Writers", "Title": "Roadrunners Report: Putting the \u201cRoad\u201d in Roadrunners, Training Camp 2.0, & More", "Date": "Sat, 07 Mar 2026 14:25:00 +0000", "Author": "Chase Beardsley", "URL": "https://thehockeywriters.com/roadrunners-report-putting-the-road-in-roadrunners-training-camp-2-0-and-more/", "Summary": "The Tucson Roadrunners, trailing the Henderson Silver Knights by one point for a playoff spot, finished February with a 4-5 record amid frequent road games due to the Tucson Gem and Mineral Show. Despite a challenging schedule, team bonding opportunities arose through travel. They sit seventh in the Pacific Division with 56 points, with March being crucial for playoff contention.", "Content": "Less than two months remain in the AHL season, and the Tucson Roadrunners are in the thick of it. Leading the Henderson Silver Knights for the final playoff spot in the Pacific Division by a single point, March is shaping up to be a big month for the Utah Mammoth\u2019s American Hockey League (AHL) affiliate after a mediocre February.\n\nIn February, the Roadrunners went 4-5-0 across their nine games. They finished the month by going 0-2-0 at home and 4-3-0 on the road. They sit seventh in the division with an overall record of 24-20-8 and 56 points.\n\nFebruary\u2019s Results\n\nIn January, the Roadrunners played a majority of their games at home because of upcoming events. February\u2019s annual gem show in Tucson once again forced the team to play most of their games on the road, including trips to Alberta and Southern California. The team did spend some off days practicing in Arizona, traveling to Chandler when needed.\n\nHere are the results from February:\n- 5-1 loss @ Ontario\n- 7-3 win @ Calgary\n- 6-5 win (OT) @ Calgary\n- 6-1 loss @ Coachella Valley\n- 3-2 win @ Coachella Valley\n- 4-2 loss vs Ontario\n- 5-3 loss vs Ontario\n- 2-1 win (OT) @ San Diego\n- 5-3 loss @ San Jose\n\nThe Impact of the Tucson Gem and Mineral Show\n\nEvery February, the Tucson Gem and Mineral Show takes place at the Tucson Convention Center. As the oldest recurring event in Tucson, it has celebrated 71 consecutive years this month. The show is a significant revenue generator for the city, attracting hundreds of visitors, which boosts sales at golf courses, restaurants, and other local businesses.\n\nDue to the show's importance, the Roadrunners are displaced from their home arena each season, forcing most of their games to be played on the road. During February, the team was active across the West Coast, with trips to Southern California, Calgary, and Northern California. Despite the hectic schedule, many players appreciated the opportunity to bond through travel. With numerous callups and injuries this season, team bonding has been limited, making these trips valuable.\n\n\u201cYou\u2019re around the team more for meals, breakfast, morning skates, and on the bus,\u201d said Cameron Hebig. \u201cIt\u2019s a chance to learn from your teammates and bond that way. It\u2019s fun to get on the road and get in the hotel with the guys.\u201d\n\nJack Ricketts, who was called up from the ECHL\u2019s Utah Grizzlies in late January, has been kept with the team despite roster changes. Traveling has allowed him to get to know his new teammates better and gain valuable experience.", "Image_URLs": "docs/images/hockey_writers_1.jpg"}, {"Source": "ESPN NFL News", "Title": "Crosby to the Ravens: What's next for both teams, plus offseason implications", "Date": "Sat, 7 Mar 2026 08:11:19 EST", "Author": "Jamison Hensley, Ryan McFadden, Dan Graziano, Matt Miller", "URL": "https://www.espn.com/nfl/story/_/id/48127938/las-vegas-raiders-trade-maxx-crosby-baltimore-ravens-questions-draft-free-agency", "Summary": "The Raiders traded defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks. Crosby, a five-time Pro Bowler with 69.5 career sacks, made a notable impact in a 2024 game against Baltimore. The Ravens sought to boost their pass rush, emphasizing the need for a ferocious defense.", "Content": "The Raiders agreed to trade defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks, sources told ESPN's Adam Schefter on Friday night.\n\nAs a defensive end for the Las Vegas Raiders, Crosby went into Baltimore in September 2024 and made a significant impact in a 26-23 upset win against the Baltimore Ravens. He finished with six tackles, four tackles for loss, and two sacks, including one in which he looped through the middle and flattened quarterback Lamar Jackson on his back.\n\nThe Ravens wanted to bring that ferocious pass rush to Baltimore so badly that they acquired Crosby from the Raiders in exchange for first-round picks in 2026 and 2027, sources told ESPN's Adam Schefter.\n\nCrosby, 28, is a five-time Pro Bowler and will be a game changer for the Ravens. His 69.5 career sacks since 2019 are more than double what anyone has produced in Baltimore over that span, with defensive tackle Nnamdi Madubuike leading the Ravens with 30 sacks since 2019.\n\nAt the NFL combine, Ravens general manager Eric De Costa emphasized that upgrading at edge rusher was a priority for Baltimore this offseason. \"When we look at the best defenses, we see ferocious pass rush, and that was lacking this year for different reasons,\" De Costa said in February.", "Image_URLs": "docs/images/espn_nfl_2.jpg"}, {"Source": "ESPN NFL News", "Title": "Solak: Why Maxx Crosby fits perfectly with the Ravens' defense -- and their Super Bowl window", "Date": "Sat, 7 Mar 2026 08:11:19 EST", "Author": "Ben Solak", "URL": "https://www.espn.com/nfl/story/_/id/48129144/2026-nfl-free-agency-trade-maxx-crosby-ravens-raiders-defense-minter-lamar", "Summary": "The Baltimore Ravens traded 2026 and 2027 first-round picks to acquire veteran edge rusher Maxx Crosby from the Raiders, marking their first-ever first-round trade for a non-quarterback. Crosby, an elite pass rusher, addresses Baltimore's weak pass rush and boosts their Super Bowl chances, ending a long drought of impactful edge rushers since Terrell Suggs.", "Content": "Multiple authors\n\nFor the weeks that rumors swirled around Las Vegas Raiders edge rusher Maxx Crosby's trade market, many teams flickered in and out of contention. The Cowboys, The Eagles, The Bears, The Lions, The Patriots\u2014all were priced out by the one team that would never, ever overpay in the NFL trade market. The one team that would never send first-round picks for a non-quarterback: the Baltimore Ravens.\n\nHere they are in uncharted waters. Crosby is the first veteran player that the Ravens have ever traded a first-round pick to acquire, and they thought he was so valuable they did it twice. ESPN's Adam Schefter reports that Baltimore is trading its 2026 and 2027 first-round selections to the Raiders for Crosby, marking the first big splash of the 2026 offseason.\n\nAs with all trades that include multiple first-round picks, this is probably a bad idea. It is always safer to draft and develop young, cost-controlled talent. That's the long-term view. It's sober and wise. At this exact moment, I do not care for it, though. I think it's incredibly fun that a player of Crosby's specific skill set has landed on a team like the Ravens, who so desperately need a jolt to get over the AFC playoff hump and appear in a Super Bowl. Crosby is a truly elite player at a premium position, and his presence on the Ravens' defense vaults the team from the middle of a crowded AFC playoff picture to the front on the line.\n\nLet's size up how he fits into both this defense and Baltimore's Super Bowl timeline.\n\nI don't think there's a team in football that needed Crosby more than the Ravens. They had 30 sacks last season, tied with the Cardinals and Panthers for the third fewest in the league. Their 29.9% pass rush win rate ranked fifth worst. It has been hard for Baltimore to find a good edge rusher. It has spent at least a fourth-round pick on an outside rusher in each of the past five drafts: Mike Green (2025), Adisa Isaac (2024), Tavius Robinson (2023), David Ojabo (2022), and Odafe Oweh (2021). The best season it has gotten out of that group was the 10-sack campaign Oweh had in 2024. But one year later, the Ravens flipped him to the Chargers at the trade deadline. Veterans such as Jadeveon Clowney (9.5 sacks in 2023) and Kyle Van Noy (12.5 in 2024) have held the roles admirably, but the Ravens have not rostered a field-tipping edge rusher since Terrell Suggs in 2017.", "Image_URLs": "docs/images/espn_nfl_1.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
