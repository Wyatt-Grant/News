n 2012, Smashing Conf has emphasized practical, real-world workflows. Unlike traditional conferences that rely on polished slide decks, Smashing Conf encourages speakers to demonstrate their actual work processes live\u2014coding, designing, and troubleshooting in real-time\u2014to provide actionable insights.\n\nThe conference aims to foster a spirit of curiosity and community, celebrating the Dutch concept of \"Gezelligheid,\" which encompasses coziness, conviviality, and a warm, inviting atmosphere. Attendees can expect to learn from industry experts, see live demonstrations, and engage with the latest trends in design and development.\n\nTickets are available in-person for \u20ac724.79, with options to save up to 25% through a Smashing Membership. An online pass costing \u20ac200 provides access to live talks and behind-the-scenes content, including video recordings.", "Image_URLs": "docs/images/smashing_5.png"}, {"Source": "Nasdaq - Original", "Title": "The SIP Formula Is Broken and Everyone Knows It", "Date": "Thu, 26 Feb 2026 22:20:07 +0000", "Author": "Phil Mackintosh", "URL": "https://www.nasdaq.com/articles/sip-formula-broken-and-everyone-knows-it", "Summary": "The article explains that the SIP (Securities Information Processor) formula is flawed, as it rewards data providers without adding corresponding value for investors. While the SIP has improved transparency and liquidity, its current economics favor professional and electronic traders over retail investors. Research indicates that quotes are twice as important as trades in price discovery, highlighting the misalignment in the current system.", "Content": "Market Infrastructure: The SIP Formula Is Broken and Everyone Knows It\n\nFebruary 26, 2026 \u2014 05:20 pm EST\n\nInvestors around the world know that it's important to know what the right prices for stocks are, and ideally, that they don\u2019t end up paying too much for the stocks they are buying. In the U.S., solving that problem included creating a consolidated tape (also known as Securities Information Processor, or SIP) and a National Best Bid and Offer (NBBO) as part of Reg NMS.\n\nThe SIP has been undeniably good for the public. By consolidating all the best prices, it protected investors, reduced trading costs and complexity. That, in turn, arguably improved liquidity, helping attract more companies to U.S. public markets. But the NBBO isn\u2019t a \u201cfree service.\u201d It is a result of venues and traders who decide to advertise their liquidity publicly. To their credit, regulators at the time realized that those providing data to the public should be rewarded and incentivized.\n\nHowever, as we show today, the market has evolved in ways that take advantage of economics\u2014usually without adding the desired compensating value to the public, who expect that they are paying for good NBBO quotes. The SIP formula works to reward those providing its data. We have detailed how the SIP economics work here. At a basic level, the SIP charges different kinds of users different prices based on how much that data helps those users. Professionals pay more than retail investors. Electronic trading systems pay more than professionals. It then rewards those who contribute data to the SIP. Because both quotes and trades contain essential signals about a stock\u2019s value and market interest, the current formula splits revenue evenly: 50% to trades, 50% to quotes, with relatively more money allocated to less-liquid stocks that need market makers more. The totals are shown in Chart 1.\n\nChart 1: The SIP charges data users and pays data producers based on a formula. Note that \u201cnon-display\u201d data, which we will talk about later, is based on the \u201cuse\u201d (for routing, trade pricing, and benchmarking) of the data by computers, rather than display (on screens) for brokers or customers. This suggests quotes are twice as important as trades.\n\nA number of well-known academics have thought deeply about price discovery\u2014and many are also pretty good at math. What their research shows is that, for most stocks, quotes matter around twice as much as trades. This makes sense when you consider that the trades in the market are often using NBBO prices. (For example, midpoint trades only occur at that price because it\u2019s in the middle of the NBBO at the time.) Chart 2: Some research suggests quotes are twice as important as trades. The more detailed math done in Brogaard\u2019s study is of interest.", "Image_URLs": "docs/images/nasdaq_original_12.jpg"}, {"Source": "Smashing Magazine", "Title": "Now Shipping: Accessible UX Research, A New Smashing Book By Michele Williams", "Date": "Tue, 03 Mar 2026 15:00:00 GMT", "Author": "hello@smashingmagazine.com (Ari Stiles)", "URL": "https://smashingmagazine.com/2026/03/accessible-ux-research-release/", "Summary": "*Accessible UX Research* by Dr. Michele Williams offers a practical guide to inclusive user research, emphasizing testing with diverse users and assistive technologies. It provides tips for beginners on asking better questions and managing biases, and detailed insights for accessibility professionals and developers. The book aims to help create more effective, inclusive digital products through comprehensive research strategies.", "Content": "Good UX research is at the root of great products. It takes the guesswork out of our designs and helps us solve problems before they grow. One of the best ways to make our research effective is to keep it inclusive\u2014testing with users with different needs and abilities, and using their feedback to build products that work for more people.\n\nOur newest book, *Accessible UX Research*, can help you plan and execute great user research. Dr. Michele Williams draws from years of experience to build a clear, easy-to-follow roadmap. This book has something for everyone who wants to build digital products well:\n\nIf you are just getting started with research, you will find helpful tips for making your research more inclusive. You will also get a primer on how to ask better questions, understand your own biases, and how to use your limited time and budget effectively.\n\nIf you are an accessibility-minded professional, you will find a deep well of details on different assistive technologies, how to include them in your testing environment, and ways to record and share your results to create a real impact on the products you make.\n\nIf you are a developer, a manager, or someone who wants to understand how different abilities impact each user\u2019s experience, you will find the history, clear descriptions, and cultural touchpoints you need to make sense of all the accessibility and inclusion recommendations you encounter.\n\nThe book isn\u2019t a checklist for you to complete as part of your accessibility work. It\u2019s a practical guide to inclusive UX research, from start to finish. If you\u2019ve ever felt unsure how to include disabled participants, or worried about \u201cgetting it wrong,\u201d this book is for you. You\u2019ll get clear, practical strategies to make your research more inclusive, effective, and reliable.\n\nInside, you\u2019ll learn how to plan research.", "Image_URLs": "docs/images/smashing_2.png"}, {"Source": "Laravel News", "Title": "Filament v5.3.0 Released with Deferred Tab Badges and Column Manager Improvements", "Date": "Wed, 04 Mar 2026 03:31:31 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/filament-v5-3-0?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading for improved performance, flexible column manager modals, customizable Rich Editor plugins, and visual sorting indicators on tables. It also adds expanded rate limiting options, support for PHP enums in navigation, a new controls slot in Callout components, and extended color palettes. Bug fixes address sidebar state restoration and missing translations.", "Content": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, column manager modal and slideover support, enhancements to Rich Editor plugins, and sort loading indicators on table columns.\n\nDeferred tab badge loading allows badge counts to load independently from tab content, improving performance by avoiding unnecessary database queries on page load when badge values are expensive to compute.\n\nThe column manager now supports displaying in a modal or slideover, providing layout options beyond the default dropdown for managing table column visibility.\n\nRich Editor plugins can now supply their own file attachment providers, enabling custom upload and storage behavior directly within the editor without external configuration. Additionally, plugins can control the visibility and state of toolbar buttons for more granular editing controls.\n\nTable columns now feature a loading spinner on sort icons during sorting operations, offering visual feedback when sorting takes a moment to complete.\n\nRate limiting configurations have been expanded to support user ID and email address keys, complementing existing IP-based options. Navigation groups now accept Unit Enum values, simplifying the definition of navigation groups using PHP enums.\n\nThe Callout component has gained a controls slot, allowing custom action buttons or content to be added alongside callout messages. Resources now support additional configuration options, and the component color palette has been extended with more Tailwind CSS color options.\n\nBug fixes include correct restoration of sidebar state on desktop page loads and the addition of missing chart widget translations.", "Image_URLs": "docs/images/laravel_3.png"}, {"Source": "Saskatoon Police News", "Title": "Evade Police/Impaired Driving - McPherson Ave, Preston Ave.", "Date": "Wed, 04 Mar 2026 16:09:08 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026113", "Summary": "A 41-year-old Saskatoon man faces multiple charges after evading police during a reckless incident on March 4, 2026. After a traffic stop, he fled on foot and in a vehicle, which was driven dangerously and damaged tires. He was arrested, found to be wanted on warrants, and suspected of being under the influence of methamphetamine. Charges include impaired driving, dangerous driving, evading police, and breaching court conditions.", "Content": "A 41-year-old Saskatoon man is facing multiple charges following an incident in which a driver evaded police overnight.\n\nAt approximately 1:00 a.m., March 4, 2026, an officer on patrol spotted a suspicious vehicle in the 500 block of 8th Street East. The officer attempted a traffic stop of a black Chrysler 200 when it turned onto McPherson Avenue. The driver was slow to pull over, and when he did, a male and a female exited the vehicle and fled on foot. The driver then sped away as the officer approached the vehicle. The suspect vehicle evaded police and was driven recklessly in the area of Wilson Crescent and Preston Avenue. \n\nThe driver attempted to overtake a snowplow but lost control after tires had been damaged earlier in the incident, ending up on the median. The male then tried to flee on foot but was apprehended. He was found to be wanted on several warrants and is believed to have been under the influence of methamphetamine at the time.\n\nThe man is now charged with possession of bear spray, impaired driving, dangerous driving, evading police, and breaching court conditions twice.", "Image_URLs": "docs/images/saskatoon_police_10.png"}, {"Source": "Saskatoon Police News", "Title": "Update - Additional Arrest - Homicide - 1700 Block 20th Street West", "Date": "Wed, 04 Mar 2026 17:12:50 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026114", "Summary": "A 26-year-old man has been charged with aggravated assault and manslaughter in connection with a February 3, 2026, homicide and will appear in court. An 18-year-old previously charged with manslaughter was arrested on February 26, 2026, and now faces charges including accessory after the fact, public mischief, and obstruction of justice, with manslaughter and assault charges withdrawn. The investigation continues.", "Content": "A second male has been charged in connection to a February 3, 2026, homicide. A 26-year-old male is charged with aggravated assault and manslaughter. He will appear in court this afternoon.\n\nA man previously charged in the homicide investigation is now facing new charges. On February 26, 2026, investigators attended a correctional facility in Saskatoon and arrested an 18-year-old man who was previously charged with manslaughter in relation to the February 3rd homicide. He is now charged with accessory after the fact to manslaughter, accessory after the fact to aggravated assault, public mischief, and obstruction of justice. The charges of manslaughter and aggravated assault have been withdrawn.\n\nThe Major Crime Unit continues to investigate.", "Image_URLs": "docs/images/saskatoon_police_8.png"}, {"Source": "The Hockey Writers", "Title": "Grading the Maple Leafs & Kings\u2019 Scott Laughton Trade", "Date": "Fri, 06 Mar 2026 21:45:07 +0000", "Author": "Spencer Lazary", "URL": "https://thehockeywriters.com/grading-the-maple-leafs-kings-scott-laughton-trade/", "Summary": "The Toronto Maple Leafs traded Scott Laughton to the Los Angeles Kings for a conditional 2026 third-round pick, aiming to recoup draft capital and free cap space. Over 24 hours, they also traded Nicolas Roy and Bobby McMann for draft picks. The moves reflect a strategy to sell assets and rebuild through the draft, with the Kings adding depth for a playoff push.", "Content": "The Toronto Maple Leafs left everything to the final buzzer. All day, Leafs Nation was wondering what deals the organization would make to help this team retool. Yesterday, they traded Nicolas Roy to the Colorado Avalanche, and today they dealt Bobby McMann to the Seattle Kraken. Now, they have announced that they have traded Scott Laughton to the Los Angeles Kings.\n\nLaughton was acquired just one year ago at the 2025 NHL Trade Deadline. Now, he is on his way out of town and heading to California to try and help the Kings push for a playoff spot down the stretch. As for the Maple Leafs, their selling of assets continues.\n\nFull Trade:\nMaple Leafs receive: Conditional 2026 third-round pick\nKings receive: Scott Laughton\n\nMaple Leafs Restocking Draft Capital\nTrade Grade: C\n\nThe Maple Leafs have made three trades over the last 24 hours, and all of them have the return be draft picks. That is ideal for Toronto, who are trying to maximize cap space heading into next season but also aim to recoup draft capital for players on expiring contracts. No fan within Leafs Nation should have expected them to pull off a hockey trade. It was always going to be a cap dump for draft picks or a massive trade for someone like Robert Thomas. It makes more sense for them to sell assets for picks and then look at how they can retool this roster in the offseason rather than trying to fix it at the deadline.\n\nBrad Treliving did have the right approach in selling their UFAs. Unfortunately, he had to budge on his asking price. He was able to get a first and a fifth for Roy, and a second and a fourth for McMann. However, he was only able to get a conditional third-round pick, which slides to a second if the Kings make the playoffs. While that is a decent return, it is significantly less than what he paid for Laughton just a season ago, which was Nikita Grebennik and a conditional 2027 first-round pick. It would have been a better return if he could have gotten a player like Alex Turcotte or even a mid-tier prospect as well as the conditional pick. Regardless, he was able to sell an expiring asset, which should set them up well in the draft. The only hope now is that the Kings can play well enough to get into the playoffs.\n\nFrom the Kings\u2019 perspective, the cost for Laughton is minimal. They are giving up a conditional third-round pick, which could become a second if they make the playoffs, and are acquiring a reliable depth center to bolster their lineup as they push for a postseason spot.", "Image_URLs": "docs/images/hockey_writers_5.jpg"}, {"Source": "The Hockey Writers", "Title": "Grading the Islanders\u2019 Trade for the Blues\u2019 Brayden Schenn", "Date": "Fri, 06 Mar 2026 22:00:00 +0000", "Author": "Alex Chauvancy", "URL": "https://thehockeywriters.com/grading-the-islanders-trade-for-the-blues-brayden-schenn/", "Summary": "The New York Islanders traded for Brayden Schenn from the St. Louis Blues, giving up a 2026 first-round pick, Jonathan Drouin, and a goaltending prospect. The move, involving Schenn's full no-trade clause waiver, is seen as questionable due to Schenn's declining performance, contract, and impact on team speed. The Blues received a strong return, maximizing Schenn's value.", "Content": "The New York Islanders have had an interesting few weeks ahead of the NHL trade deadline. Shortly before the Olympic break, they acquired Ond\u0159ej Pal\u00e1t and a couple of draft picks from the New Jersey Devils in exchange for Maxim Tsyplakov. Today, they made one of the splashier deals of Deadline Day, acquiring Brayden Schenn from the St. Louis Blues.\n\nHere are the full details:\n\nIslanders acquire: Schenn  \nBlues acquire: 2026 1st-round pick, 3rd-round pick, Jonathan Drouin, goaltending prospect Marcus Gildon\n\nSchenn had to waive his no-trade clause to join the Islanders, but it may have been better for the Islanders had he invoked it. This move is considered a head-scratcher that doesn\u2019t make much sense for where they are as an organization. As for the Blues, they made out well and got full value for their longtime captain.\n\nThe Islanders have been a surprise this season and look like a safe bet to make the playoffs. That\u2019s why GM Mathieu Darche decided to become a buyer, but it\u2019s questionable whether his moves have made the team significantly better. Pal\u00e1t\u2019s best days seem behind him, and the same is true for Schenn.\n\nSchenn has 12 goals and 28 points in 61 games this season, which is decent production, but there are red flags. His skating has declined in recent seasons, which is concerning given the Islanders\u2019 uptempo style. He also struggles in transition. His shooting ability has also fallen off over the last couple of seasons, though he remains a good playmaker and excels in faceoffs, which may have influenced the Islanders\u2019 decision to acquire him.\n\nStill, there are more cons than pros in this deal. One issue is Schenn\u2019s contract, which runs through next season at a cap hit of $6.5 million. This trade would have been more palatable if he were a rental, but the extra year complicates matters. Additionally, he makes the Islanders a slower team, adding to concerns about their pace, especially since Pal\u00e1t already did that.\n\nThe Islanders also gave up quite a bit to acquire Schenn. Drouin struggled with the Islanders and is unlikely to be missed much, but giving up a first-round pick for a declining player in his mid-30s with term is questionable asset management. Overall, skepticism remains about whether this trade will work out as intended.\n\nThe Blues, on the other hand, maximized Schenn\u2019s value. They avoided issues with no-trade clauses, as Colton Parayko\u2019s trade was blocked, and received a solid return for their longtime captain. Drouin has been productive at times over the last few seasons, despite struggling with the Islanders.", "Image_URLs": "docs/images/hockey_writers_4.jpg"}, {"Source": "The Hockey Writers", "Title": "Avalanche Acquire Nazem Kadri From Calgary Flames", "Date": "Fri, 06 Mar 2026 22:09:09 +0000", "Author": "Matteo Giuliano", "URL": "https://thehockeywriters.com/avalanche-acquire-nazem-kadri-from-calgary-flames/", "Summary": "Nazem Kadri was traded from the Calgary Flames to the Colorado Avalanche for a 2028 first-round pick, a 2027 second-round pick, Victor Olofsson, and Max Curran. The Flames will retain 20% of Kadri\u2019s $7 million salary. The Avalanche bolster their center depth, making them strong Stanley Cup contenders, while the Flames acquire valuable future assets.", "Content": "The trade deadline saw a significant move with Nazem Kadri and a 2027 fourth-round pick being traded to the Colorado Avalanche. The Calgary Flames received a 2028 first-round pick, a 2027 second-round pick, Victor Olofsson, and Max Curran. The Flames will retain 20 percent of Kadri\u2019s contract, which is $1.4 million, as part of the deal.\n\nWhat the Avalanche Are Getting\nAvalanche fans are already familiar with Kadri, who is considered an ideal third-line centre. He provides a physical presence and has demonstrated the ability to score goals even on a low-scoring team. This season, his stats include 10 goals and 29 assists in 59 games, though he scored 35 goals last season for the Flames.\n\nTrade talks around Kadri have been ongoing since his first year in Calgary, which coincided with a difficult period for the team. The Jonathan Huberdeau trade in the same offseason is now regarded as one of the worst trades in NHL history. Kadri is a talented player, but concerns about his age and contract remain. He is 35 and under contract for three more seasons at an average annual value of $7 million. Despite the high salary cap, winning a Stanley Cup with Kadri could justify the expense.\n\nA New Stanley Cup Contender?\nThe Avalanche\u2019s biggest weakness before the deadline was the centre position. With the trade, they acquired additional depth at third- and fourth-line centre. The lineup now includes Nathan MacKinnon, Brock Nelson, Kadri, and Nicolas Roy, creating a strong core of centres. With this improved depth, Colorado is now considered a top contender to win their second Stanley Cup in five years, especially given the league\u2019s wide-open competition this season.\n\nThe Flames Continue Their Rebuild\nThe Flames gained a first- and second-round pick, adding to their collection of six first-round selections over the next three seasons. These picks could serve as assets for future trades, as it\u2019s unlikely all will be used in the first round. They also received prospect Max Curran, who has posted 14 goals and 27 assists for 41 points in 31 games with the Edmonton Oil Kings.\n\nFlames general manager Craig Conroy managed to acquire valuable assets despite concerns over Kadri\u2019s contract length, price, and age.", "Image_URLs": "docs/images/hockey_writers_3.jpg"}, {"Source": "The Hockey Writers", "Title": "Ducks Trade Ryan Strome to Flames for 7th-Round Pick", "Date": "Fri, 06 Mar 2026 23:52:19 +0000", "Author": "Owen Hillman", "URL": "https://thehockeywriters.com/ducks-trade-ryan-strome-to-flames-for-7th-round-pick/", "Summary": "The Anaheim Ducks traded forward Ryan Strome to the Calgary Flames for a 2027 seventh-round pick, gaining cap relief. Strome, signed for $25 million in 2022, saw declining production and was sidelined by injuries. The Flames, rebuilding, seek veteran leadership and positional flexibility, while the Ducks focus on developing prospects and managing cap space.", "Content": "The Anaheim Ducks have traded forward Ryan Strome to the Calgary Flames for a 2027 seventh-round pick, according to Pierre Le Brun. The Ducks get some cap relief and move off of a bad contract, while the Flames acquire a veteran to mentor potential young players in their core.\n\nThe Ducks signed Strome to a five-year, $25 million contract on July 13, 2022. This deal, along with contracts for Frank Vatrano, Alex Killorn, and Radko Gudas, was intended to set the tone for the team's culture. With promising forward prospects like Mason McTavish, Leo Carlsson, and Cutter Gauthier, Strome was expected to serve as a mentor.\n\nHe was still a decent contributor with Anaheim, averaging 41 points between the 2022-23 and 2024-25 seasons. However, his production declined significantly this season, with just three goals and three assists through 33 games. Part of that decline was due to injury; he sustained an upper-body injury in the preseason that sidelined him for the first 16 games, and he has been dealing with illnesses in March.\n\nDespite his struggles, Strome remains under contract at $5 million per season until 2027. With Carlsson and McTavish developing into franchise players and the team signing Mikael Granlund to a three-year, $21 million deal in 2025, Strome\u2019s role with the Ducks was diminishing.\n\nThe Ducks were only able to receive a seventh-round pick for Strome, but they gained some cap relief. They have over $49 million in cap space this season but need to finalize deals with pending restricted free agents Carlsson, Gauthier, Oren Zellweger, and Pavel Mintyukov.\n\nThe Flames, meanwhile, are in rebuild mode and sought veteran leadership through this trade. They did not sell off completely at the deadline, with Blake Coleman remaining on the roster. With 55 points, they are positioned to secure a top draft pick in the 2026 NHL Draft, tied for the second-highest lottery odds with the St. Louis Blues, behind the Vancouver Canucks.\n\nIn addition to acquiring Strome, Calgary traded Nazem Kadri, Rasmus Andersson, and MacKenzie Weegar for strong returns. Strome could also rebound with the Flames, taking on an elevated role and providing positional flexibility, having played both wing and center. He still possesses playmaking abilities that could benefit young players like Matthew Coronato and Connor Zary.\n\nCalgary didn\u2019t give up much to acquire him and retains significant draft capital, including two first-round picks and four second-round picks.", "Image_URLs": "docs/images/hockey_writers_2.jpg"}, {"Source": "ESPN NFL News", "Title": "Sources: Ravens to acquire Crosby in blockbuster", "Date": "Fri, 6 Mar 2026 23:24:11 EST", "Author": "Jamison Hensley", "URL": "https://www.espn.com/nfl/story/_/id/48127564/sources-raiders-trade-maxx-crosby-ravens-two-1sts", "Summary": "The Baltimore Ravens are trading first-round picks in 2026 and 2027 to acquire five-time Pro Bowl defensive end Maxx Crosby from the Las Vegas Raiders, contingent on passing a physical. This marks Baltimore\u2019s first trade of a veteran for a first-round pick. Crosby, 28, will bolster the Ravens' pass rush after a poor 2025 season, aiming to improve their postseason prospects.", "Content": "In the biggest trade in franchise history, the Baltimore Ravens are acquiring five-time Pro Bowl defensive end Maxx Crosby from the Las Vegas Raiders for first-round picks in 2026 and 2027, sources told ESPN's Adam Schefter on Friday night. The deal is contingent on Crosby passing a physical, which can't occur until the start of the new league year Wednesday.\n\nThis marks the first time in the Ravens' 31-year existence that they've used a first-round pick to trade for a veteran player. Baltimore had the No. 14 pick in this year's draft. Among the teams the Ravens beat out for Crosby were the Dallas Cowboys, who were willing to offer a first- and a second-round pick for the star pass rusher.\n\nCrosby, 28, significantly upgrades a struggling Ravens pass rush that in 2025 totaled 30 sacks, Baltimore's fewest in 15 years. Last season was also the first time since the Ravens' inaugural 1996 campaign that they didn't have an edge rusher with more than 4.5 sacks.\n\nThe Ravens are making this uncharacteristic offseason splash after a disappointing 2025 season in which they finished 8-9, failed to make the playoffs, and then fired longtime coach John Harbaugh. Baltimore has been looking for a game changer, such as Crosby, to get over the postseason hurdle and reach the Super Bowl for the first time since the 2012 season.\n\nThe addition of Crosby gives the Ravens their most decorated and feared pass rusher in his prime since Terrell Suggs, the franchise's all-time sacks leader, who played in Baltimore from 2003 to 2018. Crosby has produced four double-digit sack seasons in his seven-year career. Over that span, the Ravens have had two edge rushers with 10 or more sacks in a season: Kyle Van Noy (12.5 in 2024) and Odafe Oweh (10 in 2024).\n\nThis is a huge addition for new Ravens coach Jesse Minter, who will call plays on defense. Since entering the league in 2019, Crosby has 360 quarterback pressures, which is 29 more than the next-closest player, according to ESPN Research.\n\nThe Ravens have been reluctant to give up coveted draft capital because of their philosophy of building through the draft. Before Baltimore landed Crosby, the highest draft pick it had given up was a second-rounder for middle linebacker Roquan Smith.", "Image_URLs": "docs/images/espn_nfl_3.jpg"}, {"Source": "ESPN NFL News", "Title": "Texans grant Mixon release after lost '25 season", "Date": "Fri, 6 Mar 2026 23:24:11 EST", "Author": "DJ Bien-Aime", "URL": "https://www.espn.com/nfl/story/_/id/48125078/sources-texans-release-joe-mixon-lost-2025-season", "Summary": "The Texans released veteran RB Joe Mixon after he missed the 2025 season due to a foot injury, saving $8 million in cap space. Mixon, 29, had a strong 2024 season with 1,016 rushing yards and 11 TDs. He was acquired from the Bengals in 2024 and signed a three-year extension.", "Content": "The Texans released veteran running back Joe Mixon on Friday after he missed the 2025 season with a foot injury. Mixon requested his release Thursday, and the team granted it the following day, releasing him with a non-football injury designation. The move saves Houston $8 million in cap space.\n\nMixon, 29, suffered a mysterious foot injury during the offseason, the specifics of which were not disclosed by the Texans. As a result, he missed all offseason workouts and training camp. Houston placed Mixon on the non-football injury list at the end of training camp, which automatically sidelined him for four games. Despite hopes he could return, his foot never healed, leading the team to rely on rookie Woody Marks, who had a team-high 703 rushing yards, and free agent Nick Chubb, who gained 506 yards.\n\nHouston finished 22nd in the league in rushing yards per game with 108. In an effort to improve, the Texans recently agreed to acquire David Montgomery from the Detroit Lions.\n\nIn 2024, Mixon rushed for 1,016 yards and 11 touchdowns, earning Pro Bowl honors in his first season with the Texans. He had 159 yards and a touchdown in his debut game against the Indianapolis Colts. That year, he suffered an ankle injury but returned to post six 100-yard rushing games during the regular season. Mixon also rushed for 194 yards and two touchdowns during the Texans' playoff run, which ended with a loss to the Kansas City Chiefs in the divisional round.\n\nMixon was acquired via trade from the Cincinnati Bengals in March 2024 after he was expected to be released. The franchise immediately signed him to a three-year, $27 million contract extension, including $13 million guaranteed.", "Image_URLs": "docs/images/espn_nfl_4.jpg"}, {"Source": "ESPN NFL News", "Title": "Source: Patriots trading center Bradbury to Bears", "Date": "Fri, 6 Mar 2026 23:24:11 EST", "Author": "Courtney Cronin", "URL": "https://www.espn.com/nfl/story/_/id/48126368/patriots-trading-center-garrett-bradbury-bears", "Summary": "Drew Dalman, age 27, retired from the NFL, prompting the Bears to pursue a trade for Patriots center Garrett Bradbury, a 2019 first-round pick with 105 career starts. The Bears will send a 2027 fifth-round pick once the new league year begins. The move aims to stabilize Chicago's offensive line after roster changes and cap space gains.", "Content": "Drew Dalman is retiring from the NFL at age 27, leaving the Chicago Bears to address the center position again. The Bears agreed in principle to send a 2027 fifth-round pick to the New England Patriots for center Garrett Bradbury, though the trade cannot be processed until the new league year begins next Wednesday.\n\nBradbury, a 2019 first-round pick, spent his first six years with the Minnesota Vikings before signing a two-year deal worth up to $12 million with New England in March 2025. He started all 17 regular-season games and all four playoff games in his lone season with the Patriots. His veteran presence helped stabilize the offensive line, which started rookies in key positions.\n\nBradbury's 105 career starts provide stability to the Bears' offensive line, which lost 40% of its starters this offseason due to Dalman's retirement and Ozzy Traylor being expected to miss most of the offseason recovering from a knee injury. Dalman was officially placed on the reserve/retired list, and the Bears terminated the contract of linebacker Tremaine Edmunds, who was released Thursday. Along with wide receiver DJ Moore being traded to the Buffalo Bills, Chicago has created $44 million in cap space since Tuesday.\n\nBradbury's most productive seasons came during his early years with the Vikings in a zone scheme offense that featured play-action and misdirection. Under Bears coach Ben Johnson, Chicago went under center 49% of the time in 2025 and ran play-action on 32% of dropbacks. The team also boasted the sixth-highest explosive play rate in the NFL at 15.0%.\n\nFor the Patriots, Wilson, a 2025 third-round pick, is likely to replace Bradbury. Wilson played center at the University of Georgia but was moved to left guard as part of the team's approach of playing its best five linemen regardless of position.", "Image_URLs": "docs/images/espn_nfl_5.jpg"}, {"Source": "The Hockey Writers", "Title": "Assessing the Blackhawks Trade Deadline Moves, & What It Means for the Future", "Date": "Sat, 07 Mar 2026 01:29:27 +0000", "Author": "Gail Kauchak", "URL": "https://thehockeywriters.com/assessing-the-blackhawks-trade-deadline-moves-what-it-means-for-the-future-2026/", "Summary": "The Chicago Blackhawks traded defenseman Connor Murphy to the Edmonton Oilers for a 2028 second-round pick, retaining half his salary. This move signals a rebuild, giving younger defensemen like Sam Rinzel and Artyom Levshunov increased roles. The team faces challenges on defense but aims to develop its inexperienced roster for future success.", "Content": "It\u2019s been a very busy week for the Chicago Blackhawks. The trade deadline has come and gone, and the rebuilding Blackhawks were sellers once again. General manager Kyle Davidson can be commended for gaining some value out of a few expiring veteran contracts, as well as doing right by the players.\n\nIn the meantime, a much younger and still very inexperienced team is being tasked with taking the next step in their progression, even though a sizeable portion of their support system has been stripped away. Different players will need to step up and fill new roles both on and off the ice. But they\u2019ve been schooled for this. Are they ready for it? I guess we\u2019ll find out.\n\nLet\u2019s discuss the ramifications of this year\u2019s trade deadline moves for the Blackhawks.\n\nMurphy Moved to Edmonton\n\nThe first move was on Monday, Mar. 2, when defenseman Connor Murphy was traded to the Edmonton Oilers for a 2028 second-round draft pick. Chicago also retained half of Murphy\u2019s $4.4 million cap hit on his contract, which expires at the end of this season. While it\u2019s tough to see the longest-tenured member of the Blackhawks go (nine seasons), he wasn\u2019t going to be re-signed next season. Younger defensemen are ready to take his place on the blue line.\n\nMurphy will have a chance to finally play postseason hockey, which he\u2019s never done in his 13 NHL seasons (except for the COVID bubble playoff in 2020). He\u2019ll be 33 years old on Mar. 26, so time is ticking for the stay-at-home defenseman. Now he\u2019ll have a chance to fulfill that dream.\n\nThis opens up the door for other right-handed defensemen on the team to take on bigger roles. 21-year-old Sam Rinzel and 20-year-old Artyom Levshunov will both be given the reins to become everyday players. With Murphy there, head coach Jeff Blashill had to deploy seven defensemen to get them both in the lineup. Rinzel spent some time with the Rockford Ice Hogs, and Levshunov was a healthy scratch for three contests before the Olympic break for a \u201creset\u201d to help solidify better defensive play. Hopefully, both have been prepared to take on additional responsibilities and ice time.\n\nArtyom Levshunov is one of the defensemen who will receive more ice time and responsibility now that Connor Murphy is gone. Alex Vlasic and Louis Crevier have become the top shutdown pairing for the Blackhawks, but they\u2019re really going to be tested. With Murphy, the Blackhawks started in the defensive zone 75.8% of the time. Someone will need to replace that. In the game against the Winnipeg Jets on Mar. 3\u2014the first without Murphy\u2014Vlasic started 18 defensive zone faceoffs, highlighting the increased responsibility now placed on the remaining defensemen.", "Image_URLs": "docs/images/hockey_writers_1.jpg"}, {"Source": "ESPN NFL News", "Title": "NFL free agency grades: Who won the Ravens-Raiders trade involving Maxx Crosby?", "Date": "Sat, 7 Mar 2026 01:18:15 EST", "Author": "Seth Walder", "URL": "https://www.espn.com/nfl/story/_/id/47911726/2026-nfl-free-agency-grades-signings-trades-latest-best-worst-deals-draft-outlook", "Summary": "The Bears traded DJ Moore to the Bills. The Rams sent four draft picks to the Chiefs for Trent McDuffie. The Ravens acquired Maxx Crosby from the Raiders for two first-round picks. The Chargers signed center Tyler Biadasz. ESPN's Seth Walder analyzed these moves, highlighting Crosby's high impact and the Ravens' costly trade, noting Crosby's consistent pass-rush performance and Pro Bowl status.", "Content": "Adam Schefter reports that the Bears have agreed to trade DJ Moore to the Buffalo Bills. Multiple NFL trades and signings have occurred as free agency begins on March 9, including the Rams sending four draft picks to the Chiefs for star cornerback Trent McDuffie, and the Bills acquiring DJ Moore in a deal with the Bears. The Ravens sent two first-round picks to the Raiders for edge rusher Maxx Crosby. The Chargers signed former Commanders center Tyler Biadasz to a three-year deal.\n\nESPN analytics writer Seth Walder is grading the biggest signings and trades of the offseason, evaluating each move based on factors such as on-field impact, salary cap implications, player value and age, and the teams' short- and long-term outlooks. His analysis considers how each decision affects a team's chances of winning the Super Bowl this season or in the future.\n\nRegarding the Ravens' trade for Crosby, Walder expressed surprise that the Ravens were the team to acquire him and noted the high cost of the deal. Crosby is an exceptional player, considered slightly underrated, with double-digit sacks in three of the past four years. He is a five-time Pro Bowler and has played in 110 of 117 possible regular-season games over his seven-year career. His pass rush win rate is 17.2% over the past four years, placing him in the 79th percentile, and he has accumulated 222 pass-rush wins, the fourth-most in the league during that span. Crosby is also highly effective against the run, contributing to his consistent presence on the field.", "Image_URLs": "docs/images/espn_nfl_2.jpg"}, {"Source": "ESPN NFL News", "Title": "Maxx Crosby to the Ravens: What's next for both teams, plus free agency and draft implications", "Date": "Sat, 7 Mar 2026 01:18:15 EST", "Author": "Jamison Hensley, Ryan McFadden, Dan Graziano, Matt Miller", "URL": "https://www.espn.com/nfl/story/_/id/48127938/las-vegas-raiders-trade-maxx-crosby-baltimore-ravens-questions-draft-free-agency", "Summary": "The Raiders traded defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks. Crosby, a five-time Pro Bowler with 69.5 career sacks, was key in a 2024 game against Baltimore. The Ravens sought to strengthen their pass rush, prioritizing edge rusher upgrades this offseason.", "Content": "The Raiders agreed to trade defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks, sources told ESPN's Adam Schefter on Friday night.\n\nAs a defensive end for the Las Vegas Raiders, Crosby made a significant impact in September 2024 when he played in Baltimore and contributed to a 26-23 upset win against the Ravens. He finished that game with six tackles, four tackles for loss, and two sacks, including one where he looped through the middle to sack quarterback Lamar Jackson.\n\nThe Ravens were eager to add Crosby's ferocious pass rush to their defense and acquired him from the Raiders in exchange for the first-round picks in 2026 and 2027. Crosby, 28, is a five-time Pro Bowler and has recorded 69.5 career sacks since 2019, more than double what any other player on the Ravens has produced in that span. Since 2019, the Ravens' leading sack total is 30 by defensive tackle Nnamdi Madubuike.\n\nAt the NFL combine, Ravens general manager Eric De Costa emphasized that upgrading at edge rusher was a priority for Baltimore this offseason. \"When we look at the best defenses, we see a ferocious pass rush, and that was lacking this year for different reasons,\" De Costa said in February.", "Image_URLs": "docs/images/espn_nfl_1.jpg"}];

        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
