    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "Sir\u0101t", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/sirat.html", "Summary": "\"Sir\u0101t\" is an upcoming 2025 drama directed by Oliver Laxe, starring Sergi L\u00f3pez and others. The 115-minute film follows a father and son searching for their missing daughter at a Moroccan rave, amid themes of hope, freedom, and loss. It is rated R for language, violence, and drug use.", "Content": "Sir\u0101t is a drama film set to be released in 2025, directed by Oliver Laxe and written by Santiago Fillol and Oliver Laxe. The film stars Sergi L\u00f3pez, Bruno N\u00fa\u00f1ez, Stefania Gadda, Joshua Liam Henderson, Tonin Janvier, Jade Oukid, and Richard Bellamy. It has a runtime of 115 minutes and is rated R for language, some violent content, and drug use.\n\nThe story follows a father and his son who arrive at a rave deep in the mountains of southern Morocco. They are searching for Mar, their daughter and sister, who vanished months earlier at one of these endless, sleepless parties. Surrounded by electronic music and a raw, unfamiliar sense of freedom, they repeatedly show her photo, holding onto hope as they follow a group of ravers to one last destination.", "Image_URLs": "docs/images/filmjabber_3_1772898069825.webp"}, {"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026) is an R-rated horror, drama, and romance film directed by Maggie Gyllenhaal, releasing on March 6, 2026. Starring Jessie Buckley, Christian Bale, and others, it follows a lonely Frankenstein who revives a murdered woman in 1930s Chicago, creating The Bride. The film explores themes of life, love, and macabre creativity.", "Content": "The Bride (2026) is a horror, drama, and romance film rated R with a runtime of 126 minutes, set to be released on March 6, 2026. It is directed and written by Maggie Gyllenhaal, known for her work on The Lost Daughter. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. The film is produced by Warner Brothers.\n\nThe story centers on a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening) to create a companion. Together, they revive a murdered young woman, resulting in the birth of The Bride (Buckley). The film is a bold, iconoclastic take on a compelling story, blending life, macabre romance, and ambitious ideas. Maggie Gyllenhaal\u2019s vision presents a beautiful yet hideous creature that is both captivating and unsettling.", "Image_URLs": "docs/images/filmjabber_1_1772898054780.webp"}, {"Source": "Laravel News", "Title": "The Inertia v3 Beta is Here", "Date": "Fri, 06 Mar 2026 02:36:45 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/the-inertia-v3-beta-is-here?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Inertia v3 Beta introduces a built-in XHR HTTP client, optional Axios support, and a new use Httphook for external HTTP requests. It adds optimistic updates across router, use Form, and use Http, with rollback features. Instant navigation in Vite, server-side preserve Fragment for URL hashes, and enhanced form handling are also included.", "Content": "The Inertia v3 Beta is a major pre-release milestone that introduces several new features and improvements. It now includes a built-in XHR HTTP client, making Axios an optional peer dependency. Applications that do not require Axios can omit it entirely, while those that prefer it can continue using it by installing it as a peer dependency.\n\nA new use Httphook allows developers to make HTTP requests outside of Inertia, providing the same developer experience as use Form\u2014 including processing, errors, progress, and dirtystate\u2014but returns response data instead of triggering page navigation. It supports surfacing all validation errors, not just the first.\n\nOptimistic updates have been added across the router, use Form, and use Http, including support for concurrent optimistic updates. The update callback receives the current props and returns the optimistic state to apply immediately, with automatic rollback on validation errors, server errors, or interrupted requests. The API supports both a fluent style and an inline option.\n\nThe use Form hook now works similarly, allowing optimistic updates when adding new items. The <Form> component has also gained an optimistic prop for declarative handling.\n\nInstant support in Vite development mode enables navigation to feel immediate by rendering the destination page before the server response completes.\n\nA new server-side preserve Fragment option keeps the URL hash fragment intact across redirects. In Laravel, this is achieved by chaining preserve Fragment() on a redirect response. When the server includes preserve Fragment: true in the Inertia page object, the client retains the original request's URL fragment even during redirects.", "Image_URLs": "docs/images/laravel_1_1772897806786.png"}, {"Source": "Smashing Magazine", "Title": "Human Strategy In An AI-Accelerated Workflow", "Date": "Fri, 06 Mar 2026 08:00:00 GMT", "Author": "hello@smashingmagazine.com (Carrie Webster)", "URL": "https://smashingmagazine.com/2026/03/human-strategy-ai-accelerated-workflow/", "Summary": "UX design is evolving as AI automates tasks like wireframes and prototypes, raising fears of job replacement. While AI streamlines manual, repetitive work, the core of UX\u2014navigating ambiguity and advocating for humans\u2014remains essential. Designers are shifting from output creators to directors of intent, focusing on meaningful problem-solving beyond interface creation.", "Content": "UX design is entering a new phase, with designers shifting from makers of outputs to directors of intent. AI can now generate wireframes, prototypes, and even design systems in minutes, but UX has never been only about creating interfaces. It\u2019s about navigating ambiguity, advocating for humans in systems optimized for efficiency, and solving their problems through thoughtful design.\n\nI\u2019ve been working in User Experience design for more than twenty years. Long enough to have held many job titles, from when stakeholders asked us to \u201cjust make it pretty\u201d to when wireframes were delivered as annotated PDFs. I\u2019ve seen many tools come and go over the years, methodologies rise and fall, and entire platforms disappear.\n\nYet, nothing has unsettled designers quite like AI. When generative AI tools first entered my workflow, my reaction wasn\u2019t excitement \u2014 it was unease, with a little curiosity. Watching an interface appear in seconds, complete with sensible spacing, readable typography, and halfway-decent copy, triggered a very real fear: if a machine can do this, where does that leave me?\n\nThat fear is now widespread. Designers at every level ask the same question, often quietly: \u201cWill an AI agent replace me by next week, month, or year?\u201d While the timeline varies depending on where you are in your career and how quickly your employer adopts AI tools, the concern remains.\n\nIn some roles, AI is already automating tasks that once took days \u2014 generating wireframes, prototypes, personas, usability summaries, accessibility suggestions, and entire design systems in minutes. Tasks that were once manual and time-consuming are now being streamlined.\n\nThe uncomfortable truth is: if your role is largely about producing artifacts, drawing buttons, aligning components, or translating instructions into screens, parts of that work are already being automated. However, UX design has never been solely about creating user interfaces. It\u2019s about navigating ambiguity, advocating for humans within systems optimized for efficiency, and translating complex human needs into meaningful solutions.", "Image_URLs": "docs/images/smashing_1_1772897778558.jpg"}, {"Source": "XXL Hip Hop", "Title": "King, Domani Strike Back at 50 Cent with Two Angry Diss Tracks", "Date": "Fri, 06 Mar 2026 21:35:53 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/king-domani-50-cent-diss-tracks/", "Summary": "King and Domani released diss tracks \"Droptop\" and \"PU$Y\" targeting 50 Cent for disrespecting T.I. and the Harris family on his Power Origins theme song. 50 Cent responded with provocative lyrics and a photoshopped image of T.I. and Tiny, escalating the feud.", "Content": "King and Domani released two diss tracks on their Instagram pages in retaliation against 50 Cent for disrespecting T.I. and the Harris family on the new Power Origins theme song.\n\nKing's diss track is called \"Droptop.\" On the song, he criticizes 50 Cent for talking too much and accuses him of allegedly beating women. He raps, \"You were made from 50 Cent because ya mama gave it cheap.\"\n\nMeanwhile, Domani delivered his diss track titled \"PU$Y.\" In the song, he challenges 50 Cent's tough-guy image, rapping, \"I smell p***y / How about you come here and try to push me / That suga water got ya, now you turn sweet, huh / I smell p***y / Ni**a, I read you like a book read / Come bring ya a*s to school quit playin' hookie / I smell p***y.\"\n\nThese songs respond to 50 Cent, who featured the Harris family on the theme song of his upcoming television show, Power Origins. The track, featuring R&B singer Leon Thomas, includes street rap about the drug trade. 50 Cent raps, \"I'm back on my dope boy grammar / Your daddy made your mama eat every box in Atlanta,\" and \"Freak sh*t / Peep sh*t / Keep sh*t, on the low / But everybody know.\" He captioned his Instagram post about the song, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\n50 Cent further escalated tensions by posting a photoshopped image of T.I. with Tiny eating from a cut-up cardboard box, possibly implying that his lyric about the Harris family was directed at T.I. and Tiny. He captioned the post, \"LOL...They are gonna learn to leave me alone.\"\n\nThe feud between 50 Cent and the Harris family is intensifying.", "Image_URLs": "docs/images/xxlhiphop_5_1772898227269.jpg"}, {"Source": "TechCrunch", "Title": "Nintendo sues the US government for a refund on tariffs", "Date": "Fri, 06 Mar 2026 22:35:35 +0000", "Author": "Amanda Silberling", "URL": "https://techcrunch.com/2026/03/06/nintendo-sues-the-u-s-government-for-a-refund-on-tariffs/", "Summary": "Nintendo filed a lawsuit in the U.S. Court of International Trade seeking a refund for tariffs imposed under President Trump\u2019s executive orders, which were struck down by the Supreme Court for exceeding presidential authority. Over a thousand companies are also pursuing refunds from tariffs totaling over $200 billion. Trump increased tariffs from 10% to 15%, prompting 24 states to sue.", "Content": "Nintendo filed a lawsuit against the U.S. government on Friday seeking a refund for tariffs paid due to President Donald Trump\u2019s executive orders invoking the International Emergency Economic Powers Act (IEEPA). The lawsuit was filed in the U.S. Court of International Trade after a Supreme Court decision struck down the tariffs imposed under IEEPA, ruling that the president exceeded his authority. More than a thousand other companies have also sued for refunds on these tariffs, which have resulted in over $200 billion collected on imports in total.\n\nNintendo confirmed the filing, stating, \"We have nothing else to share on the topic.\" In response to the Supreme Court\u2019s decision, President Trump raised tariffs from 10% to 15%. Subsequently, 24 states have sued, arguing that the president has once again overstepped his powers by making this change.", "Image_URLs": "docs/images/techcrunch_3_1772898010996.jpg"}, {"Source": "Smashing Magazine", "Title": "Getting Started With The Popover API", "Date": "Mon, 02 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Godstime Aburu)", "URL": "https://smashingmagazine.com/2026/03/getting-started-popover-api/", "Summary": "Recent exploration of native browser capabilities highlights the Popover API's potential to improve tooltip implementation. It addresses issues like inconsistent behavior, accessibility, and complex event handling by enabling browsers to manage interactions natively. Although still evolving, the API offers broad support and can simplify tooltip development, reducing reliance on external JavaScript libraries.", "Content": "A recent exploration into native browser capabilities has highlighted the potential of the Popover API to improve tooltip implementation. Traditionally, building tooltips involved relying on JavaScript libraries to handle hover and focus interactions, accessibility, and visual display. While simple in concept\u2014showing a small box with text when a user hovers or focuses on an element\u2014practical issues often arose once the tooltip was deployed to real users.\n\nProblems included inconsistent behavior with keyboard navigation, screen reader announcements, flickering when moving the mouse quickly, overlapping content on smaller screens, and the inability to close the tooltip with the Escape key. Managing these issues required complex event handling, ARIA attribute management, and often led to bloated, hard-to-maintain code.\n\nThese challenges prompted some developers to seek more reliable solutions. The newer Popover API offers a native platform approach, turning tooltips from simulated elements into browser-understood components. This shift means that opening, closing, keyboard interactions, Escape handling, and accessibility features are managed by the browser itself, reducing the need for custom JavaScript workarounds.\n\nWhile the API is still evolving and some features are in flux, it currently enjoys broad browser support. Developers are encouraged to monitor compatibility through resources like Can I Use. Transitioning to native APIs like Popover can simplify tooltip implementation, improve accessibility, and reduce reliance on external libraries that often act as black boxes.", "Image_URLs": "docs/images/smashing_3_1772897796616.jpg"}, {"Source": "BBC News - World", "Title": "Armed robots take to the battlefield in Ukraine war", "Date": "Sat, 07 Mar 2026 00:36:19 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c62662gzlp8o?at_medium=RSS&at_campaign=rss", "Summary": "Since Russia's invasion of Ukraine, the conflict has become highly technological, with Ukraine deploying uncrewed ground vehicles (UGVs) for combat, reconnaissance, and supply roles. These armed robots have reportedly repelled attacks, captured prisoners, and engaged in robot-on-robot clashes. Most operate remotely under human control, with their use expected to expand, especially for strike operations, amid ethical concerns.", "Content": "Since the start of Russia's full-scale invasion, the war in Ukraine has developed into a high-tech conflict. Swarms of spy and killer drones have set the skies of Ukraine abuzz, and uncrewed boats have crippled the Russian navy in the Black Sea. Now, Ukraine has embarked on a massive program to deploy armed robots on the ground.\n\nUncrewed ground vehicles (UGVs), or ground robot systems as they are known in Ukrainian military parlance, have already proven their worth. There have been reports of UGVs successfully repelling Russian attacks and even taking enemy soldiers prisoner. Ukrainian and Russian killer robots are even said to have clashed without humans being present at the site of the battle.\n\n\"Robot wars are already happening,\" said Oleksandr Afanasiev from the Ukrainian army's K2 brigade, which he commands as its UGV battalion\u2014the world's first, he claims. The brigade has been mounting Kalashnikov machine guns on top of these robots, which \"open fire on a battlefield where an infantryman would be afraid to turn up. But a UGV is happy to risk its existence,\" Afanasiev explained.\n\nHis battalion has also been using explosive-laden, battery-powered kamikaze UGVs to blow up enemy positions and hideouts. Unlike aerial drones that buzz overhead, these make no sound to warn the enemy of an impending strike. The deputy commander of the 33rd Detached Mechanised Brigade's tank battalion, known by the callsign Afghan, reported that one Ukrainian UGV armed with a machine gun ambushed a Russian personnel carrier, while another robot defended a Ukrainian position for weeks.\n\nAfghan acknowledged there are limits to the killer robots' autonomy on the battlefield, citing ethical and international humanitarian law considerations. \"Modern UGVs are part-autonomous. They can move on their own, observe, and detect the enemy. But still, the decision to open fire is made by a human, their operator,\" he said. \"Robots can misidentify the wrong person or attack a civilian. That's why the final decision must be made by an operator.\"\n\nMost armed UGVs are remotely controlled by operators over the internet from a safe distance. Ukraine's lethal UGVs can be equipped with grenade launchers as well as machine guns, and can also be used to plant landmines or barbed wire. However, the majority of uncrewed vehicles are still used for their original purposes of delivering supplies and evacuating the wounded.\n\nAccording to Valerii Zaluzhnyi, Ukraine's former commander-in-chief and now ambassador to the UK, the role of armed UGVs is expected to grow exponentially. Speaking at the London think tank Chatham House about the future of warfare, he described how strike UGVs would be increasingly utilized.", "Image_URLs": "docs/images/bbc_3_1772897865354.jpg"}, {"Source": "XXL Hip Hop", "Title": "One Suspect Charged for Foolio's Murder Wants Separate Trial", "Date": "Sat, 07 Mar 2026 00:46:07 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/foolio-murder-suspect-wants-his-own-trial/", "Summary": "Rashad Murphy, charged with Foolio's 2024 murder, seeks a separate trial or jury due to evidence concerns. His attorneys filed motions on March 5-6, addressing potential evidence from a related shooting. Murphy is one of five suspects; Alicia Andrews was convicted of manslaughter, with sentencing scheduled for December. The other four suspects' motions were denied in court.", "Content": "One of the suspects charged with Foolio's murder is to have his own trial. According to documents obtained by XXL, attorneys for Rashad Murphy, one of the suspects in the 2024 murder of rapper Foolio, filed a supplemental memorandum on Thursday (March 5) requesting to be tried separately from his co-defendants for their upcoming trial, or at least have a different jury. Last month, the court held a hearing to address the motion but no ruling was made.\n\nOn Friday (March 6), Murphy's attorneys filed an amended memorandum addressing the court's indication that evidence concerning a separate shooting involving Murphy's co-defendants might be admissible against all defendants. This would happen if the judge determines that the evidence is \"inextricably intertwined\" with the charges related to Foolio's killing. Florida law requires a defendant-specific relevance and prejudice analysis in joint trials, Rashad Murphy respectfully submits this supplemental memorandum to address that issue.\n\nRashad Murphy is one of five people charged with Foolio's murder, along with Alicia Andrews, Isaiah Chance, Sean Gathright, and Davion Murphy. The Jacksonville, Fla., rapper was shot and killed by three masked gunmen while celebrating his birthday in Tampa, Fla., on June 23, 2004. In October 2025, Andrews was convicted of manslaughter in connection with Foolio's killing and faces a maximum sentence of 15 years in prison. Her sentencing was delayed after the original judge was removed in January by an appellate court due to bias. Andrews\u2019 new sentencing hearing is now scheduled for December 8.\n\nMeanwhile, the four other murder suspects\u2014Rashad, Davion, Isaiah, and Sean Gathright\u2014were in court on Wednesday (March 4), where a judge denied several motions, including some Florida statutes, the death penalty, and victim impact evidence. Video of their court hearing can be viewed below.", "Image_URLs": "docs/images/xxlhiphop_1_1772898198395.jpg"}, {"Source": "BBC News - World", "Title": "We've been speaking to Iranians during one week of war. Here's what they said", "Date": "Sat, 07 Mar 2026 06:00:32 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c5y5lqygrn7o?at_medium=RSS&at_campaign=rss", "Summary": "During the first week of war, some Iranians celebrated the death of Supreme Leader Khamenei and viewed US and Israeli airstrikes as hope for regime change. However, many express fear, uncertainty, and skepticism about the war's motives, with internet restrictions and regime repression limiting open expression. Public sentiment varies from hope to anxiety amid ongoing bombardments and political repression.", "Content": "We've been speaking to Iranians during one week of war. Here's what they said.\n\nOn Monday, three days into the war, men in Tehran watched from a hillside as a plume of smoke rose after an explosion.\n\nWhen Hamid heard news of the death of Iran's Supreme Leader Ayatollah Ali Khamenei a week ago, he felt a wave of euphoria and took his wife and daughter into the street outside his home in Tehran to celebrate. For the next few days, as US and Israeli bombs slammed into buildings across the capital, the family went onto the roof of their house to watch the airstrikes coming in, cheering every time a regime target was hit. \"Try to find anywhere else on this earth where the population would be happy with an external attack on their country,\" he told me, via a cousin in the UK. \"But we now have hope that the regime will soon be gone. We are happy.\"\n\nHamid\u2014not his real name\u2014is not alone. Alongside colleagues from BBC Persian, we have been hearing from people inside and outside Iran on a momentous week for them, for the future of their country, and for the entire region. BBC Persian is the Persian language service of BBC News, used by 24 million people around the world\u2014the majority in Iran\u2014despite being blocked and routinely jammed by Iranian authorities.\n\nIn a police state under bombardment, with severe internet restrictions in place, it is impossible to fully gauge the mood across a vast nation of 90 million people. Residents of Tehran have received messages warning: \"If your connection to the internet continues in the coming days, your line will be blocked and you will be referred to judicial authorities.\"\n\nThe regime still instills fear, and no one who voices opposition to it is willing to give their name for fear of repercussions on themselves or their families. But a week on, while some are still celebrating every strike on the regime, others are increasingly frightened, questioning the motives and endgame of the war. \"The goal of this war isn't to bring about freedom or democracy for the Iranian people,\" Ali told us. \"It's for the geopolitical benefit of Israel, the US, and Arab countries in the region.\"\n\nMohammad, who is in his 30s and lives in Tehran, said he had wanted a deal between the US and Iran that would have avoided the war. \"Deep down, I always hoped an agreement would be made,\" he said. He had thought he would be happy at Khamenei's death, but in the end \"felt nothing.\" He told my colleague Soroush Pakzad that he is now filled with uncertainty about the future\u2014and, with regime checkpoints everywhere on the ground and bombardments from the sky, he is afraid.\n\nOthers Iranians speak of feeling a mix of fear, stress, and hope. One woman told me that it would take living in Iran for 40 years to understand the complexity of what she and other Iranians are now feeling. \"We laugh and are happy when the regime is...\"", "Image_URLs": "docs/images/bbc_5_1772897874311.jpg"}, {"Source": "Politico - Picks", "Title": "Trump\u2019s week: Poor jobs numbers, high gas prices and Noem\u2019s ouster", "Date": "Sat, 07 Mar 2026 07:00:00 EST", "Author": "Sam Sutton and Megan Messerly", "URL": "https://www.politico.com/news/2026/03/07/trump-poor-jobs-numbers-high-gas-prices-noem-00817900", "Summary": "Poor economic data, rising gas prices, and the ouster of Kristi Noem from DHS reveal vulnerabilities for the Trump administration. Economic concerns, including inflation and a stagnant labor market, along with Iran-related conflicts increasing oil prices, threaten to undermine GOP midterm prospects. Trump faces challenges on immigration, with declining support and mixed voter perceptions of border enforcement.", "Content": "Poor economic news and a key Cabinet departure expose the White House\u2019s vulnerabilities.\n\nPresident Donald Trump walks from the stage after a campaign rally at Van Andel Arena, Tuesday, Nov. 5, 2024, in Grand Rapids, Mich.\n\nDonald Trump won reelection on the promise of restoring the economy and eliminating illegal immigration. But in the last week, both issues have threatened to turn into liabilities: a stagnant labor market and soaring gas prices amid the Iran conflict are hammering the economy, and the ouster of Kristi Noem from the Department of Homeland Security has cast new light on the administration\u2019s increasingly unpopular immigration agenda.\n\nThe economic backdrop has grown ominous \u2014 Wall Street analysts are warning that surging oil prices could lead to stagflation \u2014 and the blitzkrieg of bad news has jeopardized the GOP\u2019s ability to keep voters focused on Trump administration policies that were designed to help with the rising cost of living.\n\n\u201cIf you combine an economy that people don\u2019t like with a prolonged war that you know nobody in his base believes they voted for, that\u2019s a toxic problem,\u201d said one Trump ally granted anonymity to speak freely. While Trump isn\u2019t on the ballot this year, his party needs the president\u2019s poll numbers to improve to keep the House and Senate.\n\n\u201cDon\u2019t drag this war out,\u201d the person said. \u201cThat\u2019s my best advice for the administration. The country is in no mood for a prolonged war.\u201d\n\nThe Iran conflict has put immense upward pressure on oil and gas \u2014 prices at the pump have climbed by more than 11 percent in a week. Now, with employers shedding payroll and Trump pressing reset on who\u2019s leading his immigration agenda, the president is on the backfoot on the two issues he needs to own for his party to win the midterms.\n\nAffordability was a dominant concern even when gas prices were low, said Stephen Moore, a former Heritage Foundation economist who\u2019s been an unofficial adviser to Trump over the years. The spiraling conflict in Iran has pushed oil above $90 a barrel \u2014 which is broadly expected to keep inflation high in the near term \u2014 and \u201cTrump definitely needs those prices to come down as quickly as possible,\u201d Moore said.\n\nThe president, meanwhile, is also struggling with what was once his strongest and most defining issue \u2014 immigration. While the number of people crossing the southern border has fallen significantly, in part due to Trump administration efforts, the widely shared images of aggressive enforcement actions across the country have left even some of his supporters wincing. Other conservatives, still, are unhappy that those efforts have not gone far enough, falling short of the \u201cmass deportations\u201d he promised on the campaign trail.\n\nPolling underscores the erosion of support. A recent NBC News poll found that 49 percent of adults strongly disapprove of Trump\u2019s handling of border issues.", "Image_URLs": "docs/images/politico_7_1772898108066.jpg"}, {"Source": "Star Phoenix", "Title": "Opinion: If Ottawa doesn't reform supply management, Washington will", "Date": "Sat, 07 Mar 2026 14:00:36 +0000", "Author": "Steve Bartlett", "URL": "https://thestarphoenix.com/opinion/opinion-if-ottawa-doesnt-reform-supply-management-washington-will", "Summary": "The U.S. Supreme Court ruled that tariffs imposed under the Trump Administration were unconstitutional in their legal basis, not the tariffs themselves. President Trump responded with a 15% tariff, indicating tariffs will persist. The decision signals tariffs as a lasting feature of U.S. trade policy, affecting Canada\u2019s trade negotiations, particularly concerning dairy market access and supply management.", "Content": "A person takes a jug of milk from a refrigerator in this file photo. Photo by file photo/Getty Images\n\nBy Sylvain Charlebois\n\nThe U.S. Supreme Court was unequivocal: the tariffs imposed under the Trump Administration were unconstitutional in their legal rationale. That distinction matters. The court did not declare tariffs themselves illegitimate. It rejected the justification used to impose them.\n\nIn response, President Trump invoked Article 122 and imposed a blanket 15 percent tariff on all goods entering the United States. The signal could not be clearer: tariffs are not going away. They are being re-engineered.\n\nSince early 2025, Washington has collected roughly $130 billion in tariff revenues. The court offered no guidance on what should happen to those funds. Thousands of American companies will undoubtedly challenge their assessments, but the broader message from the court \u2014 particularly reflected in Justice Kavanaugh\u2019s dissent \u2014 is that tariffs are likely to remain a structural feature of U.S. trade policy, regardless of who occupies the White House.\n\nThis decision was not partisan theatre. A Republican-dominated court ruled against a Republican president. That adds credibility. The ruling was procedural, not philosophical. The White House now has 150 days to construct a more defensible economic and legal framework to justify tariffs \u2014 and it will.\n\nThe American political mood has shifted. A growing share of the electorate believes globalization has disadvantaged the United States. Trade policy is adjusting accordingly. Whether Canada likes it or not, this is the new American trajectory.\n\nSo where does that leave us?\n\nCanada needs a trade arrangement with the United States. But it is increasingly unrealistic to assume that future access will be tariff-free. One of Washington\u2019s predictable demands will be expanded access to Canada\u2019s dairy market.\n\nYes, more access. But dismantling supply management to satisfy short-term political pressure? Absolutely not. President Trump understands that dairy is a political wedge issue in Canada. Yet from a business perspective, the case for dramatically expanding U.S. retail dairy exports into Canada is weak. Canadian consumers are not clamoring for American fluid milk.\n\nHowever, the story changes at the ingredient level. Industrial dairy proteins produced in the United States are far more competitive than Canadian equivalents. On that front, expanded access could benefit processors on both sides of the border. That conversation should be grounded in economics, not ideology.\n\nThe traditional Canadian response to trade concessions has been compensation. Ottawa distributed more than $1.7 billion in payments to dairy farmers following previous agreements. While politically expedient, that approach entrenches inefficiency. It inflates quota values, pushes farm", "Image_URLs": "docs/images/star_phoenix_1_1772897696313.jpg"}, {"Source": "Polygon", "Title": "Scream, FNAF star Matthew Lillard reveals the games that changed his life", "Date": "Sat, 07 Mar 2026 14:37:50 GMT", "Author": "Matt Patches", "URL": "https://www.polygon.com/matthew-lillard-video-games-interview-shelf-quest/", "Summary": "Polygon\u2019s new series Shelf Quest features celebrities exploring video game stores and sharing their gaming histories. In the debut, actor Matthew Lillard recalls gaming from the arcade era, his love for FIFA, and gaming\u2019s social role. He emphasizes gaming as a source of joy and connection, highlighting its evolution from early arcade days to modern online play.", "Content": "Every gamer has a shelf somewhere \u2014 real or imagined \u2014 where the games that shaped them still live. Polygon\u2019s new video series Shelf Quest turns that idea into a monthly pilgrimage. In each episode, a celebrity or creator is invited to wander the aisles of a video game store, pick up the boxes, and share games that defined their lives. It\u2019s part nostalgia trip, part oral history, and part reminder that many of us started somewhere with a controller or a few quarters.\n\nFor Polygon, the obvious home base is Videogamesnewyork, the legendary East Village shop whose narrow aisles feel like a physical archive of gaming culture. A group of us recently visited to enjoy the atmosphere of cult PS2 games as if viewing masterpieces at a museum.\n\nOur first Shelf Quest guest understood the assignment. When Matthew Lillard \u2014 known for roles in Scream, Scooby-Doo, Hackers, Twin Peaks season 3, Five Nights at Freddy's, and Wing Commander \u2014 entered the shop, he immediately began reminiscing. \u201cI was born in 1970, so I am a product of video games,\u201d Lillard said. \u201cI was literally the age where Pong came into existence.\u201d\n\nHis memories trace the entire early history of gaming, from arcade cabinets to home consoles. After years of gaming at the local pizza shop, Lillard recalls the thrill of finally having something like Donkey Kong available at home. \u201cIt was a privilege to play,\u201d he said. \u201cYou didn\u2019t get to play very often.\u201d\n\nLillard also discussed gaming with his son, getting destroyed in modern online shooters, and the one series he still plays obsessively today: FIFA. \u201cI\u2019ve bought every iteration,\u201d he laughed, pointing to a wall of soccer games. \u201cIt\u2019s my one thing that I will purchase every year.\u201d\n\nThroughout the episode, he reflects on how games have evolved as a social space \u2014 something he experienced firsthand during the pandemic while listening to his son laugh with friends online for hours. For Lillard, gaming has always been about connection more than competition. \u201cLet\u2019s keep gaming a place for joy,\u201d he said. But he also added with a smile, \u201cI will kick your ass in FIFA.\u201d", "Image_URLs": "docs/images/polygon_3_1772898046425.jpg"}, {"Source": "Laravel News", "Title": "Polyscope Is an Ai-First Dev Environment for Orchestrating Agents", "Date": "Thu, 05 Mar 2026 03:08:03 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/polyscope-is-an-ai-first-dev-environment-for-orchestrating-agents?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Beyond Code has launched Polyscope, a free AI-first development environment for orchestrating multiple AI agents simultaneously. Features include parallel agent execution, copy-on-write cloning, a preview browser, multi-model querying, and workspace integration. Available for macOS, it offers free and paid plans for individuals and teams.", "Content": "Polyscope Is an AI-First Development Environment for Orchestrating Agents\n\nThe team at Beyond Code has announced Polyscope, a free agent orchestration tool designed to run multiple AI agents simultaneously. \n\nFrom the announcement: \"Today we're announcing Polyscope - the free agent orchestration tool of my dreams. Run dozens of AI agents at the same time, with blazing fast copy-on-write clones, a built-in preview browser to visually prompt your agents, and much more.\"\n\nKey features include:\n- Running dozens of AI agents in parallel\n- Copy-on-write clones for fast agent branching\n- Built-in preview browser for visually prompting agents\n- Querying multiple models to collaborate on a question\n- Connecting workspaces to multiple repositories\n\nPolyscope is available for macOS at getpolyscope.com, offering a free plan as well as plans for solo developers and teams.", "Image_URLs": "docs/images/laravel_2_1772897813815.png"}, {"Source": "Laravel News", "Title": "Filament v5.3.0 Released with Deferred Tab Badges and Column Manager Improvements", "Date": "Wed, 04 Mar 2026 03:31:31 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/filament-v5-3-0?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, flexible column manager modal support, enhanced Rich Editor plugins with custom file providers, and sorting indicators on table columns. It also expands rate limiting options, adds a controls slot to the Callout component, and extends resource configurations and color palette options, alongside several bug fixes.", "Content": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, column manager modal and slideover support, enhancements to Rich Editor plugins, and sort loading indicators on table columns.\n\nDeferred tab badge loading allows badge counts to load independently from the tab content, improving performance by avoiding unnecessary database queries on page load when badge values are expensive to compute.\n\nThe column manager now supports displaying in a modal or slideover, providing layout options beyond the default dropdown for managing table column visibility.\n\nRich Editor plugins can now supply their own file attachment providers, enabling plugin authors to integrate custom upload and storage behavior directly into the editor without external configuration. Additionally, plugins can control the visibility and state of toolbar buttons for more granular editing control.\n\nTable columns now display a loading spinner on sort icons during sorting operations, offering visual feedback when sorting takes a moment.\n\nRate limiting configurations have been expanded to support user ID and email address keys, alongside existing IP-based options. Navigation groups for pages and resources now accept Unit Enum values, simplifying the definition of navigation groups using PHP enums.\n\nThe Callout component has gained a controls slot for custom action buttons or content alongside callout messages. Resources now support additional configuration options, and the component color palette has been extended with more Tailwind CSS color options.\n\nSeveral bugs have been fixed, including correct restoration of sidebar state on desktop page loads and the addition of missing chart widget translations.", "Image_URLs": "docs/images/laravel_3_1772897824461.png"}, {"Source": "The Hockey Writers", "Title": "3 Takeaways From Stars\u2019 Heartbreaking OT Loss to Avalanche", "Date": "Sat, 07 Mar 2026 15:15:00 +0000", "Author": "Marc Sautter", "URL": "https://thehockeywriters.com/3-takeaways-from-stars-heartbreaking-ot-loss-to-avalanche/", "Summary": "Valeri Nichushkin scored the tying goal with 15 seconds left and the shootout winner to give the Colorado Avalanche a 5-4 victory over the Dallas Stars, ending Dallas\u2019s 10-game winning streak. The game featured key goals from Makar, MacKinnon, and Necas for Colorado, and Heiskanen, Johnston, Hryckowian, and Benn for Dallas. The matchup highlighted the strong Central Division and is likely to be a playoff rematch.", "Content": "Valeri Nichushkin scored with 15 seconds left in the third period for the Colorado Avalanche to push the game to overtime and scored the winner in the shootout to snap the Dallas Stars\u2018 10-game winning streak and give the Avalanche the 5-4 win. Cale Makar, Nathan MacKinnon, and Martin Necas were the other goal scorers for the Avalanche. Mackenzie Blackwood made just seven saves on 11 shots before giving up the crease to Scott Wedgewood, who stopped all 10 shots he faced.\n\nMiro Heiskanen, Wyatt Johnston, Justin Hryckowian, and Jamie Benn scored for the Stars, while Jake Oettinger made 25 saves on 29 shots.\n\nThis contest lived up to the hype and was perhaps the best game of the season. The game highlighted the strength of the Central Division, with Colorado currently first with 93 points, Dallas second with 86 points, and Minnesota third with 84 points. These are also the top three teams in the Western Conference and among the top four in the entire NHL.\n\nThe current playoff format has been a topic of debate among fans. The first-place team in each division plays a wild-card team, while the second- and third-place divisional teams face each other. This structure has often been frustrating and is expected to be even more so this spring.\n\nIt\u2019s likely that Colorado and Dallas will meet again in the playoffs, possibly in the second round, given their standings and recent postseason history. Both teams have faced each other in the last two postseasons, with Dallas winning each time. If they meet again, it will almost certainly be in the second round, which could make for an exciting matchup despite the disappointment that it might not be in the Conference Final.\n\nThe rivalry between these teams has intensified under the current playoff format, and it\u2019s evident when watching their games. The Minnesota Wild are also a strong team, but there is hope that the Avalanche and Stars will face off again in the postseason.\n\nThe Avalanche\u2019s power play remains effective, operating at 29.9%, the second-best in the NHL, and continued its success in the recent game.", "Image_URLs": "docs/images/hockey_writers_3_1772898152845.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
