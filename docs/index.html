hment, both considered war crimes. Israel has repeatedly stated that such leaflets are intended to protect civilians by warning them of strikes in advance.\n\nA leaflet dropped into Beirut on Friday startled residents. Beirut resident Hala Beydoun described the moment as \"very scary.\" \"First there were these big, strong booms. We thought it was a rocket or a drone,\" she told CBC News. \"Then, we saw leaflets raining from the sky, like, what the heck?\"", "Image_URLs": "docs/images/cbc_1_1773522406773.jpg"}, {"Source": "Smashing Magazine", "Title": "Beyond `border-radius`: What The CSS `corner-shape` Property Unlocks For Everyday UI", "Date": "Thu, 12 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Brecht De Ruyte)", "URL": "https://smashingmagazine.com/2026/03/beyond-border-radius-css-corner-shape-property-ui/", "Summary": "The new `corner-shape` CSS property enhances border-radius by allowing diverse corner styles such as bevel, scoop, squircle, notch, and square. It works alongside border-radius to provide precise control over corner shapes, reducing reliance on hacks like clip-path or SVG masks. This feature enables more complex, varied designs with cleaner code, marking a significant improvement in CSS capabilities.", "Content": "For years, developers have been hacking around the limitations of border-radius, using clip-path, SVG masks, and fragile workarounds just to get anything other than round corners. The new corner-shape property finally changes that, opening the door to beveled, scooped, and squircle corners.\n\nWhen I first started building websites, rounded corners required five background images, one for each corner, one for the body, and a prayer that the client wouldn\u2019t ask for a different radius. Then the border-radius property landed, and the entire web collectively sighed with relief. That was over fifteen years ago, and honestly, we\u2019ve been riding that same wave ever since. Just as then, I hope that we can look at this feature as a progressive enhancement slowly making its way to other browsers.\n\nI like a good border-radius like any other guy, but the fact is that it only gives us one shape. Round. That\u2019s it. Want beveled corners? Clip-path. Scooped ticket edges? SVG mask. Squircle app icons? A carefully tuned SVG that you hope nobody asks you to animate. We\u2019ve been hacking around the limitations of border-radius for years, and those hacks come with real trade-offs: borders don\u2019t follow clip-paths, shadows get cut off, and you end up with brittle code that breaks the moment someone changes a padding value.\n\nWell, the new corner-shape changes all of that.\n\nWhat Is corner-shape?\n\nThe corner-shape property is a companion to border-radius. It doesn\u2019t replace it; it modifies the shape of the curve that border-radius creates. Without border-radius, corner-shape does nothing. But together, they\u2019re a powerful pair.\n\nThe property accepts these values: round (the default, same as regular border-radius), squircle (a superellipse, the smooth Apple-style rounded square), bevel (a straight line between the two radius endpoints, creating snipped corners), scoop (an inverted curve, creating concave corners), notch (sharp inward cuts), and square (effectively removes the rounding, overriding border-radius).\n\nYou can set different values per corner, just like border-radius:\n\n```css\n/* top-left, top-right, bottom-right, bottom-left */\nelement {\n  border-radius: 25px;\n  corner-shape: superellipse(0); /* equal to 'bevel' */\n}\n```\n\nThis new property offers more precise control over corner shapes, enabling designers and developers to create more varied and complex visual styles without relying on hacks or workarounds.", "Image_URLs": "docs/images/smashing_2_1773522466511.jpg"}, {"Source": "Variety", "Title": "Phil Campbell, Mot\u00f6rhead Guitarist, Dead at 64", "Date": "Sat, 14 Mar 2026 18:45:54 +0000", "Author": "Payton Turkeltaub", "URL": "https://variety.com/2026/music/news/phil-campbell-dead-motorhead-1236688004/", "Summary": "Phil Campbell, guitarist for Mot\u00f6rhead for 31 years, died at 64 following intensive care after surgery. He was also known for his solo album and founding Phil Campbell and the Bastard Sons with his sons. His bandmates and family expressed condolences, highlighting his musical talent, humor, and love of life.", "Content": "Phil Campbell, the guitarist for the rock band Mot\u00f6rhead, died on Friday following a battle in intensive care after a major operation. He was 64. His death was confirmed in a statement posted to the Phil Campbell and the Bastard Sons Instagram account.\n\n\u201cIt is with great sadness that we announce the passing of our beloved father, Philip Anthony Campbell, who passed away peacefully last night,\u201d the statement read. \u201cPhil was a devoted husband, a wonderful father, and a proud and loving grandfather, known affectionately as \u2018Bampi.\u2019 He was deeply loved by all who knew him and will be missed immensely. His legacy, music, and the memories he created with so many will live on forever. We kindly ask that our family\u2019s privacy is respected during this incredibly difficult time.\u201d\n\nCampbell was the guitarist for Mot\u00f6rhead for 31 years. He first joined the band in 1984 and remained until its disbandment after vocalist and bassist Lemmy died in 2015. After Mot\u00f6rhead, he released his solo album, \u201cOld Lions Still Roar,\u201d in 2019, and founded Phil Campbell and the Bastard Sons with his three sons, Todd, Dane, and Tyla Campbell. The band released its first album, \u201cThe Age of Absurdity,\u201d in 2018, and most recently released \u201cKings of the Asylum\u201d in 2023.\n\n\u201cPhil was a wonderful guitarist, writer, performer, and musician who had Mot\u00f6rhead in his veins. He always led with his gift of guitar, and carried a great sense of humour, but most of all, Phil led with his heart. You could not be around him without a chuckle or twenty, because quite simply, Phil loved life and lived it with great joy,\u201d wrote a statement posted to the Mot\u00f6rhead Instagram account.\n\nThe post added, \u201cThere will be plenty of time for us to share stories, tales of Campbell glory and some damn good jokes together; for now, please send love and positive energy to Gaynor and the boys while affording them time, space, and privacy.\u201d", "Image_URLs": "docs/images/variety_6_1773522647700.jpg"}];

            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            // Reset scroll to top before showing modal
            const modalContent = modal.querySelector('.overflow-y-auto');
            if (modalContent) modalContent.scrollTop = 0;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
