<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <h1 class="text-3xl font-bold text-gray-900">🗞️ News Aggregator</h1>
            <p class="text-gray-600 mt-1">Latest articles from multiple sources</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Articles Grid -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be rendered here -->
        </div>
    </main>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-source" class="font-semibold text-blue-600"></span>
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 font-bold text-4xl p-3 rounded-lg transition-colors">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read Full Article →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-8 rounded text-lg">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "BBC News - World", "Title": "Iran will continue to defend itself against aggression, ambassador to UK says", "Date": "Sat, 07 Mar 2026 14:11:37 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cq6qp458zv1o?at_medium=RSS&at_campaign=rss", "Summary": "Iran's ambassador to the UK stated that Iran will continue defending itself if US and Israeli aggression persists. Despite Iran's president apologizing to Gulf neighbors, Iran considers attacks on its facilities as legitimate targets. Iran has retaliated across the Middle East, including Gulf countries and Cyprus, and asserts it may strike further if provoked, depending on US and Israeli actions.", "Content": "Iran will continue to defend itself if the aggression from the American and Israeli side continues, the Iranian ambassador to the UK has told the BBC. While Iran's president on Saturday apologized to its Gulf neighbors and promised to stop attacks, Seyed Ali Mousavi stated that their policy remains to \"defend themselves.\"\n\nAfter days of strikes across the Middle East causing significant disruption and damage in many countries, Mousavi said that \"if facilities or properties or bases are used against the Iranian nation,\" they would be considered \"legitimate targets.\" In recent hours, Gulf countries including Qatar and the UAE have been hit by Iran, while the US and Israel have continued their attacks as the conflict enters its second week.\n\nIn an interview with the BBC to be broadcast on Sunday, Mousavi was asked if Iran would cease its attacks on military bases outside Israel in other parts of the Middle East. He responded that there is \"willingness from the Iranian side not to strike, not to attack our neighbors,\" but maintained that Iran had the right to continue striking targets across the region where there are military bases. Mousavi said Iran's response \"depends on the activities of the Americans and the Israeli regime.\" \n\n\"If the aggression\u2026 continues, there is no doubt we will defend ourselves,\" he stated. \"And if they want to use these military bases \u2014 although we don't want to do that \u2014 there is no doubt we will defend ourselves accordingly.\"\n\nIt has been more than seven days since the US and Israel began strikes on Iran, prompting Tehran to retaliate with attacks across the region. Kuwait, the United Arab Emirates, Saudi Arabia, Bahrain, Oman, and Iraq have all been targeted, as has an RAF base in Cyprus.\n\nIt is rare for the leadership of a country like Iran to publicly apologize, and even more unusual for a representative of Iran to agree to an interview. Following President Masoud Pezeshkian's apology, Iran's ambassador to the UK agreed to speak with the BBC and invited them to interview him at Iran's embassy in London, a building with a history marked by tension between Iran and the West. The embassy building on London's Hyde Park was the site of a 1980 siege in which five Iranian gunmen were killed after a confrontation with SAS commandos, resulting in the release of nineteen hostages, one of whom died and two were injured. The gunmen belonged to a dissident Iranian group opposed to Ayatollah Khomeini.", "Image_URLs": "docs/images/bbc_1_1772897207947.jpg"}, {"Source": "Polygon", "Title": "I'm In Love with Your Dead Grandmother review: somehow more offensive than it sounds", "Date": "Sat, 07 Mar 2026 15:00:16 GMT", "Author": "Paulo Kawanishi", "URL": "https://www.polygon.com/im-in-love-with-your-dead-grandmother-impressions/", "Summary": "\"Random Select\" features the game \"I'm In Love with Your Dead Grandmother,\" a satirical visual novel about Noah, a man on a dating app whose behavior reveals exaggerated toxic masculinity. The game, produced by Kimulator's Films, is a brief, unsettling experience that critiques outdated male stereotypes through its disturbing humor and low-budget scenarios.", "Content": "Random Select is a column from Polygon about under-the-radar video games. Every week, Polygon asks a writer to game at random, downloading the game without knowing beforehand what it is. The catch? They have to play for at least an hour and report on their thoughts \u2014 honestly. This week's game is the racing game I'm In Love with Your Dead Grandmother.\n\nThere are games that don't take themselves too seriously, with silly innocence that makes the most preposterous idea feel like a lighthearted joke, like Hatoful Boyfriend, that pigeon dating simulator. I'm In Love with Your Dead Grandmother is something altogether different, the type of project people agree to do... maybe when they're inebriated? When every idea sounds funny even though it actually isn\u2019t.\n\nI'm In Love with Your Dead Grandmother feels more like a horror game than the goofy joke it purports to be. Produced by the studio Kimulator's Films, the game uses actors to tell the story of Noah (Alain Lagac\u00e9), a 28-year-old man who recently created a profile on a dating app and lands his first real date with a girl named Michelle (Marie Gervais St-Amour). Designed as a visual novel with branching paths, the game is a satire that aims for absurd outcomes with its broad characters and low-budget scenarios.\n\nI finished this game twice in about one hour, making it the kind of bite-sized experience you may enjoy when you have a couple of hours to unwind. That said, I can't say I had \"fun\" playing it. During his date, Noah offers food made of Play-Doh, is completely tone-deaf to Michelle's intentions, and overlooks her feelings. He carries a camera in his trousers and even asks Michelle if he can take pictures of her to send in a group chat, where he exchanges photos of naked women with friends. When Noah learns about Michelle's grandmother, Betty, he spends a lot of time wondering how he could seduce the old woman \u2014 with many of his ideas bordering on sexual harassment.\n\nWhat makes Noah's behavior horrifying is not his interest in Michelle's grandmother, but how real this satirical character feels. He's the caricature of men I saw exposed in a recent TikTok trend in the Brazilian community, where women shared the embarrassing audio messages they received from guys they\u2019d dated. Some men demanded money back for dinner and gas, since the girl didn't have sex with them. Others delivered two-minute monologues about their \"fantastic qualities\" while doing their best impression of a cheesy, irresistible heartthrob.\n\nNoah is the epitome of this kind of outdated masculinity. He is self-centered, swinging from overconfident to doubting every action he takes. He is sensitive about his own concerns and insecurities, but completely disregards the woman in front of him as a person who deserves respect. He is somewhere on the I Think You Should Leave and Tim & Eric character matrix.", "Image_URLs": "docs/images/polygon_1_1772897218931.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
