                    </button>

        </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "Star Phoenix", "Title": "Opinion: Tax system biggest barrier to unlocking Saskatchewan's potential", "Date": "Sat, 14 Mar 2026 13:00:43 +0000", "Author": "Steve Bartlett", "URL": "https://thestarphoenix.com/opinion/opinion-tax-system-biggest-barrier-to-unlocking-saskatchewans-potential", "Summary": "Saskatchewan\u2019s fiscal outlook is bleak, with deficits expected to persist through 2026, and the province\u2019s debt nearly tripling since 2007. Despite promises of a balanced budget, spending has outpaced inflation and population growth. The public sector has expanded significantly, while private sector growth lags, contributing to economic stagnation. Premier Scott Moe warns that fiscal recovery requires economic growth and tax reform.", "Content": "Ahead of this month\u2019s provincial budget, Saskatchewan Premier Scott Moe has warned that Finance Minister Jim Reiter won\u2019t be wearing his black shoes. After promising a balanced budget in 2025, Saskatchewan\u2019s books are set to finish the year deep in the red, and remain there in 2026.\n\nAccording to the mid-year report, Saskatchewan\u2019s total net debt is on track to have nearly tripled since fiscal 2007, rising as a share of the economy by more than three per cent. The provincial opposition has been quick to lay the blame for deficits on the Moe administration\u2019s \u201cwaste\u201d and \u201cmismanagement.\u201d They maintain that cuts alone can right the fiscal ship, and that Saskatchewan doesn\u2019t have a \u201crevenue problem.\u201d\n\nOn the surface, Saskatchewan\u2019s spending does need better control. Expenses have far outpaced inflation and population growth. If Saskatchewan had held expenses to inflation and population growth since 2018, the province would have $1.6 billion in additional fiscal capacity this year.\n\nSaskatchewan\u2019s public sector has skyrocketed relative to the overall economy. In 2025, public sector employment reached its highest share of total employment in at least 50 years. The public sector is now a larger proportion of Saskatchewan\u2019s economy than it was when parts of the oil and potash sectors were government-owned.\n\nAt the same time, Saskatchewan has Canada\u2019s highest rates of child poverty and the highest rates of crime. Nearly a quarter of the province lacks access to a family doctor, and education funding faces a nearly $500 million shortfall from 2013 levels. These are not issues that can be addressed solely through cuts.\n\nThe rising share of the public sector as a percentage of the economy is not driven by excessive growth in government employment, but by a lack of growth in the private sector. Since 2014, real private sector per capita GDP has fallen by nearly four per cent in Saskatchewan, compared to a one per cent increase at the national level. Private sector employment grew nearly five times slower than the national average. Sixty-seven per cent of new jobs nationwide since 2014 were created in the private sector, whereas in Saskatchewan, 72 per cent of new jobs were in the public sector.\n\nThe reality is that Saskatchewan\u2019s economy is not growing fast enough to support stable funding for high-quality services. While cuts to certain spending areas are necessary, the core solution to Saskatchewan\u2019s fiscal decline lies in unleashing growth potential. The province\u2019s tax system is the biggest barrier to that potential, as Saskatchewan directly taxes job creation and investment through its PST on business inputs, machinery and equipment, building materials, and construction labour\u2014costs that few other provinces tax.", "Image_URLs": "docs/images/star_phoenix_1_1773522390093.jpg"}, {"Source": "New York Times - World", "Title": "Netanyahu Has the War He Always Wanted, but on Trump\u2019s Terms", "Date": "Sat, 14 Mar 2026 09:03:44 +0000", "Author": "David M. Halbfinger", "URL": "https://www.nytimes.com/2026/03/14/world/middleeast/netanyahu-iran-war-trump.html", "Summary": "Prime Minister Netanyahu initially vowed to eliminate Iran's threat but now aims only to degrade Iran's nuclear and missile capabilities. Israel continues targeting Iran\u2019s security forces, hoping for internal regime change. The U.S. influences Israeli targets, with American politicians urging caution to avoid damaging Iran\u2019s infrastructure, reflecting a limited scope for the war and shifting expectations.", "Content": "Prime Minister Benjamin Netanyahu went to war on Feb. 28, promising that Israel and the United States would \u201cremove the existential threat posed by the terrorist regime in Iran.\u201d Two weeks later, though Israeli and U.S. fighters own the skies over Iran, Mr. Netanyahu\u2019s war aims have been brought sharply down to earth. Israel, he says now, is merely to degrade the Islamic Republic as a nuclear and ballistic missile threat.\n\nAs for regime change, Israel continues to target Iran\u2019s internal security forces, Mr. Netanyahu said on Thursday in his first news conference of the war. Beyond that, it can do little more than hope for the best\u2014that the Iranian people find a way to overthrow their government someday, perhaps even soon.\n\nIt is a striking shift, pointing not only to the difficulty of trying to achieve challenging political objectives with air power alone, but also to an irony of the Israeli leader\u2019s position. More than 30 years after he first publicly identified Iran and its nuclear ambitions as a menace to his country, Mr. Netanyahu has finally gotten the war he always wanted when the United States joined the fight shoulder to shoulder with Israel.\n\nHowever, the war is being fought on President Trump\u2019s terms. The United States is exerting influence over what Israel may destroy in Iran. It demonstrated this a week ago when American politicians expressed displeasure with Israel for attacking fuel-storage depots in and around Tehran, filling the skies with large clouds of black smoke.\n\n\u201cPlease be cautious about what targets you select,\u201d Senator Lindsey Graham, a Republican of South Carolina and a Trump ally, wrote on social media the next day, stressing the need to preserve such infrastructure to give the Iranian people a chance at a functioning economy, should they manage to overthrow their government.", "Image_URLs": "docs/images/nyt_3_1773522438065.jpg"}, {"Source": "TechCrunch", "Title": "Meta reportedly considering layoffs that could affect 20% of the company", "Date": "Sat, 14 Mar 2026 16:28:42 +0000", "Author": "Anthony Ha", "URL": "https://techcrunch.com/2026/03/14/meta-reportedly-considering-layoffs-that-could-affect-20-of-the-company/", "Summary": "Meta is considering layoffs of over 20% of its nearly 79,000 employees to offset AI-related spending and acquisitions. The company called reports \u201cspeculative,\u201d amid industry-wide layoffs influenced by AI automation. Previous large-scale layoffs occurred in 2022 and early 2023.", "Content": "Meta is considering major layoffs that could affect 20% or more of the company\u2019s workforce, according to Reuters. These layoffs could help the Facebook parent company offset its aggressive spending on AI infrastructure, as well as AI-related acquisitions and hiring. Meta employed nearly 79,000 people as of December 31, according to a recent filing.\n\nA Meta spokesperson described the report as \u201cspeculative reporting about theoretical approaches.\u201d The news comes amid widespread layoffs in the tech industry, with companies like Block announcing significant cuts, citing AI automation as a factor. Some experts and executives, including OpenAI\u2019s Sam Altman, have suggested that many of these layoffs may be \u201cAI-washing,\u201d where AI is used as a cover for other issues such as over-hiring during the pandemic.\n\nThe last time Meta announced layoffs of this scale was in November 2022, when it cut 11,000 jobs, followed by another 10,000 in March 2023.", "Image_URLs": "docs/images/techcrunch_3_1773522573529.jpg"}, {"Source": "CBC News - World", "Title": "Former NATO chief says he doesn't think allies will be pulled further into Middle East conflict", "Date": "Sat, 14 Mar 2026 04:00:00 EDT", "Author": "", "URL": "https://www.cbc.ca/news/politics/nato-iran-israel-us-war-9.7127634?cmp=rss", "Summary": "NATO's Jens Stoltenberg stated allies are unlikely to be drawn further into the Middle East conflict but warned Iran's war could boost Russia's economy and distract from Ukraine. He emphasized NATO's limited role in Middle East conflicts and highlighted global economic impacts, including rising energy prices and potential inflation, amid Iran's closure of the Strait of Hormuz and escalating violence.", "Content": "The former secretary general of NATO, Jens Stoltenberg, has stated that he does not believe allies will be pulled further into the conflict in the Middle East. However, he expressed concern that the ongoing war with Iran could benefit Russia's economy and divert global attention from the invasion of Ukraine.\n\nStoltenberg emphasized that NATO has never played a significant role in major Middle East conflicts and stressed the importance of preventing NATO from becoming involved. In an interview on CBC's The House, he noted, \"I think it's important to prevent NATO [from becoming] involved in the conflict.\"\n\nAlthough he believes NATO allies will not become further entangled in the war, which began two weeks ago with Israel and the United States launching air attacks across Iran, Stoltenberg highlighted the global repercussions. \"The economic consequences are significant. Increased energy prices can lead to reduced global growth and increased inflation,\" he said. He also expressed concern about the human suffering and economic impacts of the conflict.\n\nThe Strait of Hormuz has been shut down for ten days amid escalating tensions, causing global unease about an oil crisis. Iranian authorities report over 1,300 deaths, while Israel has reported 12 fatalities. The U.S. has lost at least 11 soldiers, with eight others severely injured. Iran's government has retaliated by closing the Strait of Hormuz, a critical route for the world's oil supply, causing oil prices to rise as high as $100 per barrel.", "Image_URLs": "docs/images/cbc_3_1773522421233.jpg"}, {"Source": "Ars Technica", "Title": "Staff complain that xAI is flailing because of constant upheaval", "Date": "Sat, 14 Mar 2026 07:14:53 +0000", "Author": "Stephen Morris and Cristina Criddle, Financial Times", "URL": "https://arstechnica.com/ai/2026/03/staff-complain-that-xai-is-flailing-because-of-constant-upheaval/", "Summary": "Elon Musk ordered layoffs at x AI due to poor performance of its coding products, leading to the departure of two cofounders and restructuring efforts. The company, struggling to compete with Anthropic and OpenAI, is being rebuilt from scratch. Musk aims for a major stock listing and ambitious AI projects, including space-based data centers and Mars colonization.", "Content": "Elon Musk has ordered another round of job cuts at x AI after growing frustrated with the poor performance of its coding product, forcing out several more cofounders and bringing in \u201cfixers\u201d from SpaceX and Tesla to audit the startup. The latest overhaul of the two-year-old company follows the success of Anthropic and OpenAI, whose AI coding tools have significantly impacted the software industry.\n\nMusk has increased pressure after merging SpaceX with x AI in a $1.25 billion deal, as he aims to meet a June deadline for what could be the largest stock market listing in history. His broader goals include launching AI data centers into space, building factories on the Moon, and colonizing Mars.\n\nDespite Musk\u2019s push, x AI\u2019s Grok chatbot and coding product have struggled to attract paying users or businesses. Musk stated on X that \u201cx AI was not built right first time around, so is being rebuilt from the foundations up,\u201d comparing the process to Tesla\u2019s early days. SpaceX and Musk did not immediately comment.\n\nManagers from SpaceX and Tesla have been reviewing x AI employees\u2019 work, resulting in some firings due to perceived inadequacies. A key focus has been the quality of training data, which has contributed to the lag of its coding product behind competitors like Anthropic\u2019s Claude Code and OpenAI\u2019s Codex.\n\nThe review has led to the departure of two cofounders: Zihang Dai, a senior technical staff member who publicly acknowledged x AI\u2019s coding delays, and Guodong Zhang, who managed pre-training of Grok models and was blamed for issues with the coding product. Zhang confirmed his departure on X.\n\nAfter these exits, only Manuel Kroiss and Ross Nordeen remain of the original 11 cofounders who helped establish x AI in San Francisco in March 2023. Last month, Musk criticized the coding team for falling behind in a town hall meeting and announced a reorganization that saw the removal of other cofounders, including Greg Yang, Tony Wu, and Jimmy Ba.\n\nToby Pohlen, a former DeepMind researcher, was appointed to lead the \u201cMacrohard\u201d project aimed at building digital agents capable of replicating entire software companies\u2014a project Musk described as the company\u2019s \u201cmost important.\u201d The name was a humorous reference to Microsoft. However, Pohlen left the company just 16 days later, and Musk has since reassigned Ashok Elluswamy, Tesla\u2019s head of AI software, to reboot the Macrohard initiative.", "Image_URLs": "docs/images/ars_technica_1_1773522656824.jpg"}, {"Source": "Film Jabber", "Title": "Reminders of Him", "Date": "2026-03-14", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/reminders-of-him.html", "Summary": "\"Reminders of Him\" (2026) is a PG-13 romance drama directed by Vanessa Caswill, set for release on March 13, 2026. Based on Colleen Hoover's novel, it stars Maika Monroe and others, and explores themes of motherhood, forgiveness, and love after a woman, Kenna, spends seven years in prison following a tragic mistake.", "Content": "Reminders of Him (2026) is a romance drama rated PG-13 with a runtime of 114 minutes. It is set to be released on March 13, 2026, directed by Vanessa Caswill and written by Colleen Hoover and Lauren Levine. The cast includes Maika Monroe, Tyriq Withers, Rudy Pankow, Lainey Wilson, Lauren Graham, and Bradley Whitford. The film is produced by Universal Pictures.\n\nWhat is Reminders of Him about? There was before you and there was during you. For some reason, I never thought there would be an after you. The literary phenomenon from #1 New York Times bestselling author Colleen Hoover becomes a transformative feature film about motherhood, forgiveness, and the power of love to overcome even the worst mistake.\n\nAfter a perfect outing with her boyfriend, Kenna (Maika Monroe) makes an unbearable mistake that sends her to prison. Seven years later,...\n\n[Full synopsis and reviews omitted for brevity.]", "Image_URLs": "docs/images/filmjabber_1_1773522608621.webp"}, {"Source": "Variety", "Title": "FCC Chairman Brendan Carr Says TV Broadcasters Must \u2018Correct Course\u2019 or \u2018They Will Lose Their Licenses,\u2019 Citing Trump\u2019s Outrage Over Iran War Coverage", "Date": "Sat, 14 Mar 2026 20:45:07 +0000", "Author": "Jack Dunn", "URL": "https://variety.com/2026/tv/news/brendan-carr-broadcast-licenses-iran-war-donald-trump-fcc-1236688078/", "Summary": "FCC Chairman Brendan Carr warned broadcasters to \"correct course\" or risk losing licenses over alleged misinformation, citing Trump\u2019s criticism of media coverage on Iran. Carr linked to Trump\u2019s social media post condemning headlines about U.S. tanker planes. While lacking authority over newspapers, Carr appears to target TV broadcasters, emphasizing regulation of political content and media influence.", "Content": "FCC Chairman Brendan Carr wrote on X Saturday that broadcasters need to \u201ccorrect course\u201d or risk losing their broadcasting licenses, citing Donald Trump\u2019s recent displeasure with the mainstream media\u2019s coverage of the Iran War. \u201cBroadcasters that are running hoaxes and news distortions \u2013 also known as the fake news \u2013 have a chance now to correct course before their license renewals come up,\u201d Carr wrote. \u201cThe law is clear. Broadcasters must operate in the public interest, and they will lose their licenses if they do not.\u201d\n\nCarr linked to a Truth Social post from Trump, in which the president condemned \u201cintentionally misleading headlines\u201d about U.S. tanker planes that were targeted in Saudi Arabia. Trump claimed the planes were not \u201c\u2019struck\u2019 or \u2018destroyed\u2019\u201d and that four of the five planes involved in the attack were \u201calready back in service.\u201d Trump went on to call out \u201clowlife \u2018papers\u2019\u201d like the New York Times and the Wall Street Journal, who \u201cwant us to lose the War.\u201d\n\nIt is important to note that the FCC chairman has no authority over papers like the WSJ or NYT. However, Carr, who has been outspoken about quieting unfavorable TV coverage of the Trump administration, appears to be sending out a warning to broadcasters in a preemptive attempt to influence their reporting.\n\nCarr has yet to take action against any major news organizations during his tenure under Trump. Instead, his biggest impact has been in the talk show and late-night TV space. In February, Carr appeared on Fox News\u2019 \u201cThe Ingraham Angle\u201d and confirmed that the FCC had begun enforcement proceedings regarding alleged violations of the equal time rule involving political candidates by ABC\u2019s \u201cThe View.\u201d \u201cThe days that these legacy media broadcasters get to decide what we can say, what we can think, who we can vote for are over,\u201d Carr stated during the interview.", "Image_URLs": "docs/images/variety_4_1773522639749.jpg"}, {"Source": "BBC News - World", "Title": "More US Marines and warships being moved to Middle East, reports say", "Date": "Sat, 14 Mar 2026 13:27:32 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cq8gj9n12g8o?at_medium=RSS&at_campaign=rss", "Summary": "US Marines and warships, including the USS Tripoli-led amphibious group, are being deployed to the Middle East amid heightened tensions with Iran. President Trump claimed US forces destroyed Iranian military infrastructure and warned of imminent strikes. Parts of South Korea's missile defense are relocating to the region. The US has conducted extensive strikes on Iran, and Iran vows to block the Strait of Hormuz and retaliate.", "Content": "More US Marines and warships are being deployed to the Middle East, two officials confirmed to CBS News. The reinforcements are to come from an amphibious ready group and its Marine expeditionary unit, with one official stating that the group would be led by the Japan-based USS Tripoli, an amphibious assault ship. The unit headed by the USS Tripoli typically consists of around 5,000 sailors and Marines across several warships.\n\nThis development comes as President Donald Trump announced that US forces had \"totally obliterated\" Iranian military infrastructure on Kharg Island in the Strait of Hormuz, a critical waterway for global oil shipping. Retaliatory Iranian strikes targeting Israel and US military bases across the Middle East have disrupted major hubs for international air travel and caused oil prices to soar.\n\nWhen asked about the US Navy escorting tankers through the Strait of Hormuz, Trump stated on Friday: \"It will happen soon.\" The Wall Street Journal, which first reported the movement of US personnel, also noted that the request for reinforcements was made by US Central Command and approved by Defense Secretary Pete Hegseth. The US military and Pentagon have not publicly confirmed future troop movements.\n\nAdditionally, parts of a missile defense system installed in South Korea are being relocated to the Middle East, according to officials cited by the Washington Post and South Korean news outlets. Trump earlier warned that Iran would be hit \"very hard\" in the coming week, adding that the war with Iran would end when \"I feel it in my bones.\" Hegseth stated that the US military would show \"no mercy for our enemies.\"\n\nThe Pentagon reported that it had already struck 6,000 Iranian targets during the first two weeks of conflict, which began with US and Israeli strikes on Iran on February 28, killing Supreme Leader Ayatollah Ali Khamenei. Iran's new supreme leader, Mojtaba Khamenei, son of the former leader, said in his first public address on Thursday that Tehran would continue to block the Strait of Hormuz. Through a statement read on Iranian state TV, he vowed to \"avenge the blood\" of Iranians killed in the war with the US and Israel and warned neighboring countries to stop hosting US bases.", "Image_URLs": "docs/images/bbc_4_1773522551428.jpg"}, {"Source": "Polygon", "Title": "Teenage Mutant Ninja Turtles II: Secret of the Ooze is still the most fun to be had in a TMNT movie", "Date": "Sat, 14 Mar 2026 17:00:18 GMT", "Author": "Brian VanHooker", "URL": "https://www.polygon.com/teenage-mutant-ninja-turtles-ii-secret-of-the-ooze-35th-anniversary/", "Summary": "To celebrate its 35th anniversary, the 1991 film Teenage Mutant Ninja Turtles II: The Secret of the Ooze was re-released in theaters, initially for two days, then extended due to strong presales and box office success, earning $3.3 million. The film features a lighter, humorous tone with the Turtles fighting with playful weapons, and a sequel release is planned for next year.", "Content": "Last August, the shellbacks made a very unexpected comeback. For the 35th anniversary of the original Teenage Mutant Ninja Turtles film, Fathom and Saga Arts rereleased the superhero action-comedy in theaters. Originally, the event was supposed to run just two days, but ticket presales were so promising they extended it to a whole week and expanded the number of theaters. Then, after the film earned a surprising $3.3 million at the box office, the event was extended another week and Fathom announced that its sequel would get a similar release next year.\n\nNow, 1991\u2019s Teenage Mutant Ninja Turtles II: The Secret of the Ooze is back in theaters, and, 35 years later, it\u2019s still the most fun to be had with the Turtles on film, especially for those who grew up in the original Turtle-Mania of the late 1980s and early 1990s.\n\nTeenage Mutant Ninja Turtles II: The Secret of the Ooze takes place soon after the heroes defeat Shredder at the end of the first film. While they\u2019re unable to return to their sewer home because it has been discovered by the Foot Clan, the brothers stay at the apartment of their human friend April O\u2019Neil until they find a new place, which they eventually do in an old abandoned subway station. The Shredder, however, is not dead and begins rebuilding the Foot Clan. Worse, he creates two monstrous new mutants to get revenge on the Turtles.\n\nDespite being a revenge story, it\u2019s worth noting that Secret of the Ooze was much lighter in tone than its predecessor. The 1990 film mostly adapted the original, grittier comic books, and lightened them with humor from the 1987 cartoon series. The result was a story filled with action, drama, humor, and heart, but it was also violent enough to draw complaints from parenting groups. As a result, Secret of the Ooze adopted a far lighter tone; the Turtles constantly crack jokes and take almost nothing seriously. They also rarely use their ninja weapons. Yet these changes didn\u2019t break the Turtle formula\u2014other, worse Turtle films would do that later\u2014or make Secret of the Ooze a so-bad-it\u2019s-good movie. Instead, screenwriter Todd Langen, who also wrote the original, embraced this new direction and made the most of it, which is why many Turtle fans still love this sequel.\n\nSecret of the Ooze opens with the Turtles beating up a band of burglars in a shopping mall. The tone shift is immediately apparent. Instead of attacking with swords and nunchucks, the Turtles fight with yo-yos and foam baseball bats. There\u2019s even a scene at a deli counter where Michelangelo replaces his nunchucks with linked pepperonis, shouting, \u201cCombat coldcuts!\u201d while taking down the bad guys. Most of the fight scenes are similarly lighthearted and energetic, making them fun to watch despite their lack of seriousness.", "Image_URLs": "docs/images/polygon_1_1773522584173.jpg"}, {"Source": "Smashing Magazine", "Title": "Moving From Moment.js To The JS Temporal API", "Date": "Fri, 13 Mar 2026 13:00:00 GMT", "Author": "hello@smashingmagazine.com (Joe Attardi)", "URL": "https://smashingmagazine.com/2026/03/moving-from-moment-to-temporal-api/", "Summary": "JavaScript's date handling has evolved from the basic Date API to libraries like Moment.js, which added features but had issues like size and mutability. Moment is now in maintenance mode. The newer Temporal API, part of ECMAScript since March 2026, addresses these limitations and is recommended for modern date and time management in JavaScript.", "Content": "The way JavaScript handles time has evolved significantly, from the built-in Date API to Moment.js and now Temporal. The new standard fills gaps in the original Date API while addressing limitations found in Moment and other libraries. Joe Attardi shares practical \u201crecipes\u201d for migrating Moment-based code to the new Temporal API.\n\nAlmost any kind of application written in JavaScript works with times or dates in some capacity. In the beginning, this was limited to the built-in Date API. This API includes basic functionality, but is quite limited in what it can do. Third-party libraries like Moment.js, and later built-in APIs such as the Intl APIs and the new Temporal API, add much greater flexibility to working with times and dates.\n\nMoment.js is a JavaScript library with powerful utilities for working with times and dates. It includes missing features from the basic Date API, such as time zone manipulation, and makes many common operations simpler. Moment also includes functions for formatting dates and times. It became a widely used library in many different applications.\n\nHowever, Moment also had its share of issues. It\u2019s a large library, and can add significantly to an application\u2019s bundle size. Because the library doesn\u2019t support tree shaking (a feature of modern bundlers that can remove unused parts of libraries), the entire Moment library is included even if you only use one or two of its functions.\n\nAnother issue with Moment is the fact that the objects it creates are mutable. Calling certain functions on a Moment object has side effects and mutates the value of that object. This can lead to unexpected behavior or bugs.\n\nIn 2020, the maintainers of Moment decided to put the library into maintenance mode. No new feature development is being done, and the maintainers recommend against using it for new projects.\n\nThere are other JavaScript date libraries, such as date-fns, but there\u2019s a new player in town: an API built directly into JavaScript\u2014Temporal. It\u2019s a new standard that fills in the holes of the original Date API as well as solves some of the limitations found in Moment and other libraries.\n\nTemporal is a new time and date API being added to the ECMAScript standard, which defines modern JavaScript. As of March 2026, it has reached Stage 4 of the TC39 process (the committee that oversees the evolution of JavaScript).", "Image_URLs": "docs/images/smashing_1_1773522456560.jpg"}, {"Source": "Laravel News", "Title": "Laravel Pint Now Replaces Fully Qualified Class Names with Imports", "Date": "Fri, 13 Mar 2026 02:19:07 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/laravel-pint-now-replaces-fully-qualified-class-names-with-imports?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Laravel Pint's preset now includes the fully_qualified_strict_types rule, which converts FQCNs to short class names with use statements in code and PHPDoc annotations. It applies to type hints, return types, and annotations. After updating Pint and running it, projects will see cosmetic changes as FQCNs are replaced with imports, improving code clarity.", "Content": "Laravel Pint's Laravel preset now includes the fully_qualified_strict_types rule, which automatically replaces fully qualified class names (FQCNs) with short class names and adds the corresponding use statements. The rule was added by Nuno Maduro and applies to both code and PHPDoc annotations.\n\nWhen you reference a class using its fully qualified name, the rule converts it to a short name and adds a use import at the top of the file. For example, a typical Laravel model might look like this:\n\n```php\nclass User extends Authenticatable {\n    /** @use Has Factory<\\Database\\Factories\\UserFactory> */\n    use HasFactory, Notifiable;\n\n    protected function casts(): array {\n        return [\n            'email_verified_at' => \\Illuminate\\Database\\Eloquent\\Casts\\Attribute::class,\n        ];\n    }\n}\n```\n\nAfter running Pint, it becomes:\n\n```php\nuse Database\\Factories\\UserFactory;\nuse Illuminate\\Database\\Eloquent\\Casts\\Attribute;\n\nclass User extends Authenticatable {\n    /** @use Has Factory<UserFactory> */\n    use HasFactory, Notifiable;\n\n    protected function casts(): array {\n        return [\n            'email_verified_at' => Attribute::class,\n        ];\n    }\n}\n```\n\nThe rule handles FQCNs in type hints, return types, PHPDoc tags (@param, @return, @var, @throws), and inline code references.\n\nIf your project uses Pint's default Laravel preset, the rule is already active. Update Pint and run it:\n\n```\ncomposer update laravel/pint\n/vendor/bin/pint\n```\n\nIf you use a custom preset in your `pint.json`, you can add the rule manually:\n\n```json\n{\n  \"preset\": \"psr12\",\n  \"rules\": {\n    \"fully_qualified_strict_types\": {\n      \"import_symbols\": true\n    }\n  }\n}\n```\n\nSetting `import_symbols` to true tells the fixer to automatically add use statements for any FQCNs it finds, rather than only shortening names that already have a corresponding import.\n\nThis rule will affect existing projects the first time you run Pint after updating. Expect a one-time diff across your codebase as FQCNs are replaced with imports. The changes are cosmetic and don't affect runtime behavior.", "Image_URLs": "docs/images/laravel_1_1773522486684.png"}, {"Source": "Saskatoon Police News", "Title": "2nd Homicide of the year", "Date": "Sat, 14 Mar 2026 10:58:27 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026131", "Summary": "Saskatoon Police are investigating a homicide on March 14, 2026, at 900 block of 22nd Street West. A man was shot around 12:30 a.m., transported to hospital, and later died. The Major Crime Section is leading the investigation. Police seek information via 306-975-8300 or Crime Stoppers.", "Content": "Saskatoon Police are investigating a homicide that occurred in the 900 block of 22nd Street West around 12:30 a.m. on March 14, 2026. Officers responded to a shooting and found a male suffering from a gunshot wound. He was transported to hospital but later died from his injuries. The Saskatoon Police Service Major Crime Section is leading the investigation. Anyone with information is asked to contact the Saskatoon Police Service at 306-975-8300 or Crime Stoppers at 1-800-222-8477.", "Image_URLs": "docs/images/saskatoon_police_2_1773522514967.png"}, {"Source": "BBC News - World", "Title": "Three more Iran football team members change minds over asylum", "Date": "Sat, 14 Mar 2026 20:48:55 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c98gz372683o?at_medium=RSS&at_campaign=rss", "Summary": "Three Iranian women's football team members granted asylum in Australia\u2014Zahra Soltan Meshkehkar, Mona Hamoudi, and Zahra Sarbali\u2014have decided to return to Iran, rejoining their team. Initially seeking refuge, only three of seven players remain in Australia; others have either returned home or changed their minds. The Iranian sports ministry praised the team\u2019s patriotism amid accusations of psychological pressure.", "Content": "Three more members of the Iranian women's football delegation who were granted humanitarian visas to stay in Australia have changed their minds and will return home. The trio has been identified as Zahra Soltan Meshkehkar, Mona Hamoudi, and Zahra Sarbali.\n\nConcerns grew for the Iranian team after they remained silent during the country's anthem in their opening Asian Cup match against South Korea on 2 March, leading to accusations of being \"war traitors\" in Iran.\n\nAustralia's home affairs minister confirmed that the government had done everything possible to ensure the women had a safe future in the country. Tony Burke stated, \"Australians should be proud that it was in our country that these women experienced a nation presenting them with genuine choices and interacted with authorities to help them. While the Australian government can ensure that opportunities are provided and communicated, we cannot remove the context in which the players are making these incredibly difficult decisions.\"\n\nIran's sports ministry also confirmed the news, first reported by Tasnim News Agency, which is linked to the Islamic Revolutionary Guard Corps. The ministry issued a statement praising the \"national spirit and patriotism of the Iranian women's national football team\" and accused Australia's government of \"playing in Trump's field.\" \n\nTasnim reported that the three players were en route to Kuala Lumpur, Malaysia, to rejoin the rest of the squad, returning to their families and homeland after withdrawing their asylum applications in Australia. The agency claimed they had resisted \"psychological warfare, extensive propaganda, and seductive offers.\"\n\nOf the seven players who initially expressed a desire to stay in Australia, only three now remain as defectors. One player decided to return to Iran on Wednesday. Hamoudi and Sarbali were among the original five who refused asylum, having escaped from the team's hotel on the Gold Coast and been taken to a safe house by Australian Federal Police.\n\nZahra Soltan Meshkehkar, a member of the team's technical staff, was one of two women to seek asylum the following day. The other, Mohaddeseh Zolfi, changed her mind hours after being granted the right to stay and has reportedly rejoined the team.", "Image_URLs": "docs/images/bbc_1_1773522535784.jpg"}, {"Source": "Polygon", "Title": "Invincible's showrunners reveal the brutal truth about 'superhero fatigue'", "Date": "Sat, 14 Mar 2026 15:30:17 GMT", "Author": "Jake Kleinman", "URL": "https://www.polygon.com/invincible-season-4-showrunners-superhero-fatigue/", "Summary": "Superhero movies and TV shows are experiencing a decline in cultural dominance, with audiences now expecting higher quality and innovation. Creators like Robert Kirkman of Invincible emphasize the need for the genre to evolve and stand out amid fierce competition from a vast array of existing content across streaming platforms. Success now requires originality and exceptional execution.", "Content": "Superhero movies aren\u2019t the cultural phenomenon they once were, with both Hollywood executives and fans sensing a decline in their dominance. Marvel\u2019s once-unmatched cultural influence and even mediocre DC films could still perform well at the box office, but the returns on comic-book-based action films are diminishing. Television has faced similar challenges; for example, reactions to Wonder Man contrast sharply with WandaVision, which earned a sequel despite mixed reviews.\n\nAre onscreen superheroes past their prime? Not according to the showrunners of Invincible, which returns for its fourth season on Prime Video on March 18. Franchise creator Robert Kirkman told Polygon that the superhero obsession remains, but audiences have become more savvy and accustomed to the genre. The issue isn\u2019t boredom but the need for the genre to evolve. Being merely competent is no longer enough, as audiences have grown accustomed to the storytelling style since Marvel movies began releasing multiple films annually.\n\nKirkman emphasized that superhero stories need to elevate the genre to meet heightened audience expectations. His co-showrunner, Simon Racioppa, agreed, noting that the bar for these films remains high and that the genre\u2019s success has raised expectations for each new release. To stand out, creators must offer something unique or execute exceptionally well across all aspects.\n\nThe challenge extends beyond superheroes to the broader media landscape. When the Marvel Cinematic Universe launched with Iron Man in 2008, streaming services like Netflix were just emerging. Today, each new movie or show competes not just with other recent releases but with every piece of content ever produced. Kirkman pointed out that on streaming platforms, a show is often competing with classics like Friends or Seinfeld, making it harder to break through.\n\nHe concluded that creators must find ways to be distinctive and capture viewers\u2019 attention in a crowded, scrolling world, whether making superhero content or other genres.", "Image_URLs": "docs/images/polygon_3_1773522600848.jpg"}, {"Source": "New York Times - World", "Title": "Iran War Live Updates: U.S. Tells Citizens to Leave Iraq After Second Attack on Embassy", "Date": "Sat, 14 Mar 2026 20:52:15 +0000", "Author": "The New York Times", "URL": "https://www.nytimes.com/live/2026/03/14/world/iran-war-trump-oil-israel", "Summary": "The U.S. Embassy in Baghdad urged Americans to leave Iraq immediately after Iran-backed militias, including Kataib Hezbollah, attacked the embassy. The U.S. responded with airstrikes on Iran\u2019s Kharg Island. Tensions escalated with threats to target Iranian oil infrastructure and Iran\u2019s control over the Strait of Hormuz. Israel also launched strikes in Tehran and Beirut amid ongoing conflict, with significant civilian casualties reported in Iran and Lebanon.", "Content": "The U.S. Embassy in Baghdad urged all American citizens to leave Iraq immediately after being attacked overnight for the second time since the start of the war with Iran. The warning stated that militias allied with Iran had carried out numerous attacks on targets associated with the United States, including diplomatic facilities, American companies, and hotels frequented by foreigners. It recommended Americans travel overland to neighboring countries because commercial flights were not operating and warned them not to come to the embassy or a U.S. consulate in Erbil.\n\nKataib Hezbollah, an Iran-backed militia in Iraq, claimed responsibility for the attack, stating it had fired on the embassy the previous night. A video verified by The New York Times showed a structure on the embassy\u2019s roof on fire. Two Iraqi security officials confirmed the attack but could not provide additional details.\n\nOvernight, U.S. airstrikes targeted military sites on Kharg Island, home to Iran\u2019s main oil export terminal. President Trump threatened to bomb Iranian oil infrastructure on the island if Tehran did not allow ships to pass through the Strait of Hormuz, a critical waterway through which a fifth of the world\u2019s oil transits. Iran\u2019s Islamic Revolutionary Guards Corps asserted that the Strait was under its full control and warned that any transit attempts would be targeted. Trump called on other countries, including Britain, France, and China, to send warships to Iran to help ensure the passage of oil tankers, promising U.S. coordination.\n\nOil prices have risen sharply since the U.S. and Israel launched their air campaign against Iran two weeks ago, unsettling global markets.\n\nIn other developments, Israel\u2019s military bombarded Tehran and the southern outskirts of Beirut, while Hezbollah launched rockets and drones into Israeli territory. Residents in Tehran described a tense atmosphere, with some expressing uncertainty about future events. \n\nSince the conflict began, at least 1,348 civilians in Iran have been killed, according to Iran\u2019s UN representative. In Lebanon, officials reported 826 deaths and over 2,000 injuries.", "Image_URLs": "docs/images/nyt_1_1773522430275.jpg"}, {"Source": "Star Phoenix", "Title": "Opinion: 'In the darkest days, Saskatchewan showed us what community means'", "Date": "Sat, 14 Mar 2026 12:00:48 +0000", "Author": "Steve Bartlett", "URL": "https://thestarphoenix.com/opinion/letters/opinion-in-the-darkest-days-saskatchewan-showed-us-what-community-means", "Summary": "Sergio Losco and Marina Hills thank the people of Saskatchewan for their support after their 11-year-old son Henry died in December 2025. They urge mandatory carbon monoxide detectors, regular inspections, and stricter legislation to prevent future tragedies. They honor Henry's memory and aim to turn their loss into lasting change.", "Content": "Sergio Losco and Marina Hills, with their son Henry, who passed away in December. From the depths of our broken but healing hearts, Sergio and I want to say thank you \u2014 to the people of Saskatchewan, to Regina, and to every single person who has wrapped us in love since we lost our beloved 11-year-old son, Henry Losco, on Dec. 19, 2025.\n\nPlease check your carbon monoxide alarms today. Push for mandatory, working detectors in every unit, regular inspections with real enforcement, and legislation with teeth to hold those responsible accountable. Let\u2019s turn Henry\u2019s light into lasting change \u2014 so no more families lose a child to this hidden danger.\n\nFrom the bottom of our hearts: Thank you, Saskatchewan. You\u2019ve embraced us, supported us, and given us hope. Henry\u2019s memory lives in your kindness, and we will keep fighting for justice in his name.", "Image_URLs": "docs/images/star_phoenix_2_1773522396542.jpg"}, {"Source": "Laravel News", "Title": "Laracon AU Returns to Brisbane - Call for Speakers Now Open", "Date": "Wed, 11 Mar 2026 02:17:27 +0000", "Author": "Michael Dyrynda", "URL": "https://laravel-news.com/laracon-au-returns-for-2026?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Laracon AU 2026 will be held in Brisbane, Australia, from November 4-6, featuring technical talks on Laravel development, architecture, and best practices. The Call for Papers is open until April 17, inviting community submissions. The event aims to connect Laravel developers across the APAC region, with additional pre-conference activities planned. More details will be announced later.", "Content": "Laracon AU will return to Brisbane, Australia, on November 4-6, 2026, bringing the Laravel community together once again. Now in its sixth year, Laracon AU has become a gathering point for Laravel developers across the APAC region and beyond. Attendees can expect two days of technical talks, hallway conversations, and shared experiences building real applications with Laravel.\n\nThe Call for Papers is now open, inviting the community to submit talks for this year's event. The 2026 schedule will emphasize deep technical content and real-world implementation. Talks will focus on practical architecture, production patterns, and lessons learned from solving complex problems in modern Laravel applications. Topics may include scaling queues, designing resilient architecture, performance tuning, testing strategies, and integrating emerging tooling into Laravel workflows. The goal is to present talks that developers can immediately apply to their projects. Those who have built interesting solutions, solved difficult problems, or discovered beneficial patterns are encouraged to submit proposals.\n\nLaracon AU 2026 will be held in Brisbane, a city known for its warm spring weather, riverfront precincts, and vibrant developer community. Attendees traveling from interstate or overseas may want to plan to arrive earlier in the week. There will be additional opportunities to learn, connect, and explore Laravel's technical aspects before the main conference begins, with activities planned for Wednesday. It is recommended to arrive Tuesday evening or early Wednesday and to depart after 8 pm on Friday to fully enjoy the event.\n\nThe conference continues to bring together developers from across the Laravel ecosystem\u2014including engineers, maintainers, founders, and community members\u2014to share ideas and advance the craft. Details about speaker announcements, ticket releases, and other event information will be shared in the coming months. The Call for Papers closes on April 17th. Interested individuals are encouraged to submit their proposals now. Updates can be followed at laracon.au and on social media.", "Image_URLs": "docs/images/laravel_2_1773522507940.png"}, {"Source": "Variety", "Title": "Jamie Lee Curtis Likely Would Have Passed on Jason Blum\u2019s \u2018Halloween\u2019 Sequel If She Knew It Was a Trilogy. So, She Used It to Get a Development Deal", "Date": "Sat, 14 Mar 2026 20:59:37 +0000", "Author": "Emily Longeretta", "URL": "https://variety.com/2026/film/news/jamie-lee-curtis-halloween-trilogy-1236688041/", "Summary": "Jamie Lee Curtis discussed her surprise extension of her \u201cHalloween\u201d role, initially expecting only one film. She credited Jason Blum for reviving the franchise and used her deal to secure funding for other projects. Curtis also highlighted her producing work, including \u201cThe Lost Bus,\u201d and noted her mixed feelings about the horror genre despite her iconic status.", "Content": "Jamie Lee Curtis didn\u2019t know she was about to take on three more \u201cHalloween\u201d movies when she said yes to David Gordon Green\u2019s 2018 film, the sequel to her 1978 film. During a SXSW panel titled, \u201cIf Not Now, When, if Not Me, Who? Pivoting and Manifesting,\u201d Curtis opened up about filmmaking and her career as an actress and producer. She first named her appreciation for Jason Blum.\n\n\u201cThe only reason I am sitting in this chair today is because of Jason. Jason Blum, who runs Blumhouse, is the one who brought back the \u2018Halloween\u2019 movies,\u201d she said. However, when she got the call, she thought it was one movie and didn\u2019t hear until way later that they were planning to do more.\n\n\u201cIf they had come to me and said it\u2019s going to be a trilogy, I don\u2019t think I would have said yes,\u201d she said. \u201cJason Blum is notoriously cheap. How do you make low-budget movies? You don\u2019t pay people. That\u2019s the model.\u201d \n\nSo, she used it to her advantage. \u201cWhile we were editing and doing the mix, David said, \u2018You know it\u2019s a trilogy.\u2019 I was like, \u2018Uh, no.\u2019 I went to Jason Blum and said, \u2018I have some ideas, maybe you could give me a first look deal, just pay me a little money,\u2019\u201d she recalls. \u201cI said to Jason, \u2018How about a little development deal?\u2019 And I owed him two \u2018Halloween\u2019 movies, so what was he gonna say?\u201d\n\nCurtis wanted the extra money to pay Russell Goldman, a filmmaker who was working with her to try and get \u201cMother Nature\u201d made. Goldman now works in development for Curtis\u2019s Comet Pictures, and he\u2019s making his directorial feature debut at SXSW with \u201cSender.\u201d The premiere will be the first time Curtis ever saw the Comet Pictures logo on the big screen.\n\n\u201cJason Blum gave me a vanity deal,\u201d she says, referencing an earlier moment of the conversation where they discussed how every actor takes the producer credit differently. She added that Blum likely never expected she\u2019d then call him for multiple projects. For example, Curtis heard an NPR story about a school bus driver and teacher who saved 22 children and said she wanted to produce it. This year, the Apple TV film \u201cThe Lost Bus\u201d is nominated at the Oscars for Best Visual Effects.\n\nLater in the conversation, the moderator brought up that the Academy is finally respecting the horror genre with the massive amount of love for \u201cSinners.\u201d Curtis noted that although she\u2019s a Scream Queen, she doesn\u2019t love the genre.", "Image_URLs": "docs/images/variety_2_1773522632136.jpg"}, {"Source": "CBC News - World", "Title": "Russian strike on Kyiv region kills 4, wounds 15", "Date": "Sat, 14 Mar 2026 14:13:51 EDT", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/russian-strike-kyiv-energy-infrastructure-9.7128990?cmp=rss", "Summary": "A Russian missile and drone attack on Kyiv region killed at least four people and wounded 15, damaging infrastructure. Ukraine reported around 430 drones and 68 missiles, targeting energy and military sites. The U.S. postponed talks with Ukraine amid Middle East conflicts, which may impact Western support. Zelenskyy urged increased air defense production.", "Content": "A combined Russian missile and drone attack on the Kyiv region killed at least four people and wounded 15, a Ukrainian official said Saturday. The attack hit four districts, damaging residential buildings, educational institutions, enterprises, and critical infrastructure. The head of the regional administration, Mykola Kalashnyk, reported that three of the wounded were in critical condition.\n\nUkrainian President Volodymyr Zelenskyy stated that the main target of the strikes was the energy infrastructure of the Kyiv region. He said Russia launched around 430 drones and 68 missiles. Russia's Defence Ministry announced that the nighttime strikes targeted energy and industrial facilities serving Ukraine's armed forces, as well as military airfields.\n\nThe United States postponed planned talks between the two sides due to the ongoing war in the Middle East. The conflict has led to increased global energy prices and has been used by Russia to potentially deplete Western military supplies and reduce support for Ukraine. Zelenskyy called on Western partners to increase the production of air defense missiles amid the attacks.", "Image_URLs": "docs/images/cbc_2_1773522413966.jpg"}, {"Source": "Smashing Magazine", "Title": "Building Dynamic Forms In React And Next.js", "Date": "Tue, 10 Mar 2026 13:00:00 GMT", "Author": "hello@smashingmagazine.com (Sunil Sandhu)", "URL": "https://smashingmagazine.com/2026/03/building-dynamic-forms-react-next-js/", "Summary": "Most React developers view forms as components using React Hook Form, Zod, and React Query, which work well for simple cases. However, complex forms with conditional logic and derived values often shift from UI to decision processes, breaking this mental model. The article compares this traditional approach with Survey JS, which treats forms as data, offering an alternative suitable for complex scenarios.", "Content": "There\u2019s a mental model most React developers share without ever discussing it out loud. That forms are always supposed to be components. This means a stack like:\n\nReact Hook Form for local state (minimal re-renders, ergonomic field registration, imperative interaction).  \nZod for validation (input correctness, boundary validation, type-safe parsing).  \nReact Query for backend: submission, retries, caching, server sync, and so on.  \n\nAnd for the vast majority of forms \u2014 your login screens, your settings pages, your CRUD modals \u2014 this works really well. Each piece does its job, they compose cleanly, and you can move on to the parts of your application that actually differentiate your product.\n\nBut every once in a while, a form starts accumulating things like visibility rules that depend on earlier answers, or derived values that cascade through three fields. Maybe even entire pages that should be skipped or shown based on a running total.\n\nYou handle the first conditional with a useWatch and an inline branch, which is fine. Then another. Then you\u2019re reaching for superRefine to encode cross-field rules that your Zod schema can\u2019t express in the normal way. Then, step navigation starts leaking business logic. At some point, you look at what you\u2019ve built and realize that the form isn\u2019t really UI anymore. It\u2019s more of a decision process, and the component tree is just where you happened to store it.\n\nThis is where I think the mental model for forms in React breaks down, and it\u2019s really nobody\u2019s fault. The RHF + Zod stack is excellent at what it was designed for.\n\nThe issue is that we tend to keep using it past the point where its abstractions match the problem because the alternative requires a different way of thinking about forms entirely.\n\nThis article is about that alternative. To show this, we\u2019ll build the exact same multi-step form twice:  \nWith React Hook Form + Zod wired to React Query for submission,  \nWith Survey JS, which treats a form as data \u2014 a simple JSON schema \u2014 rather than a component tree.  \n\nSame requirements, same conditional logic, same API call at the end. Then we\u2019ll map exactly what moved and what stayed, and lay out a practical way to decide which model you should use, and when.", "Image_URLs": "docs/images/smashing_3_1773522475699.jpg"}, {"Source": "Saskatoon Police News", "Title": "Arrest - Assault / Weapon - 1200 Block Avenue H North", "Date": "Thu, 12 Mar 2026 19:49:14 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026130", "Summary": "A man was arrested on March 8, 2026, after officers responded to an assault report at a residence on Avenue H North. He was found attempting to destroy drugs and ammunition. A search warrant recovered a handgun, prohibited magazine, ammunition, and holster. The 35-year-old faces six firearms-related charges and assault causing bodily harm.", "Content": "One man was arrested following a report of an assault. Shortly before 3:00 a.m. on March 8, 2026, members of patrol were called to a residence in the 1200 block of Avenue H North for a report of an assault. Upon arrival, officers entered the residence and located the suspect attempting to destroy illicit drugs and ammunition. He was taken into custody, and members of the Guns and Gangs Unit were notified to assist with the investigation.\n\nFollowing the execution of a search warrant, the following items were seized: a KAHR CW9 9mm handgun, a prohibited magazine, ammunition, and a concealable holster. The 35-year-old man is facing six firearms-related charges in addition to assault causing bodily harm.", "Image_URLs": "docs/images/saskatoon_police_3_1773522521071.jpg"}, {"Source": "TechCrunch", "Title": "Honda is killing its EVs \u2014\u00a0and any chance of competing in the future", "Date": "Sat, 14 Mar 2026 17:23:24 +0000", "Author": "Tim De Chant", "URL": "https://techcrunch.com/2026/03/14/honda-is-killing-its-evs-and-any-chance-of-competing-in-the-future/", "Summary": "Honda has ceased its EV programs, including the Acura RDX, Honda 0 sedan and SUV, and the GM-built Prologue, citing tariffs and Chinese competition. The move suggests Honda is abandoning its EV ambitions, risking falling behind in electric and software-driven vehicle development, and missing opportunities to optimize EV design from the ground up.", "Content": "I get it; it\u2019s not an easy time for a legacy automaker to be selling electric vehicles, what with incentives being gutted and Chinese automakers knocking at the door. But Honda is taking it to another level. This week, Honda killed its paltry \u2014 and frankly unpromising \u2014 EV programs. What little motivation Honda had to compete in the EV arena is apparently gone, and along with it, any chance of surviving the current wave of disruption that\u2019s sweeping the industry.\n\nThe company casts blame on U.S. tariffs and Chinese competition, two easy targets. But it never really had a viable EV strategy to begin with. Honda kicked things off on Thursday by halting development of the electric Acura RDX and the Honda 0 sedan and SUV, three models that were the company\u2019s first ground-up EVs \u2014 but about which very little was shared with outsiders. It continued on Friday, with Automotive News reporting that Honda was going to stop production of the Prologue, a vehicle that was essentially designed and entirely built by GM.\n\nThe decision could backfire in a number of different ways, but there are two that I\u2019d argue are most important. By shelving EVs, Honda will fall farther behind in two of the biggest shifts sweeping the automotive industry: electric drivetrains and software-defined vehicles.\n\nTo Honda \u2014 and to many legacy automakers still early in the transition \u2014 an EV is just a car with a different drivetrain. I can imagine Honda executives thinking that they can wait out the awkward transition period and, when motors and batteries are fully sorted, simply swap out the fossil fuel bits. How hard could it be?\n\nThat\u2019s a mistake, of course. Many automakers have found that dropping batteries into a car originally designed for an internal combustion engine doesn\u2019t work out so well. It might shortcut the development cycle, but the resulting product ends up heavy, inefficient, and more costly to produce.\n\nWhen developed as an original product, EVs offer automakers a chance to rethink the automobile, and in the process, make it cheaper. The failure to pursue this opportunity could leave Honda and other legacy automakers at a disadvantage as the industry continues to evolve toward electric and software-centric vehicles.", "Image_URLs": "docs/images/techcrunch_2_1773522567705.jpg"}, {"Source": "Ars Technica", "Title": "NASA officials sidestepped questions on Artemis II risks\u2014there's a reason why", "Date": "Sat, 14 Mar 2026 00:17:31 +0000", "Author": "Stephen Clark", "URL": "https://arstechnica.com/space/2026/03/flying-to-the-moon-for-the-first-time-in-54-years-is-risky-but-how-risky/", "Summary": "NASA officials acknowledged the risks of Artemis II, the first crewed Moon mission since 1972, emphasizing its novelty and limited data from previous tests. The nine-day mission, launching no earlier than April 1, involves new spacecraft and a trajectory far beyond Earth. Despite uncertainties, NASA approved final preparations, highlighting ongoing risk mitigation efforts.", "Content": "When talking about risk during a press conference on Thursday, the NASA officials in charge of the upcoming Artemis II Moon mission hedged their answers. Reporters\u2019 questions on the risks were certainly valid and appropriate. In an open society, it is vital to set expectations for any hazardous venture such as spaceflight\u2014most importantly for the astronauts actually making the journey, but also for NASA\u2019s workforce, the White House, lawmakers, and members of the public paying for the endeavor.\n\nWhat\u2019s more, Artemis II will be the first mission since 1972 to fly humans to the vicinity of the Moon. This is not following the well-trodden yet perilous path that astronauts take to reach the International Space Station, just a few hundred miles above Earth. Artemis II will travel more than 1,000 times farther from Earth than the ISS, departing on a trajectory taking the mission several thousand miles beyond the far side of the Moon. The mission will last nine days from liftoff in Florida to splashdown in the Pacific Ocean. The four-person crew will ride a rocket and spacecraft\u2014the Space Launch System and Orion\u2014that have flown together just once before. The sheer novelty of the mission makes it difficult to quantify the risk, NASA officials said Thursday.\n\nWith just a single data point from flight testing\u2014the unpiloted Artemis I demo mission in 2022\u2014NASA managers were reluctant to publicize the bottom-line number from the probabilistic risk assessment for Artemis II. Lori Glaze, NASA\u2019s acting associate administrator for exploration system development, said the agency completed an assessment for Artemis II but questioned the exercise\u2019s usefulness. \u201cI think sometimes we get tricked into believing that those numbers are somehow really telling us something critically important,\u201d Glaze said. \u201cI think they\u2019re valuable. I think we can do things in a relative sense to measure what\u2019s more risky or less risky.\u201d\n\nGlaze and other members of the Artemis II management team were speaking with reporters at NASA\u2019s Kennedy Space Center following a flight readiness review. The two-day conclave in Florida provided the forum for a \u201cvery open\u201d and \u201ctransparent\u201d discussion of NASA\u2019s \u201crisk posture\u201d heading into the Artemis II launch, and \u201chow we\u2019re mitigating those risks,\u201d Glaze said. The decision-makers present for the meeting unanimously agreed to continue final preparations for the Artemis II mission, now scheduled for liftoff no earlier than April 1 at 6:24 pm EDT (22:24 UTC). \u201cIt is a test flight, and it is not without risk, but our team and our hardware are ready,\u201d Glaze said. The four astronauts training to fly on Artemis II joined the Flight Readiness Review (FRR) virtually from their home base in Houston. Their participation included discussion of the Orion spacecraft\u2019s heat shield and reentry trajectory.", "Image_URLs": "docs/images/ars_technica_3_1773522665701.jpg"}, {"Source": "TechCrunch", "Title": "US Army announces contract with Anduril worth up to $20B", "Date": "Sat, 14 Mar 2026 20:47:47 +0000", "Author": "Anthony Ha", "URL": "https://techcrunch.com/2026/03/14/us-army-announces-contract-with-anduril-worth-up-to-20b/", "Summary": "The U.S. Army signed a 10-year, up to $20 billion contract with defense startup Anduril for hardware, software, and services, consolidating over 120 procurement actions. The deal emphasizes rapid software deployment for modern warfare. Anduril, co-founded by Palmer Luckey, reported $2 billion revenue last year and is seeking new funding at a $60 billion valuation.", "Content": "The U.S. Army announced late Friday that it has signed a 10-year contract with defense technology startup Anduril. The deal could be worth up to $20 billion. The contract begins with a five-year \u201cbase period,\u201d with an option to extend for an additional five years, and includes Anduril hardware, software, infrastructure, and services. The Army describes the agreement as a single enterprise contract consolidating more than 120 separate procurement actions for Anduril\u2019s commercial solutions.\n\n\u201cThe modern battlefield is increasingly defined by software,\u201d said Gabe Chiulli, the chief technology officer at the Department of Defense\u2019s Office of the Chief Information Officer. \u201cTo maintain our advantage, we must be able to acquire and deploy software capabilities with speed and efficiency.\u201d\n\nAnduril was co-founded by Palmer Luckey, known for selling VR startup Oculus to Facebook (now Meta). Facebook fired Luckey after controversy arose following reports that he donated to a pro-Trump political group. Luckey has stated that the media misrepresented his political views. According to a recent feature in The New York Times, Luckey and Anduril have been embraced by the second Trump administration due to his vision for transforming the U.S. military with autonomous fighter jets, drones, submarines, and more. The company, named after a magical object in \u201cThe Lord of the Rings,\u201d reportedly brought in around $2 billion in revenue last year.\n\nSeparate reports indicate that Anduril is in discussions to raise a new funding round at a $60 billion valuation.", "Image_URLs": "docs/images/techcrunch_1_1773522558830.jpg"}, {"Source": "Polygon", "Title": "The RAM crisis could completely change the way developers make games", "Date": "Sat, 14 Mar 2026 16:00:17 GMT", "Author": "Giovanni Colantonio", "URL": "https://www.polygon.com/ram-crisis-gdc-2026-analysis/", "Summary": "At this year's GDC, industry stress was high due to layoffs, AI anxieties, and global politics. A major focus was the RAM crisis, driven by AI data center demands, causing a 300% price increase and supply shortages. Developers expressed concerns about rising costs affecting personal upgrades and potential impacts on game development and market competition. The crisis may persist for two years.", "Content": "There were a lot of reasons for developers to be stressed out at this year's Game Developers Conference. Layoffs at EA the day the event started put job insecurity in the air, generative AI's presence at the show sparked existential dread, and the inescapable anxiety of world politics made it hard to focus on creating video games. Those are some heavy topics, and they were only made worse by an economic problem currently plaguing the game development industry: the RAM crisis.\n\nThe skyrocketing cost of memory driven by AI was a major topic at this year's GDC. If you didn't bring it up with someone in a conversation, it was because they did first. It was one of the most important narratives of the show, casting a shadow over Xbox's grand Project Helix ambitions and raising questions about how rising prices could impact how games are made. No developer I spoke to quite knew the next steps for navigating the crisis, but several saw it as a moment to finally have a serious conversation about the industry's insatiable hunt to create the most high-end games possible.\n\nOn the consumer side, the impact of the memory supply shortage is simple: RAM has gotten more expensive. Earlier this year, PC Gamer shared data showing that the price of RAM has a 300% increase in some cases. Upgrading your PC right now is pricier as a result, but the problem is only snowballing due to how many products ship with a memory component. It\u2019s not your everyday shopper who is having trouble buying RAM, but the companies making the products that use it too.\n\nWhat\u2019s the problem? In very simplified terms, AI data centers require a lot of memory. There are only a handful of major memory manufacturers (Samsung and Micron, for instance) making those products, and they can make a lot more money if they sell specialized parts to AI companies rather than consumers. With more chips spoken for, low supply has led to higher costs for the rest of us. You\u2019d think that the easy solution would be \u201cjust produce more chips,\u201d but that\u2019s easier said than done for a variety of factors, including the fact that RAM requires a lot of rare metals to produce. It\u2019s also not as simple as spinning up some competing manufacturers, as that would take years. We\u2019re at a dead end, and developers at GDC told me that we might be there for another two years.\n\nThe developers I spoke to were split on just how much that would impact game development directly. Some said that they were annoyed that it was more expensive to upgrade their own personal PCs, but that they didn\u2019t feel it was having a knock-on effect for creating their games. Others in the space noted some tangential side effects.\n\n\u201cIt does wind up in our conversations particularly when we\u2019re looking at the competition,\u201d one marketing professional told me. \u201cIf you\u2019re asking people to suddenly pay more for their systems, that\u2019s fewer games than they can purchase. So it does change some of the conversations around how we have to adapt.\u201d", "Image_URLs": "docs/images/polygon_2_1773522593473.jpg"}, {"Source": "Saskatoon Police News", "Title": "Arrests - Firearms Investigation - 1300 Block 8th Street East", "Date": "Wed, 11 Mar 2026 15:29:09 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026129", "Summary": "Two individuals, a 26-year-old male and a 19-year-old female, face 17 charges after police responded to a report of a firearm in a taxi on March 10, 2026. Police seized a pellet gun, and arrested them at a motel, discovering bear spray, batons, knives, a machete, cell phones, cash, and methamphetamine.", "Content": "Two people are facing charges after police responded to a report of a firearm yesterday. At approximately 9:30 p.m. on March 10, 2026, it was reported that two individuals had left a firearm in the back of a taxi they had exited in the 1300 block of 8th Street East. Police seized the firearm, which was determined to be a pellet gun, and attended a suite in a motel where they arrested a male and female. \n\nUpon their arrest and further investigation, police located three cans of bear spray, two expandable batons, two knives, a machete, multiple cell phones, cash, and methamphetamine packaged for distribution. A 26-year-old male and a 19-year-old female are facing a total of 17 charges.", "Image_URLs": "docs/images/saskatoon_police_6_1773522526891.png"}, {"Source": "BBC News - World", "Title": "Hamas urges key ally Iran to halt attacks on Gulf states", "Date": "Sat, 14 Mar 2026 13:34:17 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cvg3xk6xgyzo?at_medium=RSS&at_campaign=rss", "Summary": "Hamas called on Iran to stop attacking Gulf states, urging regional cooperation. While supporting Iran\u2019s right to defend itself against US and Israeli strikes, Hamas expressed concern over regional violence. Iran\u2019s retaliatory missile and drone attacks have killed at least 18 people across Gulf countries. The conflict involves Iran, Hamas, Israel, and the US, with ongoing tensions and casualties in Gaza.", "Content": "The Palestinian armed group Hamas has called on Iran to stop attacking Gulf states, in a rare appeal to its key ally. The Tehran-backed group urged its \"brothers in Iran to avoid targeting neighbouring countries,\" stating that all regional nations should cooperate \"to preserve the bonds of brotherhood.\" At the same time, Hamas, which runs Gaza, affirmed Tehran's right to defend itself against attacks by the US and Israel, which are continuing to strike Iran.\n\nIranian authorities have said their retaliatory strikes target \"American installations\" on Gulf soil rather than the neighbors themselves, but many attacks have hit civilian infrastructure. Hamas said on Saturday that it had been following the war in the region with \"deep concern\" and called upon \"all states and international organisations to work towards halting [the war] immediately.\" Iran has not publicly commented on Hamas's statement.\n\nTehran's retaliatory drone and missile strikes have impacted many of its Gulf neighbors over the past two weeks. At least 18 people have been killed across the region so far, most of them security personnel or foreign workers. Six people have been killed in the United Arab Emirates (UAE) and another six in Kuwait, while Oman, Saudi Arabia, and Bahrain have all reported two deaths each.\n\nThe Palestinian group has previously condemned as a \"heinous crime\" the assassination of Iran's Supreme Leader Ali Khamenei and joint US-Israeli strikes on the first day of the war on 28 February. Hamas is part of Iran's \"axis of resistance,\" a coalition aimed at countering US and Israeli influence. Turkey and Qatar, which have recently come under Iranian attacks, also provide significant financial and political support to Hamas.\n\nThe group fought a devastating war against Israel in Gaza for more than two years. A US-imposed ceasefire began last October, and negotiations continue over subsequent phases of the deal. Israel and Hamas have accused each other of near-daily violations of the ceasefire. The Hamas-run health ministry reported that 649 people had been killed in Gaza since the ceasefire took effect.", "Image_URLs": "docs/images/bbc_3_1773522542983.png"}, {"Source": "Ars Technica", "Title": "Woman sneezes out maggots after fly larvae get trapped in her deviated septum", "Date": "Fri, 13 Mar 2026 22:38:10 +0000", "Author": "Beth Mole", "URL": "https://arstechnica.com/health/2026/03/woman-sneezes-out-maggots-after-fly-larvae-get-trapped-in-her-deviated-septum/", "Summary": "A Greek woman, aged 58, holds the record for the longest parasitic sheep bot fly in her nose, with larvae progressing to the pupa stage\u2014previously thought impossible in humans. After swarming by flies, she experienced symptoms and expelled larvae, with genetic analysis confirming the species. This case challenges previous beliefs that fly development cannot advance beyond early larval stages in humans.", "Content": "A 58-year-old woman in Greece appears to hold the record for growing a parasitic sheep bot fly in her nose the longest, almost creating a snot rocket that could literally fly. Usually, when the sheep bot fly accidentally enters a human\u2019s nose, the first-stage larvae they deliver do not develop further. In its normal target\u2014a sheep\u2019s nose\u2014the larvae move into the sinuses, feed, grow, and molt into second- and third-stage larvae. From there, the flies (Oestrus ovis) drip from the nose onto the ground, burrow into the soil, pupate, and emerge as adult flies.\n\nFor a long time, experts believed that the flies could not complete their development in humans beyond the first larval stage. However, a few human cases have been reported in recent decades involving second- and third-stage larvae. The woman\u2019s case, reported in the Journal of Emerging Infectious Diseases by a medical entomologist and colleagues, goes the furthest yet, with findings of pupa and a puparium\u2014the hard casing of a pupa\u2014in her nose.\n\nThe experts noted that the woman worked outdoors on a Greek island near a field with grazing sheep. On a hot, dry September day, she recalled being swarmed by flies. About a week later, she experienced facial pain and developed a cough over the next two to three weeks. These were her only symptoms until October 15, when she sneezed and reported that \u201cworms\u201d came out of her nose. They were, in fact, late-stage sheep bot fly larvae.\n\nShe underwent surgery to remove the mucus and larvae, recovering 10 larvae at various stages and a pupa. Genetic testing and DNA sequencing confirmed they were sheep bot flies, as did visual inspection of two third-stage larvae and the puparium. The third instar larva was yellowish with rows of spines on the ventral surface, and the posterior peritremes were circular with a central button. The broken puparium was black and wrinkled, containing remnants of the pupa.\n\nNot only had experts never found a pupa in a human nose before, but they also believed that development to that stage was \u201cbiologically implausible.\u201d They noted that the paranasal sinus environment does not meet the temperature and humidity requirements for pupation, and host secretions and immune responses further inhibit development.", "Image_URLs": "docs/images/ars_technica_6_1773522674060.jpg"}, {"Source": "CBC News - World", "Title": "Israel dropped 'propaganda' leaflets in Lebanon amid ongoing offensive against Hezbollah", "Date": "Fri, 09 Jan 2026 12:00:37 EST", "Author": "", "URL": "https://www.cbc.ca/news/world/lebanon-israel-propaganda-leaflets-9.7128940?cmp=rss", "Summary": "Israel dropped propaganda leaflets in Beirut amid its offensive against Hezbollah, warning residents to disarm or face consequences. The leaflets, evoking Gaza conflicts, urged sharing intelligence with Israeli forces and included QR codes. Experts consider the leaflets potentially a war crime, citing concerns over civilian safety and psychological impact. Lebanese residents expressed fear and confusion over the incident.", "Content": "Israel dropped propaganda leaflets in Lebanon amid ongoing offensive against Hezbollah\n\nOn Friday, two loud booms echoed in Beirut before Israeli leaflets started raining down on residents, spreading captions that evoke Israel's ongoing offensive in Gaza and urge Lebanese residents to share information with Israeli intelligence. Experts explain why they amount to propaganda and possibly a war crime.\n\nOne expert said the leaflets could amount to a war crime, while another blames the conflict on Hezbollah.\n\nAfter widening strikes across Lebanon, Israel's military dropped leaflets warning people to disarm Hezbollah or face the consequences. Lebanon reports that the fighting has killed more than 600 people and displaced 800,000 others.\n\nThe leaflets included captions that evoke Israel's ongoing offensive in Gaza and urge Lebanese residents to share information with Israeli intelligence. They stated, \"In light of the resounding success in Gaza, the New Reality Newspaper arrives in Lebanon.\" The leaflets appealed directly to Lebanese citizens, encouraging them to contact Unit 504, an intelligence arm of the Israel Defence Forces (IDF), if they \"want to be part of real change and contribute to the prosperity and protection of your country.\" QR codes on the leaflets directed people to chats on Facebook and WhatsApp, but Lebanese authorities and residents warned each other not to scan the codes out of fear of data breaches.\n\nOther statements on the leaflets included: \"Lebanon is your decision\" and \"Your land is yours, don't let it become 'free money' for Iranian Hezbollah's weapons.\" \n\nThis is not the first time Israel has dropped leaflets over residential areas. In Gaza, the Israeli army has previously dropped leaflets ordering civilians to evacuate ahead of imminent strikes\u2014a move condemned by human rights groups like Amnesty International for what they say amounts to forced displacement of civilians and collective punis
