e also sued for refunds on these tariffs, which have resulted in the collection of over $200 billion in total import duties, according to Nintendo\u2019s complaint.\n\nNintendo confirmed the filing in a statement to Tech Crunch, saying, \u201cWe have nothing else to share on the topic.\u201d In response to the Supreme Court\u2019s decision\u2014 which President Trump called \u201cextraordinarily anti-American\u201d\u2014 tariffs were raised from 10% to 15%. Currently, 24 states have sued, arguing that the president has once again overstepped his powers by making this change.", "Image_URLs": "docs/images/techcrunch_3.jpg"}, {"Source": "TechCrunch", "Title": "X is testing a new ad format that connects posts with products", "Date": "Fri, 06 Mar 2026 22:41:26 +0000", "Author": "Sarah Perez", "URL": "https://techcrunch.com/2026/03/06/x-is-testing-a-new-ad-format-that-connects-posts-with-products/", "Summary": "X is testing a new ad format that inserts product recommendations beneath posts referencing the company or its products, initially spotted with Starlink in Europe. The feature, confirmed by X\u2019s head of product, aims to integrate ads seamlessly without traditional ad labels. This follows new \u201cPaid Partnership\u201d labels and broader efforts to attract creators and advertisers, enhancing monetization and competitiveness.", "Content": "X is testing a new ad format that inserts a recommendation directly underneath a post that references the company or its products. The initial test, spotted by an X user in Europe, displayed a suggestion to \u201cGet Starlink\u201d beneath a post from a user that said Starlink\u2019s satellite service works great in Portugal. The link, when clicked, directed users to Starlink\u2019s website. X head of product Nikita Bier confirmed the test, responding, \u201cTrying to make an ad product that isn\u2019t an ad.\u201d \n\nThe Starlink ad is not visible to all users at this time, but the placeholder where the ad sits is. If a user views @levelsio\u2019s post from March 6, they will see an outlined box beneath the text. This box currently showcases a random X post unless the user is in a location where the ad test is live. \n\nIn places where the ad displays, several commenters noticed the new addition, with one asking, \u201clmao, did you add this Starlink button?\u201d In response to a suggestion that X should allow affiliate links in this ad slot, Bier said, \u201cNo, then people will lie. I want to trust recommendations on here.\u201d \n\nThe test follows earlier news that the company is rolling out \u201cPaid Partnership\u201d labels for creators. These labels can be applied to posts to comply with social media advertising regulations, instead of requiring creators to use hashtags like \u201cad\u201d or \u201cpaid partnership.\u201d If sponsored posts were combined with embedded links like the one being tested, X could potentially attract more marketers to the platform. This could encourage creators to use the app more, helping it compete against larger social networks such as Instagram, YouTube, and TikTok. \n\nX has been pursuing creator content for some time\u2014long before it was called \u201cX\u201d and before Elon Musk\u2019s ownership. The platform has introduced various creator products, including payouts for viral content, ad-revenue sharing, and creator subscriptions. Recently, the company revamped its Creator Subscriptions offering with new features, including the ability to monetize individual threads. \n\nAdditionally, X announced that its integrated chatbot Grok can now read X\u2019s long-form content, known as Articles. However, this feature remains underutilized, as many creators prefer publishing lengthy text on their own websites or newsletters.", "Image_URLs": "docs/images/techcrunch_2.jpg"}, {"Source": "XXL Hip Hop", "Title": "CyHi Addresses G.O.O.D. Music Breakup on \"The G.O.O.D. Ole Days\"", "Date": "Fri, 06 Mar 2026 23:21:00 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/cyhi-the-good-ole-days-song/", "Summary": "Cy Hi addresses Travis Scott, Kid Cudi, and Kanye West in his new song \"The G.O.O.D. Ole Days,\" revealing that his fallout with Travis stemmed from unreciprocated co-writing efforts, while his issues with Kid Cudi relate to siding with Ye during a dispute. He also discusses Ye's leadership challenges and announces a forthcoming album, \"The Story of Mr. EGOT.\"", "Content": "Cy Hi addresses Travis Scott, Kid Cudi, and the reasons behind the G.O.O.D. Music breakup in his new song, \"The G.O.O.D. Ole Days.\" On Friday (March 6), Cy Hi released the track, produced by Mark Byrd and Phil Blackman, where he discusses artists from Ye's G.O.O.D. Music label and why the breakup happened.\n\nIn the song, the Georgia rapper explains his fallout with G.O.O.D. Music members Travis Scott, Kid Cudi, and others. Cy Hi claims that his friendship with Travis deteriorated when he couldn't get a verse from him in exchange for co-writing Travis's biggest hit, \"Sicko Mode.\" He raps, \"I like what he did in fashion, but ni**a just look hella tacky. When I helped him with his album, it went like [11-times] platinum, but I still ain't got my swap and he mad that I'm even askin'.\"\n\nRegarding Kid Cudi, Cy Hi believes their relationship soured because he sided with Ye during a past disagreement with Cudi. He states, \"It could have got real ugly. They said that Ye almost f**k around and killed buddy, and that's why their relationship is still muddy. And I'm caught between it all. Man, ni**a should feel for me.\"\n\nAs for Ye, Cy Hi acknowledges that he was also a reason for G.O.O.D. Music's dissolution but empathizes with the Chicago rapper-producer, noting Ye's role as a leader trying to keep the group together. He lyrically explains, \"Okay, I understand that. But you know sometimes Kanye could be a little difficult. I get it, but I understand him in a different way. Y'all just know the beautiful dark twisty Ye. He's just an honest person, but it gets conveyed as somebody with a broken heart against the 808. I ain't going to lie. Sometimes it gets in the business way. He just ain't afraid to say what you didn't say.\"\n\nNear the end of the song, Cy Hi announces he's dropping a new album titled \"The Story of Mr. EGOT\" \"real soon.\"", "Image_URLs": "docs/images/xxlhiphop_3.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Buy the Spike in CrowdStrike or Okta Stock After Posting Record Profitability?", "Date": "Fri, 06 Mar 2026 23:30:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/buy-spike-crowdstrike-or-okta-stock-after-posting-record-profitability", "Summary": "CrowdStrike and Okta posted strong Q4 results, surpassing expectations with record profitability and revenue growth. CrowdStrike's AI-driven Falcon platform drove 24% sales growth to $1.3 billion, while Okta's subscription and enterprise adoption increased, with sales up 11% to $761 million. Both stocks have surged over 10% since earnings reports.", "Content": "Technology\n\nBuy the Spike in CrowdStrike or Okta Stock After Posting Record Profitability?\n\nIn a week marked by broader market volatility, cybersecurity firms CrowdStrike (CRWD) and Okta (OKTA) have emerged as outperformers after exceeding their Q4 expectations. Both stocks have surged more than 10% since reporting their Q4 results on Tuesday and Wednesday, respectively.\n\nBoth companies delivered standout Q4 reports, showing record profitability, strong revenue growth, expanding recurring revenue bases, and rising demand for cybersecurity and identity solutions.\n\nCrowdStrike\u2019s AI-Driven Security Demand\n\nCrowdStrike\u2019s strong Q1 results were defined by faster-than-expected growth amid surging demand for its Falcon cybersecurity platform as AI-driven cyber threats become more sophisticated. Notably, Falcon is a cloud-native cybersecurity solution that provides advanced endpoint detection and response (EDR), managed detection and response (MDR), and next-generation antivirus capabilities to protect organizations from cyber threats.\n\nFalcon\u2019s growth led to CrowdStrike posting Q4 sales of $1.3 billion, up 24% from a year ago and exceeding estimates of $1.29 billion. Its net new annual recurring revenue (ARR) grew 47% year over year, reaching a quarterly record of $331 million. Importantly, CrowdStrike saw record profitability since going public in 2019, with Q4 EPS rising 9% to $1.12, surpassing expectations of $1.10.\n\nOkta\u2019s Enterprise Adoption & Platform Consolidation\n\nOkta\u2019s standout Q4 report was highlighted by steady subscription growth, expanding enterprise adoption, and strong cash flow, signaling a successful transition for its now unified identity security platform. The consolidated platform allows customers to integrate with nearly any application, service, or cloud through a secure, reliable, and scalable system. Accelerating adoption was attributed to trust from large organizations as they modernize their security architecture.\n\nWith solid revenue growth, Okta\u2019s Q4 sales increased 11% to $761 million, beating estimates of $749.1 million. Its remaining performance obligations (RPO) rose 15% year over year, with current RPO growing 12%, indicating strong future revenue potential. Okta also posted record profitability, with Q4 EPS rising 15% to $0.90, beating expectations of $0.85. Full-year results showed annual sales surging 22% to $4.81 billion, with full-year EPS increasing significantly.", "Image_URLs": "docs/images/nasdaq_tech_3.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Par Petroleum (PARR) Q4 Earnings: How Key Metrics Compare to Wall Street Estimates", "Date": "Fri, 06 Mar 2026 23:30:01 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/par-petroleum-parr-q4-earnings-how-key-metrics-compare-wall-street-estimates", "Summary": "Par Petroleum reported Q4 revenue of $1.81 billion, up 5.9% from estimates, but EPS of $1.17 missed the $1.21 forecast. Refining throughput exceeded estimates in several refineries, while gross margins and production costs varied. Overall, revenue was slightly below last year, with mixed performance across segments.", "Content": "Technology Par Petroleum (PARR) Q4 Earnings: How Key Metrics Compare to Wall Street Estimates\n\nFor the quarter ended December 2025, Par Petroleum (PARR) reported revenue of $1.81 billion, down 1% over the same period last year. EPS came in at $1.17, compared to -$0.79 in the year-ago quarter. The reported revenue represents a surprise of +5.9% over the Zacks Consensus Estimate of $1.71 billion. With the consensus EPS estimate being $1.21, the EPS surprise was -2.91%.\n\nWhile investors closely watch year-over-year changes in headline numbers\u2014revenue and earnings\u2014and how they compare to Wall Street expectations to determine their next course of action, some key metrics always provide a better insight into a company's underlying performance. Since these metrics play a crucial role in driving the top- and bottom-line numbers, comparing them with the year-ago numbers and what analysts estimated about them helps investors better project a stock's price performance.\n\nHere is how Par Petroleum performed in the just reported quarter in terms of the metrics most widely monitored and projected by Wall Street analysts:\n\n- Total Refining - Feedstocks Throughput: 190.9 million barrels of oil versus the three-analyst average estimate of 189.1 million barrels.\n- Hawaii Refinery - Feedstocks Throughput: 87.10 million barrels per day compared to the 85.96 million barrels per day average estimate.\n- Washington Refinery - Feedstocks Throughput: 37.00 million barrels per day versus 36.08 million barrels per day estimated by three analysts.\n- Wyoming Refinery - Feedstocks Throughput: 14.40 million barrels per day compared to the 15.53 million barrels per day average estimate.\n- Montana Refinery - Feedstocks Throughput: 52.40 million barrels per day compared to the 51.55 million barrels per day estimate.\n\n- Adjusted Gross Margin per barrel - Washington Refinery: $8.32 versus $6.39 estimated by two analysts on average.\n- Production costs per barrel - Wyoming Refinery: $13.27 versus the two-analyst average estimate of $10.25.\n- Production costs per barrel - Washington Refinery: $4.57 compared to the $4.08 estimate.\n- Production costs per barrel - Hawaii Refinery: $4.15 versus the two-analyst average estimate of $4.70.\n\n- Revenues from Refining: $1.75 billion versus the two-analyst estimate of $1.57 billion, representing a year-over-year change of -1.2%.\n- Revenues from Retail: $142.28 million compared to the $145.87 million estimate, a +0.5% change year over year.\n- Revenues from Logistics: $73.71 million versus the $74 million estimate.", "Image_URLs": "docs/images/nasdaq_tech_2.jpg"}, {"Source": "Polygon", "Title": "Pok\u00e9mon Go 'Pok\u00e9mon 30th Anniversary: All Out' event guide", "Date": "Fri, 06 Mar 2026 23:30:17 GMT", "Author": "Julia Lee", "URL": "https://www.polygon.com/pokemon-go-30th-anniversary-event-pass-spawns-all-out/", "Summary": "Pok\u00e9mon Go's 30th Anniversary event runs from March 3-9, celebrating the Kanto region with increased wild spawns, special encounters, and milestone rewards. The \"All Out\" event from March 7-9 offers legendary raids, regional Ultra Beasts, and exclusive Pok\u00e9mon, with increased catch and XP bonuses. Baby Pok\u00e9mon hatch from 2 km eggs, while many Pok\u00e9mon remain unavailable.", "Content": "Pok\u00e9mon Go's Pok\u00e9mon 30th Anniversary event is here, celebrating the Kanto region once again. The event runs from March 3-9, with an upgraded \"All Out\" version taking place from March 7-9, changing spawns and bonuses for the weekend.\n\nDuring this event, all Kanto Pok\u00e9mon, including Articuno, Zapdos, and Moltres, can be found in the wild, except for Mewtwo and Mew. A special Go Pass is available, rewarding encounters with various Kanto Pok\u00e9mon and a free Mewtwo encounter at rank 80. Milestone rewards include doubled catch candy at rank 25 and doubled catch XP at rank 50, with these bonuses tripled if the premium pass is purchased.\n\nThe event also features changes to Ditto disguises, though details are still being confirmed.\n\nStarting March 7 at 10 a.m. until March 9 at 8 p.m., the event is upgraded to the \"All Out\" version, offering additional perks. Incensed used during this period may lead to legendary Pok\u00e9mon encounters if luck is on your side. Pikachu wearing hats modeled after trainers will appear in one-star raids. In five-star raids, Pok\u00e9mon such as Articuno, Zapdos, Moltres, Deoxys (Normal Form), Darkrai, Genesect (No Drive), Nihilego, Buzzwole, Pheromosa, Xurkitree, Celesteela, Kartana, Guzzlord, Stakataka, Blacephalon, and Necrozma will be available.\n\nRegional Ultra Beasts will only appear in their respective regions: Buzzwole in the Americas and Greenland, Pheromosa in Europe, the Middle East, Africa, and India, and Xurkitree in Asia-Pacific regions.\n\nBaby Pok\u00e9mon like Pichu, Cleffa, Igglybuff, Togepi, Tyrogue, Smoochum, Elekid, Magby, Azurill, Wynaut, Budew, Chingling, Bonsly, Mime Jr., Happiny, Munchlax, Riolu, Mantyke, and Toxel will hatch from 2 km eggs. Mime Jr. remains region-locked to Europe.\n\nMost Pok\u00e9mon released so far will be available in the wild, excluding baby Pok\u00e9mon, costumed Pok\u00e9mon, Ultra Beasts, some mythical Pok\u00e9mon, and others such as Mewtwo, Smeargle, Shedinja, Kecleon, Giratina, Zoroark, Larvesta, Volcarona, Scatterbug, Spewpa, Vivillon, Zygarde, Mudbray, Mudsdale, Cosmog, Cosmoem, Morpeko, Eternatus, Kubfu, Urshifu, Maushold, Dudunsparce, Gimmighoul, and Gholdengo.", "Image_URLs": "docs/images/polygon_2.jpg"}, {"Source": "Nasdaq - Original", "Title": "Weekly Chartstopper: February 27, 2026", "Date": "Fri, 27 Feb 2026 21:50:00 +0000", "Author": "Michael Normyle", "URL": "https://www.nasdaq.com/articles/weekly-chartstopper-february-27-2026", "Summary": "AI fears caused market selloff, but positive news from Anthropic boosted some software stocks. NVIDIA\u2019s strong earnings highlighted ongoing AI chip demand, though its stock declined over concerns about demand sustainability. Investors sought safety amid geopolitical tensions, lowering Treasury yields and leaving the Nasdaq-100 flat. Upcoming events include manufacturing data, earnings reports, and employment figures.", "Content": "Markets Weekly Chartstopper: February 27, 2026\n\nFebruary 27, 2026 \u2014 04:50 pm EST\n\nArtificial intelligence (AI) fears may have reached new heights this week, with some attributing Monday\u2019s selloff to a futuristic viral blog post. But, in the here and now, there was some more positive AI news: Anthropic\u2019s update on its enterprise AI agents actually boosted some software stocks since it includes plugins for some of the very same software companies caught up in the months-long AI-related selloff.\n\nNVIDIA\u2019s fourth-quarter earnings highlighted continued AI chip demand, nearly doubling profits year on year and projecting higher first-quarter revenue ($78 billion) than expected. And yet, with investors questioning the durability of demand, the stock was down over 5% the next day.\n\nSo, between concerns about AI\u2019s economic impact and geopolitical tensions, there\u2019s been a flight to safety this week, pushing down 10-year Treasury yields over 10 basis points to approximately 3.95%, while the Nasdaq-100\u00ae ended the week flat.\n\nNext Week\n\nHere are the top events to watch next week:\n- Monday: Manufacturing PMIs (February)\n- Wednesday: AVGO earnings (Q4) & Services PMIs (February)\n- Thursday: Productivity (Q4)\n- Friday: Nonfarm payrolls (February) & Retail sales (January)", "Image_URLs": "docs/images/nasdaq_original_11.png"}, {"Source": "Smashing Magazine", "Title": "Getting Started With The Popover API", "Date": "Mon, 02 Mar 2026 10:00:00 GMT", "Author": "hello@smashingmagazine.com (Godstime Aburu)", "URL": "https://smashingmagazine.com/2026/03/getting-started-popover-api/", "Summary": "The article explains how building effective, accessible tooltips was historically complex, relying on JavaScript libraries to manage interactions and accessibility. The new Popover API, supported by most browsers, offers a native solution that simplifies implementation, enhances accessibility, and reduces maintenance, representing a significant advancement over traditional, library-dependent methods.", "Content": "A tooltip may seem like a small UI element, but building one that works well across all users and devices can be surprisingly complex. Traditionally, developers relied on JavaScript libraries to implement tooltips, as browsers did not have a native, standardized way to handle them comprehensively. This often led to issues such as flickering, overlapping content, inconsistent accessibility support, and complicated event handling.\n\nOver time, the complexity of managing tooltip behavior\u2014handling hover, focus, outside clicks, ARIA attributes, and keyboard interactions\u2014caused codebases to become unwieldy. Developers would add layers of logic to fix bugs, which made maintenance difficult. Libraries helped, but they often acted as black boxes, obscuring how the underlying interactions worked.\n\nRecently, the introduction of the Popover API offers a new approach. Instead of relying on external libraries, developers can now use the browser\u2019s native support to create accessible, reliable tooltips. This API handles opening, closing, keyboard interaction, and accessibility features at the platform level, reducing the need for custom JavaScript and complex event management.\n\nWhile the Popover API is supported by most browsers, some parts are still evolving. Developers are encouraged to monitor browser compatibility and updates. Using this native API can simplify tooltip implementation, improve accessibility, and reduce maintenance overhead, marking a significant step forward from traditional, library-dependent methods.", "Image_URLs": "docs/images/smashing_3.jpg"}, {"Source": "Nasdaq - Original", "Title": "February 2026 Review and Outlook", "Date": "Mon, 02 Mar 2026 21:05:25 +0000", "Author": "The Market Intelligence Desk Team", "URL": "https://www.nasdaq.com/articles/february-2026-review-and-outlook", "Summary": "In February 2026, U.S. equities showed mixed results amid sector rotation. Large-cap indices were restrained by declines in mega-cap growth, especially AI-related stocks, while equal-weight, mid-cap, and value sectors outperformed. Treasury yields fell, and energy prices rose amid geopolitical risks. Market breadth improved, with broader leadership emerging, reflecting confidence in economic resilience despite ongoing dispersion beneath the surface.", "Content": "US Markets February 2026 Review and Outlook\n\nThe Market Intelligence Desk Team\n\nMarket Intelligence Desk by this author ->\n\nExecutive Summary\n\nU.S. equities delivered a mixed performance amid significant internal rotation. Market leadership broadened as equal-weight, mid-cap, and value exposures outperformed. Market breadth improved, with seven of 11 large-cap sectors within 0.5% of their respective 52-week highs. Mega-cap growth and AI-adjacent software weighed on cap-weighted indices. Treasury yields declined meaningfully, led by the long end. Energy prices strengthened amid geopolitical risk, reinforcing real-asset leadership. Earnings growth remained solid despite increasing dispersion beneath the surface.\n\nU.S. equity markets delivered a mixed performance in February, with headline indices masking significant rotation and dispersion beneath the surface. Among large caps, the Dow Jones Industrials rose modestly by 0.3%, the S&P 500 declined 0.8% for the second time in three months, and the Nasdaq 100 fell 2.3%, marking its worst monthly decline since March 2025. Cap-weighted indices were restrained by continued corrective price action in select large-cap growth stocks, as evidenced by the Magnificent Seven Index, which declined 7.3%, its worst since March 2025. Conversely, the S&P 500 Equal Weight Index gained 3.5%, its best since May 2025, outperforming the cap-weighted S&P 500 for the fourth consecutive month. The S&P Midcap 400 rose 4.1%, its best month since May 2025.\n\nImportantly, February did not resemble a broad risk-off environment. Instead, market action was characterized by rotation rather than liquidation. Investors continued reallocating away from concentrated leadership toward a broader mix of cyclicals and defensives, reflected in strong gains across energy, utilities, materials, staples, industrials, and healthcare. This shift suggests confidence in the durability of economic activity, even as debate persists about the return profile and timing of large-scale AI investments.\n\nFrom a macro perspective, the backdrop remained supportive but nuanced. Economic data indicated a gradually cooling economy rather than contraction, while inflation progress remained uneven. Treasury yields declined significantly during the month, with the 10-year yield falling below 4%, reinforcing expectations for a patient Federal Reserve. Overall, February appeared less like a turning point for equities and more an extension of an ongoing transition toward broader participation and more selective leadership.\n\nThe divergence in February was largely driven by continued weakness in mega-cap growth, particularly within the technology sector.", "Image_URLs": "docs/images/nasdaq_original_7.jpg"}, {"Source": "Nasdaq - Technology", "Title": "3 AI Infrastructure Stocks on Sale", "Date": "Sat, 07 Mar 2026 00:04:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/3-ai-infrastructure-stocks-sale", "Summary": "The article discusses a market sell-off caused by geopolitical tensions, creating buying opportunities for value investors. It highlights three AI infrastructure stocks\u2014Everus Construction Group, Sterling Infrastructure, and another unnamed company\u2014that have seen their shares decline but remain strong in earnings prospects. These stocks are now more attractive due to recent price drops, despite high valuations.", "Content": "Technology\n\n3 AI Infrastructure Stocks on Sale\n\nMarch 06, 2026 \u2014 07:04 pm EST\n\nWelcome to Episode #431 of the Value Investor Podcast. Every week, Tracey Ryniec, the editor of Zacks Value Investor portfolio, shares some of her top value investing tips and stock picks.\n\nStocks are selling off after the start of the Iran War has brought uncertainty back to the markets. Oil has spiked over $90 a barrel on the near closure of the Strait of Hormuz, which has caused traders to get jittery. Is this a short-term event, or will it drag on for months? There is uncertainty. That means it\u2019s a good time for value investors to look for buying opportunities in stocks. In times of high volatility, most stocks tend to sell off. Why not get your favorite stocks on sale?\n\nThe AI Infrastructure Companies are on Sale\n\nThe AI infrastructure companies posted strong fourth quarter and 2025 earnings, and most have guided higher for 2026. The hyperscalers are spending over $500 billion this year on building out the infrastructure for AI. The AI infrastructure companies are going to be among the beneficiaries. They are involved in many different areas of the AI universe. These companies are building data centers, providing products for power generation, making racks to hold the chips in the data centers, and are cooling the data centers.\n\nShares of many of these companies were trading at 5-year highs recently. But valuations were stretched. None of the AI infrastructure companies are \u201ccheap\u201d on a P/E or P/S ratio basis. But this sell-off has made them more attractive. They are on sale. Now is the time for value investors to take a look.\n\n3 AI Infrastructure Stocks on Sale\n\n1. Everus Construction Group (ECG)\n\nEverus Construction Group is \u201cbuilding America\u2019s future.\u201d It is involved in electrical and communication wiring and infrastructure as well as electrical transmission and distribution projects. Shares of Everus have fallen further since the podcast was recorded on Wednesday, March 4, 2026. Everus is down 9.1% in the last 5 days but remains up 178% over the last year. It has become cheaper on a price-to-earnings (P/E) basis. Everus now trades with a forward P/E of 27. Earnings are expected to rise 5.3% in 2026 and 7% in 2027. Is it time for value investors to buy Everus?\n\n2. Sterling Infrastructure, Inc. (STRL)\n\nSterling Infrastructure provides development services in E-Infrastructure, Transportation, and Building Solutions, including for e-commerce warehouses and data centers. Earnings are expected to jump 25.8% in 2026 and another 15% in 2027. Shares of Sterling have pulled back.", "Image_URLs": "docs/images/nasdaq_tech_1.jpg"}, {"Source": "BBC News - World", "Title": "Armed robots take to the battlefield in Ukraine war", "Date": "Sat, 07 Mar 2026 00:36:19 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c62662gzlp8o?at_medium=RSS&at_campaign=rss", "Summary": "Since Russia's invasion of Ukraine, the conflict has become high-tech, with drones and uncrewed boats. Ukraine has deployed armed ground robots (UGVs) for combat, successfully repelling attacks and capturing prisoners. These semi-autonomous robots, controlled remotely, are armed with weapons and used for attack, defense, and logistics, with their role expected to expand in future warfare.", "Content": "Since the start of Russia's full-scale invasion, the war in Ukraine has developed into a high-tech conflict. Swarms of spy and killer drones have set the skies of Ukraine abuzz, and uncrewed boats have crippled the Russian navy in the Black Sea. Now, Ukraine has embarked on a massive program to deploy armed robots on the ground.\n\nUncrewed ground vehicles (UGVs), or ground robot systems as they are known in Ukrainian military parlance, have already proven their worth. There have been reports of UGVs successfully repelling Russian attacks and even taking enemy soldiers prisoner. Ukrainian and Russian killer robots are even said to have clashed without humans being present at the site of the battle.\n\n\"Robot wars are already happening,\" said Oleksandr Afanasiev from the Ukrainian army's K2 brigade, which he commands as its UGV battalion\u2014the world's first, he claims. The brigade has been mounting Kalashnikov machine guns on top of these robots, which \"open fire on a battlefield where an infantryman would be afraid to turn up. But a UGV is happy to risk its existence,\" Afanasiev explained.\n\nHis battalion has also been using explosive-laden, battery-powered kamikaze UGVs to blow up enemy positions and hideouts. Unlike aerial drones that buzz overhead, these make no sound to warn the enemy of an impending strike. The deputy commander of the 33rd Detached Mechanised Brigade's tank battalion, known by the callsign Afghan, reported that one Ukrainian UGV armed with a machine gun ambushed a Russian personnel carrier, while another robot defended a Ukrainian position for weeks.\n\nAfghan acknowledged there are limits to the killer robots' autonomy on the battlefield, citing ethical and international humanitarian law considerations. \"Modern UGVs are part-autonomous. They can move on their own, observe, and detect the enemy. But still, the decision to open fire is made by a human, their operator,\" he said. \"Robots can misidentify the wrong person or attack a civilian. That's why the final decision must be made by an operator.\"\n\nMost armed UGVs are remotely controlled by operators over the internet from a safe distance. Ukraine's lethal UGVs can be armed with grenade launchers as well as machine guns, and can also be used to plant landmines or barbed wire. However, the majority of uncrewed vehicles are still used for their original purposes of delivering supplies and evacuating the wounded.\n\nAccording to Valerii Zaluzhnyi, Ukraine's former commander-in-chief and now ambassador to the UK, the role of armed UGVs is expected to grow exponentially. Speaking at the London think tank Chatham House about the future of warfare, he described how strike UGVs would be utilized in upcoming conflicts.", "Image_URLs": "docs/images/bbc_3.jpg"}, {"Source": "XXL Hip Hop", "Title": "One Suspect Charged for Foolio's Murder Wants Separate Trial", "Date": "Sat, 07 Mar 2026 00:46:07 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/foolio-murder-suspect-wants-his-own-trial/", "Summary": "Rashad Murphy, charged with Foolio's 2024 murder, seeks a separate trial or jury, citing potential prejudice from evidence involving co-defendants. Murphy's attorneys filed a supplemental memorandum addressing this issue. Four other suspects, including Alicia Andrews, are also charged; Andrews was convicted of manslaughter, with sentencing delayed. The suspects' trial proceedings continue in Florida.", "Content": "One of the suspects charged with Foolio's murder is to have his own trial. According to documents obtained by XXL, attorneys for Rashad Murphy, one of the suspects in the 2024 murder of rapper Foolio, filed a supplemental memorandum on Thursday (March 5) requesting to be tried separately from his co-defendants for their upcoming trial, or at least have a different jury. Last month, the court held a hearing to address the motion but no ruling was made.\n\nOn Friday (March 6), Murphy's attorneys filed an amended memorandum addressing the court's indication that evidence concerning a separate shooting involving Murphy's co-defendants might be admissible against all defendants. This would happen if the judge determines that the evidence is \"inextricably intertwined\" with the charges related to Foolio's killing. \n\nFlorida law requires a defendant-specific relevance and prejudice analysis in joint trials. Rashad Murphy respectfully submits this supplemental memorandum to address that issue.\n\nRashad Murphy is one of five people charged with Foolio's murder, along with Alicia Andrews, Isaiah Chance, Sean Gathright, and Davion Murphy. The Jacksonville, Fla., rapper was shot and killed by three masked gunmen while celebrating his birthday in Tampa, Fla., on June 23, 2004.\n\nIn October 2025, Andrews was convicted of manslaughter in connection with Foolio's killing and faces a maximum sentence of 15 years in prison. Her sentencing was delayed after the original judge was removed in January by an appellate court due to bias. Andrews\u2019 new sentencing hearing is now scheduled for December 8.\n\nMeanwhile, the four other murder suspects\u2014Rashad, Davion, Isaiah, and Sean Gathright\u2014were in court on Wednesday (March 4), where a judge denied several motions, including some Florida statutes, the death penalty, and victim impact evidence. Video of their court hearing can be viewed below.", "Image_URLs": "docs/images/xxlhiphop_1.jpg"}, {"Source": "BBC News - World", "Title": "Trump demands 'unconditional surrender' from Iran as Putin speaks with Iran's president", "Date": "Sat, 07 Mar 2026 02:04:06 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c5yq82k1wk8o?at_medium=RSS&at_campaign=rss", "Summary": "US President Donald Trump demanded Iran's \"unconditional surrender\" amid ongoing US and Israeli strikes, asserting Iran's future depends on acceptable leadership. Trump emphasized no deal unless Iran surrenders and suggested he may influence Iran's next leader, opposing radical or extremist figures. The White House expects the conflict to last four to six weeks, with no regime change explicitly called for.", "Content": "US President Donald Trump has demanded Iran's \"unconditional surrender\" as the American and Israeli military continued to launch strikes. Trump said the US and allies would make Iran \"economically bigger, better, and stronger than ever before\" after it picked \"acceptable\" new leadership.\n\nWith the war close to entering a second week, it remains unclear who will lead Iran after the killing of Supreme Leader Ali Khamenei a week ago, or on what terms the US would end its offensive against Tehran, which has triggered region-wide retaliatory strikes. Speaking on Friday, White House spokeswoman Karoline Leavitt said the administration expected military operations to last four to six weeks.\n\nWriting on his Truth Social platform, Trump said: \"There will be no deal with Iran except UNCONDITIONAL SURRENDER! After that, and the selection of a GREAT & ACCEPTABLE Leader(s), we, and many of our wonderful and very brave allies and partners, will work tirelessly to bring Iran back from the brink of destruction, making it economically bigger, better, and stronger than ever before. IRAN WILL HAVE A GREAT FUTURE. MAKE IRAN GREAT AGAIN (MIGA!).\"\n\nTrump's latest intervention suggested he was not interested in a negotiated settlement to the war, though he stopped short of calling for regime change. Since the beginning of the conflict, Trump has avoided the term \"regime change,\" a sign he may be wary of drawing parallels between the attack on Iran and past US wars in the Middle East that he criticised before entering politics.\n\nOther senior administration officials have made that argument on Trump's behalf in recent days, saying the president will not let the US get drawn into a protracted, open-ended conflict like in Iraq and Afghanistan. Asked about the duration of the offensive, Leavitt told reporters: \"We expect [the war] to last about 4 to 6 weeks, and we are well on our way to achieving those objectives, annihilating Iran's navy.\"\n\nShe also said Trump did not want Iran to be led by \"a radical terrorist or a regime that chants death to America.\" The White House press secretary told reporters: \"[Trump] wants to take an interest in and pursue who the next leader of the Iranian country is going to be. And that has yet to be decided.\"\n\nEarlier this week, Trump told US outlet Axios he expected to play a role in the selection of Iran's next leader. Responding to reports that Khamenei's son Mojtaba\u2014a conservative close to Iran's powerful Islamic Revolutionary Guard Corps\u2014could be installed as leader, Trump said that would be \"unacceptable.\" Trump has likened the situation in Iran to the US raid on Venezuela earlier this year.", "Image_URLs": "docs/images/bbc_1.jpg"}, {"Source": "TechCrunch", "Title": "Robinhood\u2019s startup fund stumbles in NYSE debut", "Date": "Sat, 07 Mar 2026 02:04:43 +0000", "Author": "Marina Temkin", "URL": "https://techcrunch.com/2026/03/06/robinhoods-startup-fund-stumbles-in-nyse-debut/", "Summary": "Robinhood launched Robinhood Ventures Fund I to allow retail investors to access private startups like Databricks, Stripe, and Revolut. The fund raised $658.4 million of its $705.7 million target, but shares declined 16% on debut. Unlike Destiny Tech100, which trades above NAV, Robinhood's fund lacks exposure to high-profile companies like OpenAI and SpaceX. Robinhood plans to add more late-stage startups.", "Content": "Retail investors are often excluded from the startup world. Robinhood is attempting to change that by allowing the public to invest in a portfolio of what it calls \u201csome of the most exciting private companies operating today.\u201d To do this, the company has secured access to eight startups\u2014including Databricks, Stripe, Mercor, and Oura\u2014grouped into a vehicle called Robinhood Ventures Fund I. The fund also includes Ramp, Airwallex, Revolut, and Boom. It launched last month with an ambitious $1 billion target, but demand was lower than expected.\n\nOn Thursday, Robinhood announced the fund had raised $658.4 million, which could reach $705.7 million if underwriters exercise their full allotment. The shares, priced at $25 in the offering, began trading on Friday and closed the day at $21, a 16% decline.\n\nThe reception of Robinhood Ventures (RVI) on Wall Street contrasts sharply with another effort to give individual investors exposure to buzzy startups. When Destiny Tech100, a publicly traded, closed-end fund holding stakes in 100 venture-backed companies including SpaceX, OpenAI, and Discord, direct-listed on the NYSE in March 2024, its shares surged from a reference price of $4.84 to an opening trade of $8.25, eventually closing its first day at $9.00. Since then, Destiny Tech100 has continued to climb, closing trading on Friday at $26.61, a 33% premium to its net asset value of $19.97, meaning its shares trade well above the value of its underlying holdings.\n\nThe key difference appears to be that Robinhood\u2019s fund lacks exposure to companies widely expected to go public at enormous valuations, such as OpenAI, Anthropic, and SpaceX. Robinhood aims to address this by adding more startups to the fund, eventually targeting \u201c15 to 20 of the best late-stage growth companies,\u201d according to Robinhood Ventures President Sarah Pinto. The company\u2019s CFO, Shiv Verma, told Axios that Robinhood is also looking to gain exposure to OpenAI.", "Image_URLs": "docs/images/techcrunch_1.jpg"}, {"Source": "Polygon", "Title": "Marathon interactive maps", "Date": "Sat, 07 Mar 2026 02:15:17 GMT", "Author": "Polygon Staff", "URL": "https://www.polygon.com/map/marathon-interactive-maps-exfil-locations/", "Summary": "The article introduces interactive maps for the game Marathon's launch zones: Perimeter, Dire Marsh, and Outpost, with Cryo Archive coming later. Perimeter is beginner-friendly but challenging, featuring hotspots like Hauler and tunnels. Dire Marsh is swampy with stronger enemies, while Outpost is a tough, close-quarters UESC facility. These maps help players locate locked rooms, exfil points, and targets.", "Content": "No Ads Ninja v10 Client!\n\nJump Links Perimeter interactive map Dire Marsh interactive map Outpost interactive map Whether you're looking for locked rooms, exfil locations, or priority targets, our Marathon interactive maps are what you need. There are two zones in Marathon at launch \u2014 Perimeter and Dire Marsh \u2014 and each of them offers a different environment to hunt down other runners and UESC enemies alike, before getting the heck out of there with your hard-earned loot. Here are our interactive Marathon maps for Perimeter, Dire Marsh, and Outpost. Expect an interactive map for the game's hardest map, Cryo Archive, when it becomes playable later this month.\n\nPerimeter interactive map Considered the best map for beginners, don't let that fool you. Perimeter can still give you a tough time. Hauler is one of the most active player hotspots here, as one of the only ways from the southern half of the map to the north, due to the Data Wall that stretches horizontally. Then there's Tunnels, which is a mazy network of underground tunnels that houses plenty of high-tier loot. Not to mention Station and Overflow, which you must complete the \"Survival Directive\" priority contract.\n\nDire Marsh interactive map Dire Marsh is a swampy environment, with Algae Ponds being the most populated; some players have referred to it as \"Marathon's Tilted Towers.\" You can complete \"Introducing: Traxus\" at Intersection, Bio-Research, or Complex, and there's also the Maintenance Pump key you can use in the southwest corner. The UESC threats on Dire Marsh are stronger than Perimeter, so make sure you're using the best weapons and classes.\n\nOutpost interactive map Outpost is a close-quarters map that takes place within a massive UESC facility. The enemies are tougher, extraction is more difficult, and even the air itself will sometimes combust into hellfire. This map is brutal for new runners. Bring some good equipment before you tackle this map.", "Image_URLs": "docs/images/polygon_1.png"}, {"Source": "New York Times - World", "Title": "Surfers in Munich (Yes, Munich) Just Want Their Wave Back", "Date": "Sat, 07 Mar 2026 05:01:08 +0000", "Author": "Christopher F. Schuetze and Laetitia Van\u00e7on", "URL": "https://www.nytimes.com/2026/03/07/world/europe/munich-surfing-wave.html", "Summary": "Two men in Munich attempted to recreate the city\u2019s artificial wave in the Eisbach creek, which was disrupted after dredging last year. Authorities now require a safer, fixed wave maker, but efforts to install one have failed due to strong currents dislodging the equipment. The local surfing community is working to restore the popular surf spot amid safety concerns.", "Content": "Ignoring the winter freeze from the Alps, two men shed their parkas one recent morning, squirmed into wet suits, and walked into a raging creek in downtown Munich. A helper handed them a 20-foot metal bar, which the men shoved underwater. They were trying to create a wave by installing an obstacle that would bend the churning water to surfable perfection. And they were failing.\n\nMunich, despite sitting some 200 miles from the nearest sea, was an unlikely surf spot until recently. Enthusiasts flocked to the waterway, called the Eisbach, in a park near a university neighborhood, to take turns riding the artificial wave. But after the authorities dredged the channel last year, the wave vanished.\n\nNow the Munich surfing community \u2014 yes, there is such a thing \u2014 is trying to remake it. Nature and bureaucracy have complicated things. The city authorities have urged caution after a death at the creek last year. They want the surfers to install a safer kind of wave maker \u2014 one that is fixed to the creek bed, unlike the old version, which hung from a bridge.\n\nThe problem is that the surfers\u2019 efforts to satisfy that demand have not yet made waves: When the men in wet suits jammed the metal bar into the creek bed, the Eisbach\u2019s current kept dislodging it.", "Image_URLs": "docs/images/nyt_4.jpg"}, {"Source": "New York Times - World", "Title": "For Xi, Trump\u2019s Embrace of War Proves China Needs More Power", "Date": "Sat, 07 Mar 2026 05:15:46 +0000", "Author": "David Pierson", "URL": "https://www.nytimes.com/2026/03/07/world/asia/china-iran-power.html", "Summary": "U.S. and Israeli attacks on Iran, including the killing of Iran\u2019s supreme leader, reinforce Xi Jinping\u2019s view that hard power is essential. Xi has prioritized building a strong military to deter U.S. aggression amid concerns over American force disrupting global order. While China believes it\u2019s less likely to be targeted due to its nuclear status, Beijing sees U.S. military actions as a persistent threat.", "Content": "The sudden and furious attacks by U.S. and Israeli forces on Iran this past week, including the killing of the country\u2019s supreme leader, are confirming Xi Jinping\u2019s worldview that hard power is king.\n\nFor years, Mr. Xi, China\u2019s top leader, has warned his country about American military hostility and directed his generals to build a world-class army, or what he called a \u201cGreat Wall of Steel,\u201d strong enough to deter the United States and ensure peace on Beijing\u2019s terms. \u201cIt is necessary to speak to invaders in the language they know,\u201d Mr. Xi said. \u201cThat is, a war must be fought to deter invasion, and a victory is needed to win peace and respect.\u201d\n\nMr. Xi\u2019s more than decade-long pursuit of the power to fight fire with fire is now given added urgency because of President Trump\u2019s unapologetic use of military force, which is threatening governments and disrupting a global order that China increasingly sees itself as eventually leading.\n\nWhile Mr. Xi and Mr. Trump are set to meet in several weeks in Beijing to extend a fragile truce after a punishing trade war last year, the specter of brute American force taking down sovereign leaders like Iran\u2019s Ayatollah Ali Khamenei and capturing others like President Nicol\u00e1s Maduro of Venezuela remains unsettling for China. Both Ayatollah Khamenei and Mr. Maduro were strategic partners to Beijing.\n\nChinese analysts and officials do not believe the United States would target Mr. Xi in the same way, given China\u2019s status as a nuclear power. But Mr. Trump\u2019s embrace of war as a tool to assert American dominance has nonetheless reaffirmed Beijing\u2019s view that the United States remains China\u2019s most enduring threat.", "Image_URLs": "docs/images/nyt_1.jpg"}, {"Source": "BBC News - World", "Title": "We've been speaking to Iranians during one week of war. Here's what they said", "Date": "Sat, 07 Mar 2026 06:00:32 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c5y5lqygrn7o?at_medium=RSS&at_campaign=rss", "Summary": "During a week of war, Iranians expressed mixed emotions\u2014some celebrated the death of Supreme Leader Khamenei and cheered airstrikes, hoping regime change, while others felt fear, uncertainty, and skepticism about the war\u2019s motives. Despite internet restrictions and repression, BBC Persian reports a population divided between hope for regime collapse and concern over ongoing violence and geopolitical interests.", "Content": "We've been speaking to Iranians during one week of war. Here's what they said.\n\nOn Monday, three days into the war, men in Tehran watched from a hillside as a plume of smoke rose after an explosion.\n\nWhen Hamid heard news of the death of Iran's Supreme Leader Ayatollah Ali Khamenei a week ago, he felt a wave of euphoria and took his wife and daughter into the street outside his home in Tehran to celebrate. For the next few days, as US and Israeli bombs slammed into buildings across the capital, the family went onto the roof of the house to watch the airstrikes coming in, cheering every time a regime target was hit. \n\n\"Try to find anywhere else on this earth where the population would be happy with an external attack on their country,\" he told me, via a cousin in the UK. \"But we now have hope that the regime will soon be gone. We are happy.\"\n\nHamid\u2014not his real name\u2014is not alone. Alongside colleagues from BBC Persian, we have been hearing from people inside and outside Iran on a momentous week for them, for the future of their country, and for the entire region. BBC Persian is the Persian language service of BBC News, used by 24 million people around the world\u2014the majority in Iran\u2014despite being blocked and routinely jammed by Iranian authorities.\n\nIn a police state under bombardment, with severe internet restrictions in place, it is impossible to fully gauge the mood across a vast nation of 90 million people. Residents of Tehran have received messages warning: \"If your connection to the internet continues in the coming days, your line will be blocked and you will be referred to judicial authorities.\"\n\nThe regime still instills fear, and no one who voices opposition to it is willing to give their name for fear of repercussions on themselves or their families. But a week on, while some are still celebrating every strike on the regime, others are increasingly frightened, questioning the motives and endgame of the war.\n\n\"The goal of this war isn't to bring about freedom or democracy for the Iranian people,\" Ali told us. \"It's for the geopolitical benefit of Israel, the US, and Arab countries in the region.\"\n\nMohammad, who is in his 30s and lives in Tehran, said he had wanted a deal between the US and Iran that would have avoided the war. \"Deep down, I always hoped an agreement would be made,\" he said. He had thought he would be happy at Khamenei's death, but in the end \"felt nothing.\" He told my colleague Soroush Pakzad that he is now filled with uncertainty about the future\u2014and, with regime checkpoints everywhere on the ground and bombardments from the sky, he is afraid.\n\nOthers Iranians speak of feeling a mix of fear, stress, and hope. One woman told me that it would take living in Iran for 40 years to understand the complexity of what she and other Iranians are now feeling. \"We laugh and are happy when the regime is...\"", "Image_URLs": "docs/images/bbc_5.jpg"}, {"Source": "New York Times - World", "Title": "New Airstrikes Batter Tehran", "Date": "Sat, 07 Mar 2026 06:50:38 +0000", "Author": "The New York Times", "URL": "https://www.nytimes.com/live/2026/03/06/world/iran-war-trump-israel-lebanon", "Summary": "The Israeli military launched widespread strikes on Iranian infrastructure, including near Mehrabad Airport in Tehran, damaging planes. Iran responded with drone and missile attacks on Israel. The conflict has expanded, with reports of Russian intelligence sharing with Iran, and ongoing bombings in Lebanon causing mass displacement. Oil prices surged amid the escalating Middle East conflict.", "Content": "The Israeli military said it had launched \u201ca broad-scale wave of strikes\u201d on Iranian government infrastructure in the early hours of Saturday morning. Soon after, Iranian state media reported that Israeli strikes had hit the area near Mehrabad Airport in Tehran. Two residents of Tehran who live near the airport said in text messages that it appeared to have been badly damaged and that it looked like commercial planes were burning on the tarmac. The Israeli military did not immediately respond to questions about whether it had struck the airport.\n\nThe new strikes in Tehran came hours after it emerged that U.S. officials believe Russia has provided intelligence to Iran during the U.S.-Israeli war, including satellite imagery showing the locations of warships and military personnel. The involvement of Russia was the latest indication that the Middle East conflict was expanding. The information sharing by Russia could further complicate relations between Washington and Moscow, even though some officials downplayed its importance, noting that Russia has long provided similar information to Iran and it was unclear if Tehran could act on it.\n\nBombing in Iran and Lebanon continued unabated on Friday, as oil and gas prices surged again, reflecting how the U.S.-Israeli war against Iran, now nearly a week old, was affecting the global economy. President Trump demanded \u201cunconditional surrender\u201d by Iran on Friday via social media, marking the most uncompromising stance he has taken so far and suggesting a potential for a prolonged conflict in the Middle East.\n\nOn Friday afternoon, Israeli officials announced that their forces had destroyed an underground bunker used by Iran\u2019s supreme leader before he was killed last week. The Israeli military also targeted the southern outskirts of Beirut and issued additional evacuation warnings in Lebanon as it intensified its campaign against Iran-backed Hezbollah militants. An estimated 300,000 people in Lebanon have fled their homes since the bombing began, according to the Norwegian Refugee Council.\n\nMohamed Hjoula, 35, who had taken refuge with about 40 family members on Beirut\u2019s waterfront promenade after leaving their homes, said, \u201cWe civilians are paying the price of war.\u201d\n\nIran\u2019s Islamic Revolutionary Guards Corps launched a wave of drones and missiles at Israel, according to a statement from the force reported by IRNA, Iran\u2019s state news agency. Air-raid sirens sounded in Tel Aviv, and the Israeli military said it detected missile launches from Iran, though there were no immediate reports of major damage.\n\nThe Israeli military reported striking more than 400 targets in western Iran on Friday, including missile launchers and drone storage sites.\n\nOil and gasoline prices surged, with the U.S. benchmark crude rising sharply, reflecting the economic impact of the ongoing conflict.", "Image_URLs": "docs/images/nyt_7.jpg"}, {"Source": "CBC News - World", "Title": "Conflict spreads across the Middle East in days after U.S.-Israel attack kills Iran's supreme leader", "Date": "Sat, 28 Feb 2026 06:07:45 EST", "Author": "Sarah Petz", "URL": "https://www.cbc.ca/news/world/livestory/iran-israel-us-war-day-7-9.7109761?cmp=rss", "Summary": "Conflict in the Middle East escalates after the U.S.-Israel attack kills Iran's supreme leader. Iran retaliates with strikes on Israel and U.S. bases, while Israel targets Hezbollah in Lebanon. Hundreds are dead, thousands evacuated, and a humanitarian crisis ensues. U.S. President Trump calls for \"unconditional surrender,\" and Canada evacuates 3,500 citizens. Iran reports over 1,230 deaths; Lebanon reports 217 deaths.", "Content": "Conflict spreads across the Middle East days after the U.S.-Israel attack kills Iran's supreme leader. Countries rush to evacuate citizens as Iran retaliates for ongoing strikes. Rescuers inspect the site of an Israel and U.S. strike on a police station in Tehran, Iran, on March 3.\n\nThe U.S.-Israeli war on Iran continues to widen after nearly a week, leaving hundreds dead, thousands seeking evacuation, and many facing a humanitarian crisis. Iran launched retaliatory attacks on Israel and U.S. bases, while Israel intensified its campaign against Iran-backed Hezbollah militants in Lebanon.\n\nOn Friday, U.S. President Donald Trump stated that the only deal with Iran to potentially end the war would be \"unconditional surrender.\" Prime Minister Mark Carney said Canada had no plans to engage militarily as of Friday, focusing instead on evacuating 3,500 Canadians who requested assistance from the region.\n\nThe death tolls as of Friday include more than 1,230 people in Iran. The Lebanese Health Ministry reported 217 people killed and more than 790 wounded due to Israeli attacks.", "Image_URLs": "docs/images/cbc_2.jpg"}, {"Source": "Smashing Magazine", "Title": "Fresh Energy In March (2026 Wallpapers Edition)", "Date": "Sat, 28 Feb 2026 09:00:00 GMT", "Author": "hello@smashingmagazine.com (Cosima Mielke)", "URL": "https://smashingmagazine.com/2026/02/desktop-wallpaper-calendars-march-2026/", "Summary": "March's wallpaper, designed by Ginger from Serbia, features a blooming flower symbolizing renewal. Available in various resolutions, it can be downloaded for free to refresh desktops and celebrate spring's arrival.", "Content": "With spring approaching and other seasons vying for attention, March greets us with blossoms. Designed by Ginger from Serbia, this wallpaper features a delicate, blooming flower symbolizing renewal and new beginnings. The collection offers various screen resolutions and is available for free download, allowing users to refresh their desktops and find inspiration for the season ahead.", "Image_URLs": "docs/images/smashing_4.png"}, {"Source": "Laravel News", "Title": "Kit: An Opinionated API Starter Kit for Laravel", "Date": "Sun, 01 Mar 2026 20:51:54 +0000", "Author": "Yannick Lyn Fatt", "URL": "https://laravel-news.com/kit-an-opinionated-api-starter-kit-for-laravel?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Kit by Steve Mc Dougallis is a Laravel API starter kit featuring token-based authentication, API documentation, and security defaults. It supports versioned JSON APIs, invokable controllers, form request validation, and JSON:API responses. Includes auth routes, security measures like rate limiting and headers, sunset middleware for deprecations, and localization. Setup involves cloning, dependencies, and running migrations; documentation is auto-generated with Scribe.", "Content": "Kit by Steve Mc Dougallis is a Laravel API starter kit built around token-based authentication, API documentation, and security-first defaults. It targets developers who want a structured starting point for building versioned JSON APIs without wiring everything up from scratch.\n\nGetting Started\n\nClone the repository, install dependencies, and run the setup script:\n\n```bash\ncomposer install\ncomposer run setup\nphp artisan serve\n```\n\nThe `composer run setup` command copies `.env.example` to `.env`, generates an app key, and runs migrations against a local SQLite database.\n\nAPI Architecture\n\nThe kit takes a few deliberate architectural positions:\n\n- No global or API prefix\u2014routes are versioned directly, e.g., `/v1/auth/login`.\n- Invokable controllers only\u2014each controller has a single `__invoke` method.\n- Form Requests for validation\u2014request payloads are validated in dedicated Form Request classes, with DTO-style payload classes in `app/Http/Payloads/V1`.\n- JSON:API resource format\u2014responses follow a consistent structure for entity data.\n\nAuthentication\n\nNine routes handle the full auth lifecycle:\n\n- Registration and login (both return tokens via Laravel Sanctum).\n- `/v1/auth/me` (requires Bearer token).\n- Email verification via signed URLs.\n- Password reset with anti-enumeration responses (the same response is returned whether or not the email exists).\n\nSecurity Defaults\n\nThe kit includes several security defaults out of the box:\n\n- ULID primary keys for user records.\n- Predefined rate limits on auth endpoints, configurable in the App Service Provider.\n- Mandatory `Content-Type: application/json` enforcement on write requests.\n- Hardened response headers, including `X-Content-Type-Options: nosniff`, `X-Frame-Options: DENY`, and `Referrer-Policy: no-referrer`.\n- Request ID tracking.\n- Audit logging for sensitive operations.\n\nSunset Middleware\n\nThe kit also includes a Sunset middleware for deprecating API endpoints over time. It is applied directly to a route with three parameters: the sunset date, a successor URL, and a boolean to control enforcement:\n\n```php\nRoute::middleware('sunset:2027-01-01,https://api.acme.com/v2/auth/login,true')->post('/v1/auth/login', LoginController::class);\n```\n\nWhile the endpoint is active, the middleware appends `Deprecation`, `Sunset`, and `Link` (successor version) headers to responses, allowing API clients to detect deprecation and plan accordingly. After the sunset date and enforcement, the endpoint returns a 410 Gone status.\n\nDocumentation\n\nAPI documentation is generated using Scribe. Annotations are attribute-based rather than docblock-based, and the setup produces an OpenAPI specification alongside the docs.\n\nLocalization\n\nThe kit respects the `Accept-Language` request header and responds with a `Content-Language` header. Supported locales default to English, with translation files at `lang/en/api.php` and `lang/es/api.php`.\n\nTooling\n\nThe project uses Pest for testing, PHPStan for static analysis, Pint for code formatting, and Rector for automated refactoring. GitHub Actions workflows support continuous integration.", "Image_URLs": "docs/images/laravel_5.png"}, {"Source": "Laravel News", "Title": "Ward: A Security Scanner for Laravel", "Date": "Sun, 01 Mar 2026 20:52:40 +0000", "Author": "Yannick Lyn Fatt", "URL": "https://laravel-news.com/ward-a-security-scanner-for-laravel?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Ward is a Go-based command-line security scanner tailored for Laravel projects. It analyzes project structure\u2014routes, models, controllers, configs, dependencies\u2014and performs targeted security checks across four engines: environment variables, configuration files, dependencies, and custom rules. It offers multiple output formats (JSON, SARIF, HTML, Markdown) and integrates with CI/CD pipelines, providing detailed, sortable reports to identify vulnerabilities and misconfigurations.", "Content": "Ward: A Security Scanner for Laravel\n\nLast updated on March 1st, 2026 by Yannick Lyn Fatt\n\nWard, created by El Jakani Yassine, is a command-line security scanner written in Go designed around Laravel's structure. Rather than running generic pattern matching across your codebase, it first parses your project's structure\u2014routes, models, controllers, middleware, Blade templates, config files, environment variables, and dependencies\u2014then runs targeted checks against that context.\n\nInstallation\n\nWard is distributed as a Go binary, so you'll need to ensure you have Go installed. You can then run:\n\n```bash\ngo install github.com/eljakani/ward@latest\n```\n\nMake sure `$GOPATH/bin` is in your PATH:\n\n```bash\nexport PATH=\"$PATH:$(go env GOPATH)/bin\"\n```\n\nAfter installing, run:\n\n```bash\nward init\n```\n\nto create `~/.ward/` with a default config file, 42+ built-in rules organized by category, and directories for reports and scan history.\n\nScanning a Project\n\nPoint Ward at a local directory or a remote Git repository:\n\n- Local project:\n\n```bash\nward scan /path/to/laravel-project\n```\n\n- Remote repository (shallow cloned):\n\n```bash\nward scan https://github.com/user/laravel-project.git\n```\n\nWhen run in a terminal, Ward displays a TUI. A scan view shows pipeline progress and live severity counts as scanners run. Once complete, a results view presents a sortable findings table with severity badges, category grouping, and a detail panel showing descriptions, code snippets, and remediation guidance.\n\nWhat It Checks\n\nWard ships with four independent scan engines:\n\n- **env-scanner:** Runs 8 checks against your `.env` file, including debug mode enabled in production, missing or weak `APP_KEY`, and secrets leaked in `.env.example`.\n\n- **config-scanner:** Runs 13 checks across your `config/*.php` files, covering hardcoded credentials, insecure session flags, CORS wildcard origins, and missing security options.\n\n- **dependency-scanner:** Queries the OSV.dev advisory database in real time against your `composer.lock` to find vulnerable Packagist packages. Because it queries live data rather than a bundled list, it reflects current advisories.\n\n- **rules-scanner:** Applies 42 rules across 7 categories: secrets (hardcoded passwords, API keys, AWS credentials), injection (SQL, command, eval), XSS (unescaped Blade output, JavaScript injection), debug artifacts (`dd()`, `dump()`, `phpinfo()`), weak cryptography (MD5, SHA1, insecure RNG), configuration issues (CORS, CSRF, mass assignment), and authentication gaps (missing middleware, absent rate limiting).\n\nOutput Formats\n\nConfigure output formats in `~/.ward/config.yaml`:\n\n```yaml\noutput:\n  formats: [json, sarif, html, markdown]\n  dir: ./reports\n```\n\n- **JSON:** Machine-readable results\n\n- **SARIF:** Compatible with GitHub Code Scanning and IDE integrations\n\n- **HTML:** Standalone dark-themed visual report\n\n- **Markdown:** Suitable for PR comments\n\nCI/CD Integration\n\nWard returns non-zero exit codes when findings meet or exceed a specified severity, making it straightforward to gate deployments:\n\n```bash\nward scan --output json --fail-on high\n```", "Image_URLs": "docs/images/laravel_4.png"}, {"Source": "Laravel News", "Title": "Polyscope Is an Ai-First Dev Environment for Orchestrating Agents", "Date": "Thu, 05 Mar 2026 03:08:03 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/polyscope-is-an-ai-first-dev-environment-for-orchestrating-agents?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Beyond Code has launched Polyscope, a free AI-first development environment for orchestrating multiple AI agents simultaneously. It features fast copy-on-write cloning, a built-in preview browser, multi-model querying, and workspace integration. Available for macOS, Polyscope offers free and paid plans for individual developers and teams.", "Content": "Polyscope Is an AI-First Dev Environment for Orchestrating Agents\n\nThe team at Beyond Code has announced Polyscope, a free agent orchestration tool designed to run multiple AI agents simultaneously.\n\nFrom the announcement: \"Today we're announcing Polyscope - the free agent orchestration tool of my dreams. Run dozens of AI agents at the same time, blazing fast copy-on-write clones, a built-in preview browser you can use to visually prompt your agents, and much more.\"\n\nKey features include:\n- Running dozens of AI agents in parallel\n- Copy-on-write clones for fast agent branching\n- Built-in preview browser for visually prompting agents\n- Querying multiple models to collaborate on a question\n- Connecting workspaces to multiple repositories\n\nPolyscope is available for macOS at getpolyscope.com, offering a free plan and plans for solo developers and teams.", "Image_URLs": "docs/images/laravel_2.png"}, {"Source": "Saskatoon Police News", "Title": "Hit & Run / Assault - 400 Block Witney Avenue North", "Date": "Thu, 05 Mar 2026 20:35:09 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026115", "Summary": "Police are investigating a vehicle chase and assault on Witney Avenue North on March 5, 2026. A civilian vehicle chased and struck another, leading to an occupant assaulting the driver. The victim sustained non-life-threatening injuries; the suspect vehicle fled. The incident followed a confrontation near 22nd Street West and Idylwyld Drive North. Both parties are believed to know each other.", "Content": "Police are investigating following a civilian vehicle chase that led to an assault. \n\nShortly before 10:00 a.m. on March 5, 2026, police were called to the 400 block of Witney Avenue North following multiple reports of altercations between the occupants of two vehicles. Information was received that a civilian vehicle had been chasing another before intentionally striking it in the 400 block of Witney Avenue. An occupant then exited the vehicle and began assaulting the driver of the vehicle that had been struck. \n\nUpon arrival, officers located the victim of the assault suffering from non-life-threatening injuries; the other involved vehicle fled prior to police arrival. \n\nThrough investigation, officers learned that a confrontational exchange took place in the area of 22nd Street West and Idylwyld Drive North between two parties before one began chasing the other in their vehicles. During the chase, multiple uninvolved parked vehicles were struck and damaged. \n\nBoth parties are believed to have been known to one another, and police are continuing to investigate.", "Image_URLs": "docs/images/saskatoon_police_6.png"}, {"Source": "Politico - Picks", "Title": "Justice Department publishes documents with sexual assault allegations against Trump", "Date": "Thu, 05 Mar 2026 21:30:31 EST", "Author": "Erica Orden", "URL": "https://www.politico.com/news/2026/03/05/donald-trump-epstein-files-allegations-00816123", "Summary": "The Justice Department released FBI interviews of a woman alleging that President Trump sexually assaulted her as a teenager after meeting him through Jeffrey Epstein. The woman claimed Trump hit her after she bit him during an attempted sexual assault. Trump denies the allegations, which lack corroboration. The files, released amid political scrutiny, include unsubstantiated claims from the woman.", "Content": "The Justice Department posted a series of FBI interviews with a woman who alleged that President Donald Trump sexually assaulted her when she was a young teenager after being introduced to him by Jeffrey Epstein. According to FBI summaries of her interviews, known as FBI 302s, her central allegation is that Trump hit her after she bit his penis when he attempted to force her to perform oral sex.\n\nThe three files were released amid investigations by Democrats into whether the department purposefully withheld materials that included sexual assault allegations against Trump. Trump has denied any wrongdoing related to the Epstein allegations and has not been charged with a crime in connection with them. There is no evidence suggesting Trump participated in Epstein\u2019s sex trafficking operation. Many of the materials released by the Justice Department lack substantiation or context.\n\nWhite House press secretary Karoline Leavitt dismissed the allegations as \u201ccompletely baseless accusations, backed by zero credible evidence, from a sadly disturbed woman who has an extensive criminal history.\u201d She also claimed that the Department of Justice knew about these allegations for four years but took no action, asserting that Trump has been exonerated by the release of the Epstein files.\n\nThe files, dated between August and October 2019, describe that when the woman was between 13 and 15 years old, Epstein took her to either New York or New Jersey, where she was introduced to Trump in a large building. She stated that Trump \u201cdidn\u2019t like that I was a boy-girl,\u201d which was interpreted as her being a tomboy. She recalled Trump asking others to leave the room, then saying, \u201cLet me teach you how little girls are supposed to be,\u201d before unzipping his pants and instructing her to put her head \u201cdown to his penis.\u201d She said she bit him during the incident, after which he pulled her hair and punched her on the side of her head. She recalled him saying, \u201cGet this little bitch the hell out of here,\u201d as others reentered the room. The FBI interviews did not specify how the incident ended or how she exited the encounter.\n\nIn one interview, the woman disclosed that she had begun working with attorneys and wanted to be upfront about her pending civil case.", "Image_URLs": "docs/images/politico_7.jpg"}, {"Source": "Nasdaq - Original", "Title": "A Tale of Two Earnings Cycles", "Date": "Thu, 05 Mar 2026 22:45:23 +0000", "Author": "Phil Mackintosh", "URL": "https://www.nasdaq.com/articles/tale-two-earnings-cycles", "Summary": "In Q4 2025, both Nasdaq-100\u00ae large caps and small caps experienced strong earnings growth, with Nasdaq posting 17% year-over-year gains and small caps returning to positive growth after 11 quarters. Nasdaq's growth is driven by higher margins and less sensitivity to economic headwinds, while small caps benefited from easing inflation, wage pressures, and declining interest costs.", "Content": "Earnings: A Tale of Two Earnings Cycles\n\nThe fourth quarter of 2025 continued a recent trend: the Nasdaq-100\u00ae large caps and S&P 600 small caps both experienced strong earnings growth. However, the drivers behind these trends are quite different.\n\nBoth large and small caps are seeing strong earnings growth now. The Nasdaq-100\u00ae posted 17% year-over-year earnings growth in Q4 2025, extending its streak to 11 consecutive quarters of at least 15% growth. In contrast, small caps had endured 11 straight quarters of negative earnings growth from Q3 2022 through Q1 2025. But that trend reversed in Q2 2025, and Q4 marked its third consecutive quarter of positive earnings growth.\n\nLooking ahead, consensus estimates project the Nasdaq-100\u00ae to continue its streak of 15%+ earnings growth over the next year, while small caps are expected to maintain their positive growth trend. Despite both indexes showing strong earnings growth today, the underlying drivers differ significantly.\n\nThe Nasdaq-100\u00ae has been less sensitive to headwinds that drove small caps into recession. Earnings growth can be broken down into three components: earnings before interest and taxes (EBIT), interest costs, and taxes and other items. Using last twelve months (LTM) data, the comparison reveals notable differences.\n\nSmall caps faced multiple headwinds over the past couple of years. They experienced negative EBIT growth due to margin pressures from high inflation and wage increases, along with less pricing power compared to large caps. Rising interest costs, driven by Federal Reserve rate hikes from 2022 to 2024, also weighed on small caps. Recently, as inflation and wages slowed, EBIT growth turned positive, aided by rate cuts that stabilized interest costs, which are expected to decline further.\n\nIn contrast, the Nasdaq-100\u00ae appeared to operate in a world less affected by these headwinds. While these challenges impacted large caps less\u2014thanks to higher margins\u2014they still played a role in their earnings dynamics.", "Image_URLs": "docs/images/nasdaq_original_4.jpg"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Hwy 11 North Bound Lanes", "Date": "Thu, 05 Mar 2026 23:24:40 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026116", "Summary": "Saskatoon police report that one eastbound lane on Circle Drive and one northbound lane on Highway 11 have reopened after a semi carrying equipment damaged the Highway 11 overpass. No injuries occurred. Traffic restrictions remain, with engineers assessing the damage. Motorists are advised to take alternate routes and expect delays.", "Content": "The Saskatoon Police Service advises that City of Saskatoon engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed.\n\nThe Saskatoon Police Service Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nThe police also reported that a semi with a trailer carrying equipment traveling northbound on Highway 11 from Regina into the city limits at the Circle Drive overpass was too high for the structure, causing significant damage.\n\nAs a result, the northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge will be closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_4.png"}, {"Source": "Star Phoenix", "Title": "Sask. Party government under fire for $10-a-day child care cutoff", "Date": "Thu, 05 Mar 2026 23:26:31 +0000", "Author": "Michael Joel-Hansen", "URL": "https://thestarphoenix.com/news/saskatchewan/sask-party-government-under-fire-for-10-a-day-child-care-cutoff", "Summary": "Saskatchewan's government announced that only children turning six after April 1 will qualify for $10-a-day childcare, leaving families with children born before that date facing higher fees. Critics, including NDP Leader Carla Beck, criticized the cutoff, which increases costs for some families by up to $680 monthly. Education Minister Hindley called the deal a negotiated improvement despite its limitations.", "Content": "Saskatchewan NDP Leader Carla Beck criticized the provincial government after it announced that only children who turn six and are born after April 1 will qualify for the $10-a-day childcare rate, leaving some families facing full fees.\n\nTina Lloyd had been hopeful she\u2019d have some monthly breathing room in her family\u2019s budget when she heard that six-year-olds in their kindergarten year would be covered for $10-a-day child care under the upcoming agreement between the provincial and federal governments. The coverage was expected to extend until the end of kindergarten. Lloyd, whose daughter has a March 31 birthday, and her husband are now facing increased care fees, which will rise from $217 each month to up to $900 for full-time care or $650 for half-time care. The provincial government recently informed parents and providers that the agreement covers $10-a-day child care only for children who turn six after April 1, when the new deal takes effect.\n\nUnder the new provisions, children with birthdays before April 1 will not be covered, and families will face an additional $680 in costs starting less than a month from now. When the $1.6 billion funding agreement was announced in November 2025, Education Minister Everett Hindley emphasized that ensuring children did not age out of the program at six was a major priority. He stated that if the deal were to be renegotiated, this was an aspect they would try to include.\n\nSpeaking with media in Regina on Thursday, Hindley acknowledged that the agreement was \u201cnot perfect\u201d but considered it an improvement over previous arrangements. He explained that the deal resulted from negotiations between the provincial and federal governments, which involved compromises. Hindley described it as \u201cthe best deal that we were able to obtain\u201d and did not see the cutoff as an oversight by the province.\n\nCara Werner, chair of the advocacy group Childcare Now Saskatchewan and director of Dream Big Rocanville, told reporters that providers, parents, and caregivers had believed that six-year-olds born before April 1 would be covered through kindergarten. She criticized the timing of the information about the cutoff, suggesting it reflected poorly on Hindley\u2019s understanding of the deal.\n\nSaskatchewan NDP Leader Carla Beck stated that caregivers whose children are excluded from the program will face costs between $30 and $85 more per day than those whose children are included.", "Image_URLs": "docs/images/star_phoenix_5.jpg"}, {"Source": "Smashing Magazine", "Title": "Say Cheese! Meet SmashingConf Amsterdam \ud83c\uddf3\ud83c\uddf1", "Date": "Thu, 26 Feb 2026 11:00:00 GMT", "Author": "hello@smashingmagazine.com (Iris Lje\u0161njanin)", "URL": "https://smashingmagazine.com/2026/02/meet-smashingconf-amsterdam/", "Summary": "Smashing Conf Amsterdam 2026, a leading UX and front-end conference, will be held from April 13-16 at Path\u00e9 Tuschinski. Since 2012, it emphasizes practical, live demonstrations by industry experts on topics like design systems, accessibility, and AI. In-person tickets cost \u20ac724.79, with discounts available, while online access is \u20ac200.", "Content": "Smashing Conf Amsterdam 2026 is a premier conference for designers and UI engineers focusing on UX and front-end topics such as design systems, accessibility, Figma, UX writing, modern CSS, and AI. The event will take place from April 13 to 16, 2026, at the Path\u00e9 Tuschinski in Amsterdam, the Netherlands.\n\nSince its inception i
