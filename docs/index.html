    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-start md:items-center justify-center md:min-h-screen p-0 md:p-4">
            <div class="bg-white w-full h-screen md:h-auto md:rounded-lg md:shadow-xl md:max-w-2xl md:max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start md:rounded-t-lg">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-source" class="font-semibold text-blue-600"></span>

                <!-- Modal Content -->

                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>

                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">

                <!-- Modal Footer -->

                    </button>

        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026) is an R-rated horror drama romance directed by Maggie Gyllenhaal, set for release on March 6, 2026. Starring Jessie Buckley, Christian Bale, and others, it follows a lonely Frankenstein who revives a murdered woman in 1930s Chicago. The film blends macabre romance and ambitious themes, produced by Warner Brothers.", "Content": "The Bride (2026) is a horror drama romance film rated R, with a runtime of 126 minutes. It is set to be released on March 6, 2026. The film is directed and written by Maggie Gyllenhaal, known for her work on The Lost Daughter. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. It is produced by Warner Brothers.\n\nThe story follows a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening) to create a companion. They revive a murdered young woman, and The Bride (Buckley) is born. The film is described as a bold, iconoclastic take on a compelling story, blending life, macabre romance, and ambitious ideas. Maggie Gyllenhaal\u2019s vision results in a film that is both beautiful and hideous, with a unique and intense atmosphere.", "Image_URLs": "docs/images/filmjabber_1_1772900422201.webp"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Highway 11 - Update", "Date": "Fri, 06 Mar 2026 01:39:24 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026117", "Summary": "Saskatoon police report that one eastbound lane on Circle Drive and one northbound lane on Highway 11 are open after a semi-trailer struck a structure, causing damage. No injuries occurred. Traffic restrictions remain, with delays expected; drivers are advised to take alternate routes as further assessments are ongoing.", "Content": "The Saskatoon Police Service advises that City of Saskatoon engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed. The Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nA semi with a trailer carrying a piece of equipment on the northbound lane of Highway 11, entering the city limits at the Circle Drive overpass, was too high for the structure and caused significant damage. As a result, the northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge will be closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_2_1772900194387.png"}, {"Source": "Laravel News", "Title": "The Inertia v3 Beta is Here", "Date": "Fri, 06 Mar 2026 02:36:45 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/the-inertia-v3-beta-is-here?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Inertia v3 Beta introduces a built-in XHR HTTP client, making Axios optional. It adds a use Httphook for standalone requests, extends optimistic updates across router and forms, and supports concurrent updates with rollback. Instant navigation improves responsiveness, and a preserve Fragment option retains URL hashes across redirects, enhancing user experience.", "Content": "The Inertia v3 Beta is a major pre-release milestone that introduces several new features and improvements. It now includes a built-in XHR HTTP client, making Axios an optional peer dependency. Applications that do not require Axios can omit it entirely, while those that prefer it can continue using it by installing it as a peer dependency.\n\nA new use Httphook has been added to facilitate standalone HTTP requests outside of Inertia's page navigation. This hook provides a similar developer experience to use Form, including processing, errors, progress, and dirtystate, but returns response data instead of triggering page navigation. It supports surfacing all validation errors.\n\nOptimistic updates have been extended across the router, use Form, and use Http, with support for concurrent updates. The update callback can apply immediate optimistic state changes, with automatic rollback on validation or server errors. The API supports both a fluent style and an inline option.\n\nThe use Form hook now supports optimistic updates similarly, allowing for immediate UI updates before server confirmation. The <Form> component has also gained an optimistic prop for declarative handling.\n\nInstant navigation support has been added, allowing pages to render immediately before server responses complete, creating a more responsive user experience.\n\nA new server-side preserve Fragment option ensures that URL hash fragments are retained across redirects. In Laravel, this can be enabled by chaining preserveFragment() on redirect responses, and when included in the Inertia page object, the client preserves the original URL fragment even after redirects.", "Image_URLs": "docs/images/laravel_1_1772900170144.png"}, {"Source": "Smashing Magazine", "Title": "Human Strategy In An AI-Accelerated Workflow", "Date": "Fri, 06 Mar 2026 08:00:00 GMT", "Author": "hello@smashingmagazine.com (Carrie Webster)", "URL": "https://smashingmagazine.com/2026/03/human-strategy-ai-accelerated-workflow/", "Summary": "UX design is evolving as AI rapidly automates tasks like wireframes and prototypes, raising concerns about job security. While AI can handle artifact creation, the core of UX remains about navigating ambiguity, advocating for users, and solving problems. Designers face a shift from producing outputs to directing intent, emphasizing the human-centered aspects of the discipline.", "Content": "UX design is entering a new phase, with designers shifting from makers of outputs to directors of intent. AI can now generate wireframes, prototypes, and even design systems in minutes, but UX has never been only about creating interfaces. It\u2019s about navigating ambiguity, advocating for humans in systems optimized for efficiency, and solving their problems through thoughtful design.\n\nI\u2019ve been working in User Experience design for more than twenty years. Long enough to have held many job titles, from when stakeholders asked us to \u201cjust make it pretty\u201d to when wireframes were delivered as annotated PDFs. I\u2019ve seen many tools come and go over the years, methodologies rise and fall, and entire platforms disappear.\n\nYet, nothing has unsettled designers quite like AI. When generative AI tools first entered my workflow, my reaction wasn\u2019t excitement \u2014 it was unease, with a little bit of curiosity. Watching an interface appear in seconds, complete with sensible spacing, readable typography, and halfway-decent copy, triggered a very real fear: if a machine can do this, where does that leave me?\n\nThat fear is now widespread. Designers at every level ask the same question, often quietly: \u201cWill an AI agent replace me by next week, month, or year?\u201d While the difference between next week and next year is significant, it depends on where you are in your career and how quickly your employer chooses to adopt AI tools. I have been fortunate in some roles to work with organizations that haven\u2019t allowed the use of AI tools due to data security concerns. Discussions about AI\u2019s impact are ongoing on platforms like Reddit.\n\nFearing the takeover of AI in our roles is not irrational. We\u2019re seeing AI generate wireframes, prototypes, personas, usability summaries, accessibility suggestions, and entire design systems. Tasks that once took days can now be completed in minutes.\n\nHere\u2019s the uncomfortable truth: if your role is largely about producing artifacts, drawing buttons, aligning components, or translating instructions into screens, then parts of that work are already being automated. Still, UX design has never been solely about creating a user interface. It\u2019s about navigating ambiguity, advocating for humans within systems optimized for efficiency, and solving their problems through thoughtful design.", "Image_URLs": "docs/images/smashing_1_1772900139244.jpg"}, {"Source": "XXL Hip Hop", "Title": "King, Domani Strike Back at 50 Cent with Two Angry Diss Tracks", "Date": "Fri, 06 Mar 2026 21:35:53 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/king-domani-50-cent-diss-tracks/", "Summary": "King and Domani released diss tracks on March 6 in response to 50 Cent\u2019s comments on his Power Origins theme song, which referenced T.I. and the Harris family. King\u2019s \"Droptop\" criticizes 50 Cent\u2019s behavior, while Domani\u2019s \"PU$Y\" challenges his toughness. 50 Cent responded with provocative posts, escalating the feud.", "Content": "King and Domani dropped two angry diss tracks after 50 Cent appeared to have dissed T.I. and the Harris family on the new Power Origins theme song. On Friday (March 6), King and Domani released the tracks on their Instagram pages in retaliation against 50 Cent for disrespecting T.I. and the Harris family.\n\nKing's diss track is called \"Droptop.\" On the song, he criticizes 50 Cent for talking too much smack and accuses him of allegedly beating women. \"You were made from 50 Cent because ya mama gave it cheap,\" King raps.\n\nMeanwhile, Domani delivered his diss track titled \"PU$Y.\" On the haunting song, Domani challenges 50 Cent's tough-guy image. \"I smell p***y / How about you come here and try to push me / That suga water got ya, now you turn sweet, huh / I smell p***y / Ni**a, I read you like a book read / Come bring ya a*s to school quit playin' hookie / I smell p***y,\" he raps.\n\nBoth songs respond to 50 Cent, who the Harris family referenced on the theme song to his upcoming television show, Power Origins. The track, featuring R&B singer Leon Thomas, includes street rap about the drug trade. 50 Cent raps, \"I'm back on my dope boy grammar / Your daddy made your mama eat every box in Atlanta,\" and \"Freak sh*t / Peep sh*t / Keep sh*t, on the low / But everybody know.\" 50 Cent captioned his Instagram post about the song, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\nFurther escalating tensions, 50 Cent posted a photoshopped image of T.I. with Tiny eating a piece from a cut-up cardboard box, possibly implying that his lyric, \"Your daddy made your mama eat every box in Atlanta,\" was directed at T.I. and the Harris family matriarch. \"LOL... They are gonna learn to leave me alone,\" Fif wrote in the caption.\n\nThe feud between 50 Cent and the Harris family is intensifying.", "Image_URLs": "docs/images/xxlhiphop_3_1772900549061.jpg"}, {"Source": "TechCrunch", "Title": "X is testing a new ad format that connects posts with products", "Date": "Fri, 06 Mar 2026 22:41:26 +0000", "Author": "Sarah Perez", "URL": "https://techcrunch.com/2026/03/06/x-is-testing-a-new-ad-format-that-connects-posts-with-products/", "Summary": "X is testing a new ad format that inserts recommendations beneath posts referencing the company or its products, initially showing a \u201cGet Starlink\u201d suggestion. The test, confirmed by X\u2019s head of product Nikita Bier, is limited to certain regions. This follows recent rollout of \u201cPaid Partnership\u201d labels for creators, aiming to boost creator monetization and attract advertisers amid ongoing platform development.", "Content": "X is testing a new ad format that inserts a recommendation directly underneath a post that references the company or its products. The initial test, spotted by an X user in Europe, displayed a suggestion to \u201cGet Starlink\u201d beneath a post from a user that said Starlink\u2019s satellite service works great in Portugal. The link, when clicked, directed users to Starlink\u2019s website. X head of product Nikita Bier confirmed the test, responding, \u201cTrying to make an ad product that isn\u2019t an ad.\u201d\n\nThe Starlink ad is not visible to all users at this time, but the placeholder where the ad sits is. If a user views @levelsio\u2019s post from March 6, they\u2019ll see an outlined box beneath the text of his post. This box currently showcases a random X post unless the user is in a location where the ad test is live. \n\nIn places where the ad displays, several commenters noticed the new addition, with one asking, \u201clmao, did you add this Starlink button?\u201d In the thread, Bier also responded to a suggestion that X should allow affiliate links in this ad slot by saying, \u201cNo, then people will lie. I want to trust recommendations on here.\u201d \n\nX could not be immediately reached for comment. TechCrunch will update the article if the company responds.\n\nThe test follows news earlier this week that the company is rolling out \u201cPaid Partnership\u201d labels for creators. The labels can be applied to posts to comply with regulations around social media advertising, instead of requiring creators to use a hashtag like \u201cad\u201d or \u201cpaid partnership.\u201d If creators\u2019 sponsored posts are combined with embedded links to advertisers like the one being tested, X could potentially attract more marketers to the platform. That could boost creators\u2019 use of the app, allowing it to better compete against larger social networks favored by creators, such as Instagram, YouTube, and TikTok.\n\nX has been pursuing creator content for some time \u2014 even before it was called \u201cX\u201d and before it was owned by Elon Musk. Yet the app has not yet found its footing in this space. So far, the company has rolled out several creator products, including payouts for viral content, ad revenue sharing, creator subscriptions, and more.\n\nThis week, the company also revamped its Creator Subscriptions offering with new features, including the ability to monetize individual threads. Additionally, X announced that its integrated chatbot Grok is now capable of reading X\u2019s long-form content, known as Articles. However, this feature remains underutilized, as creators who publish lengthy written content tend to prefer their own websites or newsletters.", "Image_URLs": "docs/images/techcrunch_2_1772900375310.jpg"}, {"Source": "Nasdaq - Original", "Title": "February 2026 Review and Outlook", "Date": "Mon, 02 Mar 2026 21:05:25 +0000", "Author": "The Market Intelligence Desk Team", "URL": "https://www.nasdaq.com/articles/february-2026-review-and-outlook", "Summary": "In February 2026, U.S. equities showed mixed results amid rotation and dispersion. Large-cap indices were restrained, with the Nasdaq 100 down 2.3% and the Magnificent Seven falling 7.3%. The S&P 500 Equal Weight and Midcap 400 gained, reflecting broader leadership. Treasury yields declined, and energy prices rose amid geopolitical risks. Market rotation favored cyclicals and defensives, indicating confidence in economic resilience.", "Content": "US Markets February 2026 Review and Outlook\n\nThe Market Intelligence Desk Team\n\nMarket Intelligence Desk by this author ->\n\nExecutive Summary: U.S. equities delivered a mixed headline performance amid significant internal rotation. Market leadership broadened as equal-weight, mid-cap, and value exposures outperformed. Market breadth improved with seven of 11 large-cap sectors within 0.5% of their respective 52-week highs. Mega-cap growth and AI-adjacent software weighed on cap-weighted indices. Treasury yields declined meaningfully, led by the long end. Energy prices strengthened amid geopolitical risk, reinforcing real-asset leadership. Earnings growth remains solid despite increasing dispersion beneath the surface.\n\nU.S. equity markets delivered a mixed performance in February, with headline indices masking a significant degree of rotation and dispersion beneath the surface. Among large caps, the Dow Jones Industrials rose modestly by 0.3%, the S&P 500 declined 0.8% for the second time in three months, and the Nasdaq 100 fell 2.3%, posting its worst monthly decline since March 2025. Cap-weighted indices were restrained by continued corrective price action in select large-cap growth stocks, as seen in the Magnificent Seven Index, which dropped 7.3%, its worst decline since March 2025. Conversely, the S&P 500 Equal Weight Index gained 3.5%, its best monthly performance since May 2025, outperforming the cap-weighted S&P 500 for the fourth consecutive month. The S&P Midcap 400 rose 4.1%, its best month since May 2025.\n\nImportantly, February did not resemble a broad risk-off environment. Instead, market action was characterized by rotation rather than liquidation. Investors continued reallocating away from concentrated leadership toward a broader mix of cyclicals and defensives, reflected in strong gains across energy, utilities, materials, staples, industrials, and healthcare. This shift suggests confidence in the durability of economic activity, even as debate persists around the return profile and timing of large-scale AI investment.\n\nFrom a macro perspective, the backdrop remained supportive but nuanced. Economic data indicated a gradually cooling economy rather than contraction, with inflation progress remaining uneven. Treasury yields declined significantly during the month, with the 10-year yield falling below 4%, reinforcing expectations for a patient Federal Reserve. Overall, February appeared less like a turning point for equities and more like an extension of an ongoing transition toward broader participation and more selective leadership.\n\nThe divergence in February was largely driven by continued weakness in mega-cap growth, particularly within the technology sector.", "Image_URLs": "docs/images/nasdaq_original_7_1772900349083.jpg"}, {"Source": "XXL Hip Hop", "Title": "One Suspect Charged for Foolio's Murder Wants Separate Trial", "Date": "Sat, 07 Mar 2026 00:46:07 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/foolio-murder-suspect-wants-his-own-trial/", "Summary": "Rashad Murphy, charged with Foolio's 2024 murder, seeks a separate trial or jury due to evidence concerns. He is one of five suspects, including Alicia Andrews, who was convicted of manslaughter. Andrews' sentencing is scheduled for December 2025. The other suspects' motions were denied in court.", "Content": "One of the suspects charged with Foolio's murder is to have his own trial. According to documents obtained by XXL, attorneys for Rashad Murphy, one of the suspects in the 2024 murder of rapper Foolio, filed a supplemental memorandum on Thursday (March 5) requesting to be tried separately from his co-defendants for their upcoming trial, or at least have a different jury. Last month, the court held a hearing to address the motion but no ruling was made.\n\nOn Friday (March 6), Murphy's attorneys filed an amended memorandum addressing the court's indication that evidence concerning a separate shooting involving Murphy's co-defendants might be admissible against all defendants. This would happen if the judge determines that the evidence is \"inextricably intertwined\" with the charges related to Foolio's killing. Florida law requires a defendant-specific relevance and prejudice analysis in joint trials, Rashad Murphy respectfully submits this supplemental memorandum to address that issue.\n\nRashad Murphy is one of five people charged with Foolio's murder, along with Alicia Andrews, Isaiah Chance, Sean Gathright, and Davion Murphy. The Jacksonville, Fla., rapper was shot and killed by three masked gunmen while celebrating his birthday in Tampa, Fla., on June 23, 2004. In October 2025, Andrews was convicted of manslaughter in connection with Foolio's killing and faces a maximum sentence of 15 years in prison. Her sentencing was delayed after the original judge was removed in January by an appellate court due to bias. Andrews\u2019 new sentencing hearing is now scheduled for December 8.\n\nMeanwhile, the four other murder suspects\u2014Rashad, Davion, Isaiah, and Sean Gathright\u2014were in court on Wednesday (March 4), where a judge denied several motions, including some Florida statutes, the death penalty, and victim impact evidence. Video of their court hearing can be viewed below.", "Image_URLs": "docs/images/xxlhiphop_1_1772900527356.jpg"}, {"Source": "Star Phoenix", "Title": "Five Saskatoon concerts to see in March", "Date": "Sat, 07 Mar 2026 13:00:52 +0000", "Author": "Aidan Jaager", "URL": "https://thestarphoenix.com/news/local-news/five-saskatoon-concerts-to-see-in-march", "Summary": "Inuk singer-songwriter Elisapie will perform folk and pop songs in Inuktitut at the Broadway Theatre on March 17, as part of her Canadian tour promoting her Juno-nominated album \u201cInuktitut.\u201d Known for blending Indigenous and contemporary sounds, she aims to share personal stories and connect with audiences. Also, Black Pistol Fire will perform at Louis\u2019 on March 14.", "Content": "Canadian Inuk singer-songwriter Elisapie will perform a blend of folk and pop with Inuktitut lyrics at the Broadway Theatre on March 17.\n\nElisapie is a Canadian Inuk singer-songwriter born in a remote village in Nunavik, Quebec. She is known for blending rock, indie, folk, and pop with Inuktitut lyrics, incorporating both classic rock and traditional Indigenous elements. Her upcoming show will feature songs that evoke childhood memories and storytelling. She has stated that her music reflects personal, contemporary Inuk experiences rather than traditional themes of nomadic life or hunting. \n\nElisapie expressed excitement about returning to Saskatoon and sharing her album and healing journey through her music. She noted that her songs evoke a wide range of emotions and that she values the connection with audiences, fostering dialogue between Indigenous and non-Indigenous stories. \n\nAs part of her Canadian tour, she will perform songs from her album \u201cInuktitut,\u201d which was nominated for Juno 2025 Album of the Year, won Adult Alternative Album of the Year, made the Polaris Music Prize 2024 Shortlist, and earned her a 2024 Juno for Contemporary Indigenous Album of the Year.\n\nElisapie performs at the Broadway Theatre on March 17 at 7:30 p.m. Tickets are available at broadwaytheatre.ca.\n\nCanadian rock band Black Pistol Fire will perform at Louis\u2019 at the University of Saskatchewan on March 14. Formed in Toronto, Black Pistol Fire consists of childhood friends Kevin McKeown and Eric Owen. They are known for blending influences from blues, garage punk, and southern rock. McKeown handles guitar and lead vocals, while Owen plays drums. Their popular songs include \u201cLost Cause\u201d and \u201cBully,\u201d from the album \u201cDeadbeat Graffiti.\u201d The duo earned two Juno Award nominations in 2022 for Breakthrough Group of the Year and Rock Album of the Year for \u201cLook Alive.\u201d", "Image_URLs": "docs/images/star_phoenix_3_1772900074228.jpg"}, {"Source": "Star Phoenix", "Title": "Opinion: If Ottawa doesn't reform supply management, Washington will", "Date": "Sat, 07 Mar 2026 14:00:36 +0000", "Author": "Steve Bartlett", "URL": "https://thestarphoenix.com/opinion/opinion-if-ottawa-doesnt-reform-supply-management-washington-will", "Summary": "The U.S. Supreme Court ruled Trump-era tariffs unconstitutional in their legal basis but did not declare tariffs illegitimate, prompting President Trump to impose a 15% tariff on all imports. The court\u2019s decision suggests tariffs will remain a key trade tool, with ongoing revenue and political implications. Canada faces pressure to expand U.S. access to its dairy market, especially for ingredients, amid shifting U.S. trade policies.", "Content": "A person takes a jug of milk from a refrigerator in this file photo.Photo by file photo/Getty Images\n\nThe U.S. Supreme Court was unequivocal: the tariffs imposed under the Trump Administration were unconstitutional in their legal rationale. That distinction matters. The court did not declare tariffs themselves illegitimate. It rejected the justification used to impose them.\n\nIn response, President Trump invoked Article 122 and imposed a blanket 15 percent tariff on all goods entering the United States. The signal could not be clearer: tariffs are not going away. They are being re-engineered.\n\nSince early 2025, Washington has collected roughly $130 billion in tariff revenues. The court offered no guidance on what should happen to those funds. Thousands of American companies will undoubtedly challenge their assessments, but the broader message from the court \u2014 particularly reflected in Justice Kavanaugh\u2019s dissent \u2014 is that tariffs are likely to remain a structural feature of U.S. trade policy, regardless of who occupies the White House.\n\nThis decision was not partisan theatre. A Republican-dominated court ruled against a Republican president. That adds credibility. The ruling was procedural, not philosophical. The White House now has 150 days to construct a more defensible economic and legal framework to justify tariffs \u2014 and it will. The American political mood has shifted. A growing share of the electorate believes globalization has disadvantaged the United States. Trade policy is adjusting accordingly.\n\nWhether Canada likes it or not, this is the new American trajectory. So where does that leave us?\n\nCanada needs a trade arrangement with the United States. But it is increasingly unrealistic to assume that future access will be tariff-free. One of Washington\u2019s predictable demands will be expanded access to Canada\u2019s dairy market.\n\nYes, more access. But dismantling supply management to satisfy short-term political pressure? Absolutely not. President Trump understands that dairy is a political wedge issue in Canada. Yet from a business perspective, the case for dramatically expanding U.S. retail dairy exports into Canada is weak. Canadian consumers are not clamoring for American fluid milk.\n\nHowever, the story changes at the ingredient level. Industrial dairy proteins produced in the United States are far more competitive than Canadian equivalents. On that front, expanded access could benefit processors on both sides of the border. That conversation should be grounded in economics, not ideology.\n\nThe traditional Canadian response to trade concessions has been compensation. Ottawa distributed more than $1.7 billion in payments to dairy farmers following previous agreements. While politically expedient, that approach entrenches inefficiency. It inflates quota values, pushes farm", "Image_URLs": "docs/images/star_phoenix_1_1772900055933.jpg"}, {"Source": "Polygon", "Title": "Mr. Mime is a godawful mime in Pok\u00e9mon Pokopia", "Date": "Sat, 07 Mar 2026 16:00:17 GMT", "Author": "Giovanni Colantonio", "URL": "https://www.polygon.com/pokemon-pokopia-mr-mime/", "Summary": "In Pok\u00e9mon Pokopia, developer Omega Force depicts Mr. Mime speaking in full sentences, breaking his traditional mime persona. Unlike previous media, including Detective Pikachu, where he remained silent or mimed, he now converses normally, undermining his profession. The author criticizes this change, emphasizing respect for Mr. Mime's mime identity and praising the game's detailed creature characterization overall.", "Content": "I\u2019ve spent 50 hours building a life for myself in Pok\u00e9mon Pokopia. During that time, I\u2019ve met over 200 monsters who all have their own distinct personalities. It\u2019s always a joy to log on and be greeted by my bubbly Squirtle or my mischievous Greedent. I cherish them\u2026 except for one resident. \n\nDeveloper Omega Force has done Kanto\u2019s freakiest dude dirty: Mr. Mime is an absolutely terrible mime in Pokopia. For decades, Mr. Mime has been one of the easiest Pok\u00e9mon to adapt across mediums. The guy\u2019s entire deal is built into his name\u2014he\u2019s a mime. He mimes. The series has always been a little liberal with his skillset\u2014he still says his name in the anime like any monster\u2014but he\u2019s always been a man of few words. The 2019 Detective Pikachu movie especially nailed him down by portraying him as, you know, a mime. It felt like we had figured out how to portray the little weirdo.\n\nBafflingly, that has changed in Pok\u00e9mon Pokopia in what\u2019s sure to be a scandal to the mime community. Even though he still pretends to be trapped in a glass box while idling around, he now speaks in full sentences like every other monster you encounter. He\u2019s just a guy who says \u201cyo,\u201d similar to Rotom. When I first met him, I expected the game to make some kind of joke about it or acknowledge that he was breaking mime law. There is no such self-awareness. The guy just talks normally with you as if nothing\u2019s wrong.\n\nThe same is true for his pre-evolution, Mime Jr., but I can give that little guy some credit. He\u2019s still learning his craft. I expect a kid to break character and run over to show me the berries he picked. Mr. Mime, on the other hand, should know better. He\u2019s a full-grown adult who has spent his life honing his craft. Omega Force has demeaned the man\u2019s profession, and I won\u2019t stand for it.\n\nI will give the studio credit for the rest of the cast, though. One of Pokopia\u2019s best qualities is that it goes to great lengths to characterize each critter and imagine what it would sound like if they could all speak the same language. I love my broody Hitmonlee training in silence in the corner of town, or Trubbish hopping around the beach like a smelly ball of sunshine.\n\nPokopia builds on an appeal that\u2019s started to come alive in Scarlet and Violet\u2019s open-world design, creating a better sense that you\u2019re dealing with real animals cohabitating in real environments. I just hope Mr. Mime\u2019s profession gets the respect it deserves next time. I don\u2019t want to hear the man talk. I don\u2019t want him to thank me for putting a lamp in his home. I don\u2019t want him to ask me quiz questions about who is heavier, him or Onix. (Why would I answer that!?) I just want the guy struggling to escape from a glass prison and nothing more.", "Image_URLs": "docs/images/polygon_1_1772900393131.jpg"}, {"Source": "New York Times - World", "Title": "Mideast Fighting: Live Updates: Trump Vows to Hit Iran Harder", "Date": "Sat, 07 Mar 2026 16:08:55 +0000", "Author": "The New York Times", "URL": "https://www.nytimes.com/live/2026/03/07/world/iran-war-trump-israel-lebanon", "Summary": "President Trump vowed to intensify attacks on Iran, promising to target new areas and groups. Iran\u2019s interim government apologized to Gulf states for missile strikes but denied attacking neighboring countries, stating they targeted U.S. military sites. The conflict has caused hundreds of deaths, displacement, and rising oil prices, with ongoing Israeli strikes in Iran and Lebanon. The war's end remains unclear.", "Content": "President Trump on Saturday vowed that Iran would be \u201chit very hard\u201d\u2014including \u201careas and groups of people\u201d yet to be targeted since the Israeli-American joint assault began\u2014as the spiraling war entered its second week. Mr. Trump also said Iran had \u201capologized and surrendered to its Middle East neighbors.\u201d His remarks came after a televised speech earlier on Saturday by Masoud Pezeshkian, the Iranian president, who is also a member of the interim three-person council running the country.\n\nWhile Mr. Pezeshkian apologized to Gulf states for shooting scores of missiles and drones at them in retaliatory strikes, he also called Mr. Trump\u2019s demand for unconditional surrender \u201ca dream that our enemies will take to the grave.\u201d Mr. Pezeshkian cautioned that Iran reserved the right to respond to countries from whose territory Iran was attacked. Later on Saturday afternoon\u2014after criticism from Iranian hard-liners\u2014Mr. Pezeshkian issued another statement: \u201cWe have not attacked our friendly and neighboring countries. Rather, we have targeted U.S. military bases, facilities, and installations in the region,\u201d he said on social media.\n\nThe mixed remarks by American and Iranian leaders left it far from clear whether an off-ramp to end the war was emerging. Shortly after Mr. Pezeshkian\u2019s televised apology, air-raid sirens rang out in Bahrain and Qatar, suggesting that attacks were still continuing.\n\nU.S. forces have struck over 3,000 targets since the American-Israeli air war against Iran began last weekend, according to the U.S. military\u2019s Central Command, which is responsible for the Middle East. Senior U.S. officials last briefed the public on the fighting two days ago.\n\nThe Israeli military said on Saturday that it had launched \u201ca broad-scale wave of strikes\u201d overnight across the Iranian capital of Tehran and central Iran. Israeli attacks hit Mehrabad airport in Tehran overnight, the military said, targeting planes affiliated with Iran\u2019s Revolutionary Guards.\n\nAfter just over a week, the U.S.-Israeli war with Iran has killed hundreds and displaced hundreds of thousands; drawn in states from Oman to Turkey; snarled international travel and shipping; and sent oil and gas prices surging.\n\nPresident Trump\u2019s plan for the war remained very much unclear. His administration has zigzagged between outlining specific military goals for the war versus a broader attempt to oust the Iranian government.\n\nIsrael also intensified its attacks in Lebanon against Iran-backed Hezbollah militants there. Overnight, Israeli warplanes repeatedly bombarded the southern outskirts of Beirut, where the military had ordered hundreds of thousands of residents to flee or face imminent danger. The Israeli military said its special forces had also launched a rare raid deep in eastern Lebanon to search\u2014for the remains of...", "Image_URLs": "docs/images/nyt_1_1772900112177.jpg"}, {"Source": "Laravel News", "Title": "Polyscope Is an Ai-First Dev Environment for Orchestrating Agents", "Date": "Thu, 05 Mar 2026 03:08:03 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/polyscope-is-an-ai-first-dev-environment-for-orchestrating-agents?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Beyond Code announced Polyscope, a free AI-first development environment for orchestrating multiple AI agents simultaneously. Key features include parallel agent execution, fast copy-on-write clones, a preview browser for visual prompts, multi-model querying, and workspace integration. Available for macOS, it offers free and paid plans for solo developers and teams.", "Content": "Polyscope Is an AI-First Dev Environment for Orchestrating Agents\n\nThe team at Beyond Code has announced Polyscope, a free agent orchestration tool designed to run multiple AI agents simultaneously. \n\nFrom the announcement: \"Today we're announcing Polyscope - the free agent orchestration tool of my dreams. Run dozens of AI agents at the same time, blazing fast copy-on-write clones, a built-in preview browser you can use to visually prompt your agents, and much more.\"\n\nKey features include:\n- Running dozens of AI agents in parallel\n- Copy-on-write clones for fast agent branching\n- Built-in preview browser for visually prompting agents\n- Querying multiple models to collaborate on a question\n- Connecting workspaces to multiple repositories\n\nPolyscope is available for macOS at getpolyscope.com, offering a free plan and options for solo developers and teams.", "Image_URLs": "docs/images/laravel_2_1772900177385.png"}, {"Source": "Laravel News", "Title": "Filament v5.3.0 Released with Deferred Tab Badges and Column Manager Improvements", "Date": "Wed, 04 Mar 2026 03:31:31 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/filament-v5-3-0?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Filament v5.3.0 introduces ten features: deferred tab badge loading, column manager modal/slideover support, enhanced Rich Editor plugins with custom file providers, and sort loading indicators. It also adds rate limiting key options, navigation group enum support, a Callout controls slot, extended resource configurations, and more Tailwind colors. Bug fixes include sidebar state restoration and missing chart translations.", "Content": "Filament v5.3.0 introduces ten new features, including deferred tab badge loading, column manager modal and slideover support, enhancements to Rich Editor plugins, and sort loading indicators on table columns.\n\nDeferred tab badge loading allows badge counts to load independently from tab content, improving performance by avoiding unnecessary database queries on page load when badge values are expensive to compute.\n\nThe column manager now supports displaying in a modal or slideover, providing layout options beyond the default dropdown for managing table column visibility.\n\nRich Editor plugins can now supply their own file attachment providers, enabling plugin authors to integrate custom upload and storage behavior directly into the editor without external configuration. Additionally, plugins can control the visibility and state of toolbar buttons for more granular editing control.\n\nTable columns now display a loading spinner on sort icons during sorting operations, offering visual feedback when sorting takes a moment to complete.\n\nRate limiting configurations now support keys based on user ID and email address, supplementing existing IP-based options. Navigation groups can accept Unit Enum values, simplifying the definition of navigation groups using PHP enums.\n\nThe Callout component has gained a controls slot, allowing custom action buttons or content to be added alongside callout messages. Resources now support additional configuration options, and the component color palette has been extended with more Tailwind CSS color options.\n\nBug fixes include correct restoration of sidebar state on desktop page loads and the addition of missing chart widget translations.", "Image_URLs": "docs/images/laravel_3_1772900185731.png"}, {"Source": "ESPN NFL News", "Title": "Crosby to the Ravens: What's next for both teams, plus offseason implications", "Date": "Sat, 7 Mar 2026 08:11:19 EST", "Author": "Jamison Hensley, Ryan McFadden, Dan Graziano, Matt Miller", "URL": "https://www.espn.com/nfl/story/_/id/48127938/las-vegas-raiders-trade-maxx-crosby-baltimore-ravens-questions-draft-free-agency", "Summary": "The Raiders traded defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks. Crosby, a five-time Pro Bowler with 69.5 career sacks, is expected to boost Baltimore's pass rush. The Ravens prioritized improving their edge rushers this offseason, seeking to enhance their defense.", "Content": "The Raiders agreed to trade defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks, sources told ESPN's Adam Schefter on Friday night.\n\nAs a defensive end for the Las Vegas Raiders, Crosby made a significant impression in September 2024 when he played in Baltimore and contributed to a 26-23 upset win against the Ravens. He finished that game with six tackles, four tackles for loss, and two sacks, including one where he looped through the middle to sack quarterback Lamar Jackson.\n\nThe Ravens wanted to bring Crosby\u2019s ferocious pass rush to Baltimore so badly that they acquired him from the Raiders in exchange for first-round picks in 2026 and 2027. Crosby, 28, is a five-time Pro Bowler and is expected to be a game changer for the Ravens. His 69.5 career sacks since 2019 are more than double what anyone else on the Ravens has produced in that span; defensive tackle Nnamdi Madubuike leads the team with 30 sacks since 2019.\n\nAt the NFL combine, Ravens general manager Eric De Costa emphasized that upgrading at edge rusher was a priority for Baltimore this offseason. \"When we look at the best defenses, we see ferocious pass rush, and that was lacking this year for different reasons,\" De Costa said in February.", "Image_URLs": "docs/images/espn_nfl_2_1772900506841.jpg"}, {"Source": "ESPN NFL News", "Title": "Solak: Why Maxx Crosby fits perfectly with the Ravens' defense -- and their Super Bowl window", "Date": "Sat, 7 Mar 2026 08:11:19 EST", "Author": "Ben Solak", "URL": "https://www.espn.com/nfl/story/_/id/48129144/2026-nfl-free-agency-trade-maxx-crosby-ravens-raiders-defense-minter-lamar", "Summary": "The Baltimore Ravens acquired Raiders edge rusher Maxx Crosby by trading 2026 and 2027 first-round picks, marking their first such trade for a veteran. Crosby, an elite pass rusher, addresses Baltimore\u2019s weak pass rush, which ranked near the bottom last season. The move aims to boost their playoff chances and is a rare major investment in a veteran player by the Ravens.", "Content": "Multiple authors\n\nFor the weeks that rumors swirled around the Las Vegas Raiders' edge rusher Maxx Crosby's trade market, many teams flickered in and out of contention. The Cowboys, the Eagles, the Bears, the Lions, and the Patriots were all considered, but none of them got it done. All were priced out by the one team that would never, ever overpay in the NFL trade market\u2014the Baltimore Ravens.\n\nHere they are in uncharted waters. Crosby is the first veteran player that the Ravens have ever traded a first-round pick to acquire, and they thought so highly of him that they did it twice. ESPN's Adam Schefter reports that Baltimore is trading its 2026 and 2027 first-round selections to the Raiders for Crosby, marking the first big splash of the 2026 offseason.\n\nAs with all trades that include multiple first-round picks, this is probably a bad idea. It is always safer to draft and develop young, cost-controlled talent. That's the long-term view\u2014sober and wise. At this moment, however, it is incredibly fun that a player of Crosby's specific skill set has landed on a team like the Ravens, who so desperately need a jolt to get over the AFC playoff hump and appear in a Super Bowl. Crosby is a truly elite player at a premium position, and his presence on the Ravens' defense vaults the team from the middle of a crowded AFC playoff picture to the front on the line.\n\nThe Ravens needed Crosby more than any other team. They had 30 sacks last season, tied with the Cardinals and Panthers for the third fewest in the league. Their 29.9% pass rush win rate ranked fifth worst. It has been hard for Baltimore to find a good edge rusher. The team has spent at least a fourth-round pick on an outside rusher in each of the past five drafts: Mike Green (2025), Adisa Isaac (2024), Tavius Robinson (2023), David Ojabo (2022), and Odafe Oweh (2021). The best season from that group was Oweh's 10-sack campaign in 2024. But one year later, the Ravens flipped him to the Chargers at the trade deadline. Veterans such as Jadeveon Clowney (9.5 sacks in 2023) and Kyle Van Noy (12.5 in 2024) have held the roles admirably, but the Ravens have not rostered a field-tipping edge rusher since Terrell Suggs in 2017.", "Image_URLs": "docs/images/espn_nfl_1_1772900495144.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            // Reset scroll to top before showing modal
            const modalContent = modal.querySelector('.overflow-y-auto');
            if (modalContent) modalContent.scrollTop = 0;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
