0NemoClaw, Robot Olaf, and a\u00a0$1 trillion\u00a0bet", "Date": "Fri, 20 Mar 2026 20:02:35 +0000", "Author": "Theresa Loconsolo", "URL": "https://techcrunch.com/video/what-happened-at-nvidia-gtc-nemoclaw-robot-olaf-and-a-1-trillion-bet/", "Summary": "At Nvidia\u2019s GTC conference, CEO Jensen Huang announced a $1 trillion AI chip sales goal by 2027, emphasizing an \"Open Claw strategy\" and showcasing innovations like Nemo Claw and Robot Olaf. The event highlighted Nvidia\u2019s aim to dominate AI infrastructure across various industries, impacting startups and broader tech development.", "Content": "Startups\n\nWhat happened at Nvidia GTC: Nemo Claw, Robot Olaf, and a $1 trillion bet\n\nTheresa Loconsolo\n\nCEO Jensen Huang took the stage at Nvidia\u2019s GTC conference this week in his signature leather jacket to deliver a two-and-a-half-hour keynote, projecting $1 trillion in AI chip sales through 2027, declaring that every company needs an \u201cOpen Claw strategy,\u201d and closing with a rambling Olaf robot that had to get its mic cut. The message was clear: Nvidia aims to be foundational to everything, from AI training to autonomous vehicles to Disney parks.\n\nOn this episode of Tech Crunch\u2019s Equity podcast, Kirsten Korosec, Anthony Ha, and Sean O\u2019Kane analyze what Nvidia\u2019s expanding web of AI infrastructure partnerships means for startups, and discuss other headlines from the week.\n\nTheresa Loconsolo is an audio producer at Tech Crunch focusing on Equity, the network\u2019s flagship podcast. Before joining Tech Crunch in 2022, she was one of two producers at a four-station conglomerate, where she wrote, recorded, voiced, and edited content, and engineered live performances and interviews with guests like lovelytheband. Theresa is based in New Jersey and holds a bachelor\u2019s degree in Communication from Monmouth University.", "Image_URLs": "docs/images/techcrunch_3_1774052284773.jpg"}, {"Source": "Star Phoenix", "Title": "Season ends for hockey Huskies with OT heartbreak at U Sports nationals", "Date": "Fri, 20 Mar 2026 22:16:01 +0000", "Author": "Aidan Jaager", "URL": "https://thestarphoenix.com/sports/season-ends-for-hockey-huskies-with-ot-heartbreak-at-u-sports-nationals", "Summary": "University of Saskatchewan Huskies, ranked No. 1, lost 4-3 in overtime to No. 8 Saint Mary\u2019s in the U Sports national quarterfinals. Despite a late comeback from 3-0 down, the Huskies' season ended. Connor Roulette scored twice for Saskatchewan, but Ethan Ritchie\u2019s goal secured Saint Mary\u2019s victory. Saint Mary\u2019s advances to face Windsor in the semifinals.", "Content": "University of Saskatchewan Huskies head coach Brandon Cote credited No. 8 ranked Saint Mary's Huskies for playing \"a real hard game\" following a 4-3 overtime loss in the U Sports national championship quarterfinals.\n\nOne game. One shot. Season over for the No. 1 University of Saskatchewan men\u2019s hockey team. The top and back-to-back Canada West champion Huskies saw their pursuit of a U Sports national title end abruptly on Thursday with a 4-3 overtime loss to the No. 8 and host squad Saint Mary\u2019s in the University Cup national championship quarterfinals.\n\n\u201cObviously tough right now for our group,\u201d head coach Cote said. \u201cWe had, I guess, higher expectations coming in here, but you know, we\u2019ve had a great year and I\u2019m proud of our guys.\u201d\n\nAfter being down 3-0 late in the second period against Saint Mary\u2019s, the team battled back to tie the game late\u2014only to fall short in overtime in Halifax.\n\nCote praised Saint Mary\u2019s for their effort, noting, \u201cThey played a real hard game,\u201d and acknowledged the unpredictability of overtime. \u201cWe had our chances, we had our opportunities, a couple breakaways, couple point-blankers. Their goaltender played well. Our goaltender played well. They had some good chances, and that\u2019s just the way it goes sometimes,\u201d he said.\n\nU Sports rookie of the year forward Connor Roulette opened the scoring for the Huskies with four minutes left in the second period, netting his sixth goal of the playoffs. He added another goal 15 seconds into the third to reduce the deficit to 3-2.\n\nDespite power play opportunities for both teams late in the game, neither could score until the final minutes when Saint Mary\u2019s took a tripping penalty. Just over 40 seconds into the penalty, Chantz Petruic found Liam Keeler alone in front of the net to tie the game.\n\nThe comeback was short-lived, however. Saint Mary\u2019s defenseman Ethan Ritchie redirected a shot over Huskies goaltender Nolan Maier to secure the win with four minutes left in overtime.\n\nRoulette, named the Huskies\u2019 player of the game, reflected on the tournament. \u201cComing into a tournament like this, they give you the No. 1 seed, but that means nothing when you\u2019re in a tournament with the eight best teams left in Canada,\u201d he said. \u201cI just can\u2019t thank the coaches and our vets enough. Just a really fun year, and it just sucks that it got cut short.\u201d\n\nSaint Mary\u2019s will now face No. 4 Windsor Lancers in the U Sports national championship semifinals on Saturday.", "Image_URLs": "docs/images/star_phoenix_2_1774052095466.jpg"}, {"Source": "New York Times - World", "Title": "Trump Organization Eyes Transylvania Golf Course Deal", "Date": "Fri, 20 Mar 2026 09:01:06 +0000", "Author": "Rebecca R. Ruiz and Andrei Petre", "URL": "https://www.nytimes.com/2026/03/20/world/europe/trump-romania-transylvania-apartments-golf-course.html", "Summary": "The Trump Organization plans to develop luxury apartments and a golf course near a landfill in Cluj, Romania, marking its expansion into Transylvania. The project aims to revive a stalled development amid local issues, including Roma displacement. Despite previously pledging to halt international deals, the company continues global expansion through licensing, earning tens of millions in 2024.", "Content": "The Trump Organization has long established its presence in major cities such as Manhattan, Los Angeles, and Honolulu, with ambitions extending to Australia, Bali, and the Maldives. Now, the family business is targeting Transylvania, the central Romanian region known for its association with Count Dracula. \n\nRecords and interviews indicate that the company has selected a site near one of the region\u2019s largest landfills and a former medical waste dump in the city of Cluj. The project, which has not yet been officially announced, aims to revive a stalled real estate development that was previously marred by government corruption. It would feature luxury apartments and a golf course close to an informal encampment where Roma people have been effectively exiled to live beside toxic waste.\n\nThe deal represents part of a broader global expansion of the Trump brand. During Donald Trump\u2019s first presidential term, the company publicly pledged to cease new international deals, but this promise was not renewed after he returned to office. Instead, the firm has leveraged the president\u2019s popularity in certain regions, particularly in Persian Gulf countries, through licensing agreements that allow use of the Trump name.\n\nFinancial disclosures suggest that these international licensing deals generated tens of millions of dollars in 2024. The company has announced additional projects and has also profited from ventures involving cryptocurrency.", "Image_URLs": "docs/images/nyt_6_1774052156875.jpg"}, {"Source": "Saskatoon Police News", "Title": "Arrests - Discharged Bear Spray - 400 Block Confederation Drive", "Date": "Fri, 20 Mar 2026 21:10:47 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026150", "Summary": "A 12-year-old girl and a 14-year-old boy were arrested after discharging bear spray during a fight at a business on Confederation Drive. The girl was charged with weapon possession and concealment, while the boy faced charges of mischief, weapon possession, and concealment, with the boy also found with an imitation firearm.", "Content": "A youth male and a youth female were arrested yesterday evening after bear spray was discharged in a business.\n\nAt around 7:15 p.m. on March 19, 2026, police were called to a business in the 400 block of Confederation Drive for a report of a large group of youth fighting and discharging bear spray. Upon arrival, officers were directed towards three youths who had not since fled; following continued investigation, two of the youths were arrested and found to be in possession of canisters of bear spray. One was also in possession of an imitation firearm.\n\nAs a result, a 12-year-old female was charged with possession of a weapon dangerous to public peace and unauthorized carry of a concealed weapon. A 14-year-old male was charged with mischief over $5000, possession of a weapon dangerous to public peace (x2), and unauthorized carry of a concealed weapon (x2).", "Image_URLs": "docs/images/saskatoon_police_2_1774052221771.png"}, {"Source": "Ars Technica", "Title": "You're likely already infected with a brain-eating virus you've never heard of", "Date": "Fri, 20 Mar 2026 22:11:24 +0000", "Author": "Beth Mole", "URL": "https://arstechnica.com/health/2026/03/youre-likely-already-infected-with-a-brain-eating-virus-youve-never-heard-of/", "Summary": "Researchers warn that the JC virus, infecting up to 90% of people silently, can activate and cause progressive multifocal leukoencephalopathy (PML), a deadly brain disease. PML destroys myelin in the brain, leading to neurological deficits. While rare, cases have increased, especially among immunocompromised individuals, though treatments have improved survival rates.", "Content": "There\u2019s a virus you may have never heard of before that is estimated to infect up to 90 percent of people and lurks quietly in your cells for life\u2014but if it becomes activated, it will destroy your brain. Researchers reported this week that there may be a new way for this virus to activate\u2014one that affects up to 10 percent of adults worldwide.\n\nThe virus is the human polyomavirus 2, commonly called either the JC virus or John Cunningham virus, named after the patient from whom it was first isolated in 1971. It shows up in the urine and stool of infected people and spreads via the fecal-oral route. Many people are thought to be infected early in life, and blood testing surveys have suggested that 50\u201390 percent of adults have been exposed at some point.\n\nResearchers hypothesize that the initial site of infection is the tonsils, or perhaps the gastrointestinal tract. But wherever it happens, that initial infection is asymptomatic. At that point, a person is infected with what\u2019s called the archetype JC virus, which quietly sets up a persistent but utterly silent lifelong infection.\n\nFor the vast majority of people, that is all their JC virus infection will be\u2014silent. But for an unlucky few, the JC virus will awaken, rearrange its genetic material, and morph into a brain-demolishing disease called progressive multifocal leukoencephalopathy or PML.\n\nDevastating disease\n\nIn PML, the new disease-causing virus or \u201cPML-type\u201d JC virus actively invades the brain, destroying specific brain cells, including those that form the insulating myelin sheaths that protect nerve cells. This leads to extensive demyelination, resulting in nerve cell dysfunction and death. On imaging, PML can show up as signature lesions in the brain. These lesions, paired with test findings of JC virus DNA in cerebrospinal fluid, are used to diagnose PML. Symptoms can mimic everything from a stroke to multiple sclerosis, causing problems like speech impairments, visual defects, motor dysfunction, and seizures.\n\nPML was first identified in 1958 in a cancer patient. It was considered an extremely rare condition until the 1980s, when it started to appear in patients with HIV/AIDS. In fact, PML became an AIDS-defining disease, with 2\u20135 percent of HIV-infected patients developing it in the early phase of the epidemic. At that point, the condition was uniformly fatal. But with the introduction of highly active antiretroviral therapy (HAART) in 1996, PML cases declined, and the disease was no longer a death sentence, though survivors often have significant lasting damage.\n\nExpanding cases\n\nIn the decades since its discovery, PML has been considered a disease that strikes amid profound immune suppression. It\u2019s thought that the JC virus can activate and rearrange.", "Image_URLs": "docs/images/ars_technica_4_1774052373367.jpg"}, {"Source": "Polygon", "Title": "Crimson Desert guides and walkthroughs", "Date": "Fri, 20 Mar 2026 21:32:43 GMT", "Author": "Polygon Staff", "URL": "https://www.polygon.com/crimson-desert-guides-walkthroughs/", "Summary": "Crimson Desert is an open-world medieval game set in Pywel, featuring quests, puzzles, battles, and exploration. Players start as Kliff, gathering friends while navigating a vast, maze-like world with limited tutorials. Key tips include choosing skills, respecs, fast travel, and resource gathering. Guides and maps assist with navigation, puzzle solutions, and quest completion.", "Content": "Crimson Desert is a vast open-world game that takes you and your Greymane buddies through Pywel, a medieval realm full of knights, bandits, witches, and even cats. You'll start off as Kliff, who is looking to get the gang back together, but you'll need to take a pit stop in Hernand first. As you meet up with your friends, you'll encounter numerous puzzles both on land and in the Abyss, take on difficult battles, and perhaps pet a dog or two.\n\nPywel is huge and extremely easy to get lost in. Everyone will have a different playthrough due to the world's size and options, but that can also be daunting. To help you get started, a guide and interactive map are available to help you become familiar with the world. If you want a sense of direction, these resources can guide you on where to go first.\n\nCrimson Desert is fairly hands-off with its tutorials, which can make its quests and puzzles a little difficult to solve. Right from the beginning, you'll be thrown into the Abyss and unraveling ancient ruins, but they're no easy task. Before you set off, you should gear up, stock up on food, and choose the best skills for your playstyle. If you'd rather explore, look out for Abyss cressets and Abyss nexuses to traverse the world quickly.\n\nGetting started tips include knowing where to go first, understanding the best skills to level up, how to respec, how to make money, and how to fast travel. Additionally, players can learn when they get a house in Crimson Desert, complete quest walkthroughs such as \"Abyss Without Balance,\" \"Reunion,\" \"Familiar Curses,\" and \"Bustling Hill.\" Puzzle solutions are available for challenges like the Dragon's Stone Chamber, Root's End Abyss, and the Precipice of Truth Abyss.\n\nResources can be collected through fishing, mining ore, cutting trees, stealing, and pickpocketing. To power up, players can craft weapons and armor, cook, and obtain palmar pills. Locations of witches are also part of the exploration.", "Image_URLs": "docs/images/polygon_3_1774052309435.png"}, {"Source": "Laravel News", "Title": "Laravel Prompts v0.3.15 Adds Streaming, Tasks, Autocomplete, and More", "Date": "Thu, 19 Mar 2026 13:32:19 +0000", "Author": "Eric L. Barnes", "URL": "https://laravel-news.com/laravel-prompts-0-3-15?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "Laravel Prompts v0.3.15 adds features for interactive CLI apps, including task() for long operations with live updates, stream() for incremental output, autocomplete() for suggestions, dynamic context panels in select prompts, title() for terminal titles, and notify() for system alerts. These tools enable building AI-powered, real-time, and user-friendly terminal applications.", "Content": "Laravel Prompts v0.3.15 introduces several new features to facilitate the creation of interactive, real-time, and AI-driven terminal applications.\n\nA new helper, task(), simplifies running long-running operations while keeping users informed. It includes a live-updating spinner, scrolling log output, and persistent success, warning, and error states that remain after completion. The task label can also be dynamically updated as progress changes, making it useful for deployments, installations, or processes requiring visibility.\n\nThe stream() prompt enables incremental output directly to the terminal, supporting word wrapping, ANSI support, and a smooth fade-in effect. This feature is ideal for displaying AI-generated responses, live logs, or progressive output from APIs\u2014anything arriving over time can now be displayed naturally in the CLI.\n\nWith autocomplete(), users receive type-ahead suggestions while maintaining full control over input. Suggestions can be provided via a static array or a dynamic closure that filters options as the user types. This is useful for config keys, file paths, or frequently used values where speed is essential.\n\nSelect prompts now support dynamic context panels through the info parameter. By passing a closure, developers can display contextual details\u2014such as pricing, descriptions, IDs, or metadata\u2014based on the currently highlighted option across select, multiselect, search, multisearch, and suggest prompts.\n\nThe title() helper allows programmatic updates to the terminal window or tab title, which is especially helpful for long-running commands. Users can monitor progress at a glance, even when the terminal is in the background. Passing an empty string resets the title.\n\nThe notify() function brings native system notifications to CLI applications, supporting macOS (including subtitles and sounds) and Linux (with custom icons). This feature is useful for background tasks like deployments or builds, alerting users when processes complete.\n\nThese primitives can be combined to build AI-powered CLI applications. For example: accept user input, update the terminal title, process the request with an AI agent wrapped in task(), and stream the generated output with stream(). This pattern enables powerful AI-driven developer tools directly in the terminal.", "Image_URLs": "docs/images/laravel_3_1774052212875.png"}, {"Source": "BBC News - World", "Title": "Norway's crown princess breaks silence, claiming she was 'manipulated and deceived' by Epstein", "Date": "Fri, 20 Mar 2026 15:30:28 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cde5y63y3n7o?at_medium=RSS&at_campaign=rss", "Summary": "Norwegian Crown Princess Mette-Marit expressed regret over her contacts with Jeffrey Epstein, stating she wishes she had never met him. She revealed exchanging emails and staying at his Florida home between 2011-2014, claiming she was manipulated and unaware of his crimes. She apologized for poor judgment, emphasized her lack of knowledge about his abuse, and condemned Epstein\u2019s victims.", "Content": "Norway's Crown Princess Mette-Marit has told national TV that she wishes she had never met late US sex offender Jeffrey Epstein, breaking seven weeks of silence after the extent of her contacts with him emerged.\n\n\"I feel so manipulated, and when you are manipulated, you don't realise it from the start,\" Mette-Marit said in a 20-minute interview in which she was often on the verge of tears.\n\nSeven weeks ago, Norwegians discovered that the crown princess had exchanged hundreds of emails with the disgraced Epstein between 2011 and 2014, and stayed in his Florida house when he was not there.\n\n\"It is incredibly important for me to take responsibility for not checking his background more carefully,\" she said. \"And to take responsibility for being so manipulated and deceived as I was.\"\n\nShe has already apologized and admitted to \"poor judgement\" after the close nature of her links to Epstein came to light when millions of Epstein files were released by the US justice department at the end of January.\n\n\"Of course I wish I had never met him,\" the princess told public broadcaster NRK, stressing that it was Epstein's victims who deserved justice for the great abuse they had suffered. She said she felt great anger that they had not yet received it.\n\nHer decision to speak publicly comes after intense scrutiny and pressure to explain herself, including from Prime Minister Jonas Gahr St\u00f8re.\n\nThe crown princess gave little away during the conversation, and some of her responses came across as defensive. In 2011, three years after Epstein had been jailed for soliciting underage sex, she wrote: \"Googled u after last email. Agree didn't look too good.\"\n\nSitting alongside her husband, Crown Prince Haakon, during the interview, Mette-Marit maintained she \"didn't know he was a sex offender or a predator,\" even though the reporter pointed out that a Wikipedia article on Epstein at the time had made clear he was a convicted abuser.\n\n\"I can't remember this; it was 15 years ago.\"\n\nThe crown princess described phoning her husband after an \"uneasy\" incident during her stay at Epstein's Florida home.\n\n\"I still didn't know anything about all the abuse. But I had understood enough that I thought he was a bad guy who people shouldn't have contact with,\" she told NRK. \"And I had up close how he blackmailed others. So I regret that I didn't tell more people, because I should have.\"\n\nShe admitted to being too trusting of Epstein, but when asked why neither the palace nor the foreign ministry knew about her links to him, she said he was a \"private contact\" and she did not tell everyone about her private contacts.\n\nAsked why she spent several days in Epstein's home in Palm Beach in 2013, she explained that it was down to an unnamed mutual acquaintance. \"Epstein was a close friend of a good friend of mine,\" she said.", "Image_URLs": "docs/images/bbc_5_1774052262278.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^docs\//, './').replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            // Show modal and scroll to top
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // Use requestAnimationFrame to ensure DOM is ready, then scroll to top
            requestAnimationFrame(() => {
                const contentBox = modal.querySelector('.bg-white');
                if (contentBox) {
                    contentBox.scrollTop = 0;
                }
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
