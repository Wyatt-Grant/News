        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>

                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">

                <!-- Modal Footer -->

    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "Sir\u0101t", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/sirat.html", "Summary": "\"Sir\u0101t\" is an R-rated drama directed by Oliver Laxe, set in a suspense genre. The 115-minute film, starring Sergi L\u00f3pez and others, follows a father and son searching for their missing daughter at a Moroccan rave. It releases in Los Angeles and New York on November 14, 2025, and nationwide on March 6, 2026.", "Content": "Sir\u0101t is a drama film set in a foreign suspense genre, rated R, with a runtime of 115 minutes. It is scheduled for release on November 14, 2025, in Los Angeles and New York, and on March 6, 2026. Directed by Oliver Laxe and written by Santiago Fillol and Oliver Laxe, the film stars Sergi L\u00f3pez, Bruno N\u00fa\u00f1ez, Stefania Gadda, Joshua Liam Henderson, Tonin Janvier, Jade Oukid, and Richard Bellamy. \n\nThe story follows a father and his son who arrive at a rave deep in the mountains of southern Morocco. They are searching for Mar, their daughter and sister, who vanished months earlier at one of these endless, sleepless parties. Surrounded by electronic music and a raw, unfamiliar sense of freedom, they repeatedly show her photo, holding onto hope as they follow a group of ravers to one last destination.", "Image_URLs": "docs/images/filmjabber_3.webp"}, {"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026), directed by Maggie Gyllenhaal, is an R-rated horror drama romance set for release on March 6, 2026. Featuring stars like Christian Bale, Jessie Buckley, and Pen\u00e9lope Cruz, the film follows a Frankenstein-like creation in 1930s Chicago, exploring themes of life, love, and macabre transformation. Warner Brothers produces the 126-minute film.", "Content": "The Bride (2026) is a horror drama romance film rated R with a runtime of 126 minutes, set to be released on March 6, 2026. It is directed and written by Maggie Gyllenhaal, known for her work on The Lost Daughter. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. The film is produced by Warner Brothers.\n\nThe story centers on a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening). Together, they revive a murdered young woman, resulting in the creation of The Bride (Buckley). The film offers a bold, iconoclastic take on a compelling story, blending life, macabre romance, and ambitious ideas. Maggie Gyllenhaal\u2019s vision presents a beautiful yet hideous creature that is both captivating and unsettling.", "Image_URLs": "docs/images/filmjabber_1.webp"}, {"Source": "Film Jabber", "Title": "Hoppers", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/hoppers.html", "Summary": "\"Hoppers\" is a 2026 animated sci-fi comedy film directed by Daniel Chong, set for release on March 6, 2026. Produced by Walt Disney, it stars Jon Hamm, Bobby Moynihan, and Piper Curda. The story involves scientists developing technology to transfer human consciousness into robotic animals, enabling communication with animals, with Mabel uncovering hidden mysteries.", "Content": "Hoppers (2026) is an action animated comedy sci-fi film rated PG, with a runtime of 105 minutes. It is scheduled for release on March 6, 2026, and is directed by Daniel Chong, with writers Jesse Andrews and Daniel Chong. The cast includes Jon Hamm, Bobby Moynihan, and Piper Curda. The film is produced by Walt Disney Pictures.\n\nIn \"Hoppers,\" scientists have discovered how to \"hop\" human consciousness into lifelike robotic animals, allowing people to communicate with animals as if they were animals. Using this new technology, Mabel (Curda) will uncover mysteries within the animal world that are beyond anything she could have imagined.", "Image_URLs": "docs/images/filmjabber_2.webp"}, {"Source": "Film Jabber", "Title": "How to Make a Killing", "Date": "2026-03-07", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/how-to-make-a-killing.html", "Summary": "\"How to Make a Killing\" (2026) is an R-rated crime comedy directed by John Patton Ford, starring Glen Powell as Becket Redfellow, who seeks to inherit $28 billion by eliminating family members after being disowned at birth. The film features Margaret Qualley, Jessica Henwick, Ed Harris, and others, produced by A24.", "Content": "How to Make a Killing (2026) is a crime suspense comedy rated R, with a runtime of 105 minutes. It is directed by John Patton Ford, who also wrote the screenplay. The cast includes Glen Powell, Margaret Qualley, Jessica Henwick, Bill Camp, Zach Woods, Topher Grace, and Ed Harris. The film is produced by A24.\n\nThe story centers on Becket Redfellow, played by Glen Powell, who was disowned at birth by his wealthy family. Determined to reclaim his inheritance, he is willing to go to any lengths, including eliminating relatives who stand in his way.\n\nIn the film, Powell's character is depicted as someone who has not been particularly fortunate in life\u2014despite being attractive, successful, and surrounded by admirers. His ultimate goal is to inherit $28 billion by removing his family members.", "Image_URLs": "docs/images/filmjabber_4.webp"}, {"Source": "Saskatoon Police News", "Title": "Traffic Collison - Circle Dr E/Highway 11 - Update", "Date": "Fri, 06 Mar 2026 01:39:24 +0000", "Author": "Unknown", "URL": "http://saskatoonpolice.ca/news/2026117", "Summary": "Saskatoon police report that one eastbound lane on Circle Drive and one northbound lane on Highway 11 are now open after a semi-trailer struck the bridge, causing damage. No injuries occurred. Traffic restrictions remain, and motorists are advised to use alternate routes as engineers assess the damage. The collision is under investigation.", "Content": "The Saskatoon Police Service advises that city engineers have assessed the damage, and one eastbound lane on Circle Drive and one northbound lane of Highway 11 have been opened for traffic to proceed. The Collision Analyst Unit, in cooperation with the Saskatchewan Highway Patrol, is investigating the collision. No injuries were reported.\n\nTraffic flow restrictions will remain until further notice. Motorists are asked to take alternate routes or expect delays in the area.\n\nA semi with a trailer carrying equipment traveling northbound on Highway 11 from Regina, entering the city limits at the Circle Drive overpass, was too high for the structure and caused significant damage. The northbound lanes of Highway 11 into the city and the eastbound lanes of Circle Drive over the bridge will be closed until engineers from the City of Saskatoon assess the damage and determine if it is safe for travel. Motorists are advised to take alternate routes until further notice.", "Image_URLs": "docs/images/saskatoon_police_2.png"}, {"Source": "Laravel News", "Title": "The Inertia v3 Beta is Here", "Date": "Fri, 06 Mar 2026 02:36:45 +0000", "Author": "Paul Redmond", "URL": "https://laravel-news.com/the-inertia-v3-beta-is-here?utm_medium=feed&utm_source=feedpress.me&utm_campaign=Feed%3A+laravelnews", "Summary": "The Inertia v3 Beta introduces a built-in XHR HTTP client, optional Axios support, and a new use Httphook for external HTTP requests with validation error handling. It adds optimistic updates across the router, use Form, and use Http, with support for concurrent updates and automatic rollback. Instant navigation and server-side URL fragment preservation are also included.", "Content": "The Inertia v3 Beta is a major pre-release milestone that introduces several new features and improvements. It now includes a built-in XHR HTTP client, making Axios an optional peer dependency. Applications that do not require Axios can omit it entirely, while those that prefer it can continue using it by installing it as a peer dependency.\n\nA new use Httphook allows making HTTP requests outside of Inertia, providing the same developer experience as use Form\u2014 including processing, errors, progress, and dirty state\u2014but returns response data instead of triggering page navigation. It supports surfacing all validation errors, not just the first.\n\nOptimistic updates have been added across the router, use Form, and use Http, including support for concurrent optimistic updates. The update callback can receive current props and return the optimistic state to apply immediately, with automatic rollback on validation errors, server errors, or interrupted requests. The router supports both a fluent API and an inline option for optimistic updates.\n\nThe use Form hook now works similarly, allowing optimistic updates when adding new items. The <Form> component also gains an optimistic prop for declarative handling.\n\nInstant support has been added to make navigation feel immediate by rendering the destination page before the server response completes.\n\nA new server-side preserve Fragment option keeps the URL hash fragment intact across redirects. In Laravel, chaining preserve Fragment() on a redirect response ensures the URL fragment is preserved even when the server includes preserve Fragment: true in the Inertia page object.", "Image_URLs": "docs/images/laravel_1.png"}, {"Source": "New York Times - World", "Title": "He Had a Purple Heart, PTSD and a Rap Sheet. He Had to Leave the U.S.", "Date": "Fri, 06 Mar 2026 05:00:24 +0000", "Author": "Max Kim", "URL": "https://www.nytimes.com/2026/03/06/world/asia/south-korea-deportee-immigration.html", "Summary": "Sae Joon Park, a U.S. Army veteran deported last year, faces potential deafness in South Korea after a ruptured eardrum and worsening hearing loss. Having lived in the U.S. since age 7 and holding a Purple Heart, he struggles with language barriers and his criminal past, which led to his deportation. He has sought media attention and congressional help for his case.", "Content": "Sae Joon Park\u2019s life was in pieces after he was swept up in the Trump administration\u2019s deportation push last year. But on a recent Tuesday, he was preoccupied with the more immediate concern that he might be going deaf.\n\nAt a walk-in clinic in Busan, South Korea, he explained to the receptionist, in slightly accented Korean, how his left eardrum had inexplicably ruptured in his sleep a few weeks earlier. Now his right ear was fading out, too.\n\n\u201cFill in the blanks, please,\u201d she said, producing an intake form.\n\n\u201cI can\u2019t read or write Korean,\u201d Mr. Park said.\n\nIt was a line he had delivered many times in recent weeks, explained by the fact that he hadn\u2019t lived in South Korea since he was 7, when he immigrated to the United States. A U.S. Army veteran with combat trauma and a Purple Heart, he was ordered to leave America at the age of 56 over a criminal history that he thought he had atoned for.\n\nHe had pleaded his case in nearly two dozen media interviews. In December, he video-called into a congressional hearing where former Homeland Security Secretary Kristi Noem promised to look into his case.", "Image_URLs": "docs/images/nyt_12.jpg"}, {"Source": "Smashing Magazine", "Title": "Human Strategy In An AI-Accelerated Workflow", "Date": "Fri, 06 Mar 2026 08:00:00 GMT", "Author": "hello@smashingmagazine.com (Carrie Webster)", "URL": "https://smashingmagazine.com/2026/03/human-strategy-ai-accelerated-workflow/", "Summary": "UX design is evolving as AI rapidly automates tasks like wireframes and prototypes, raising fears of job displacement. However, the core of UX\u2014navigating ambiguity, advocating for users, and solving complex problems\u2014remains irreplaceable. While automation handles artifact creation, human-centered design skills are essential for meaningful, effective solutions.", "Content": "UX design is entering a new phase, with designers shifting from makers of outputs to directors of intent. AI can now generate wireframes, prototypes, and even design systems in minutes, but UX has never been only about creating interfaces. It\u2019s about navigating ambiguity, advocating for humans in systems optimized for efficiency, and solving their problems through thoughtful design.\n\nI\u2019ve been working in User Experience design for more than twenty years. Long enough to have held many job titles, from when stakeholders asked us to \u201cjust make it pretty\u201d to when wireframes were delivered as annotated PDFs. I\u2019ve seen many tools come and go over the years, methodologies rise and fall, and entire platforms disappear.\n\nYet, nothing has unsettled designers quite like AI. When generative AI tools first entered my workflow, my reaction wasn\u2019t excitement \u2014 it was unease, with a little curiosity. Watching an interface appear in seconds, complete with sensible spacing, readable typography, and halfway-decent copy, triggered a very real fear: if a machine can do this, where does that leave me?\n\nThat fear is now widespread. Designers at every level ask the same question, often quietly: \u201cWill an AI agent replace me by next week, month, or year?\u201d While the difference between next week and next year is significant, it depends on where you are in your career and how quickly your employer chooses to adopt AI tools. I have been fortunate in some roles to work with organizations that haven\u2019t allowed the use of AI due to data security concerns. For those interested, discussions about AI in design are ongoing on platforms like Reddit.\n\nFearing the takeover of AI in our roles is not irrational. We\u2019re AI generating wireframes, prototypes, personas, usability summaries, accessibility suggestions, and entire design systems. Tasks that once took days can now be completed in minutes.\n\nHere\u2019s the uncomfortable truth: if your role is largely about producing artifacts, drawing buttons, aligning components, or translating instructions into screens, then parts of that work are already being automated. Still, UX design has never truly been about just creating a user interface. It\u2019s about navigating ambiguity, advocating for humans within systems optimized for efficiency, and translating complex human needs into effective solutions.", "Image_URLs": "docs/images/smashing_1.jpg"}, {"Source": "New York Times - World", "Title": "Lebanon at \u2018Tipping Point\u2019 as It Seeks to Disarm Hezbollah", "Date": "Fri, 06 Mar 2026 08:59:40 +0000", "Author": "Christina Goldbaum", "URL": "https://www.nytimes.com/2026/03/06/world/middleeast/lebanon-hezbollah-iran-disarm.html", "Summary": "Lebanon's government has struggled to disarm Hezbollah amid rising tensions with Israel. Recent Israeli airstrikes targeted Hezbollah positions in Beirut, displacing residents. Experts warn this could lead to civil conflict or Hezbollah disarmament, as Lebanon faces escalating violence after Hezbollah's retaliation for Iran's leader's death. The situation remains tense and unpredictable.", "Content": "For much of the past year, Lebanon\u2019s government has walked a tightrope in its dealings with the Iranian-backed armed group Hezbollah as it has moved to disarm the militants and curb their influence in Lebanese politics. Now, as Lebanon faces a rapidly escalating conflict between Hezbollah and Israel, the country is awaiting whether the government will seize this moment to take decisive action against Hezbollah\u2014and how the group will respond.\n\nOvernight, the Israeli military bombed Hezbollah positions on the southern edge of Beirut, with explosions audible across the city. The bombardment displaced thousands of residents from the densely populated area, many of whom spent the night on the streets of downtown Beirut. \n\n\u201cThis is the tipping point,\u201d said Sami Nader, director of the Institute of Political Science at Saint Joseph University of Beirut. \u201cEither we have the dark scenario where the army clashes with Hezbollah and there is civil strife, or Hezbollah abides by the government decision and they disarm.\u201d\n\nLebanese officials have had to strike a delicate balance over the past year: appeasing demands from the United States and other allies to act swiftly against Hezbollah, while proceeding cautiously to avoid clashes between Lebanese soldiers and militants\u2014a scenario many fear could ignite civil conflict. \n\nHowever, when Hezbollah began firing at Israel this week in retaliation for the killing of Iran\u2019s Supreme Leader, Ayatollah Ali Khamenei, and the subsequent escalation of fighting, that balance appeared to unravel.", "Image_URLs": "docs/images/nyt_9.jpg"}, {"Source": "Politico - Picks", "Title": "Trump\u2019s war aim: Iran\u2019s \u2018unconditional surrender\u2019", "Date": "Fri, 06 Mar 2026 10:14:06 EST", "Author": "Giselle Ruhiyyih Ewing", "URL": "https://www.politico.com/news/2026/03/06/donald-trump-iran-war-unconditional-surrender-00816361", "Summary": "President Trump called for Iran\u2019s \u201cunconditional surrender\u201d amid ongoing military conflict, suggesting regime change and influence over Iran\u2019s leadership. He emphasized that surrender could mean military defeat or Tehran\u2019s official capitulation. The shift expands U.S. goals from destroying Iran\u2019s missile and nuclear capabilities to regime change, following the killing of Iran\u2019s supreme leader.", "Content": "President Donald Trump outlined his administration\u2019s ultimate goal for the war in Iran on Friday: \u201cunconditional surrender\u201d by the Islamic Republic\u2019s leaders.\n\nIn a Truth Social post, Trump wrote that \u201cthere will be no deal with Iran except UNCONDITIONAL SURRENDER!\u201d Following Tehran\u2019s submission to the ongoing military campaign, he suggested there should be \u201cthe selection of a GREAT & ACCEPTABLE Leader(s),\u201d after which the U.S. and its allies would work to \u201cbring Iran back from the brink of destruction, making it economically bigger, better, and stronger than ever before.\u201d\n\nIt\u2019s not the first time Trump has called for Iran\u2019s \u201cunconditional surrender.\u201d The president issued a warning to Tehran using those same words during a 12-day war last June \u2014 just four days before the U.S. struck multiple of Iran\u2019s nuclear sites.\n\nLater on Friday, Trump said that \u201csurrender\u201d did not necessarily mean a formal announcement from Tehran, but could also be a complete defeat of its military forces. \u201cUnconditional surrender could be that [the Iranians] announce it. But it could also be when they can\u2019t fight any longer because they don\u2019t have anyone or anything to fight with,\u201d he told Axios in an interview.\n\nTrump\u2019s message, coming after days of mixed signals from administration officials, indicates that the U.S. has no intention of providing Tehran with an off-ramp for a deal. It also clarifies the administration\u2019s ultimate aims nearly a week into a war that has already claimed several American lives, as well as those of U.S. allies and Iranian citizens.\n\nThe post diverges from what the president said when he announced the U.S. operation against Iran last Saturday. In a video statement at the time, Trump said the goals were to \u201cdestroy\u201d Tehran\u2019s missiles and missile industry, \u201cannihilate\u201d its navy, and prevent Iran from developing nuclear weapons.\n\nNow, the president has expanded those aims to include regime change. Trump had already indicated that he wants to influence the selection of Iran\u2019s next leader after the joint U.S.-Israeli operation killed the Islamic Republic\u2019s supreme leader, Ayatollah Ali Khamenei, over the weekend. He told POLITICO in an interview Thursday that he plans to \u201chave a big impact\u201d in that process.\n\nSpeaking to the press in the Oval Office on Tuesday, Trump said he preferred to work with \u201csomebody from within\u201d the current regime \u2014 though he admitted that the number of options was dwindling as \u201cmost of the people we had in mind are dead.\u201d", "Image_URLs": "docs/images/politico_1.jpg"}, {"Source": "CBC News - World", "Title": "'This is wrong,' Lebanese resident says as hundreds of thousands displaced amid Israeli strikes", "Date": "Fri, 06 Mar 2026 11:13:47 EST", "Author": "", "URL": "https://www.cbc.ca/news/world/lebanon-israel-evacuation-orders-iran-war-9.7117084?cmp=rss", "Summary": "Israeli airstrikes in Lebanon have killed at least 217 people and displaced hundreds of thousands, mainly in Beirut\u2019s southern suburbs. Residents are sleeping outdoors amid ongoing clashes between Israel and Hezbollah, with fears of a humanitarian catastrophe. Israel has ordered Lebanese civilians to evacuate southern Lebanon, intensifying the conflict's impact.", "Content": "Israeli airstrikes continued to pound Lebanon on Friday, forcing hundreds of thousands to flee their homes in densely populated neighborhoods to shelter elsewhere, as aid groups warned the escalating conflict could lead to a humanitarian catastrophe. According to Lebanon's Health Ministry, at least 217 people have been killed and hundreds more injured since the conflict intensified on Monday.\n\nDisplaced people fleeing Israeli airstrikes in the southern suburbs of Beirut, such as Dahiyeh, are sleeping on the streets, on cars, and on the beach. Jamal Seifeddin, 43, who spent the night outside in downtown Beirut, described the situation: \"We\u2019re sleeping here in the streets \u2014 some in cars, some on the street, some on the beach. No one even brought a blanket.\"\n\nThe southern suburbs of Beirut were again targeted by Israeli airstrikes as Israel engaged in exchanges of fire with Hezbollah, the Iranian-backed militia. Following U.S. and Israeli attacks against Iran that began a week ago, Hezbollah launched missiles and drones into Israel on Monday for the first time in over a year. Israel responded with bombardments of southern Lebanon and Beirut's southern suburbs.\n\nResidents fleeing the area expressed fears for their safety. Hadi Kaakour, a resident fleeing Beirut's southern suburbs, said he is uncertain he will be safe anywhere, stating, \"We don't put anything past [Israel], they will strike us no matter where we go.\" Others voiced frustration over Lebanon being drawn into the conflict, with Yousef Nabulsi saying, \"We got sucked into a mess that we have nothing to do with. People have been displaced and are now staying on the streets, and this is wrong.\"\n\nOn Thursday, Israel's military ordered Lebanese residents out of Beirut's southern suburbs, including areas controlled by Hezbollah, as well as parts of the eastern Bekaa Valley, after directing people to evacuate sections of southern Lebanon.", "Image_URLs": "docs/images/cbc_4.jpg"}, {"Source": "CBC News - World", "Title": "Justice Department releases Epstein files that include uncorroborated Trump allegation, after complaints", "Date": "Fri, 06 Mar 2026 11:56:54 EST", "Author": "Chris Iorfida", "URL": "https://www.cbc.ca/news/world/epstein-files-trump-allegations-9.7117186?cmp=rss", "Summary": "The U.S. Justice Department released previously undisclosed files related to Jeffrey Epstein, including interviews with a woman alleging she was assaulted by Trump as a teen and claims of Epstein\u2019s schemes. The documents, initially withheld, are part of the Epstein Transparency Act. The White House dismissed the woman's allegations as baseless, and some claims are considered untrue and sensationalist.", "Content": "The U.S. Justice Department has released additional files connected to the late sex offender Jeffrey Epstein, including descriptions of interviews with a woman making allegations against President Donald Trump, a former Epstein associate. The department said Thursday the files had been \"incorrectly coded as duplicative,\" and therefore not originally published. The department has faced scrutiny in Congress over its handling of the documents, which it is required to make public as part of the Epstein Transparency Act, prompted by efforts from both Democratic and Republican legislators.\n\nSome of the new records pertain to a woman who contacted the FBI shortly after Epstein\u2019s 2019 arrest and claimed that a man named \u201cJeff\u201d living in Hilton Head, South Carolina, had raped her there in the 1980s when she was around 13 years old. The woman told agents she didn\u2019t know the man\u2019s identity at the time, but decades later concluded he was Jeffrey Epstein after a friend texted her his photo from a news story.\n\nThe woman was interviewed four times by FBI agents and over time added a host of other claims, including that Epstein had schemed to have her mother sent to prison, beaten her, arranged sexual encounters with other men, and once flew her to either New Jersey or New York in the mid-1980s, where she claimed to have bitten Trump after he tried to sexually assault her. She eventually declined to answer additional questions and broke off contact with agents, according to the files.\n\nWhite House Press Secretary Karoline Leavitt called the woman's claims \"completely baseless accusations, backed by zero credible evidence.\" The Justice Department has cautioned that some of the documents include \"untrue and sensationalist claims\" against Trump. It is not precisely known when the Epstein and Trump relationship began, but the earliest publicly available period is the late 1980s.", "Image_URLs": "docs/images/cbc_5.jpg"}, {"Source": "Star Phoenix", "Title": "Carney approval high in Sask., Liberals at 49 per cent national voter support: poll", "Date": "Fri, 06 Mar 2026 12:00:25 +0000", "Author": "Postmedia News", "URL": "https://thestarphoenix.com/news/local-news/carney-approval-high-in-sask-liberals-at-49-per-cent-national-voter-support-poll", "Summary": "A poll shows high approval ratings for Prime Minister Mark Carney in Saskatchewan, with 59% support in Manitoba and Saskatchewan. The Liberal government has 59% approval, while support for the Bloc Qu\u00e9b\u00e9cois and NDP remains low. Conservative support has declined to around 37-38%, and most Canadians prefer delaying the next election until 2029.", "Content": "High approval ratings in Saskatchewan for Prime Minister Mark Carney show what happens when a federal leader doesn\u2019t go out of their way to pick fights with certain regions of the country, the executive vice-president of a national pollster said. \n\nThe poll indicated that Alberta showed a 53 per cent approval rating for Carney, while Manitoba and Saskatchewan were at 59 per cent. Leger executive vice-president Andrew Enns noted Saskatchewan Premier Scott Moe has taken two international trips with Carney and has come back with results for his constituents.\n\nThe poll also revealed that support for the Bloc Qu\u00e9b\u00e9cois fell to five per cent, compared to six per cent in January. Support for the New Democratic Party remained stable at five per cent. Additionally, 59 per cent of respondents expressed satisfaction with the performance of the Liberal government led by Carney.\n\n\u201cWe\u2019re actually a full year in of having Prime Minister Carney managing the affairs of the government,\u201d Enns said. \u201cThey\u2019ve done a very good job of keeping government activity, government message, on track in terms of what Canadians are expecting of their government during these times.\u201d\n\nEnns stated that the poll is \u201cnot good news\u201d for the Conservatives, whose support has remained around 37 to 38 per cent over the past 18 months. \n\n\u201cNow suddenly they have lost some support,\u201d said Enns. \u201cI think it probably should be concerning to them.\u201d He suggested this could be due to their old messaging falling flat or possibly related to Carney\u2019s personal approval ratings. Some conservative-minded voters seem to favor Carney\u2019s approach.\n\nSpeculation about Carney calling an early election to secure a majority has persisted, as the Liberals remain strong in the polls. However, about half of Canadians polled believe the next election should be in 2029, as per the fixed election date legislation.\n\n\u201cCanadians don\u2019t want an election now, they quite frankly don\u2019t want one this spring,\u201d Enns said. \u201cAnd when you like what you\u2019re getting, which 60 per cent of Canadians do in terms of how the government\u2019s performing and how the prime minister is performing, they\u2019re not interested in changing that.\u201d\n\nNearly 71 per cent of Liberal voters support an election in 2029. Notably, nearly 24 per cent of Conservative voters would like an election now; 19 per cent would prefer an election this spring, and 20 per cent would like an election at a different time.", "Image_URLs": "docs/images/star_phoenix_4.jpg"}, {"Source": "Star Phoenix", "Title": "Warm to early sounds of spring: Five things to do this weekend in Saskatoon, March 6-8", "Date": "Fri, 06 Mar 2026 12:00:48 +0000", "Author": "Jocelyn Bennett, Saskatoon StarPhoenix", "URL": "https://thestarphoenix.com/news/local-news/warm-to-early-sounds-of-spring-five-things-to-do-this-weekend-in-saskatoon-march-6-8", "Summary": "A Women\u2019s Day march was held at Vimy Memorial, featuring a book reading and musical performances. Events included \"An Evening with the Bromantics,\" a brass band concert debuting new works, and a concert by singer-songwriter Eric Kane. The Saskatoon Symphony performed \"Spring Fever,\" and Yurii Kolotylyn presented Ukrainian and English standup comedy.", "Content": "Commemorating International Women\u2019s Day, a women\u2019s march was held at the Vimy Memorial in Kiwainis Memorial Park on Sunday at 1 p.m. The event included a book reading, a performance of piano pieces, and some favorite cover songs. Nasser was joined by Bart McKay and Murray Pulver for the performance.\n\nEnjoy a modern take on classic music with \"An Evening with the Bromantics,\" which brings the 1950s to the stage in a tribute to the golden era. The six-piece Saskatchewan band puts its own spin on the sounds of the decade, exploring Motown and early rock with songs from Roy Orbison, The Platters, Buddy Holly, and Sam Cooke. The all-ages concert took place Friday at the Broadway Theatre at 8 p.m.\n\nThe Bridge City Brass Band presented traditional and contemporary brass band music. Alongside familiar tunes, the concert featured the Saskatoon premiere of \"A Gallimaufry Suite\" by Philip Harper and \"Eternity\" by Michael Bojesen. The concert was held Sunday at Grace-Westminster United Church at 2:30 p.m.\n\nCanadian singer-songwriter Eric Kane stopped in Saskatoon on his \"Love is a Weapon pt2\" tour. Spreading a message of self-love and growth, Kane\u2019s music translates personal pain into poetic lyricism, navigating grief from the loss of his brother, resilience, and emotional recovery. The concert, limited to ages 19 and older, took place Friday at Art Bar at 7 p.m.\n\nThe Saskatoon Symphony Orchestra presented \"Spring Fever,\" with guest conductor Tania Miller leading the orchestra on a musical journey from darkness to light, reflecting the joy of winter transitioning into spring. Principal bassoonist Stephanie Unverricht took center stage for Mozart\u2019s Bassoon Concerto. Other works for the evening included pieces by Beethoven and Schumann.\n\nYurii Kolotylyn brought his comedy to the stage with a full-length standup show performed in Ukrainian, followed by an English version. The shows, limited to ages 19 and older, were held Saturday at Art Bar at 7 p.m. in Ukrainian and at 9 p.m. in English.", "Image_URLs": "docs/images/star_phoenix_3.jpg"}, {"Source": "CBC News - World", "Title": "Dillon Brooks, Canadian NBA player with the Phoenix Suns, arrested for suspicion of DUI after traffic stop", "Date": "Fri, 06 Mar 2026 12:37:43 EST", "Author": "", "URL": "https://www.cbc.ca/sports/basketball/nba/dillon-brooks-canadian-nba-player-with-the-phoenix-suns-arrested-for-suspicion-of-dui-after-traffic-stop-9.7117561?cmp=rss", "Summary": "Phoenix Suns forward Dillon Brooks was arrested in Scottsdale for suspicion of DUI early Friday morning after a traffic stop. He was released after booking around 3:30 a.m. Brooks, sidelined since February 21 with a fractured hand, is expected to miss several weeks. The Suns are gathering information; Brooks was having his best season, averaging 20.9 points per game.", "Content": "Phoenix Suns forward Dillon Brooks was arrested for suspicion of driving under the influence early Friday morning in Scottsdale, Arizona, police said. Officers conducted a traffic stop in Scottsdale at roughly 1 a.m., and after an investigation, Brooks was taken into custody. He was released following the booking process around 3:30 a.m.\n\nThe 30-year-old from Mississauga, Ontario, has not played since February 21 due to a fractured left hand. He is expected to be out until at least late March after undergoing surgery.\n\nThe Suns issued a statement saying, \"We are aware of the situation involving Dillon Brooks and are gathering more information. We have no further comment at this time.\"\n\nThe team played the Chicago Bulls at home on Thursday night, just hours before his arrest, losing 105-103. Before his injury, Brooks was having the best season of his NBA career, averaging a career-high 20.9 points per game. He joined the Suns as part of the trade that sent Kevin Durant to the Rockets during the offseason.", "Image_URLs": "docs/images/cbc_6.jpg"}, {"Source": "Politico - Picks", "Title": "Pam Bondi\u2019s in trouble with Republicans on Capitol Hill", "Date": "Fri, 06 Mar 2026 13:40:15 EST", "Author": "Hailey Fuchs", "URL": "https://www.politico.com/news/2026/03/06/pam-bondi-epstein-subpoena-00816820", "Summary": "Attorney General Pam Bondi faces a House subpoena over her handling of Jeffrey Epstein files amid Republican scrutiny. While the White House and DOJ support her, some GOP lawmakers are pushing for her testimony. Her political future is uncertain, especially after President Trump\u2019s recent personnel changes and her ongoing controversy.", "Content": "Pam Bondi\u2019s in trouble with Republicans on Capitol Hill. The attorney general will soon have to appear before a House committee under subpoena.\n\nAttorney General Pam Bondi was already in trouble with congressional Republicans. Now she could be facing an even more serious threat to her political future after President Donald Trump ousted Homeland Security Secretary Kristi Noem, showing his willingness to remove Cabinet members who lose trust within the GOP.\n\nBondi is under intense scrutiny for her handling of the Jeffrey Epstein files. As many as 20 Republicans might be prepared to support efforts to punish her for slowwalking the release of the materials, according to a Democrat leading the charge. Five Republicans joined Democrats on the House Oversight and Government Reform Committee Wednesday to subpoena her testimony.\n\nThe White House is signaling confidence in Bondi\u2019s leadership. Abigail Jackson, a White House spokesperson, pointed to Trump\u2019s remarks during an unrelated event where he called Bondi a \u201cterrific person\u201d who is proving \u201chow tough she is,\u201d and expressed belief that she will demonstrate her strength over the next three years.\n\n\u201cAttorney General Pam Bondi has worked tirelessly to successfully implement the President\u2019s law and order agenda,\u201d Jackson said. \u201cThe President has full faith in the Attorney General.\u201d\n\nJustice Department spokesperson Natalie Baldassarre praised Bondi for her efforts to deliver transparency in the Epstein case and comply with congressional mandates for the files\u2019 release. She stated that critics \u201crefuse to accept the truth\u201d and accused them of engaging in \u201claughable antics\u201d to score political points at the expense of victims. Baldassarre also highlighted \u201cDOJ Wins\u201d and included quotes from Congressional Republicans praising Bondi.\n\nNoem\u2019s situation was different. She oversaw an agency whose federal immigration enforcement agents shot and killed two U.S. citizens in Minnesota, faced questions about spending hundreds of millions of taxpayer dollars on a self-promotional ad campaign, and clashed with border czar Tom Homan. However, her recent congressional hearings exposed a lack of confidence among Republicans in her leadership and demonstrated how much Trump is influenced by lawmakers\u2019 sentiments. For Bondi, the situation is becoming increasingly...", "Image_URLs": "docs/images/politico_4.jpg"}, {"Source": "BBC News - World", "Title": "Israeli troops push into Lebanon for yet another war with Iran's proxy Hezbollah", "Date": "Fri, 06 Mar 2026 16:16:05 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/cpv8xlvk3p4o?at_medium=RSS&at_campaign=rss", "Summary": "Israeli troops have entered Lebanon near the border, securing strategic positions amid increased tensions with Hezbollah, which has launched rockets and drones at northern Israel. Israel is evacuating southern Lebanon and aims to disarm Hezbollah, with plans for potential operations beyond the Litani River. The conflict follows recent air strikes and a large-scale civilian exodus.", "Content": "Israeli troops have entered Lebanon for what appears to be another escalation involving Iran's proxy, Hezbollah. Along the northern border, bursts of machine-gun fire from inside Lebanon are loud and persistent as new Israeli forces push forward to secure strategic positions near the border. The sound of air strikes echoes over the remains of Shia villages destroyed during Israel's last ground war there in 2024.\n\nA senior military official stated on Thursday that Israeli ground forces are taking additional hilltops inside Lebanon, describing it as a defensive operation aimed at better protecting northern Israeli communities. However, there has been a significant military build-up, with dozens of tanks and armored bulldozers recently positioned right by the border, fueling speculation of a possible full-scale invasion.\n\nIsrael has issued a large-scale evacuation order for southern Lebanon, extending roughly 27 kilometers (16 miles) inside the country. The Israel Defense Forces Chief of Staff, Eyal Zamir, has said the objective in Lebanon is disarming Hezbollah and that efforts will continue until that goal is achieved. A senior military official, speaking anonymously, indicated that forces may operate as far as the Litani River and beyond if instructed, with plans ready for immediate action.\n\nHezbollah, allied with Iran, joined the conflict on Monday and has been launching rockets and drones at northern Israel daily, most of which are intercepted by Israeli air defenses. Residents in an Israeli border community targeted by a drone on Tuesday expressed reluctance to leave, questioning where they would go, citing increased danger in larger cities like Jerusalem and Tel Aviv.\n\nIsraeli opposition leader Yair Lapid suggested that Israel might establish a \"sterile zone\" in southern Lebanon, similar to the Yellow Line in Gaza, which marks the boundary between Israeli-held territory and that controlled by Hamas. He proposed creating an area with no Lebanese villages, arguing that such measures are a response to Lebanon hosting terrorist organizations.\n\nIn the past few days, hundreds of thousands of Lebanese civilians have been fleeing Israeli air strikes, less than 18 months after a ceasefire ended the previous conflict.", "Image_URLs": "docs/images/bbc_6.jpg"}, {"Source": "Star Phoenix", "Title": "Complex repairs needed after semi collision with Saskatoon overpass", "Date": "Fri, 06 Mar 2026 16:26:20 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/news/local-news/semi-collision-with-overpass-reduces-saskatoon-freeway-lanes", "Summary": "A semi hauling heavy equipment struck the Highway 11, Highway 16, and Circle Drive overpass in Saskatoon, causing significant damage. Traffic was reduced to one lane, with northbound and eastbound closures. Repairs are underway, but the timeline is unclear. No injuries were reported, and authorities are investigating the incident.", "Content": "Traffic moved through a single open lane beneath the Circle Drive overpass on Highway 11 as crews assessed damage after a semi hauling heavy equipment struck the structure Thursday afternoon. Saskatoon Police said the collision caused significant damage to the overpass at the Highway 11, Highway 16, and Circle Drive cloverleaf.\n\nRepairs are needed on the busy overpass in Saskatoon after cargo on a semi-trailer collided with the concrete structure. The City of Saskatoon stated that the extent of the damage or the cost of repairs to the section of the cloverleaf at Circle Drive and Highway 11 was not immediately known after the collision Thursday afternoon.\n\nPlanning for repairs was underway on Friday, though a timeline was not available due to \u201cthe complexity and extent of the required work,\u201d according to a city news release. Saskatoon police reported that a semi with a trailer carrying equipment on Thursday around 5 p.m., traveling northbound on Highway 11 from Regina and entering the city limits at the Circle Drive overpass, was too high for the structure and caused significant damage.\n\nNorthbound traffic on Highway 11 and eastbound traffic on Circle Drive were immediately closed off for hours before one lane in each direction was reopened. No injuries were reported. City engineers, Saskatoon police, emergency services, and collision analysts were all on the scene. Analysts worked with Saskatchewan Highway Patrol to investigate the incident.\n\nWork began on Friday morning to safely remove loose concrete and address safety concerns. Southbound traffic on Highway 11 and westbound traffic on Highway 16 remained unaffected. Northbound semi trucks on Highway 11 were being detoured around the area at Township 360 via Range Road 3050, according to the city.", "Image_URLs": "docs/images/star_phoenix_2.jpg"}, {"Source": "Star Phoenix", "Title": "Despite off-night shooting, Huskies advance to women's hoops semifinal", "Date": "Fri, 06 Mar 2026 17:08:22 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/sports/local-sports/u-of-s-huskies/despite-off-night-shooting-huskies-advance-to-womens-hoops-semifinal", "Summary": "The University of Saskatchewan Huskies advanced to the U Sports women\u2019s basketball semifinals with a 71-55 win over UBC, despite shooting poorly. Led by Gage Grassick\u2019s 25 points, they aim for a second consecutive national title. They will face Laval, which upset Toronto Metropolitan in the quarterfinal, on Saturday at 4 p.m.", "Content": "Though the University of Saskatchewan Huskies were off-target on the offensive end, they were sharp enough defensively to make up for it as they began their pursuit for back-to-back national basketball titles.\n\nIn their quarterfinal on Thursday versus Canada West rival British Columbia at the U Sports Women\u2019s Final 8 in Quebec City, the fifth-placed Huskies shot just 24 per cent from three-point range and 48 per cent from the free throw line, but overcame those struggles by locking down the fourth-placed Thunderbirds. Holding UBC to 34 per cent shooting from the field and never allowing more than 15 points in any quarter, the Huskies advanced to Saturday\u2019s semifinal with a 71-55 victory.\n\nWinners of U Sports crowns in 2016, 2020 and 2025, the Huskies have another national title within reach. The team, undefeated in the regular season, lost in the Canada West semifinal but received the lone wild card to nationals.\n\n\u201cI think if we can defend like that and we can have a bit better shooting night, then we\u2019ll give ourselves a chance no matter who we\u2019re playing against,\u201d Huskies head coach Lisa Thomaidis said following the game.\n\nFirst-team all-Canadian Gage Grassick led the Huskies with a game-high 25 points, while adding three steals and four rebounds. Ella Murphy Wiebe scored 16 points and hauled down eight rebounds. Maya Flindell and Andrea Dodig each scored 11 points for the team. Sara Toneguzzi had a team-high 21 points for UBC.\n\nIn Saturday\u2019s semifinal, the Huskies take on No. 8- and host Laval. In a first-round shocker, the Rouge et Or knocked off top-ranked Toronto Metropolitan 57-54. Sabrine Khelifi, who led her team with 14 points, banked a three-pointer from the top of the arc with 15 seconds left in the fourth quarter to break the tie and propel her squad to the medal round.\n\nThe Huskies tip off Saturday against Laval at 4 p.m. On the other side of the bracket, Canada West champion and third-ranked Calgary Dinos advanced with a 58-45 win over sixth-ranked McGill. In Saturday\u2019s other semifinal, Calgary faces off against No. 2- and host New Brunswick, which handled seventh-ranked Carleton Ravens 80-63.", "Image_URLs": "docs/images/star_phoenix_1.jpg"}, {"Source": "XXL Hip Hop", "Title": "T.I. Unfazed by 50 Cent's Diss and Threat to Drop Scandalous Doc", "Date": "Fri, 06 Mar 2026 17:16:37 GMT", "Author": "C. Vernon Coleman II", "URL": "https://www.xxlmag.com/ti-unfazed-50-cent-diss-threat-scandalous-documentary/", "Summary": "T.I. dismisses 50 Cent's threats to release a scandalous documentary about him and Tiny, responding with diss tracks and social media posts. T.I. challenges 50 Cent to a lyrical or documentary battle, criticizing his motives and calling him out on various issues, including family and credibility. The feud continues with both artists exchanging insults.", "Content": "T.I. is unfazed by 50 Cent's apparent diss and threat to put out a scandalous documentary about Tip and Tiny. The ongoing beef between T.I. and 50 Cent continues, with 50 sharing a since-deleted post threatening to release a \"Surviving T.I. and Tiny\" documentary and appearing to throw shade at T.I. and the Harris family on the new Power Origins theme song.\n\nT.I. responded to 50's threat and the shade on the new song. He captioned a video of himself performing his single \"Let Em Know\" in the streets, saying, \"We can go bar for bar, hit for hit, or doc for doc... either way all you gon do is show how much of a FN u is. Let\u2019s play. Nobody fears you over here Boo Boo\u2026\"\n\nIn a follow-up post, T.I. shared a new song called \"Trauma Bond,\" in which he raps about his family and throws shade at 50. He said, \"These ni**as, the suckas for clicks, bi**hes for algorithms/Your mama ran the streets she shoulda left the daddy with him,\" and added, \"@50cent Drop whatever you choose, just please keep showing da world You a H*!!! #OnClay.\"\n\nHe continued, \"[And] You still ain\u2019t tell us why you in 4K 'D**k Pulling' wit the smile of a Sissy???? Pandora\u2019s box is ajar sir\u2026 Good luck FN You suck. P.S. Me & mine till the end of time Issa 'Trauma Bond'!!!!\"", "Image_URLs": "docs/images/xxlhiphop_7.jpg"}, {"Source": "BBC News - World", "Title": "Flight paths squeezed as Iran conflict closes more airspace", "Date": "Fri, 06 Mar 2026 18:09:19 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/crrx1jgr4jjo?at_medium=RSS&at_campaign=rss", "Summary": "The closure of southern Azerbaijan's airspace due to conflict disrupts global flights, forcing airlines to reroute north or south, increasing travel times and fuel costs. Western airlines avoid Russian, Iranian, and Iraqi airspace, causing congestion in northern Azerbaijan. Gulf airlines shift routes through Egypt, Saudi Arabia, and Oman, with limited capacity from Qatar. Overall, air traffic is significantly reduced and more complex.", "Content": "The closure of airspace over the southern half of Azerbaijan is putting additional pressure on airlines scrambling to respond to disruption caused by the conflict in the Gulf. Flight traffic had already been severely disrupted in a region which in normal times acts as a significant hub for the global airline industry. The Buta drone attack on the small Central Asian country has squeezed many flights into a narrow corridor across the north of the country. \n\nAviation expert John Strickland said there was now a \"very tight range of options for airlines\" trying to navigate the current situation. Western airlines have had to avoid Russian airspace, including Siberia, since the invasion of Ukraine in 2022. Now all flights are also steering clear of Iran and Iraq airspace, opting for alternative routes to the north or south. Flightradar24 data maps show real-time congestion in an approximately 100 km wide strip across the north of Azerbaijan, a country roughly the size of Portugal. Late on Friday, Flightradar24 data showed planes using northern Azerbaijan's airspace but not flying over the south of the country.\n\nGulf airlines have begun to operate more flights out of the UAE and Oman, helping to evacuate stranded travelers, but there are no flights out of Qatar and capacity remains well below normal levels, according to Opsgroup, which provides risk information for the industry. \"The central corridor across Iran, Iraq, and the Gulf is effectively closed, so most traffic is going either north via the Caucasus and Afghanistan, or south via Egypt, Saudi Arabia, and Oman,\" said David Mumford, an international operations specialist at Opsgroup. \"Both routes are longer and busier than usual, so flight times and fuel burn are higher.\"\n\nAir traffic sharply reduced after the attacks began on Saturday as airlines were forced to use more limited corridors. Aviation consultant Strickland noted that passengers could find their flight times extended due to longer routings. \"Flights already doing circuitous routing have even less choice,\" he said. Some airlines had begun to adapt routes in recent weeks as tension built in the Gulf, and this week even more flights were forced to switch to routes further south to avoid the conflict zone.\n\nThere was likely to be congestion at busy times of the day, such as west to east in the afternoon and evening when Europe to Asia flights are typically scheduled, and east to west early in the morning when flights tend to come from Asia to Europe. This represented \"another big complication for airlines' planning\" on top of usual factors like meteorological conditions and the impact of delays on aircraft and crew scheduling. Most airlines are not currently adding stops to accommodate the longer routes, but Qantas has added a refueling stop in Singapore on its non-stop flight from Perth to London.", "Image_URLs": "docs/images/bbc_2.jpg"}, {"Source": "Nasdaq - Technology", "Title": "ZRS Chart of the Month", "Date": "Fri, 06 Mar 2026 20:09:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/zrs-chart-month-1", "Summary": "Zacks Research Chief Sheraz Mian highlights a company targeting millennial and Gen Z audiences, generating nearly $1 billion last quarter. Following a recent pullback, it is seen as an ideal investment opportunity, with potential to double in value. Five stocks are recommended by Zacks experts as top picks for rapid growth.", "Content": "Technology ZRS Chart of the Month September 06, 2024 \u2014 02:00 pm EDT\n\nWritten by John Blank for Zacks\n\nResearch Chief Names \"Single Best Pick to Double\"\n\nFrom thousands of stocks, five Zacks experts each have chosen their favorite to skyrocket 100% or more in months to come. Among these, Director of Research Sheraz Mian has selected one with the most explosive upside.\n\nThis company targets millennial and Gen Z audiences, generating nearly $1 billion in revenue last quarter. A recent pullback makes now an ideal time to invest. While not all picks are winners, this one could far surpass earlier Zacks\u2019 Stocks Set to Double, such as Nano-X Imaging, which increased by 129.6% in just over nine months.\n\nWant the latest recommendations from Zacks Investment Research? Today, you can download five stocks set to double.", "Image_URLs": "docs/images/nasdaq_tech_6.jpg"}, {"Source": "TechCrunch", "Title": "OSHA probing fatality at Rivian warehouse", "Date": "Fri, 06 Mar 2026 20:23:08 +0000", "Author": "Sean O'Kane", "URL": "https://techcrunch.com/2026/03/06/osha-probing-fatality-at-rivian-warehouse/", "Summary": "OSHA is investigating the death of 61-year-old Kevin Lancaster at Rivian's Illinois warehouse, who died after being pinned between a tractor trailer and a loading dock. The incident occurred near Rivian\u2019s factory, and the investigation may take six months. Rivian expressed condolences and is cooperating with authorities amid prior safety scrutiny at the facility.", "Content": "The Occupational Safety and Health Administration has opened an investigation into the death of a worker at a Rivian warehouse in Illinois. The agency said the probe could take up to six months.\n\nThe man, identified by local authorities as 61-year-old Kevin Lancaster, reportedly died from \u201cblunt traumatic compressional injuries\u201d after getting pinned between a tractor trailer and a loading dock at the facility, which is located just a few miles from Rivian\u2019s factory. Lancaster was reportedly trapped in that spot for around 20 minutes before firefighters were able to reach him. Emergency crews responded to a call at 1:40 p.m. local time, and Lancaster was pronounced dead at a local medical center at 2:33 p.m. The Normal Police Department and the McLean County Coroner are still investigating Lancaster\u2019s death.\n\nRivian issued a statement saying, \u201cSafety at our facilities is our top priority. Unfortunately yesterday afternoon, a contractor passed away after an incident at our warehouse. Our sympathy and thoughts are with their family and friends. We are working with the Normal Police Department on its investigation.\u201d\n\nThe safety of Rivian\u2019s factory in Normal, Illinois, became a subject of scrutiny in 2024 after Bloomberg News reported 16 \u201cserious\u201d violations levied on the company across that year and the previous one. Despite this, Rivian has received only one violation at the Illinois manufacturing plant since that report was published. OSHA told Bloomberg that Rivian \u201chas improved their safety and health team and are very cooperative with the OSHA process.\u201d\n\nRivian assembles its R1 pickup truck, R1 SUV, and EDV commercial electric van at its 4.3-million-square-foot factory in Normal. The company is expanding the facility by another 1.1 million square feet to accommodate its next EV, the R2. Once complete, the factory will have the capacity to assemble 215,000 vehicles.", "Image_URLs": "docs/images/techcrunch_5.jpg"}, {"Source": "XXL Hip Hop", "Title": "King, Domani Strike Back at 50 Cent with Two Angry Diss Tracks", "Date": "Fri, 06 Mar 2026 21:35:53 GMT", "Author": "Trent Fitzgerald", "URL": "https://www.xxlmag.com/king-domani-50-cent-diss-tracks/", "Summary": "King and Domani released diss tracks on March 6 targeting 50 Cent for dissing T.I. and the Harris family on the Power Origins theme song. King\u2019s \"Droptop\" criticizes 50 Cent\u2019s behavior, while Domani\u2019s \"PU$Y\" challenges his toughness. 50 Cent responded with provocative lyrics and a photoshopped image implying disrespect toward T.I. and Tiny, escalating the feud.", "Content": "King and Domani dropped two angry diss tracks after 50 Cent appeared to have dissed T.I. and the Harris family on the new Power Origins theme song. On Friday (March 6), King and Domani released the songs on their Instagram pages in retaliation against 50 Cent for disrespecting T.I. and the Harris family.\n\nKing's diss track is called \"Droptop.\" In the song, he criticizes 50 Cent for talking too much smack and alleges that he has a history of beating women. \"You were made from 50 Cent because ya mama gave it cheap,\" King raps.\n\nMeanwhile, Domani delivered his diss track titled \"PU$Y.\" On the haunting song, Domani challenges 50 Cent's tough-guy image. \"I smell p***y / How about you come here and try to push me / That suga water got ya, now you turn sweet, huh / I smell p***y / Ni**a, I read you like a book read / Come bring ya a*s to school quit playin' hookie / I smell p***y,\" he raps.\n\nBoth songs respond to 50 Cent, who featured the Harris family on the theme song for his upcoming television show, Power Origins. The track, featuring R&B singer Leon Thomas, includes street rap about the drug trade. 50 Cent raps, \"I'm back on my dope boy grammar / Your daddy made your mama eat every box in Atlanta,\" and mentions discreet activities with, \"Freak sh*t / Peep sh*t / Keep sh*t, on the low / But everybody know.\" He captioned his Instagram post about the song, \"50cent Ft Leon Thomas (No one told us what we\u2019re here for) POWER ORIGINS theme song!\"\n\n50 Cent further escalated tensions by posting a photoshopped image of T.I. with Tiny eating from a cut-up cardboard box, possibly implying that 50's lyric, \"Your daddy made your mama eat every box in Atlanta,\" was directed at T.I. and the Harris family matriarch. He captioned the post, \"LOL...They are gonna learn to leave me alone.\"\n\nThe feud between 50 Cent and the Harris family is intensifying.", "Image_URLs": "docs/images/xxlhiphop_5.jpg"}, {"Source": "Nasdaq - Technology", "Title": "Top Research Reports for Procter & Gamble, American Express & TJX", "Date": "Fri, 06 Mar 2026 21:51:00 +0000", "Author": "Zacks", "URL": "https://www.nasdaq.com/articles/top-research-reports-procter-gamble-american-express-tjx", "Summary": "The article highlights recent research reports on major stocks, including Procter & Gamble, American Express, and TJX. P&G faces margin pressures from rising costs but maintains steady sales through brand strength and innovation. American Express\u2019s shares declined 5.1% over six months amid rising expenses and credit-loss provisions. The reports analyze industry trends and company performance.", "Content": "Technology Top Research Reports for Procter & Gamble, American Express & TJX\n\nMarch 06, 2026 \u2014 04:51 pm EST\n\nThe Zacks Research Daily presents the best research output of our analyst team. Today's Research Daily features new research reports on 16 major stocks, including The Procter & Gamble Co. (PG), American Express Co. (AXP), and The TJX Companies, Inc. (TJX), as well as two micro-cap stocks Genie Energy Ltd. (GNE) and Comp X International Inc. (CIX). The Zacks microcap research is unique as our research content on these small and under-the-radar companies is the only research of its type in the country.\n\nThese research reports have been hand-picked from the roughly 70 reports published by our analyst team today. You can access today\u2019s research reports here.\n\nAhead of Wall Street\n\nThe daily 'Ahead of Wall Street' article is a must-read for all investors who would like to be ready for that day's trading action. The article comes out before the market opens, attempting to make sense of that morning's economic releases and how they will affect that day's market action. You can read this article for free on our homepage and can sign up there to receive email notifications as this article is published each morning.\n\nYou can read today's AWS here.\n\nNon-Farm Payrolls Sink -92K in February\n\nToday's Featured Research Reports\n\nShares of Procter & Gamble have declined 1.8% over the past six months against the Zacks Consumer Products - Staples industry\u2019s decline of 1.9%. The company is facing mounting margin pressure from elevated commodity costs, rising tariffs, and higher financing expenses. Gross margins are contracting despite productivity gains, while a $400 million tariff headwind and a $250 million drag from higher interest and taxes threaten earnings growth.\n\nNevertheless, PG\u2019s resilient performance underscores the power of its brand portfolio and disciplined operating strategy. Despite a mixed consumer backdrop, the company continues to generate steady organic sales, supported by pricing strength and broad-based category growth, particularly in Beauty, Health Care, and Grooming.\n\nProcter & Gamble\u2019s integrated approach, innovation, market expansion, and productivity enable PG to adapt quickly to evolving consumer trends while preserving competitiveness. \n\nYou can read the full research report on Procter & Gamble here.\n\nAmerican Express\u2019s shares have declined 5.1% over the past six months against the Zacks Financial - Miscellaneous Services industry\u2019s decline of 24.8%. The company\u2019s rising expense intensity, elevated credit-loss provisions amid weakening consumer credit trends, and relatively high leverage could pressure margins and earnings stability if macro conditions remain challenging.", "Image_URLs": "docs/images/nasdaq_tech_5.jpg"}, {"Source": "TechCrunch", "Title": "Life EV officially owns Rad Power Bikes now", "Date": "Fri, 06 Mar 2026 21:56:35 +0000", "Author": "Kirsten Korosec", "URL": "https://techcrunch.com/2026/03/06/life-ev-officially-owns-rad-power-bikes-now/", "Summary": "Life Electric Vehicles (Life EV) acquired Rad Power Bikes for $13.2 million, including its assets and IP, after Rad Power filed for Chapter 11 bankruptcy in December. Life EV plans to maintain Rad Power\u2019s operations, expand retail presence, and support existing customers. Based in Florida, Life EV focuses on acquiring and scaling e-bike brands, with Rad Power being its most notable acquisition.", "Content": "Life Electric Vehicles Holdings, also known as Life EV, officially owns the intellectual property, inventory, and certain operating assets of Rad Power Bikes. Life EV acquired Rad Power for $13.2 million. Rad Power Bikes, a prominent electric bike company that raised nearly $330 million in venture capital, filed for Chapter 11 bankruptcy protection in December. The company had struggled for months prior to its bankruptcy filing and had warned employees that it might have to shut down without new capital.\n\nLife EV intends to keep the company intact and said it will continue retail operations under the Rad Power Bikes brand in the United States. It also plans to expand its retail footprint in select key markets. The company pledged to support existing customers regarding warranties and gift cards.\n\nBased in Florida, Life EV has built its business by acquiring, developing, and scaling electric bicycle and micro-mobility brands. While Rad Power is its most high-profile acquisition, the company also holds an equity interest in LEV Manufacturing, Inc., which acquired the Serial 1 premium electric bicycle brand originally developed and spun off from Harley-Davidson.\n\nIn a statement, Life EV said the acquisition aligns with its broader strategy of expansion across North America.", "Image_URLs": "docs/images/techcrunch_4.jpg"}, {"Source": "Nasdaq - Original", "Title": "Weekly Chartstopper: March 6, 2026", "Date": "Fri, 06 Mar 2026 22:00:46 +0000", "Author": "Michael Normyle", "URL": "https://www.nasdaq.com/articles/weekly-chartstopper-march-6-2026", "Summary": "Since the Iran conflict began, energy prices have surged\u2014up to 35% in US oil and 65% in European LNG\u2014raising inflation risks. Markets expect fewer Fed rate cuts, with the 10-year Treasury yield rising to 4.15%. Despite a job loss report, the Nasdaq-100 declined only 1%, amid ongoing economic uncertainty. Key upcoming data includes CPI, PCE, GDP, and job reports.", "Content": "US Markets Weekly Chartstopper: March 6, 2026\n\nMarch 06, 2026 \u2014 05:00 pm EST\n\nSince the conflict with Iran began on Saturday, markets have been trying to assess its economic impact, primarily through higher energy prices. The conflict has effectively halted traffic in the Strait of Hormuz, which transports 20-25% of global oil and liquefied natural gas (LNG), and has shuttered energy facilities in the region.\n\nThis week, international and U.S. oil prices have risen 30% and 35%, respectively, reaching their highest levels since 2023. European LNG prices are up 65%, while U.S. LNG prices have increased by 10%. JPMorgan estimates that if oil prices remain at these levels, U.S. headline inflation could increase by 0.3 percentage points, and U.S. GDP growth could decrease by 0.6 percentage points. \n\nGiven this likely boost to inflation, markets have reduced their expectations for Federal Reserve rate cuts this year by 20 basis points to around 40 basis points. This adjustment follows a significant jobs report miss, with the economy losing 92,000 jobs in February\u2014against expectations of a 55,000 gain\u2014and broad-based losses across sectors. However, it\u2019s important not to overinterpret a single month\u2019s data, as the private sector has averaged about 20,000 jobs gained per month over the past three months.\n\nDespite these developments, the Nasdaq-100\u00ae is down just 1% this week, though rising inflation expectations have pushed the 10-year Treasury yield up nearly 20 basis points to 4.15%.\n\nNext Week\n\nHere are the top events to watch:\n\n- Tuesday: NFIB Small Business Optimism (February)\n- Wednesday: CPI Inflation (February)\n- Thursday: Jobless Claims\n- Friday: PCE Inflation and Spending (January), Real GDP (Q4 revision), JOLTS Job Openings (January)\n\nMichael Normyle  \nU.S. Economist and Senior Director at Nasdaq", "Image_URLs": "docs/images/nasdaq_original_3.png"}, {"Source": "Polygon", "Title": "Best Xbox Game Pass games to play this weekend (March 6-8 2026)", "Date": "Fri, 06 Mar 2026 22:11:14 GMT", "Author": "Austin Manchester", "URL": "https://www.polygon.com/best-xbox-game-pass-games-march-6-2026/", "Summary": "March's new game releases, including Pok\u00e9mon Pokopia and Slay the Spire 2, are not on Xbox Game Pass. Instead, the service offers popular titles like Resident Evil 2, the indie puzzle-platformer Planet of Lana 2, and the newly launched Slay the Spire 2, along with its predecessor, providing a variety of engaging options for subscribers.", "Content": "While March is off to a strong start for new games, with Pok\u00e9mon Pokopia, Slay the Spire 2, and Marathonall releasing this past week, none of those are on Xbox Game Pass. Neither is February's Resident Evil Requiem, one of the year's best games so far and a potential contender for Game of the Year. \n\nHowever, there are many excellent games available on Game Pass worth checking out. This week's recommendations include a precursor to Resident Evil Requiem, an indie hit, and a must-play roguelike deckbuilder.\n\nResident Evil 2 is currently a popular choice, especially since Resident Evil Requiem has become the fastest-selling game in the series\u2019s history. The remake follows rookie cop Leon as he tries to escape Raccoon City police headquarters and uncover the secrets of the Umbrella Corporation. It offers a thrilling, well-paced adventure that can be completed over a weekend. Players can also experience Claire Redfield\u2019s route for additional content.\n\nPlanet of Lana 2: Children of the Leaf is a stylish and cinematic indie puzzle-platformer. It tells a deeply personal story through expressive animation, sweeping music, and standout vocal performances, despite using a language that sounds like gibberish. The game introduces new puzzle mechanics, such as using Mui's ability to hypnotize creatures to progress. The sequel opens with a recap of the first game, which is also available on Game Pass, so players can enjoy both titles without prior experience.\n\nSlay the Spire 2 recently launched and is one of the biggest game releases of the year. For those curious about the series, the original Slay the Spire remains available. Released in 2019, it popularized the roguelike deckbuilding genre with its mix of strategic card play, unique visuals, and high replayability. Slay the Spire 2 builds upon these fundamentals, offering even more depth and variety.", "Image_URLs": "docs/images/polygon_5.jpeg"}, {"Source": "CBC News - World", "Title": "U.S. says it worked with Ecuador to bomb alleged drug-trafficking operations site", "Date": "Fri, 06 Mar 2026 22:15:00 EST", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/us-ecuador-joint-operation-drug-trafficking-9.7118563?cmp=rss", "Summary": "The U.S. and Ecuador conducted a joint operation targeting a Colombian FARC dissident training camp near Ecuador's border, involving helicopters, aircraft, boats, and drones. The operation aimed to dismantle drug trafficking networks, with no details on casualties. Ecuador's President Noboa emphasizes a crackdown on organized crime and values U.S. support.", "Content": "The U.S. and Ecuador carried out a joint operation targeting drug trafficking in Ecuador, authorities in both countries announced on Friday. The U.S. described the operation as \"lethal kinetic operations.\" Neither U.S. Southern Command nor Ecuador's defense ministry provided details on whether anyone was killed or captured during the strike.\n\nThe operation involved helicopters, aircraft, river boats, and drones to locate and bomb a drug traffickers' training camp in northeastern Ecuador near the Colombian border, according to Ecuador's defense ministry. The camp belonged to the Comandos de la Frontera (CDF), a Colombian criminal organization composed of FARC dissidents, with a capacity for 50 people.\n\nEcuador's President Daniel Noboa has prioritized a military crackdown on organized crime. His government has also imposed tariffs on Colombia, accusing it of insufficient efforts to combat drug trafficking. Noboa is scheduled to travel to Miami this weekend to participate in the Trump administration's \"Shield of the Americas\" summit, which gathers regional leaders to discuss security and organized crime.\n\nThe Ecuadorian defense ministry stated, \"The United States is a key ally in this fight,\" and noted that the operation was conducted at Ecuador's request to dismantle narco-terrorist networks. This followed a similar U.S.-Ecuador operation announced earlier this week by U.S. Southern Command.", "Image_URLs": "docs/images/cbc_3.jpg"}, {"Source": "Polygon", "Title": "Resident Evil Requiem is a timely critique of capitalist greed", "Date": "Fri, 06 Mar 2026 22:15:17 GMT", "Author": "Josh Broadwell", "URL": "https://www.polygon.com/resident-evil-requiem-critique-rich-tech-bros/", "Summary": "Resident Evil Requiem offers a critique of capitalism and selfishness, focusing on Victor Gideon's plan to transfer consciousness into elites using blood experiments at the Raccoon City orphanage. The story highlights themes of exploitation, manipulation, and the dehumanization of vulnerable victims, likening the process to social media manipulation and emphasizing the series' ongoing critique of corporate evil.", "Content": "As much as Resident Evil changed over the years, a few things remained constant with the series' attitude toward society. Corporations are bad, rich people are even worse, and corporate scientists are also bad. The themes usually don't go much further than that. But Resident Evil Requiem has a more carefully thought-out critique of capitalism and selfishness more broadly, and it's a timely one as well. \n\nVictor Gideon, one of Requiem's primary antagonists, is the focal point of Capcom's critique. He wants to realize Oswell Spencer's presumed goal of preserving the consciousness of a \"superior\" person by transplanting it into another host to make new generations of \"elites,\" not unlike other real-life tech and business moguls. It is revealed that the Raccoon City Orphanage was a front for these experiments, with dozens of clone children created for this purpose. Central to Gideon\u2019s plans is the idea that people's memories and essences are stored in blood, hence all the blood-related work he's doing in the Rhodes Care Home. This concept isn't just Resident Evil hokum; the idea that blood contains part of the human spirit and could transfer it between hosts persisted for centuries, dating back to the Middle Ages.\n\nThe ideal result is a person who remains an individual but is inclined to think like Spencer, know what he knows, and behave like him if Gideon\u2019s plans succeed. The operation resembles a gruesome algorithm that takes pieces from everyone's experiences, then adds a predetermined bias to create a result that benefits the creator more than anyone else. This process can be likened to social media, where a handful of malicious individuals try to manipulate what people think and believe.\n\nThe connections become even more explicit in the care center\u2019s basement, where Gideon and his team put people through a mulcher to extract their blood for these experiments. If the blood theory is correct, they are not just taking lives\u2014they are using the essence of existence\u2014their memories, souls, and everything that makes them alive\u2014for their own ends, like a plaything. The victims are often vulnerable people who believe they are receiving help, only to be turned into monsters when someone decides it\u2019s time.\n\nRequiem's storytelling takes a long break once Leon Kennedy reaches Raccoon City, but the critique of exploitation and the grotesque abuse of power remains a central theme throughout the narrative.", "Image_URLs": "docs/images/polygon_4.jpg"}, {"Source": "Polygon", "Title": "How to get bricks in Pok\u00e9mon Pokopia", "Date": "Fri, 06 Mar 2026 22:33:38 GMT", "Author": "Josh Broadwell", "URL": "https://www.polygon.com/pokemon-pokopia-bricks-how-to-get-squishy-clay/", "Summary": "In Pok\u00e9mon Pokopia, players need squishy clay and Burn-type Pok\u00e9mon (Charmander, Torchic, Litwick, Growlithe, Vulpix) to craft bricks for advanced building projects. Clay is obtained by breaking clay blocks in caves or from Paldean Woopers. Bricks are produced by Pok\u00e9mon using clay, with no daily limit. Guides and walkthroughs assist with resource collection and game progression.", "Content": "This article is part of a directory: Pok\u00e9mon Pokopia guides and walkthroughs.\n\nYou'll need bricks in Pok\u00e9mon Pokopia to complete more advanced, non-leaf building projects. However, the game doesn't provide explicit instructions early on for how to obtain bricks. You need a specific resource and the help of a certain type of Pok\u00e9mon, but once you understand the process, making bricks can be easily incorporated into your daily routine.\n\nTo get bricks in Pok\u00e9mon Pokopia, you'll need squishy clay and the assistance of a Pok\u00e9mon with the Burn specialty. These Pok\u00e9mon include Charmander, Torchic, Litwick, Growlithe, and Vulpix. Since Charmander is available in the first area and Torchic in Bleak Beach, you'll be able to start making bricks soon after obtaining clay.\n\nWith clay in hand, speak to your Burn Pok\u00e9mon of choice, select \"Look at this!\", show them the clay, and ask them to turn it into bricks. One lump of squishy clay yields two bricks, and you can process up to 10 lumps at a time. It takes a few minutes for the Pok\u00e9mon to fire the clay into bricks, but there is no limit on how many times per day you can have them make bricks.\n\nBricks are not typically found in the wild like rocks. To get squishy clay, you can start harvesting after completing the \"Yawn up a Storm\" request, which involves rain softening clay trapping Onix. Use Rock Smash to break the clay blocks and collect the squishy clay left behind. There are several dozen clay blocks in the cave system here, and additional clay can be found in the Bleak Beach region.\n\nAdditionally, if you create a Pok\u00e9mon habitat for Paldean Wooper, you may find clumps of squishy clay around that habitat. Wooper has the Litter specialty, causing them to drop specific items at intervals, including squishy clay.\n\nFor new players, guides are available to help you upgrade your island, including a Pok\u00e9dex and Habitat Dex to identify spawn locations and building requirements for summoning your favorite Pok\u00e9mon. If you're feeling overwhelmed, there are early tips and tricks to help streamline your progress.\n\nThere are also walkthroughs for other key requests that advance the story, such as \"Brighten Things Up!\", \"Time to Party!\", and \"Build the Huge Building!\". Multiplayer options are available, but there are restrictions for regular Pokopia multiplayer and the Game Share version.", "Image_URLs": "docs/images/polygon_3.jpg"}, {"Source": "TechCrunch", "Title": "Nintendo sues the US government for a refund on tariffs", "Date": "Fri, 06 Mar 2026 22:35:35 +0000", "Author": "Amanda Silberling", "URL": "https://techcrunch.com/2026/03/06/nintendo-sues-the-u-s-government-for-a-refund-on-tariffs/", "Summary": "Nintendo filed a lawsuit in the U.S. Court of International Trade seeking refunds for tariffs imposed under President Trump\u2019s executive orders, which the Supreme Court ruled exceeded presidential authority. The tariffs, collected under the IEEPA, totaled over $200 billion. Nintendo is among more than a thousand companies suing for refunds following the Supreme Court decision.", "Content": "Nintendo filed a lawsuit against the U.S. government on Friday over its collection of tariffs from global businesses. The gaming company is seeking a refund for any duties it paid due to President Donald Trump\u2019s executive orders that invoked the International Emergency Economic Powers Act (IEEPA).\n\nThe lawsuit was filed in the U.S. Court of International Trade following a Supreme Court decision that struck down the tariffs imposed under IEEPA, ruling that the president had exceeded his authority. More than a thousand other companies hav
