<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Phoenix Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <h1 class="text-3xl font-bold text-gray-900">Star Phoenix News</h1>
                <p class="text-gray-600 mt-1"><span id="article-count">0</span> articles loaded</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Articles Grid -->
            <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading state -->
                <div class="col-span-full text-center py-12">
                    <div class="inline-block">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                    <p class="text-gray-600 mt-4">Loading articles...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 font-bold text-2xl ml-4">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read on Star Phoenix →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let articles = [];

        // Load and parse CSV
        async function loadArticles() {
            try {
                // Try multiple possible paths for the CSV file
                let response = null;
                let csvPath = 'articles.csv';
                
                try {
                    response = await fetch(csvPath);
                    if (!response.ok) throw new Error('Not found');
                } catch (e) {
                    // Try relative path from current location
                    csvPath = './articles.csv';
                    response = await fetch(csvPath);
                }
                
                if (!response.ok) {
                    throw new Error(`Failed to load CSV: ${response.status}`);
                }
                
                const csvText = await response.text();
                if (!csvText.trim()) {
                    throw new Error('CSV file is empty');
                }
                
                // Parse CSV with custom parser
                articles = parseCSV(csvText);
                
                if (articles.length === 0) {
                    throw new Error('No articles parsed from CSV');
                }
                
                renderArticles();
                document.getElementById('article-count').textContent = articles.length;
                console.log(`Successfully loaded ${articles.length} articles`);
            } catch (error) {
                console.error('Error loading articles:', error);
                document.getElementById('articles-container').innerHTML = 
                    '<div class="col-span-full text-center text-red-600 p-8">' +
                    '<p class="font-bold">Error loading articles</p>' +
                    '<p class="text-sm mt-2">' + escapeHtml(error.message) + '</p>' +
                    '<p class="text-sm mt-2">Make sure articles.csv is in the same folder as index.html</p>' +
                    '</div>';
            }
        }

        // Robust CSV parser that handles quoted fields with newlines
        function parseCSV(csvText) {
            const lines = [];
            let current = '';
            let inQuotes = false;
            
            // Split by lines while respecting quoted fields
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                
                if (char === '"') {
                    if (inQuotes && csvText[i + 1] === '"') {
                        current += '""';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                    current += char;
                } else if (char === '\n' && !inQuotes) {
                    lines.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            if (current) lines.push(current);
            
            if (lines.length < 2) return [];
            
            // Parse header
            const headers = parseCSVLine(lines[0]);
            const articles = [];
            
            // Parse rows
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === 0 || !values[0]) continue;
                
                const article = {};
                headers.forEach((header, index) => {
                    article[header] = values[index] || '';
                });
                
                if (article.Title && article.Title.trim()) {
                    articles.push(article);
                }
            }
            
            return articles;
        }

        // Parse a CSV line, handling quoted fields
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        // Escaped quote
                        current += '"';
                        i++;
                    } else {
                        // Toggle quote state
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    // Field separator
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            
            result.push(current.trim());
            return result;
        }

        // Render articles as cards
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            if (articles.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-600">No articles found</div>';
                return;
            }

            articles.forEach((article, index) => {
                const card = createArticleCard(article, index);
                container.appendChild(card);
            });
        }

        // Create article card element
        function createArticleCard(article, index) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow overflow-hidden cursor-pointer';
            card.onclick = () => openModal(index);

            // Fix image paths - handle both absolute and relative paths
            let imagePath = article.Image_URLs ? article.Image_URLs.split('|')[0] : '';
            if (imagePath && !imagePath.startsWith('http')) {
                // Convert articles/images/... to ./images/...
                imagePath = imagePath.replace(/^articles\//, './');
            }
            
            const imageHtml = imagePath ? 
                `<img src="${imagePath}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                `<div class="w-full h-48 bg-gray-300 flex items-center justify-center"><span class="text-gray-500">No image</span></div>`;

            const preview = article.Content
                .replace(/<[^>]*>/g, '')
                .substring(0, 150)
                .replace(/\n/g, ' ') + '...';

            const dateFormatted = formatDate(article.Date);

            card.innerHTML = `
                ${imageHtml}
                <div class="p-4">
                    <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                    <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>${escapeHtml(article.Author)}</span>
                        <span>${dateFormatted}</span>
                    </div>
                </div>
            `;

            return card;
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-author').textContent = `By ${article.Author}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    // Regular paragraphs with good spacing
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        // Fix image paths - convert articles/images/... to ./images/...
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Escape HTML characters
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Load articles on page load
        window.addEventListener('load', loadArticles);
    </script>
</body>
</html>
