<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <h1 class="text-3xl font-bold text-gray-900">🗞️ News Aggregator</h1>
            <p class="text-gray-600 mt-1">Latest articles from multiple sources</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Articles Grid -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be rendered here -->
        </div>
    </main>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-source" class="font-semibold text-blue-600"></span>
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 font-bold text-4xl p-3 rounded-lg transition-colors">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read Full Article →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-8 rounded text-lg">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "BBC News - World", "Title": "Trump demands 'unconditional surrender' from Iran as Putin speaks with Iran's president", "Date": "Sat, 07 Mar 2026 02:04:06 GMT", "Author": "Unknown", "URL": "https://www.bbc.com/news/articles/c5yq82k1wk8o?at_medium=RSS&at_campaign=rss", "Summary": "U.S. President Donald Trump demanded Iran's \"unconditional surrender\" amid ongoing US and Israeli strikes, with no interest in negotiated settlement. He emphasized strengthening Iran's economy post-conflict and expressed intentions to influence Iran's leadership selection, opposing potential successors like Khamenei's son. The White House expects the military campaign to last 4-6 weeks, aiming to weaken Iran's navy and avoid prolonged conflict.", "Content": "US President Donald Trump has demanded Iran's \"unconditional surrender\" as the American and Israeli military continued to launch strikes. Trump said the US and allies would make Iran \"economically bigger, better, and stronger than ever before\" after it picked \"acceptable\" new leadership.\n\nWith the war close to entering a second week, it remains unclear who will lead Iran after the killing of Supreme Leader Ali Khamenei a week ago, or on what terms the US would end its offensive against Tehran, which has triggered region-wide retaliatory strikes. Speaking on Friday, White House spokeswoman Karoline Leavitt said the administration expected military operations to last four to six weeks.\n\nWriting on his Truth Social platform, Trump said: \"There will be no deal with Iran except UNCONDITIONAL SURRENDER! After that, and the selection of a GREAT & ACCEPTABLE Leader(s), we, and many of our wonderful and very brave allies and partners, will work tirelessly to bring Iran back from the brink of destruction, making it economically bigger, better, and stronger than ever before. IRAN WILL HAVE A GREAT FUTURE. MAKE IRAN GREAT AGAIN (MIGA!).\"\n\nTrump's latest intervention suggested he was not interested in a negotiated settlement to the war, though he stopped short of calling for regime change. Since the beginning of the conflict, Trump has avoided the term \"regime change,\" a sign he may be wary of drawing parallels between the attack on Iran and past US wars in the Middle East that he criticised before entering politics. Other senior administration officials have made that argument on Trump's behalf in recent days, saying the president will not let the US get drawn into a protracted, open-ended conflict like in Iraq and Afghanistan.\n\nAsked about the duration of the offensive, Leavitt told reporters: \"We expect [the war] to last about 4 to 6 weeks, and we are well on our way to achieving those objectives, annihilating Iran's navy.\" She also said Trump did not want Iran to be led by \"a radical terrorist or a regime that chants death to America.\" The White House press secretary told reporters: \"[Trump] wants to take an interest in and pursuing who the next leader of the Iranian country is going to be. And that has yet to be, the president is discussing it.\"\n\nEarlier this week, Trump told US outlet Axios he expected to play a role in the selection of Iran's next leader. Responding to reports that Khamenei's son Mojtaba\u2014a conservative close to Iran's powerful Islamic Revolutionary Guard Corps military wing\u2014could be installed as leader, Trump said that would be \"unacceptable.\" Trump has likened the situation in Iran to the US raid on Venezuela earlier this year, in which he removed the co...", "Image_URLs": "articles/images/fa5d3e90-197c-11f1-9156-4356592fc9c8_3.jpg"}, {"Source": "CBC News - World", "Title": "Conflict spreads across the Middle East in days after U.S.-Israel attack kills Iran's supreme leader", "Date": "Sat, 28 Feb 2026 06:07:45 EST", "Author": "Sarah Petz", "URL": "https://www.cbc.ca/news/world/livestory/iran-israel-us-war-day-7-9.7109761?cmp=rss", "Summary": "Conflict in the Middle East escalates after the U.S.-Israel attack kills Iran's leader. Iran retaliates with strikes on Israel and U.S. bases, while Israel targets Hezbollah in Lebanon. Hundreds are dead, thousands evacuated, and a humanitarian crisis persists. U.S. President Trump calls for unconditional surrender; Canada evacuates 3,500 citizens. Death tolls exceed 1,230 in Iran and 217 in Lebanon.", "Content": "Conflict spreads across the Middle East days after the U.S.-Israel attack kills Iran's supreme leader. Countries rush to evacuate citizens as Iran retaliates for ongoing strikes. Rescuers inspect the site of an Israel and U.S. strike on a police station in Tehran, Iran, on March 3.\n\nThe U.S.-Israeli war on Iran continues to widen after nearly a week, leaving hundreds dead, thousands seeking evacuation, and many facing a humanitarian crisis. Iran launched retaliatory attacks on Israel and U.S. bases, while Israel intensified its campaign against Iran-backed Hezbollah militants in Lebanon.\n\nOn Friday, U.S. President Donald Trump stated that the only deal with Iran to potentially end the war would be \"unconditional surrender.\" Prime Minister Mark Carney said Canada had no plans to engage militarily as of Friday, focusing instead on evacuating 3,500 Canadians who requested assistance from the region.\n\nThe death tolls as of Friday include more than 1,230 people in Iran. The Lebanese Health Ministry reported 217 people killed and more than 790 wounded due to Israeli attacks.", "Image_URLs": "articles/images/default_9.jpg|articles/images/default_10.jpg"}, {"Source": "ESPN NFL News", "Title": "Maxx Crosby to the Ravens: What's next for both teams, plus free agency and draft implications", "Date": "Fri, 6 Mar 2026 23:26:09 EST", "Author": "Jamison Hensley, Ryan McFadden, Dan Graziano, Matt Miller", "URL": "https://www.espn.com/nfl/story/_/id/48127938/las-vegas-raiders-trade-maxx-crosby-baltimore-ravens-questions-draft-free-agency", "Summary": "The Raiders traded defensive end Maxx Crosby to the Ravens for 2026 and 2027 first-round picks. Crosby, a five-time Pro Bowler with 69.5 career sacks, contributed to a 26-23 upset win over Baltimore in September 2024. The Ravens sought to enhance their pass rush, making Crosby a key addition.", "Content": "The Raiders agreed to trade defensive end Maxx Crosby to the Ravens in exchange for 2026 and 2027 first-round picks, sources told ESPN's Adam Schefter on Friday night.\n\nAs a defensive end for the Las Vegas Raiders, Crosby went into Baltimore in September 2024 and contributed to a 26-23 upset win against the Baltimore Ravens. He finished with six tackles, four tackles for loss, and two sacks, including one where he looped through the middle and flattened quarterback Lamar Jackson on his back.\n\nThe Ravens wanted to bring that ferocious pass rush to Baltimore so badly that they acquired Crosby from the Raiders in exchange for first-round picks in 2026 and 2027, sources told ESPN's Adam Schefter. Crosby, 28, is a five-time Pro Bowler and will be a game-changer for the Ravens. His 69.5 career sacks since 2019 are more than double what anyone has produced in Baltimore over that span, with defensive tackle Nnamdi Madubuikeleads the Ravens with 30 sacks since 2019.\n\nAt the NFL combine, Ravens general manager Eric De Costa emphasized that upgrading at edge rusher was a priority for Baltimore this offseason. \"When we look at the best defenses, we ferocious pass rush, and that was lacking this year for different reasons,\" De Costa said in February.", "Image_URLs": "articles/images/Maxx_Crosby_to_the_Ravens:_Wha.jpg"}, {"Source": "Star Phoenix", "Title": "Despite off-night shooting, Huskies advance to women's hoops semifinal", "Date": "Fri, 06 Mar 2026 17:08:22 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/sports/local-sports/u-of-s-huskies/despite-off-night-shooting-huskies-advance-to-womens-hoops-semifinal", "Summary": "The University of Saskatchewan Huskies advanced to the U Sports women\u2019s basketball semifinals with a 71-55 win over UBC, despite shooting poorly. Led by Gage Grassick\u2019s 25 points, they face Laval next. Laval upset top-ranked Toronto Metropolitan, and Calgary will play New Brunswick in the other semifinal.", "Content": "Though the University of Saskatchewan Huskies were off-target on the offensive end, they were sharp enough defensively to make up for it as they began their pursuit for back-to-back national basketball titles.\n\nIn their quarterfinal on Thursday versus Canada West rival British Columbia at the U Sports Women\u2019s Final 8 in Quebec City, the fifth-placed Huskies shot just 24 per cent from three-point range and 48 per cent from the free throw line, but overcame those struggles by locking down the fourth-placed Thunderbirds. Holding UBC to 34 per cent shooting from the field and never allowing more than 15 points in any quarter, the Huskies advanced to Saturday\u2019s semifinal with a 71-55 victory.\n\nWinners of U Sports crowns in 2016, 2020 and 2025, the Huskies have another national title within reach. The team, undefeated in the regular season, lost in the Canada West semifinal but received the lone wild card to nationals.\n\n\u201cI think if we can defend like that and we can have a bit better shooting night, then we\u2019ll give ourselves a chance no matter who we\u2019re playing against,\u201d Huskies head coach Lisa Thomaidis said following the game.\n\nFirst-team all-Canadian Gage Grassick led the Huskies with a game-high 25 points, while adding three steals and four rebounds. Ella Murphy Wiebe scored 16 points and hauled down eight rebounds. Maya Flindell and Andrea Dodig each scored 11 points for the team. Sara Toneguzzi had a team-high 21 points for UBC.\n\nIn Saturday\u2019s semifinal, the Huskies take on No. 8- and host Laval. In a first-round shocker, the Rouge et Or knocked off top-ranked Toronto Metropolitan 57-54. Sabrine Khelifi, who led her team with 14 points, banked a three-pointer from the top of the arc with 15 seconds left in the fourth quarter to break the tie and propel her squad to the medal round.\n\nThe Huskies tip off Saturday against Laval at 4 p.m. On the other side of the bracket, Canada West champion and third-ranked Calgary Dinos advanced with a 58-45 win over sixth-ranked McGill. In Saturday\u2019s other semifinal, Calgary faces off against No. 2- and host New Brunswick, which handled seventh-ranked Carleton Ravens 80-63.", "Image_URLs": "articles/images/0309-sports-huskies-bball-44_293705946_27.jpg"}, {"Source": "CBC News - World", "Title": "U.S. says it worked with Ecuador to bomb alleged drug-trafficking operations site", "Date": "Fri, 06 Mar 2026 22:15:00 EST", "Author": "Unknown", "URL": "https://www.cbc.ca/news/world/us-ecuador-joint-operation-drug-trafficking-9.7118563?cmp=rss", "Summary": "The U.S. and Ecuador conducted a joint operation targeting a Colombian FARC dissident drug training camp near Ecuador's Colombian border, using helicopters, aircraft, boats, and drones. The operation aimed to dismantle narco-terrorist networks, with no details on casualties. Ecuador's President Noboa emphasized a crackdown on organized crime and highlighted U.S. support.", "Content": "The U.S. and Ecuador carried out a joint operation targeting drug trafficking in Ecuador, authorities in both countries announced on Friday. The U.S. described the operation as \"lethal kinetic operations.\" Neither U.S. Southern Command nor Ecuador's defense ministry provided details on whether anyone was killed or captured during the strike.\n\nThe operation involved helicopters, aircraft, river boats, and drones to locate and bomb a drug traffickers' training camp in northeastern Ecuador near the Colombian border, according to Ecuador's defense ministry. The camp belonged to the Comandos de la Frontera (CDF), a Colombian criminal organization composed of FARC dissidents, with a capacity for 50 people.\n\nEcuadorian President Daniel Noboa has prioritized a military crackdown on organized crime. His government has also imposed tariffs on Colombia, accusing it of insufficient efforts to combat drug trafficking. Noboa is scheduled to travel to Miami this weekend to participate in the \"Shield of the Americas\" summit, which gathers regional leaders to discuss security and organized crime.\n\nThe Ecuadorian defense ministry stated, \"The United States is a key ally in this fight,\" adding that the operation was conducted at Ecuador's request to dismantle narco-terrorist networks. The operation followed a similar joint effort announced earlier this week by U.S. Southern Command.", "Image_URLs": "articles/images/default_11.jpg"}, {"Source": "Star Phoenix", "Title": "Complex repairs needed after semi collision with Saskatoon overpass", "Date": "Fri, 06 Mar 2026 16:26:20 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/news/local-news/semi-collision-with-overpass-reduces-saskatoon-freeway-lanes", "Summary": "A semi hauling heavy equipment struck the Highway 11, Highway 16, and Circle Drive overpass in Saskatoon, causing significant damage. Traffic was reduced to a single lane, with closures on northbound Highway 11 and eastbound Circle Drive. No injuries were reported. Repairs are underway, but a timeline is not yet available.", "Content": "Traffic moved through a single open lane beneath the Circle Drive overpass on Highway 11 as crews assessed damage after a semi hauling heavy equipment struck the structure Thursday afternoon. Saskatoon Police reported that the collision caused significant damage to the overpass at the Highway 11, Highway 16, and Circle Drive cloverleaf.\n\nThe City of Saskatoon stated that the extent of the damage and the cost of repairs were not immediately known after the collision. Planning for repairs was underway on Friday, but a timeline was not available due to the complexity and extent of the work required.\n\nAccording to Saskatoon police, a semi with a trailer carrying equipment on Thursday around 5 p.m. was too high for the structure while traveling northbound on Highway 11 from Regina, entering the city limits at the Circle Drive overpass. The impact caused significant damage. \n\nNorthbound traffic on Highway 11 and eastbound traffic on Circle Drive were immediately closed off for hours before one lane in each direction was reopened. No injuries were reported. \n\nCity engineers, Saskatoon police, emergency services, and collision analysts were on the scene. Analysts worked with Saskatchewan Highway Patrol to investigate the incident. Work began on Friday morning to safely remove loose concrete and address safety concerns.\n\nSouthbound traffic on Highway 11 and westbound traffic on Highway 16 remained unaffected. Northbound semi trucks on Highway 11 were being detoured around the area at Township 360 via Range Road 3050.", "Image_URLs": "articles/images/0307-news-circle-drive-overpass-1_301870116_10.jpg"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `By ${article.Author}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
