<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Phoenix Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <h1 class="text-3xl font-bold text-gray-900">🗞️ Star Phoenix News</h1>
            <p class="text-gray-600 mt-1">Latest articles from Star Phoenix RSS feed</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Articles Grid -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be rendered here -->
        </div>
    </main>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 font-bold text-2xl ml-4">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read on Star Phoenix →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Title": "Despite off-night shooting, Huskies advance to women's hoops semifinal", "Date": "Fri, 06 Mar 2026 17:08:22 +0000", "Author": "thestarphoenix", "URL": "https://thestarphoenix.com/sports/local-sports/u-of-s-huskies/despite-off-night-shooting-huskies-advance-to-womens-hoops-semifinal", "Summary": "The University of Saskatchewan Huskies advanced to the U Sports women\u2019s basketball semifinals with a 71-55 win over UBC, despite shooting poorly. Led by Gage Grassick\u2019s 25 points, they aim for a second consecutive title. They will face Laval, which upset Toronto Metropolitan, in Saturday\u2019s semifinal in Quebec City.", "Content": "Though the University of Saskatchewan Huskies were off-target on the offensive end, they were sharp enough defensively to make up for it as they began their pursuit for back-to-back national basketball titles. In their quarterfinal on Thursday versus Canada West rival British Columbia at the U Sports Women\u2019s Final 8 in Quebec City, the fifth-placed Huskies shot just 24 per cent from three-point range and 48 per cent from the free throw line, but overcame those struggles by locking down the fourth-placed Thunderbirds. Holding UBC to 34 per cent shooting from the field and never allowing more than 15 points in any quarter, the Huskies advanced to Saturday\u2019s semifinal with a 71-55 victory.\n\nWinners of U Sports crowns in 2016, 2020 and 2025, the Huskies have another national title within reach. The team, undefeated in the regular season, lost in the Canada West semifinal but received the lone wild card to nationals.\n\n\u201cI think if we can defend like that and we can have a bit better shooting night, then we\u2019ll give ourselves a chance no matter who we\u2019re playing against,\u201d Huskies head coach Lisa Thomaidis said following the game.\n\nFirst-team all-Canadian Gage Grassick led the Huskies with a game-high 25 points, while adding three steals and four rebounds. Ella Murphy Wiebe scored 16 points and hauled down eight rebounds. Maya Flindell and Andrea Dodig each scored 11 points for the team. Sara Toneguzzi had a team-high 21 points for UBC.\n\nIn Saturday\u2019s semifinal, the Huskies take on No. 8- and host Laval. In a first-round shocker, the Rouge et Or knocked off top-ranked Toronto Metropolitan 57-54. Sabrine Khelifi, who led her team with 14 points, banked a three-pointer from the top of the arc with 15 seconds left in the fourth quarter to break the tie and propel her squad to the medal round.\n\nThe Huskies tip off Saturday against Laval at 4 p.m. On the other side of the bracket, Canada West champion and third-ranked Calgary Dinos advanced with a 58-45 win over sixth-ranked McGill. In Saturday\u2019s other semifinal, Calgary faces off against No. 2-ranked New Brunswick, which handled seventh-ranked Carleton Ravens 80-63.", "Image_URLs": "articles/images/0309-sports-huskies-bball-44_293705946_24.jpg"}];

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            articles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-author').textContent = `By ${article.Author}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
