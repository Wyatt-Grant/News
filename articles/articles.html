<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <h1 class="text-3xl font-bold text-gray-900">🗞️ News Aggregator</h1>
            <p class="text-gray-600 mt-1">Latest articles from multiple sources</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Articles Grid -->
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Articles will be rendered here -->
        </div>
    </main>

    <!-- Article Detail Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto" onclick="closeOnOverlayClick(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal Header -->
                <div class="sticky top-0 bg-white border-b p-4 sm:p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-bold text-gray-900 break-words"></h2>
                        <div id="modal-meta" class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
                            <span id="modal-source" class="font-semibold text-blue-600"></span>
                            <span id="modal-author"></span>
                            <span id="modal-date"></span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 font-bold text-4xl p-3 rounded-lg transition-colors">
                        ✕
                    </button>
                </div>

                <!-- Modal Image -->
                <div id="modal-image-container" class="bg-gray-100">
                    <!-- Images will be inserted here -->
                </div>

                <!-- Modal Content -->
                <div class="p-6 sm:p-8">
                    <div id="modal-summary" class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded"></div>
                    <div id="modal-content" class="max-w-none prose-base"></div>
                    <a id="modal-link" href="#" target="_blank" class="inline-block mt-6 text-blue-600 hover:text-blue-800 font-semibold underline">
                        Read Full Article →
                    </a>
                </div>

                <!-- Modal Footer -->
                <div class="border-t p-4 text-center">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-8 rounded text-lg">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded article data
        const articles = [{"Source": "Film Jabber", "Title": "Hoppers", "Date": "2026-03-06", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/hoppers.html", "Summary": "\"Hoppers\" is an upcoming animated sci-fi comedy film set for release on March 6, 2026, by Walt Disney Pictures. Directed by Daniel Chong, it stars Jon Hamm, Bobby Moynihan, and Piper Curda. The story involves scientists enabling humans to transfer consciousness into robotic animals, with Mabel exploring mysteries in the animal world.", "Content": "Hoppers (2026) is an action animated comedy sci-fi film rated PG, with a runtime of 105 minutes. It is scheduled for release on March 6, 2026, and is directed by Daniel Chong, written by Jesse Andrews and Daniel Chong. The cast includes Jon Hamm, Bobby Moynihan, and Piper Curda. The film is produced by Walt Disney Pictures.\n\nIn \u201cHoppers,\u201d scientists have discovered how to \u201chop\u201d human consciousness into lifelike robotic animals, allowing people to communicate with animals as animals. Using this new technology, Mabel (Curda) will uncover mysteries within the animal world that are beyond anything she could have imagined.", "Image_URLs": "articles/images/hoppers-movie-poster-7531.webp"}, {"Source": "Film Jabber", "Title": "The Bride", "Date": "2026-03-06", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/the-bride-frankenstein.html", "Summary": "\"The Bride\" (2026), directed by Maggie Gyllenhaal, is an R-rated horror-drama-romance film releasing on March 6, 2026. Featuring stars like Jessie Buckley, Christian Bale, and Annette Bening, it follows a lonely Frankenstein (Bale) in 1930s Chicago who collaborates with scientist Dr. Euphronious to revive a murdered woman, creating The Bride. The film explores themes of love, life, and monstrosity.", "Content": "The Bride (2026) is a horror, drama, and romance film rated R, with a runtime of 126 minutes. It is scheduled for release on March 6, 2026. The film is directed and written by Maggie Gyllenhaal, known for her work on The Lost Daughter. The cast includes Jessie Buckley, Christian Bale, Peter Sarsgaard, Annette Bening, Jake Gyllenhaal, and Pen\u00e9lope Cruz. It is produced by Warner Brothers.\n\nThe story centers on a lonely Frankenstein (Bale) who travels to 1930s Chicago to meet groundbreaking scientist Dr. Euphronious (Annette Bening) to create a companion. Together, they revive a murdered young woman, resulting in the birth of The Bride (Buckley). The film offers a bold, iconoclastic take on a compelling story, blending life, macabre romance, and ambitious ideas. Maggie Gyllenhaal's vision presents a beautiful yet hideous creature that is both captivating and unsettling.", "Image_URLs": "articles/images/the-bride-frankenstein-7646.webp"}, {"Source": "Film Jabber", "Title": "Sir\u0101t", "Date": "2026-03-06", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/sirat.html", "Summary": "\"Sir\u0101t\" (2025) is a 115-minute foreign suspense drama directed by Oliver Laxe. Starring Sergi L\u00f3pez, it follows a father and son searching for their missing daughter at a Moroccan mountain rave, amid electronic music and a sense of freedom, as hope fades and they pursue her last known whereabouts.", "Content": "Sir\u0101t (2025) is a foreign suspense drama with an R rating, running for 115 minutes. It is directed by Oliver Laxe and written by Santiago Fillol and Oliver Laxe. The cast includes Sergi L\u00f3pez, Bruno N\u00fa\u00f1ez, Stefania Gadda, Joshua Liam Henderson, Tonin Janvier, Jade Oukid, and Richard Bellamy.\n\nThe story follows a father (Sergi L\u00f3pez) and his son who arrive at a rave deep in the mountains of southern Morocco. They are searching for Mar, their daughter and sister, who vanished months earlier at one of these endless, sleepless parties. Surrounded by electronic music and a raw, unfamiliar sense of freedom, they repeatedly show her photo. As hope diminishes, they continue their search, following a group of ravers to one last destination.", "Image_URLs": "articles/images/sirat-7610.webp"}, {"Source": "Film Jabber", "Title": "Scream 7", "Date": "2026-03-06", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/scream-7.html", "Summary": "Scream 7, an R-rated horror comedy, is set for release on February 27, 2026, with a 114-minute runtime. Directed and written by Kevin Williamson, it features Neve Campbell and Courteney Cox. The story follows Sidney Prescott as she confronts a new Ghostface killer targeting her daughter in a quiet town.", "Content": "Scream 7 (2026) is a horror comedy rated R with a runtime of 114 minutes. It is scheduled for release on February 27, 2026. The film is directed and written by Kevin Williamson, with additional writing by Guy Busick and James Vanderbilt. The cast includes Neve Campbell, Courteney Cox, Isabel May, Jasmin Savoy Brown, Mason Gooding, Anna Camp, Joel McHale, Mckenna Grace, Michelle Randolph, Jimmy Tatro, Asa Germann, Celeste O\u2019Connor, Sam Rechner, Ethan Embry, Tim Simons, and Mark Consuelos. It is produced by Paramount Pictures.\n\nThe story centers on a new Ghostface killer emerging in a quiet town where Sidney Prescott (Neve Campbell) has started a new life. Her daughter (Isabel May) becomes the next target, prompting Sidney to confront her past in order to stop the bloodshed and protect her family.", "Image_URLs": "articles/images/favicon_1772861174_www_filmjabber_com.ico"}, {"Source": "Film Jabber", "Title": "How to Make a Killing", "Date": "2026-03-06", "Author": "Unknown", "URL": "http://www.filmjabber.com/movie-preview/how-to-make-a-killing.html", "Summary": "\"How to Make a Killing\" (2026), directed by John Patton Ford and starring Glen Powell, Margaret Qualley, and others, is a crime-comedy about Becket Redfellow, disowned by his wealthy family. Desperate to reclaim his inheritance, he considers killing relatives to inherit $28 billion. The film is set for release on February 20, 2026.", "Content": "How to Make a Killing (2026)\n\nCrime, Suspense, Comedy  \nRated R  \n105 minutes  \nRelease Date: February 20, 2026  \nDirector: John Patton Ford  \nWriter: John Patton Ford  \nCast: Glen Powell, Margaret Qualley, Jessica Henwick, Bill Camp, Zach Woods, Topher Grace, Ed Harris  \nStudio: A24  \n\nDisowned at birth by his obscenely wealthy family, blue-collar Becket Redfellow (Glen Powell) will stop at nothing to reclaim his inheritance, no matter how many relatives stand in his way.\n\nIn How to Make a Killing, Glen Powell plays a man who just hasn\u2019t been dealt any luck in his life: he\u2019s incredibly good looking, has a high-earning career, and has two knockout women swooning over him. Oh, and if he kills off several of his relatives, he\u2019ll inherit $28 billion.", "Image_URLs": "articles/images/how-to-make-a-killing-7639.webp"}];

        // Source color mapping
        const sourceColors = {
            'Star Phoenix': { bg: 'bg-red-100', text: 'text-red-800' },
            'CBC News - World': { bg: 'bg-orange-100', text: 'text-orange-800' },
            'New York Times - World': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
            'Smashing Magazine': { bg: 'bg-pink-100', text: 'text-pink-800' },
            'Laravel News': { bg: 'bg-purple-100', text: 'text-purple-800' },
            'Saskatoon Police News': { bg: 'bg-indigo-100', text: 'text-indigo-800' },
            'Thomson Reuters News': { bg: 'bg-cyan-100', text: 'text-cyan-800' },
            'BBC News - World': { bg: 'bg-teal-100', text: 'text-teal-800' },
            'Dow Jones - Top Stories': { bg: 'bg-green-100', text: 'text-green-800' },
            'The Hockey Writers': { bg: 'bg-sky-100', text: 'text-sky-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' },
            'ESPN NFL News': { bg: 'bg-violet-100', text: 'text-violet-800' }
        };

        function getSourceColor(source) {
            return sourceColors[source] || { bg: 'bg-gray-100', text: 'text-gray-800' };
        }

        // Render articles
        function renderArticles() {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';

            // Sort articles by date (newest first)
            const sortedArticles = articles.sort((a, b) => {
                const dateA = new Date(a.Date) || new Date(0);
                const dateB = new Date(b.Date) || new Date(0);
                return dateB - dateA;
            });

            sortedArticles.forEach((article, index) => {
                const dateFormatted = formatDate(article.Date);
                const sourceColor = getSourceColor(article.Source);
                
                // Get first image if available
                let imagePath = '';
                if (article.Image_URLs) {
                    const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                    if (imagePaths.length > 0) {
                        imagePath = imagePaths[0];
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                    }
                }

                const imageHtml = imagePath ? 
                    `<img src="${escapeHtml(imagePath)}" alt="Article image" class="w-full h-48 object-cover bg-gray-200" onerror="this.parentElement.style.backgroundColor='#d1d5db'; this.style.display='none';">` :
                    '';

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow hover:shadow-lg transition-shadow cursor-pointer overflow-hidden';
                card.innerHTML = `
                    ${imageHtml}
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-semibold ${sourceColor.bg} ${sourceColor.text} px-2 py-1 rounded">${escapeHtml(article.Source)}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 mb-2 line-clamp-2">${escapeHtml(article.Title)}</h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2 leading-relaxed">${escapeHtml(article.Summary ? article.Summary.substring(0, 125) : 'No summary available')}</p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span>${escapeHtml(article.Author)}</span>
                            <span>${dateFormatted}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(index);
                container.appendChild(card);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Open modal with article details
        function openModal(index) {
            const article = articles[index];
            const modal = document.getElementById('modal');

            // Set content
            document.getElementById('modal-title').textContent = article.Title;
            document.getElementById('modal-source').textContent = article.Source;
            document.getElementById('modal-author').textContent = `${article.Author !== 'Unknown' ? ('By ' + article.Author) : ''}`;
            document.getElementById('modal-date').textContent = formatDate(article.Date);
            document.getElementById('modal-link').href = article.URL;

            // Show summary if available
            if (article.Summary && article.Summary.trim()) {
                document.getElementById('modal-summary').innerHTML = `<p class="font-semibold text-gray-800 leading-relaxed m-0">${escapeHtml(article.Summary)}</p>`;
            } else {
                document.getElementById('modal-summary').innerHTML = '';
            }

            // Format content with line breaks and styling
            const formattedContent = article.Content
                .split('\n\n')
                .filter(p => p.trim())
                .map((p) => {
                    const escaped = escapeHtml(p);
                    return `<p class="mb-4 leading-relaxed text-gray-700">${escaped}</p>`;
                })
                .join('');
            document.getElementById('modal-content').innerHTML = formattedContent;

            // Add images if available
            const imageContainer = document.getElementById('modal-image-container');
            imageContainer.innerHTML = '';
            if (article.Image_URLs) {
                const imagePaths = article.Image_URLs.split('|').filter(p => p.trim());
                if (imagePaths.length > 0) {
                    imagePaths.forEach(imagePath => {
                        if (!imagePath.startsWith('http')) {
                            imagePath = imagePath.replace(/^articles\//, './');
                        }
                        
                        const img = document.createElement('img');
                        img.src = imagePath;
                        img.alt = article.Title;
                        img.className = 'w-full h-auto';
                        img.onerror = () => {
                            console.warn('Failed to load image:', imagePath);
                        };
                        imageContainer.appendChild(img);
                    });
                }
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking on the overlay (dark background)
        function closeOnOverlayClick(event) {
            // Check if the click was on the modal itself (overlay), not on the white content box
            const contentBox = event.target.closest('.bg-white');
            if (!contentBox) {
                closeModal();
            }
        }

        // Format date
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Initialize
        renderArticles();
    </script>
</body>
</html>
